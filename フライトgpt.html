<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Real 3D Flight Simulator</title>
<style>
html,body{margin:0;overflow:hidden;background:#87ceeb;font-family:Arial,sans-serif;color:white;touch-action:none;overscroll-behavior:none;-webkit-user-select:none;user-select:none}
#hud{position:fixed;top:calc(10px + env(safe-area-inset-top));left:10px;background:rgba(0,0,0,.45);padding:10px 12px;border-radius:12px;font-size:13px;line-height:1.5;z-index:10;backdrop-filter:blur(6px)}
#help{position:fixed;right:10px;top:calc(10px + env(safe-area-inset-top));background:rgba(0,0,0,.45);padding:10px 12px;border-radius:12px;font-size:12px;line-height:1.5;z-index:10;max-width:42vw;backdrop-filter:blur(6px)}
#touchControls{position:fixed;left:0;right:0;bottom:calc(12px + env(safe-area-inset-bottom));z-index:20;display:none;pointer-events:none}
.touchCluster{display:flex;gap:8px;align-items:center;justify-content:center;pointer-events:auto}
.touchBtn{width:58px;height:58px;border-radius:18px;border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.35);color:#fff;font-size:22px;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,.28);backdrop-filter:blur(8px)}
.touchBtn:active{transform:scale(.94);background:rgba(255,255,255,.22)}
#leftPad{position:absolute;left:12px;bottom:0;display:grid;grid-template-columns:58px 58px 58px;grid-template-rows:58px 58px 58px;gap:6px;pointer-events:auto}
#rightPad{position:absolute;right:12px;bottom:0;display:flex;flex-direction:column;gap:8px;pointer-events:auto}
#mobileTopBtns{position:fixed;right:10px;bottom:calc(150px + env(safe-area-inset-bottom));display:none;flex-direction:column;gap:8px;z-index:21}
.smallTouch{width:62px;height:38px;border-radius:14px;font-size:14px}
@media (max-width: 800px){
  #help{display:none}
  #touchControls,#mobileTopBtns{display:block}
  #hud{font-size:12px;padding:8px 10px}
  #center{opacity:.72}
}
#center{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border:2px solid rgba(255,255,255,.7);border-radius:50%;z-index:9}
#center:before,#center:after{content:"";position:absolute;background:rgba(255,255,255,.7)}
#center:before{width:34px;height:2px;left:-10px;top:8px}
#center:after{width:2px;height:34px;left:8px;top:-10px}
</style>
</head>
<body>
<div id="hud"></div>
<div id="help">
<b>3D Flight Simulator</b><br>
W/S：スロットル<br>
↑↓：機首上下<br>
←→：ロール<br>
A/D：ヨー<br>
C：視点切替<br>
R：リセット
</div>
<div id="center"></div>
<div id="mobileTopBtns">
  <button class="touchBtn smallTouch" data-key="c">視点</button>
  <button class="touchBtn smallTouch" data-key="r">リセット</button>
</div>
<div id="touchControls">
  <div id="leftPad">
    <span></span><button class="touchBtn" data-key="arrowup">▲</button><span></span>
    <button class="touchBtn" data-key="arrowleft">◀</button><span></span><button class="touchBtn" data-key="arrowright">▶</button>
    <span></span><button class="touchBtn" data-key="arrowdown">▼</button><span></span>
  </div>
  <div id="rightPad">
    <button class="touchBtn" data-key="w">加速</button>
    <button class="touchBtn" data-key="s">減速</button>
    <button class="touchBtn" data-key="a">左旋</button>
    <button class="touchBtn" data-key="d">右旋</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
let scene,camera,renderer,plane,clock;
let speed=0.6, throttle=0.55;
let altitude=120;
let viewMode=0;
const keys={};
const hud=document.getElementById("hud");

init();
animate();

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87ceeb);
  scene.fog=new THREE.Fog(0x87ceeb,800,4200);

  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,10000);

  const isMobile=matchMedia('(max-width: 800px), (pointer: coarse)').matches;
  renderer=new THREE.WebGLRenderer({antialias:!isMobile,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,isMobile?1.35:2));
  document.body.appendChild(renderer.domElement);

  clock=new THREE.Clock();

  const hemi=new THREE.HemisphereLight(0xffffff,0x446644,1.3);
  scene.add(hemi);

  const sun=new THREE.DirectionalLight(0xffffff,1.6);
  sun.position.set(700,1200,500);
  scene.add(sun);

  createTerrain();
  createClouds();
  createRunway();
  createPlane();

  resetPlane();

  addEventListener("resize",()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });

  addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()]=true;
    if(e.key.toLowerCase()==="r") resetPlane();
    if(e.key.toLowerCase()==="c") viewMode=(viewMode+1)%3;
  });
  addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.querySelectorAll('[data-key]').forEach(btn=>{
    const k=btn.dataset.key;
    const on=ev=>{
      ev.preventDefault();
      if(k==='r'){ resetPlane(); return; }
      if(k==='c'){ viewMode=(viewMode+1)%3; return; }
      keys[k]=true;
    };
    const off=ev=>{
      ev.preventDefault();
      if(k!=='r'&&k!=='c') keys[k]=false;
    };
    btn.addEventListener('pointerdown',on);
    btn.addEventListener('pointerup',off);
    btn.addEventListener('pointercancel',off);
    btn.addEventListener('pointerleave',off);
  });
}

function createTerrain(){
  const geo=new THREE.PlaneGeometry(9000,9000,180,180);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), z=pos.getZ(i);
    const h=Math.sin(x*.003)*35+Math.cos(z*.004)*25+Math.sin((x+z)*.002)*30;
    pos.setY(i,h);
  }
  geo.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({color:0x3f8f3f,roughness:.95});
  const mesh=new THREE.Mesh(geo,mat);
  scene.add(mesh);

  const treeCount=matchMedia('(max-width: 800px), (pointer: coarse)').matches?120:280;
  for(let i=0;i<treeCount;i++){
    const tree=new THREE.Group();
    const trunk=new THREE.Mesh(
      new THREE.CylinderGeometry(1.2,1.8,12,6),
      new THREE.MeshStandardMaterial({color:0x5b3418})
    );
    trunk.position.y=6;
    const leaf=new THREE.Mesh(
      new THREE.ConeGeometry(8+Math.random()*8,25+Math.random()*18,8),
      new THREE.MeshStandardMaterial({color:0x124f23})
    );
    leaf.position.y=25;
    tree.add(trunk,leaf);
    tree.position.set((Math.random()-.5)*8000,0,(Math.random()-.5)*8000);
    tree.scale.setScalar(.8+Math.random()*1.5);
    scene.add(tree);
  }
}

function createClouds(){
  const mat=new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:.85});
  const cloudCount=matchMedia('(max-width: 800px), (pointer: coarse)').matches?38:75;
  for(let i=0;i<cloudCount;i++){
    const cloud=new THREE.Group();
    for(let j=0;j<5+Math.random()*5;j++){
      const m=new THREE.Mesh(new THREE.SphereGeometry(25+Math.random()*35,16,12),mat);
      m.position.set(j*35+Math.random()*20,Math.random()*20,Math.random()*30);
      m.scale.y=.45;
      cloud.add(m);
    }
    cloud.position.set((Math.random()-.5)*7000,500+Math.random()*900,(Math.random()-.5)*7000);
    scene.add(cloud);
  }
}

function createRunway(){
  const runway=new THREE.Mesh(
    new THREE.BoxGeometry(90,2,850),
    new THREE.MeshStandardMaterial({color:0x202020,roughness:.7})
  );
  runway.position.set(0,3,0);
  scene.add(runway);

  for(let i=-360;i<=360;i+=80){
    const line=new THREE.Mesh(
      new THREE.BoxGeometry(5,2.2,38),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );
    line.position.set(0,5,i);
    scene.add(line);
  }
}

function createPlane(){
  plane=new THREE.Group();

  const body=new THREE.Mesh(
    new THREE.CylinderGeometry(6,8,54,24),
    new THREE.MeshStandardMaterial({color:0xd9dde3,metalness:.35,roughness:.35})
  );
  body.rotation.z=Math.PI/2;

  const nose=new THREE.Mesh(
    new THREE.ConeGeometry(8,18,24),
    new THREE.MeshStandardMaterial({color:0xf2f4f7,metalness:.3,roughness:.3})
  );
  nose.rotation.z=-Math.PI/2;
  nose.position.x=36;

  const wing=new THREE.Mesh(
    new THREE.BoxGeometry(14,2,80),
    new THREE.MeshStandardMaterial({color:0xc4ccd8,metalness:.25,roughness:.4})
  );
  wing.position.x=2;

  const tailWing=new THREE.Mesh(
    new THREE.BoxGeometry(9,1.5,34),
    new THREE.MeshStandardMaterial({color:0xc4ccd8})
  );
  tailWing.position.x=-28;

  const fin=new THREE.Mesh(
    new THREE.BoxGeometry(8,24,2),
    new THREE.MeshStandardMaterial({color:0xb7c0cc})
  );
  fin.position.set(-29,12,0);

  const cockpit=new THREE.Mesh(
    new THREE.SphereGeometry(7,20,12),
    new THREE.MeshStandardMaterial({color:0x16324f,transparent:true,opacity:.65,metalness:.1,roughness:.05})
  );
  cockpit.scale.set(1.2,.45,.75);
  cockpit.position.set(15,7,0);

  plane.add(body,nose,wing,tailWing,fin,cockpit);
  scene.add(plane);
}

function resetPlane(){
  speed=.8;
  throttle=.55;
  plane.position.set(0,120,250);
  plane.rotation.set(0,Math.PI,0);
}

function updatePlane(dt){
  if(keys["w"]) throttle+=dt*.35;
  if(keys["s"]) throttle-=dt*.35;
  throttle=Math.max(0,Math.min(1,throttle));

  speed += (throttle*3.2-speed)*dt*.55;
  speed=Math.max(.15,speed);

  const pitchInput=(keys["arrowup"]?1:0)-(keys["arrowdown"]?1:0);
  const rollInput=(keys["arrowleft"]?1:0)-(keys["arrowright"]?1:0);
  const yawInput=(keys["a"]?1:0)-(keys["d"]?1:0);

  plane.rotateZ(rollInput*dt*1.35);
  plane.rotateX(pitchInput*dt*.85);
  plane.rotateY(yawInput*dt*.55);

  plane.rotation.z*=0.997;

  const forward=new THREE.Vector3(1,0,0).applyQuaternion(plane.quaternion);
  plane.position.addScaledVector(forward,speed*60*dt);

  const lift=(speed*.45 + throttle*.8) - .45;
  plane.position.y += lift*dt*22;

  if(plane.position.y<18){
    plane.position.y=18;
    plane.rotation.x*=.96;
    speed*=.985;
  }

  const bound=4300;
  if(Math.abs(plane.position.x)>bound) plane.position.x*=-.9;
  if(Math.abs(plane.position.z)>bound) plane.position.z*=-.9;
}

function updateCamera(dt){
  const forward=new THREE.Vector3(1,0,0).applyQuaternion(plane.quaternion);
  const up=new THREE.Vector3(0,1,0).applyQuaternion(plane.quaternion);

  let targetPos;
  if(viewMode===0){
    targetPos=plane.position.clone()
      .addScaledVector(forward,-115)
      .addScaledVector(up,38);
  }else if(viewMode===1){
    targetPos=plane.position.clone()
      .addScaledVector(forward,12)
      .addScaledVector(up,12);
  }else{
    targetPos=plane.position.clone().add(new THREE.Vector3(0,260,0));
  }

  camera.position.lerp(targetPos,1-Math.pow(.001,dt));
  const look=plane.position.clone().addScaledVector(forward,130);
  camera.lookAt(look);
}

function updateHUD(){
  hud.innerHTML=
    `速度：${Math.round(speed*180)} km/h<br>`+
    `スロットル：${Math.round(throttle*100)} %<br>`+
    `高度：${Math.round(plane.position.y)} m<br>`+
    `視点：${["追尾","コックピット","上空"][viewMode]}`;
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.033);
  updatePlane(dt);
  updateCamera(dt);
  updateHUD();
  renderer.render(scene,camera);
}
</script>
</body>
</html>
