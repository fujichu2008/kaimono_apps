<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>小鉄のおうち</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   小鉄のおうち — 茶色いトイプードルと暮らす日々
   palette: 茶屋クリーム #f6eddc / 木の床 #e6cfa4 / 翡翠 #3f7d6a
            提灯朱 #c05038 / 金縁 #c9a35c / 小鉄ブラウン #a9744f
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  background:#2d2620;color:#4a3a2a;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
button{font-family:inherit;border:none;cursor:pointer;background:none}
.screen{position:fixed;inset:0;display:none;flex-direction:column}
.screen.on{display:flex}

/* ---------- タイトル ---------- */
#titleScreen{
  background:
    radial-gradient(circle at 50% 26%, #fff6e2 0 30%, transparent 31%),
    linear-gradient(#274a41,#1c332d 55%,#15241f);
  align-items:center;justify-content:flex-start;z-index:60;
}
#titleMoon{position:absolute;top:8%;left:50%;transform:translateX(-50%);
  width:74vw;max-width:340px;aspect-ratio:1;border-radius:50%;
  background:linear-gradient(#fdf3dc,#f3e2bd);
  box-shadow:0 0 0 7px #c9a35c,0 0 0 11px #7a5b34,0 10px 60px rgba(0,0,0,.45);
  display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
#titleMoon .kt{position:relative;width:62%;bottom:6%}
.tLan{position:absolute;width:34px;height:44px;border-radius:16px/20px;
  background:radial-gradient(circle at 35% 30%,#e07a5c,#b3402c);
  box-shadow:inset 0 -6px 0 rgba(0,0,0,.15);animation:sway 4s ease-in-out infinite}
.tLan:before{content:"";position:absolute;top:-12px;left:50%;width:2px;height:12px;background:#c9a35c;transform:translateX(-50%)}
.tLan:after{content:"";position:absolute;bottom:-8px;left:50%;width:8px;height:8px;background:#c9a35c;transform:translateX(-50%);border-radius:2px}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
#titleName{margin-top:calc(8% + 76vw);max-width:100%;text-align:center;z-index:2}
@media(min-height:700px){#titleName{margin-top:calc(8% + min(74vw,340px) + 34px)}}
#titleName h1{font-size:clamp(38px,11vw,52px);font-weight:900;color:#fdf3dc;
  letter-spacing:.12em;text-shadow:0 3px 0 #7a5b34,0 8px 24px rgba(0,0,0,.5)}
#titleName p{color:#bcd8c9;margin-top:10px;font-size:14px;letter-spacing:.2em}
#btnStart{margin-top:26px;padding:16px 54px;border-radius:999px;font-size:19px;font-weight:700;
  color:#3a2b1a;background:linear-gradient(#ffe9b8,#e9c887);
  box-shadow:0 0 0 3px #c9a35c,0 6px 0 #8a6a3a,0 12px 26px rgba(0,0,0,.4);
  animation:btnPulse 2.2s ease-in-out infinite}
@keyframes btnPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#btnStart:active{transform:translateY(4px);box-shadow:0 0 0 3px #c9a35c,0 2px 0 #8a6a3a}
#titleSub{margin-top:14px;color:#8fae9e;font-size:12px;z-index:2}

/* ---------- ゲーム本体 ---------- */
#game{background:#f6eddc}
header{
  padding:calc(env(safe-area-inset-top) + 8px) 14px 6px;
  background:linear-gradient(#436e5f,#3a6154);color:#fdf3dc;
  border-bottom:3px solid #c9a35c;flex:none;position:relative;z-index:5;
}
#hudTop{display:flex;align-items:baseline;gap:10px}
#hudTitle{font-weight:900;font-size:17px;letter-spacing:.08em}
#hudDay{margin-left:auto;font-size:14px;font-weight:700;background:rgba(0,0,0,.2);
  padding:2px 10px;border-radius:999px}
#hudStage{font-size:11px;color:#cfe6d9;margin-top:2px;letter-spacing:.12em}
#hudMsg{margin-top:5px;min-height:20px;font-size:13px;color:#fff6e2;
  transition:opacity .3s;font-weight:500}
#meters{display:flex;gap:6px;padding:7px 12px;background:#efe2c8;
  border-bottom:2px solid #dcc79c;flex:none;position:relative;z-index:5}
.meter{flex:1;background:#fff9ec;border:1.5px solid #d9c193;border-radius:10px;
  padding:3px 6px 4px;text-align:center}
.meter .mLabel{font-size:9.5px;color:#8a6f4a;font-weight:700;letter-spacing:.05em}
.meter .mBarBg{height:6px;background:#e8dcc2;border-radius:3px;margin-top:2px;overflow:hidden}
.meter .mBar{height:100%;border-radius:3px;transition:width .5s;background:#e0a23f}
#barClean{background:#5aa4c4}#barMood{background:#e0764f}#barBond{background:#c85a7a}

/* ---------- 部屋 ---------- */
#room{flex:1;position:relative;overflow:hidden;
  background:
    /* 丸窓（月洞門風） */
    radial-gradient(circle at 76% 26%, #fef6df 0 12.5%, #c9a35c 12.5% 13.6%, #8a6a3a 13.6% 14.4%, transparent 14.5%),
    /* 壁の格子帯 */
    repeating-linear-gradient(90deg, transparent 0 26px, rgba(138,106,58,.10) 26px 28px),
    linear-gradient(#f3e7cd 0 56%, #e6cfa4 56% 58%, #ecd6ab 58% 100%);
}
/* 窓の外の竹 */
#room:before{content:"";position:absolute;left:calc(76% - 8.5%);top:calc(26% - 12%);
  width:17%;aspect-ratio:1;border-radius:50%;
  background:
    linear-gradient(80deg,transparent 44%,#7fae8e 44% 49%,transparent 49%),
    linear-gradient(100deg,transparent 60%,#6b9c7c 60% 65%,transparent 65%),
    linear-gradient(#dff0e2,#bcd8c1);
  z-index:0}
/* 床の敷物 */
#rug{position:absolute;left:50%;bottom:8%;transform:translateX(-50%);
  width:66%;height:15%;border-radius:50%;
  background:radial-gradient(ellipse at center,#dd8a68 0 40%,#c96b4a 40% 72%,#b3543a 72%);
  box-shadow:inset 0 0 0 4px rgba(255,240,210,.35);z-index:0}
/* 提灯 */
.lan{position:absolute;width:30px;height:38px;border-radius:14px/18px;z-index:1;
  background:radial-gradient(circle at 35% 30%,#e07a5c,#b3402c);
  box-shadow:inset 0 -5px 0 rgba(0,0,0,.15);animation:sway 5s ease-in-out infinite;transform-origin:top center}
.lan:before{content:"";position:absolute;top:-14px;left:50%;width:2px;height:14px;background:#8a6a3a;transform:translateX(-50%)}
.lan:after{content:"";position:absolute;bottom:-7px;left:50%;width:7px;height:7px;background:#c9a35c;transform:translateX(-50%);border-radius:2px}
/* 竹の鉢 */
#plant{position:absolute;right:3%;bottom:34%;width:44px;height:80px;z-index:1;pointer-events:none}
#plant .pot{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:36px;height:24px;
  background:linear-gradient(#4a8a74,#3f7d6a);border-radius:4px 4px 8px 8px;box-shadow:inset 0 3px 0 rgba(255,255,255,.2)}
#plant .stem{position:absolute;bottom:20px;width:5px;height:56px;background:linear-gradient(#8fbf9a,#5f9c73);border-radius:3px}
#plant .stem.s1{left:12px;transform:rotate(-6deg)}
#plant .stem.s2{left:24px;height:48px;transform:rotate(7deg)}
#plant .leaf{position:absolute;width:18px;height:7px;background:#6fae83;border-radius:0 100% 0 100%}

/* 玄関 */
#door{position:absolute;left:2.5%;top:16%;width:21%;max-width:96px;aspect-ratio:.62;z-index:1;
  background:linear-gradient(#9c7448,#7d5a36);
  border:3px solid #5f4326;border-radius:8px 8px 3px 3px;
  box-shadow:inset 0 0 0 3px #b98a58}
#door:before{content:"";position:absolute;inset:12% 16%;border:2px solid #5f4326;border-radius:4px;
  background:repeating-linear-gradient(0deg,transparent 0 12px,rgba(95,67,38,.4) 12px 14px)}
#door:after{content:"";position:absolute;right:14%;top:48%;width:7px;height:7px;background:#e3c06a;border-radius:50%}
#doorMat{position:absolute;left:4%;top:calc(16% + 21vw * 1.55);width:18%;max-width:86px;height:14px;
  background:#3f7d6a;border-radius:50%;opacity:.5;z-index:0}

/* ごはん皿 */
#bowl{position:absolute;left:14%;bottom:9%;width:64px;height:30px;z-index:2}
#bowl .dish{position:absolute;bottom:0;width:100%;height:20px;border-radius:6px 6px 14px 14px;
  background:linear-gradient(#4a8a74,#376a58);box-shadow:inset 0 3px 0 rgba(255,255,255,.25),0 2px 3px rgba(0,0,0,.2)}
#bowl .dish:before{content:"";position:absolute;top:2px;left:8%;width:84%;height:8px;border-radius:50%;background:#2c5546}
#bowlFood{position:absolute;top:-4px;left:14%;width:72%;height:14px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#d9a45f,#b3773a);opacity:0;transition:opacity .3s}
#bowlFood.show{opacity:1}
#bowlFood .fdIcon{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:14px}

/* トイレシート */
#sheet{position:absolute;right:6%;bottom:8.5%;width:26%;max-width:120px;height:44px;z-index:1;
  background:linear-gradient(#eef6fa,#d8ebf3);border:2.5px solid #a9cbdb;border-radius:8px;
  box-shadow:0 2px 4px rgba(0,0,0,.12)}
#sheet:before{content:"";position:absolute;inset:6px;border:1.5px dashed #a9cbdb;border-radius:5px}

/* ボール */
#ball{position:absolute;width:34px;height:34px;border-radius:50%;z-index:6;
  background:radial-gradient(circle at 32% 28%,#ffd97a,#e0973f 60%,#b3702c);
  box-shadow:inset -3px -4px 0 rgba(0,0,0,.15),0 2px 4px rgba(0,0,0,.25);
  touch-action:none}
#ball:before{content:"";position:absolute;top:46%;left:-2%;width:104%;height:5px;
  border-radius:50%;border-top:3px solid #b3543a;box-sizing:border-box}

/* うんち */
.poop{position:absolute;width:30px;height:30px;z-index:5;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.poop svg{width:100%;height:100%;filter:drop-shadow(0 2px 2px rgba(0,0,0,.2))}

/* エフェクト */
#fxLayer{position:absolute;inset:0;pointer-events:none;z-index:20}
.spark{position:absolute;font-size:20px;animation:sparkUp 1s ease-out forwards;pointer-events:none}
@keyframes sparkUp{0%{opacity:1;transform:translateY(0) scale(.6)}100%{opacity:0;transform:translateY(-46px) scale(1.3)}}
.heartFx{position:absolute;font-size:18px;animation:sparkUp 1.1s ease-out forwards;pointer-events:none}
.zzz{position:absolute;font-size:16px;color:#7a9;animation:sparkUp 2s ease-out infinite}

/* ---------- 小鉄 SVG ---------- */
.kt{position:absolute;width:118px;z-index:10;transition:left 1s linear,bottom .6s ease;
  filter:drop-shadow(0 4px 3px rgba(90,60,30,.25))}
.kt svg{width:100%;display:block;overflow:visible}
.kt .flip{transition:transform .25s;transform-origin:center}
.kt.face-l .flip{transform:scaleX(-1)}
.kt [class^="kt-"],.kt g{transform-box:fill-box}
.kt .kt-root{transform-origin:50% 90%;}
.kt .kt-head{transform-origin:20% 80%;transition:transform .3s}
.kt .kt-tail{transform-origin:90% 90%}
.kt .kt-earF,.kt .kt-earB{transform-origin:50% 8%}
.kt .kt-eyes{transform-origin:center;transition:transform .2s}
.kt .kt-paw{transform-origin:50% 6%;transition:transform .35s}
.kt .leg{transform-origin:50% 8%}
.kt .kt-mouth-open{opacity:0}
/* 待機：ゆれ＋しっぽゆらゆら */
.kt .kt-root{animation:bob 2.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
.kt .kt-tail{animation:wagSlow 1.8s ease-in-out infinite}
@keyframes wagSlow{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(12deg)}}
@keyframes wagFast{0%,100%{transform:rotate(-26deg)}50%{transform:rotate(26deg)}}
.kt.m-wag .kt-tail{animation:wagFast .5s ease-in-out infinite}
.kt.m-wagfast .kt-tail{animation:wagFast .22s ease-in-out infinite}
/* まばたき */
.kt .kt-eyes{animation:blink 4.6s infinite}
@keyframes blink{0%,94%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
.kt.m-squint .kt-eyes{animation:none;transform:scaleY(.14)}
/* 歩く */
@keyframes trot{0%,100%{transform:rotate(16deg)}50%{transform:rotate(-16deg)}}
@keyframes trotR{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(16deg)}}
.kt.m-walk .legF1,.kt.m-walk .legB2{animation:trot .34s linear infinite}
.kt.m-walk .legF2,.kt.m-walk .legB1{animation:trotR .34s linear infinite}
.kt.m-walk .kt-root{animation:bob .34s ease-in-out infinite}
.kt.m-walk .kt-earF,.kt.m-walk .kt-earB{animation:earFlop .34s ease-in-out infinite}
@keyframes earFlop{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(9deg)}}
/* 食べる */
.kt.m-eat .kt-head{animation:eatBob .48s ease-in-out infinite}
@keyframes eatBob{0%,100%{transform:rotate(34deg) translateY(6px)}50%{transform:rotate(40deg) translateY(9px)}}
.kt.m-eat .kt-mouth-open{opacity:1;animation:mog .24s infinite alternate}
@keyframes mog{from{transform:scaleY(.5)}to{transform:scaleY(1)}}
.kt.m-eat .kt-mouth{opacity:0}
/* 匂いをかぐ */
.kt.m-sniff .kt-head{animation:sniff .5s ease-in-out infinite}
@keyframes sniff{0%,100%{transform:rotate(30deg) translate(2px,5px)}50%{transform:rotate(33deg) translate(4px,6px)}}
/* 首かしげ */
.kt.m-tilt .kt-head{transform:rotate(-22deg)}
/* おすわり */
.kt.m-sit .kt-root{animation:none;transform:rotate(-18deg) translateY(4px)}
.kt.m-sit .legB1,.kt.m-sit .legB2{transform:rotate(72deg)}
/* ふせ */
.kt.m-lie .kt-root{animation:none;transform:translateY(12px)}
.kt.m-lie .leg{transform:rotate(80deg)}
.kt.m-lie .kt-eyes{animation:none;transform:scaleY(.25)}
/* お手 */
.kt.m-paw .kt-paw{transform:rotate(-78deg)}
/* ジャンプ */
.kt.m-jump{animation:hop .5s ease-in-out infinite}
@keyframes hop{0%,100%{transform:translateY(0)}40%{transform:translateY(-26px)}60%{transform:translateY(-26px)}}
.kt.m-jump .kt-tail{animation:wagFast .25s ease-in-out infinite}
/* 得意げ（胸を張る） */
.kt.m-proud .kt-root{animation:none;transform:rotate(-14deg)}
.kt.m-proud .kt-head{transform:rotate(-10deg) translateY(-2px)}
.kt.m-proud .kt-tail{animation:wagFast .3s ease-in-out infinite}
/* おなかを見せる */
.kt.m-belly{animation:none}
.kt.m-belly .flip{transform:rotate(118deg)!important}
.kt.m-belly .leg{animation:pedal .6s ease-in-out infinite}
@keyframes pedal{0%,100%{transform:rotate(12deg)}50%{transform:rotate(-12deg)}}
/* 耳ぴくっ */
.kt.m-alert .kt-earF,.kt.m-alert .kt-earB{animation:earPik .5s ease-in-out 2}
@keyframes earPik{0%,100%{transform:rotate(0)}40%{transform:rotate(-24deg) translateY(-2px)}}
/* くわえたボール */
#ktBall{position:absolute;right:-4px;top:38%;width:20px;height:20px;border-radius:50%;
  background:radial-gradient(circle at 32% 28%,#ffd97a,#e0973f);display:none;z-index:2}
.kt.m-carry #ktBall{display:block}
.kt.face-l #ktBall{right:auto;left:-4px}

/* ---------- 下部ナビ ---------- */
nav{flex:none;display:grid;grid-template-columns:repeat(6,1fr);gap:6px;
  padding:8px 8px calc(env(safe-area-inset-bottom) + 10px);
  background:linear-gradient(#436e5f,#35594d);border-top:3px solid #c9a35c;position:relative;z-index:5}
nav button{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 0 7px;border-radius:12px;background:#fdf3dc;
  box-shadow:0 3px 0 #b8935c;font-size:10.5px;font-weight:700;color:#4a3a2a}
nav button .ico{font-size:20px;line-height:1}
nav button:active{transform:translateY(3px);box-shadow:none}
nav button:disabled{opacity:.45}

/* ---------- モーダル ---------- */
#modal{position:fixed;inset:0;background:rgba(30,25,18,.55);z-index:40;display:none;
  align-items:flex-end;justify-content:center}
#modal.on{display:flex}
#modalBox{width:100%;max-width:480px;max-height:78vh;background:#fdf6e6;
  border-radius:22px 22px 0 0;border-top:4px solid #c9a35c;
  padding:16px 16px calc(env(safe-area-inset-bottom) + 16px);
  display:flex;flex-direction:column;animation:up .3s cubic-bezier(.3,1.2,.5,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
#modalTitle{font-size:17px;font-weight:900;color:#3a6154;text-align:center;letter-spacing:.1em}
#modalBody{overflow-y:auto;margin-top:12px;-webkit-overflow-scrolling:touch}
#modalClose{margin-top:12px;padding:12px;border-radius:999px;background:#e8dcc2;
  font-weight:700;color:#6a5a3f;font-size:14px}
.foodBtn{display:flex;align-items:center;gap:12px;width:100%;padding:12px;margin-bottom:8px;
  background:#fff;border:2px solid #e0cfa5;border-radius:14px;text-align:left}
.foodBtn:active{background:#fff2d6}
.foodBtn .fIco{font-size:26px}
.foodBtn .fName{font-weight:700;font-size:15px}
.foodBtn .fDesc{font-size:11px;color:#9a8562}
.trainBtn{width:100%;padding:16px;margin-bottom:10px;border-radius:14px;font-size:16px;font-weight:700;
  background:linear-gradient(#fff,#f3e7cd);border:2px solid #c9a35c;color:#4a3a2a}
.diaryTab{display:flex;gap:8px;margin-bottom:10px}
.diaryTab button{flex:1;padding:9px;border-radius:999px;font-weight:700;font-size:13px;
  background:#e8dcc2;color:#7a6a4a}
.diaryTab button.act{background:#3f7d6a;color:#fdf3dc}
.dEntry{background:#fff;border-left:4px solid #c9a35c;border-radius:0 10px 10px 0;
  padding:9px 12px;margin-bottom:8px;font-size:13.5px;line-height:1.6}
.dEntry b{color:#b3543a;font-size:12px}
.albumGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.albumCard{background:#fff;padding:8px 8px 10px;border-radius:6px;
  box-shadow:0 3px 8px rgba(0,0,0,.15);transform:rotate(-1.5deg);text-align:center}
.albumCard:nth-child(even){transform:rotate(1.8deg)}
.albumCard .aPic{background:linear-gradient(#f3e7cd,#e6cfa4);border-radius:4px;
  font-size:38px;padding:14px 0;border:1px solid #e0cfa5}
.albumCard .aTitle{font-size:11.5px;font-weight:700;margin-top:6px;line-height:1.4}
.albumCard .aDay{font-size:10px;color:#9a8562}
.letterPaper{background:#fffdf4;border:1.5px solid #d9c193;border-radius:10px;padding:18px 16px;
  font-size:14px;line-height:2;box-shadow:0 4px 12px rgba(0,0,0,.1);white-space:pre-line}
.letterPaper .sig{text-align:right;margin-top:10px;font-weight:700;color:#b3543a}

/* ---------- お手ターゲット ---------- */
#pawTarget{position:absolute;width:56px;height:56px;border-radius:50%;z-index:22;display:none;
  border:3px dashed #e0764f;background:rgba(255,220,180,.35);
  animation:pawPulse .8s ease-in-out infinite}
@keyframes pawPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
#pawTarget:after{content:"🖐";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px}

/* ---------- 散歩 ---------- */
#walkScene{background:linear-gradient(#f5cfa0 0 30%,#f0b98a 30% 46%,#e5a878 46%);z-index:30}
#wsSky{position:absolute;inset:0 0 46% 0;overflow:hidden}
#wsSun{position:absolute;top:14%;left:60%;width:64px;height:64px;border-radius:50%;
  background:radial-gradient(#fff3d0,#f5cf7a);box-shadow:0 0 44px #ffdf9c}
.wsLayer{position:absolute;left:0;width:400vw;will-change:transform}
#wsFar{bottom:44%;height:26%}
#wsMid{bottom:38%;height:34%}
#wsGround{position:absolute;left:0;right:0;bottom:0;height:40%;
  background:
    repeating-linear-gradient(90deg,rgba(120,90,60,.18) 0 3px,transparent 3px 58px),
    repeating-linear-gradient(0deg,rgba(120,90,60,.14) 0 2px,transparent 2px 34px),
    linear-gradient(#cbb08a,#b99a74);
  }
#wsGroundLines{position:absolute;left:0;bottom:0;height:40%;width:400vw;
  background:repeating-linear-gradient(90deg,rgba(90,65,40,.22) 0 4px,transparent 4px 90px)}
.wsProp{position:absolute;bottom:0;font-size:38px;transform:translateX(-50%);
  filter:drop-shadow(0 3px 2px rgba(0,0,0,.2))}
.wsProp.big{font-size:56px}
.wsProp .tapRing{position:absolute;inset:-10px;border-radius:50%;border:3px dashed #e0764f;
  animation:pawPulse 1s ease-in-out infinite;display:none}
.wsProp.near .tapRing{display:block}
.wsGate{position:absolute;bottom:0;width:120px;height:120px;transform:translateX(-50%)}
.wsGate:before{content:"";position:absolute;inset:0;border-radius:50%;
  border:14px solid #8a7460;border-bottom-color:transparent;opacity:.55}

<script>
"use strict";
/* ================= ユーティリティ ================= */
const $ = s => document.querySelector(s);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const sleep = ms => new Promise(r => setTimeout(r, ms));
const rand = (a,b) => a + Math.random()*(b-a);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const KEY = "kotetsu_home_v1";
const DAY_MS = 86400000;

/* ---- ちいさな効果音 (WebAudio) ---- */
let AC = null;
function beep(freq, dur, type, vol){
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type||"sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(vol||0.08, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + (dur||0.15));
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + (dur||0.15));
  }catch(e){}
}
function chime(){ beep(660,.12); setTimeout(()=>beep(880,.14),110); setTimeout(()=>beep(1100,.2),230); }
function sadBeep(){ beep(300,.2,"triangle"); }

/* ================= 小鉄 SVG ================= */
function ktSVG(){
  return `<svg viewBox="0 0 150 122"><g class="flip"><g class="kt-root">
  <g transform="translate(34,58)"><g class="kt-tail">
    <circle cx="0" cy="0" r="9.5" fill="#9c6a45"/>
    <circle cx="-6" cy="-7" r="6.5" fill="#a9744f"/>
  </g></g>
  <g class="kt-legs">
    <rect class="leg legB1" x="50" y="80" width="9" height="22" rx="4.5" fill="#8f6040"/>
    <rect class="leg legB2" x="63" y="82" width="9" height="21" rx="4.5" fill="#9c6a45"/>
    <rect class="leg legF2" x="84" y="82" width="9" height="21" rx="4.5" fill="#9c6a45"/>
  </g>
  <g class="kt-body">
    <ellipse cx="70" cy="70" rx="31" ry="22" fill="#a9744f"/>
    <circle cx="48" cy="62" r="12" fill="#b3805a"/>
    <circle cx="66" cy="55" r="14" fill="#b3805a"/>
    <circle cx="86" cy="60" r="12" fill="#b3805a"/>
    <circle cx="58" cy="74" r="12" fill="#a9744f"/>
    <circle cx="80" cy="74" r="12" fill="#a9744f"/>
  </g>
  <g transform="translate(96,78)"><g class="kt-paw">
    <rect x="0" y="0" width="9" height="23" rx="4.5" fill="#8f6040"/>
  </g></g>
  <g transform="translate(102,38)"><g class="kt-head">
    <ellipse class="kt-earB" cx="-13" cy="6" rx="8" ry="15" fill="#7d5334"/>
    <circle cx="0" cy="0" r="18" fill="#b3805a"/>
    <circle cx="-9" cy="-9" r="10" fill="#bd8a63"/>
    <circle cx="5" cy="-12" r="10" fill="#bd8a63"/>
    <circle cx="13" cy="-6" r="9" fill="#bd8a63"/>
    <circle cx="12" cy="6" r="9.5" fill="#c99a72"/>
    <ellipse class="kt-earF" cx="-11" cy="8" rx="8.5" ry="16" fill="#8f6040"/>
    <g class="kt-eyes">
      <circle cx="2" cy="-2" r="2.8" fill="#2c2018"/>
      <circle cx="13" cy="-3" r="2.8" fill="#2c2018"/>
      <circle cx="3" cy="-3" r="1" fill="#fff"/>
      <circle cx="14" cy="-4" r="1" fill="#fff"/>
    </g>
    <circle cx="20" cy="3" r="3.4" fill="#3a2b20"/>
    <path class="kt-mouth" d="M14 9 q4 4 8 1" stroke="#6a4a30" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <ellipse class="kt-mouth-open" cx="17" cy="11" rx="4" ry="3.5" fill="#8a4a3a"/>
  </g></g>
</g><div id="__slot__"></div></g></svg>`;
}
function buildKt(el, withBall){
  el.innerHTML = ktSVG().replace('<div id="__slot__"></div>','');
  if(withBall){
    const b = document.createElement("div");
    b.id = "ktBall"; el.appendChild(b);
  }
}

/* ================= 状態 ================= */
let S = null;
let busy = false;
let memoryMode = false;

const FOODS = [
  {id:"normal", ico:"🥣", name:"いつものフード", desc:"まいにちの ごはん", hunger:26, mood:4},
  {id:"sasami", ico:"🍗", name:"ささみごはん",   desc:"やわらかくて いいにおい", hunger:30, mood:7},
  {id:"veggie", ico:"🥕", name:"やさい入りごはん", desc:"けんこうに いいよ", hunger:24, mood:4, health:6},
  {id:"treat",  ico:"🦴", name:"ごほうびおやつ", desc:"とくべつな ときに", hunger:10, mood:12},
  {id:"special",ico:"🍱", name:"とくべつごはん", desc:"ちょっと ごうか", hunger:34, mood:10},
];
const STAGES = [
  [26,"ゆめ見期"],[21,"好奇心期"],[16,"しんらい期"],
  [11,"せいちょう期"],[6,"なじみ期"],[1,"であい期"]
];

function defaultState(){
  return {
    v:1, start:Date.now(), last:Date.now(), dbgDays:0,
    hunger:65, clean:85, mood:70, energy:85, bond:12, health:90,
    paw:0, toilet:0, walkExp:0, playExp:0, indep:0,
    dW:0, dS:0, dP:0, dC:0,
    fav: pick(["sasami","veggie","special"]),
    feeds:0, cleans:0, walks:0, plays:0, pets:0, finds:0,
    poops:[], diary:[], album:[],
    flags:{}, lastAutoDiary:0, dreamSeen:[],
    ended:false, endType:null,
    lastLetterDay:0, kmikMet:false
  };
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ S = Object.assign(defaultState(), JSON.parse(raw)); return true; }
  }catch(e){}
  return false;
}
function curDay(){
  return Math.min(30, Math.floor((Date.now()-S.start)/DAY_MS) + 1 + S.dbgDays);
}
function stageName(d){
  if(d>=30) return "とくべつな朝";
  for(const [n,s] of STAGES) if(d>=n) return s;
  return "であい期";
}
function toiletLv(){ return Math.min(5, Math.floor(S.toilet/17)); }
function pawLv(){ return Math.min(5, Math.floor(S.paw/17)); }
function playLv(){ return Math.min(5, Math.floor(S.playExp/17)); }

/* ---- オフライン経過 ---- */
function applyOfflineProgress(){
  const now = Date.now();
  const hrs = Math.min(48, (now - S.last)/3600000);
  if(hrs > 0.2 && !S.ended){
    S.hunger = clamp(S.hunger - hrs*3.5, 5, 100);
    S.clean  = clamp(S.clean  - hrs*2.5, 5, 100);
    S.mood   = clamp(S.mood   - hrs*2.5, 8, 100);
    S.energy = clamp(S.energy + hrs*4, 0, 100);
    let n = Math.min(3 - S.poops.length, Math.floor(hrs/6));
    while(n-- > 0) spawnPoop(false);
  }
  S.last = now;
}

/* ================= HUD / 表示 ================= */
let msgTimer = null;
function showMsg(t, hold){
  const el = $("#hudMsg");
  el.style.opacity = 0;
  clearTimeout(msgTimer);
  setTimeout(()=>{ el.textContent = t; el.style.opacity = 1; }, 250);
  if(!hold) msgTimer = setTimeout(()=>{ el.style.opacity = .4; }, 5000);
}
function updateHUD(){
  const d = curDay();
  $("#hudDay").textContent = memoryMode ? "おもいで" : d + "日目";
  $("#hudStage").textContent = memoryMode ? "小鉄は たびのとちゅう" : "小鉄のようす：" + stageName(d);
  $("#barHunger").style.width = S.hunger + "%";
  $("#barClean").style.width  = S.clean + "%";
  $("#barMood").style.width   = S.mood + "%";
  $("#barBond").style.width   = clamp(S.bond,0,100) + "%";
}

/* ---- エフェクト ---- */
function fx(x, y, ch, cls){
  const room = $("#room"), e = document.createElement("span");
  e.className = cls || "spark"; e.textContent = ch;
  e.style.left = x + "px"; e.style.top = y + "px";
  $("#fxLayer").appendChild(e);
  setTimeout(()=>e.remove(), 1400);
}
function fxAtKt(ch, cls){
  const r = kt.getBoundingClientRect(), rm = $("#room").getBoundingClientRect();
  fx(r.left - rm.left + r.width/2 + rand(-14,14), r.top - rm.top + rand(-6,10), ch, cls);
}

/* ================= 小鉄の操作 ================= */
const kt = $("#kotetsu");
buildKt(kt, true);
buildKt($("#titleKt"));
let ktPos = {x:50, y:20}; // 部屋内 %（xは中心, yは下から）

function setKtPos(x, y, instant){
  ktPos.x = x; ktPos.y = y;
  kt.style.transition = instant ? "none" : "";
  kt.style.left = "calc(" + x + "% - 59px)";
  kt.style.bottom = y + "%";
  if(instant) requestAnimationFrame(()=>{ kt.style.transition = ""; });
}
function face(dir){ kt.classList.toggle("face-l", dir === "l"); }
function setMotion(){
  kt.className = "kt" + (kt.classList.contains("face-l") ? " face-l" : "");
  for(const c of arguments) kt.classList.add("m-" + c);
}
async function moveKt(x, y, speed){
  const dx = Math.abs(x - ktPos.x);
  const dur = clamp(dx * (speed||36), 320, 2400);
  face(x < ktPos.x ? "l" : "r");
  setMotion("walk");
  kt.style.transition = "left " + dur + "ms linear, bottom " + dur + "ms linear";
  setKtPos(x, y === undefined ? ktPos.y : y);
  await sleep(dur + 60);
  kt.style.transition = "";
  setMotion();
}
function ktIdleHome(){ setMotion(); }

/* ================= うんち ================= */
function poopSVG(){
  return `<svg viewBox="0 0 30 30">
    <ellipse cx="15" cy="24" rx="11" ry="5.5" fill="#8a5a38"/>
    <ellipse cx="15" cy="17" rx="8" ry="5" fill="#9c6a45"/>
    <ellipse cx="15" cy="11" rx="5" ry="4" fill="#a9744f"/>
    <circle cx="12" cy="17" r="1.2" fill="#fff"/><circle cx="18" cy="17" r="1.2" fill="#fff"/>
    <circle cx="12" cy="17" r=".6" fill="#3a2b20"/><circle cx="18" cy="17" r=".6" fill="#3a2b20"/>
  </svg>`;
}
function poopSpot(){
  const lv = toiletLv();
  if(lv >= 4 || (lv === 3 && Math.random() < .75) || (lv === 2 && Math.random() < .4))
    return {x: rand(70,86), y: rand(10,13), onSheet:true};
  if(lv >= 2) return {x: rand(60,88), y: rand(10,16), onSheet:false};
  if(lv >= 1) return {x: Math.random()<.5 ? rand(6,16) : rand(84,92), y: rand(10,20), onSheet:false};
  return {x: rand(10,88), y: rand(10,34), onSheet:false};
}
function spawnPoop(announce){
  if(S.poops.length >= 3) return;
  S.poops.push(poopSpot());
  if(announce !== false){ renderPoops(); showMsg("あっ、小鉄がうんちをした…！"); }
}
function renderPoops(){
  const layer = $("#poopLayer");
  layer.innerHTML = "";
  S.poops.forEach((p,i)=>{
    const d = document.createElement("div");
    d.className = "poop"; d.innerHTML = poopSVG();
    d.style.left = "calc(" + p.x + "% - 15px)";
    d.style.bottom = p.y + "%";
    d.onclick = ()=>cleanPoop(i);
    layer.appendChild(d);
  });
}

async function cleanPoop(i){
  if(busy || memoryMode) return;
  busy = true;
  const p = S.poops[i];
  S.poops.splice(i,1);
  const rm = $("#room").getBoundingClientRect();
  fx(rm.width*p.x/100 - 10, rm.height*(1 - p.y/100) - 40, "✨");
  fx(rm.width*p.x/100 + 10, rm.height*(1 - p.y/100) - 56, "🫧");
  beep(880,.1);
  renderPoops();
  S.clean = clamp(S.clean + 9, 0, 100);
  S.cleans++; S.dC += 2;
  updateHUD();
  showMsg("うんちを かたづけた！");
  await moveKt(clamp(p.x, 12, 88));
  setMotion("squint","wag");
  fxAtKt("✨");
  await sleep(1100);
  showMsg("小鉄は スッキリしたかおを している");
  setMotion();
  save(); busy = false;
}

  });
}
async function feedKotetsu(id){
  if(busy) return; busy = true;
  const f = FOODS.find(x=>x.id === id);
  const full = S.hunger >= 92;
  $("#bowlFood").classList.add("show");
  $("#bowlFood .fdIcon").textContent = f.ico;
  beep(520,.1);
  showMsg(f.name + "を おさらに いれた");
  await sleep(500);
  setMotion("alert");           // 耳がぴくっ
  await sleep(700);
  await moveKt(19, 11);          // お皿へ歩く
  face("l");
  if(full){
    setMotion("sniff");          // のぞく
    await sleep(1000);
    setMotion("tilt");           // 首をかしげる
    showMsg("小鉄は おなかいっぱいみたい…");
    sadBeep();
    await sleep(1300);
  }else{
    setMotion("sniff");
    await sleep(700);
    const love = (id === S.fav);
    if(love){ fxAtKt("💕","heartFx"); setMotion("wagfast","eat"); showMsg("小鉄の目が キラキラしている！"); }
    else { setMotion("eat"); showMsg("小鉄は もぐもぐ たべている"); }
    beep(440,.08); setTimeout(()=>beep(440,.08),300); setTimeout(()=>beep(440,.08),600);
    await sleep(2600);
    $("#bowlFood").classList.remove("show");
    setMotion(love ? "wagfast" : "wag");   // 食後しっぽふり
    fxAtKt(love ? "💖" : "✨", "heartFx");
    if(love) chime();
    showMsg(love ? "小鉄は だいこうぶつに おおよろこび！" : "小鉄は まんぞくそうだ");
    S.hunger = clamp(S.hunger + f.hunger, 0, 100);
    S.mood   = clamp(S.mood + f.mood + (love?8:0), 0, 100);
    if(f.health) S.health = clamp(S.health + f.health, 0, 100);
    S.bond = clamp(S.bond + 1.5, 0, 100);
    S.feeds++; S.dC += 1.5;
    if(!S.flags.firstFeed){ S.flags.firstFeed = true; addAlbum("はじめてのごはん","🍚"); addDiary("小鉄が はじめて ごはんをたべた。おいしそうだった。"); }
    if(love && !S.flags.favFound){ S.flags.favFound = true; addDiary("小鉄の だいこうぶつは "+f.name+"みたいだ。"); }
    await sleep(1100);
  }
  updateHUD();
  await moveKt(50, 20);
  setMotion();
  save(); busy = false;
  maybePoopLater();
}
function maybePoopLater(){
  if(S.poops.length < 3 && Math.random() < .3){
    setTimeout(()=>{ if(!busy && !memoryMode && !S.ended){ spawnPoop(); save(); } }, rand(8000,20000));
  }
}

async function trainPaw(){
  if(busy) return; busy = true;
  showMsg("「小鉄、お手！」");
  await moveKt(50, 18);
  face("l");
  setMotion("sit");
  await sleep(800);
  const lv = pawLv();
  // 前足付近にターゲット
  const r = kt.getBoundingClientRect(), rm = $("#room").getBoundingClientRect();
  const tg = $("#pawTarget");
  tg.style.left = (r.left - rm.left - 30) + "px";
  tg.style.top  = (r.top - rm.top + r.height*0.55) + "px";
  tg.style.display = "block";
  showMsg("小鉄の 前足のちかくを タイミングよくタップ！", true);
  const tapped = await new Promise(res=>{
    let done = false;
    const t = setTimeout(()=>{ if(!done){ done = true; res(false); } }, 3000);
    tg.onclick = ()=>{ if(!done){ done = true; clearTimeout(t); res(true); } };
  });
  tg.style.display = "none";
  const p = 0.18 + S.paw/110 + (tapped ? 0.28 : -0.5);
  if(Math.random() < p){
    setMotion("sit","paw", lv>=3 ? "wagfast" : "wag");
    fxAtKt("✨"); chime();
    showMsg(lv>=4 ? "おかわりも できた！小鉄は とくいげだ！" : lv>=2 ? "小鉄が お手をした！" : "小鉄の前足が ちょこんと のった…！");
    S.paw = clamp(S.paw + 8, 0, 100);
    S.dS += 3; S.bond = clamp(S.bond+2,0,100); S.mood = clamp(S.mood+4,0,100);
    if(!S.flags.firstPaw){ S.flags.firstPaw = true; addAlbum("はじめてのお手","🐾"); addDiary("小鉄が はじめて お手にせいこうした！"); }
    await sleep(1400);
    if(lv >= 4){ setMotion("sit"); await sleep(300); setMotion("sit","paw","wagfast"); await sleep(900); } // おかわり
    setMotion("proud");
    await sleep(900);
  }else{
    setMotion("tilt");
    sadBeep();
    showMsg(lv===0 ? "小鉄は なにをいわれているのか わからず 首をかしげた" : "うーん、こんどは できるかな？");
    S.paw = clamp(S.paw + 2.5, 0, 100);
    S.dS += 1;
    await sleep(1500);
  }
  updateHUD(); setMotion();
  save(); busy = false;
}

/* ================= ボールあそび ================= */
const ball = $("#ball");
let ballPos = {x:66, y:17};
function setBallPos(x, y){
  ballPos.x = x; ballPos.y = y;
  ball.style.left = "calc(" + x + "% - 17px)";
  ball.style.bottom = y + "%";
}
setBallPos(66, 17);
let dragging = false, dragStart = null;
ball.addEventListener("pointerdown", e=>{
  if(busy || memoryMode) return;
  dragging = true; dragStart = {x:e.clientX, y:e.clientY};
  ball.setPointerCapture(e.pointerId);
});
ball.addEventListener("pointerup", e=>{
  if(!dragging) return;
  dragging = false;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if(Math.hypot(dx,dy) > 24) throwBall(dx, dy);
});
async function throwBall(dx, dy){
  if(busy) return; busy = true;
  beep(700,.08);
  const rm = $("#room").getBoundingClientRect();
  const tx = clamp(ballPos.x + dx/rm.width*160, 8, 92);
  showMsg("ボールを なげた！");
  // 放物線アニメーション
  const sx = ballPos.x, sy = ballPos.y, peak = 34;
  const t0 = performance.now(), dur = 650;
  await new Promise(res=>{
    (function step(t){
      const k = Math.min(1, (t - t0)/dur);
      setBallPos(sx + (tx-sx)*k, sy + peak*4*k*(1-k));
      if(k < 1) requestAnimationFrame(step); else res();
    })(t0);
  });
  setBallPos(tx, 13);
  // 小鉄が目で追って走る
  setMotion("alert");
  await sleep(350);
  await moveKt(clamp(tx + (tx > ktPos.x ? -7 : 7), 8, 92), 16, 22);
  const lv = playLv();
  S.playExp = clamp(S.playExp + 6, 0, 100);
  S.plays++; S.dP += 3;
  S.mood = clamp(S.mood + 6, 0, 100); S.bond = clamp(S.bond + 2, 0, 100);
  S.energy = clamp(S.energy - 6, 0, 100);
  const retChance = [0, .35, .6, .85, 1, 1][lv];
  if(Math.random() < retChance){
    face(tx > ktPos.x ? "r" : "l");
    setMotion("sniff");
    await sleep(500);
    ball.style.opacity = 0;
    kt.classList.add("m-carry");
    showMsg(lv >= 4 ? "ナイスキャッチ！小鉄が とんでもどってくる！" : "小鉄が ボールをもって もどってきた！");
    if(lv >= 4){ setMotion("jump"); kt.classList.add("m-carry"); await sleep(700); }
    await moveKt(58, 18, lv >= 3 ? 22 : 40);
    kt.classList.remove("m-carry");
    setBallPos(66, 17);
    ball.style.opacity = 1;
    setMotion("wagfast","proud");
    fxAtKt("💖","heartFx"); chime();
    if(!S.flags.firstFetch){ S.flags.firstFetch = true; addAlbum("はじめてもってきた","🎾"); addDiary("小鉄が はじめて ボールをもってきてくれた！"); }
    await sleep(1200);
  }else{
    setMotion("sniff");
    await sleep(800);
    setMotion("tilt");
    showMsg("小鉄は ボールのまえで 首をかしげている…");
    await sleep(1200);
    setBallPos(66, 17); // 片付け
    setMotion("wag");
    await sleep(500);
  }
  updateHUD(); setMotion();
  save(); busy = false;
}

/* ================= 散歩 ================= */
const WALK_PROPS = [
  ["🏮","あかい提灯","じっと見あげている"],
  ["🎋","たけ","かぜの音に 耳をぴくぴく"],
  ["🌸","はな","くんくん…いいにおい"],
  ["🐦","ことり","目でおいかけている"],
  ["🍃","はっぱ","ぱくっと しそうになった"],
  ["🐕","ちいさな犬","しっぽをふって ごあいさつ"],
  ["🪷","はすの池","水面を ふしぎそうに のぞいた"],
  ["🫖","茶屋のやかん","ゆげのにおいに くんくん"],
  ["🦋","ちょうちょ","ぴょんと とびついた"],
];
let ws = null;
function goWalk(){
  if(busy) return; busy = true;
  const scene = $("#walkScene");
  buildKt($("#wsKtWrap"));
  $("#wsKtWrap").className = "kt m-walk";
  // 遠景・中景を生成
  const far = $("#wsFar"), mid = $("#wsMid");
  far.innerHTML = ""; mid.innerHTML = "";
  for(let x = 100; x < 4200; x += rand(260,420)){
    const g = document.createElement("div");
    if(Math.random() < .35){ g.className = "wsGate"; }
    else { g.className = "wsHouse"; }
    g.style.left = x + "px";
    far.appendChild(g);
  }
  const GOAL = 2600;
  const props = [];
  for(let x = 460; x < GOAL - 200; x += rand(240,400)){
    const def = pick(WALK_PROPS);
    props.push({x, def, found:false, kmik:false});
  }
  // KMIK：まれな出会い（1プレイ1回、未遭遇なら12%）
  if(!S.kmikMet && Math.random() < .12){
    props.splice(Math.floor(props.length/2), 0,
      {x: GOAL/2 + rand(-100,100), def:["🎪","ゆかいな仲間たち","？？？"], found:false, kmik:true});
  }
  props.forEach(p=>{
    const d = document.createElement("div");
    d.className = "wsProp" + (p.kmik ? " big" : "");
    d.style.left = p.x + "px";
    d.innerHTML = p.def[0] + '<div class="tapRing"></div>';
    d.onclick = ()=>discover(p, d);
    mid.appendChild(d);
    p.el = d;
  });
  let off = 0, moving = false, finds = 0, wsBusy = false, raf = null;
  ws = {off, props, finds};

  function toast(t){
    const el = $("#wsToast");
    el.innerHTML = t; el.style.opacity = 1;
    clearTimeout(el._t);
    el._t = setTimeout(()=>{ el.style.opacity = 0; }, 2200);
  }
  async function discover(p, el){
    if(p.found || wsBusy) return;
    const screenX = p.x - off;
    if(screenX < 0 || screenX > innerWidth*0.9) return;
    p.found = true; wsBusy = true;
    $("#wsKtWrap").className = "kt m-sniff";
    beep(620,.1); setTimeout(()=>beep(820,.12),140);
    if(p.kmik){
      S.kmikMet = true;
      toast("🎪 ふしぎな旅の楽団<b>「KMIK」</b>に出会った！<br>小鉄のまわりを ゆかいに ひとまわりして いってしまった…");
      addDiary("さんぽで ゆかいな仲間たち「KMIK」に出会った。小鉄はしっぽをふりまくっていた。");
      addAlbum("KMIKとの出会い","🎪");
      chime(); setTimeout(chime, 350);
    }else{
      toast(p.def[0] + " <b>" + p.def[1] + "</b>をみつけた！<br>" + p.def[2]);
    }
    el.style.transition = "transform .4s"; el.style.transform = "translateX(-50%) scale(1.25)";
    ws.finds++; S.finds++; S.dW += 2;
    await sleep(1100);
    el.style.transform = "translateX(-50%) scale(1)";
    $("#wsKtWrap").className = "kt m-walk";
    wsBusy = false;
  }
  function render(){
    $("#wsFar").style.transform = "translateX(" + (-off*0.35) + "px)";
    $("#wsMid").style.transform = "translateX(" + (-off) + "px)";
    $("#wsGroundLines").style.transform = "translateX(" + (-(off%94)) + "px)";
    $("#wsDist").textContent = Math.floor(off/10) + "m";
    props.forEach(p=>{
      const sx = p.x - off;
      p.el.classList.toggle("near", !p.found && sx > innerWidth*0.15 && sx < innerWidth*0.75);
    });
  }
  function loop(){
    if(moving && !wsBusy){ off += 3.6; if(off >= GOAL){ endWalk(true); return; } }
    render();
    raf = requestAnimationFrame(loop);
  }
  const go = $("#btnGo");
  go.onpointerdown = ()=>{ moving = true; };
  go.onpointerup = go.onpointercancel = go.onpointerleave = ()=>{ moving = false; };
  $("#btnWsBack").onclick = ()=>endWalk(false);

  async function endWalk(goal){
    cancelAnimationFrame(raf);
    moving = false;
    if(goal){ toast("こうえんに とうちゃく！小鉄は おおまんぞく"); chime(); await sleep(1600); }
    scene.classList.remove("on");
    // 帰宅ボーナス
    const gain = clamp(4 + ws.finds*2 + (goal?4:0), 3, 18);
    S.bond = clamp(S.bond + gain*0.6, 0, 100);
    S.mood = clamp(S.mood + gain, 0, 100);
    S.energy = clamp(S.energy - 10, 5, 100);
    S.walkExp = clamp(S.walkExp + 7 + ws.finds, 0, 100);
    S.indep = clamp(S.indep + 2, 0, 100);
    S.walks++; S.dW += 4 + ws.finds;
    if(!S.flags.firstWalk){ S.flags.firstWalk = true; addAlbum("はじめてのさんぽ","🍃"); }
    addDiary(ws.finds > 0
      ? "さんぽで " + ws.finds + "こ はっけんがあった。小鉄はたのしそうだった。"
      : "小鉄と ゆっくり さんぽした。");
    updateHUD();
    setKtPos(28, 20, true); face("r");
    setMotion("wagfast");
    showMsg("ただいま！小鉄は まんぞくそうに しっぽをふっている");
    await sleep(1400);
    await moveKt(50, 20);
    setMotion();
    save(); busy = false;
  }

  // 出発演出
  (async ()=>{
    showMsg("さんぽに いこう！");
    await moveKt(14, 26);         // 玄関を見る
    face("l");
    setMotion("alert");
    await sleep(700);
    fxAtKt("🦮");
    showMsg("リードをつけると 小鉄が とびはねた！");
    setMotion("jump");
    chime();
    await sleep(1500);
    scene.classList.add("on");
    render();
    loop();
  })();
}

/* ================= 日記・アルバム ================= */
function addDiary(text, day){
  S.diary.push({d: day || curDay(), t: text});
  save();
}
function addAlbum(title, ico){
  if(S.album.some(a=>a.title === title)) return;
  S.album.push({d: curDay(), title, ico});
  showMsg("📷 アルバムに「" + title + "」が のこった");
  save();
}
function openDiaryModal(){
  openModal("にっき と アルバム", `
    <div class="diaryTab">
      <button id="tabD" class="act">📖 にっき</button>
      <button id="tabA">📷 アルバム</button>
    </div><div id="diaryList"></div>`);
  const list = $("#diaryList");
  function renderD(){
    list.innerHTML = S.diary.length
      ? S.diary.slice().reverse().map(e=>`<div class="dEntry"><b>${e.d}日目</b>　${e.t}</div>`).join("")
      : '<div class="dEntry">まだ にっきは ないみたい。小鉄と すごそう。</div>';
  }
  function renderA(){
    list.innerHTML = S.album.length
      ? '<div class="albumGrid">' + S.album.map(a=>
        `<div class="albumCard"><div class="aPic">${a.ico}</div>
         <div class="aTitle">${a.title}</div><div class="aDay">${a.d}日目</div></div>`).join("") + "</div>"
      : '<div class="dEntry">おもいでの しゃしんは これからふえていくよ。</div>';
  }
  $("#tabD").onclick = ()=>{ $("#tabD").classList.add("act"); $("#tabA").classList.remove("act"); renderD(); };
  $("#tabA").onclick = ()=>{ $("#tabA").classList.add("act"); $("#tabD").classList.remove("act"); renderA(); };
  renderD();
}

/* ---- 自動日記（日ごと） ---- */
const AUTO_DIARY = {
  "であい期":["小鉄はまだ そわそわしている。よく首をかしげる。","小鉄は へやのにおいを くんくん かいでいた。","ごはんのときだけ 目がまんまるになる。"],
  "なじみ期":["小鉄が あしもとに 近よってくることがふえた。","しっぽをふる かいすうが ふえたきがする。","トイレシートを ちょっとおぼえてきたみたい。"],
  "せいちょう期":["小鉄のひょうじょうが ゆたかになってきた。","できることが すこしずつ ふえている。","小鉄は まいにち げんきいっぱいだ。"],
  "しんらい期":["よぶと 小鉄が とことこ 近よってくる。","トイレのあと ほめてほしそうに こっちを見る。","ごはんのまえに おすわりして まてるようになった。"],
  "好奇心期":["小鉄が まどのそとを じっと見ていた。","小鉄は 玄関のほうを 見つめる時間がふえた。","小鉄が じぶんから ボールをもってきた。なんだか たのもしい。"],
  "ゆめ見期":["小鉄は ねむりながら 足をぱたぱたさせていた。ゆめをみているのかな。","小鉄は じぶんの行きたいばしょを かんがえているようだ。","小鉄は あまえながらも、そとのせかいを 見つめている。"]
};
function autoDiaryFor(d){
  const st = stageName(d);
  return pick(AUTO_DIARY[st] || AUTO_DIARY["であい期"]);
}

/* ================= 夢の夜（26〜29日目） ================= */
async function playDream(d){
  const scene = $("#dreamScene");
  // 星
  scene.querySelectorAll(".star").forEach(s=>s.remove());
  for(let i = 0; i < 26; i++){
    const s = document.createElement("div");
    s.className = "star";
    s.style.cssText = `left:${rand(2,98)}%;top:${rand(2,60)}%;width:${rand(1.5,3.5)}px;height:${rand(1.5,3.5)}px;animation-delay:${rand(0,2)}s`;
    scene.appendChild(s);
  }
  buildKt($("#dreamKt"));
  $("#dreamKt").className = "kt m-lie";
  const lead = dreamLead();
  const pics  = {W:"🌉", S:"💮", P:"🎾", C:"🏮", B:"🌅"};
  const texts = {
    W:"小鉄はゆめのなかで\nとおくの橋をわたっていた。\nしらない町のあかりが、きらきらしていた。",
    S:"小鉄はゆめのなかで\nたくさんの人に「おりこうだね」と\nなでられていた。むねをはっていた。",
    P:"小鉄はゆめのなかで\n子どもたちとボールをおいかけていた。\nわらいごえが きこえたきがした。",
    C:"小鉄はゆめのなかで\nあたたかいへやで ねむっていた。\nだれかに あんしんをとどけるゆめ。",
    B:"小鉄はゆめのなかで\nあさやけの道をあるいていた。\nいつかまた、ここにかえってくるゆめ。"
  };
  $("#dreamPic").textContent = pics[lead];
  $("#dreamText").textContent = (d) + "日目のよる。\n\n" + texts[lead];
  scene.classList.add("on");
  beep(392,.4,"sine",.05); setTimeout(()=>beep(494,.5,"sine",.05),450); setTimeout(()=>beep(587,.8,"sine",.05),950);
  await sleep(5200);
  scene.classList.remove("on");
  addDiary("小鉄は ゆめをみていた。" + texts[lead].split("\n")[1], d);
  if(!S.flags.dreamAlbum){ S.flags.dreamAlbum = true; addAlbum("ゆめをみた夜","🌙"); }
  save();
}
function dreamLead(){
  const arr = [["W",S.dW],["S",S.dS],["P",S.dP],["C",S.dC]].sort((a,b)=>b[1]-a[1]);
  const total = S.dW + S.dS + S.dP + S.dC;
  if(total < 8 || arr[0][1] - arr[1][1] <= Math.max(4, total*0.12)) return "B";
  return arr[0][0];
}

/* ================= 日付チェック ================= */
async function checkDay(){
  if(S.ended) return;
  const d = curDay();
  if(d > S.lastAutoDiary){
    for(let dd = Math.max(1, S.lastAutoDiary + 1); dd <= Math.min(d, 29); dd++){
      if(dd > 1 || S.lastAutoDiary === 0) addDiary(autoDiaryFor(dd), dd);
    }
    S.lastAutoDiary = d;
    save();
  }
  updateHUD();
  if(d >= 26 && d <= 29 && !S.dreamSeen.includes(d)){
    S.dreamSeen.push(d); save();
    await sleep(900);
    await playDream(d);
  }
  if(d >= 30){
    $("#banner30").style.display = "block";
  }
}

/* ================= エンディング ================= */
function calculateDreamEnding(){ return dreamLead(); }
const ENDINGS = {
  W:{ sky:"walk", lines:[
      "たくさんあるいた さんぽみち。",
      "その先に、もっとひろいせかいが あることを 小鉄はしっていた。",
      "「いろんなけしきを見て、いつか あなたにはなしたい」",

  P:{ sky:"play", lines:[

      "あそぶことのたのしさを、小鉄はだれよりもしっている。",
      "「たくさんの子どもたちと あそんで、えがおをつくりたい」",
      "小鉄は、みんなのにんきものになるゆめを 見つけた。"]},
  C:{ sky:"care", lines:[
      "きれいなへや、あたたかいごはん、あんしんできるばしょ。",

      "ごはんも、さんぽも、あそびも、ぜんぶたいせつなおもいで。",
      "あなたとのくらしで、小鉄はたくさんのことをおぼえた。",
      "「せかいを見てくる。そして、またいつか──」",
      "小鉄は、すこしとおくへいく旅を えらんだ。"]}
};
async function playEnding(type, replay){
  const scene = $("#endScene");
  const e = ENDINGS[type] || ENDINGS.B;
  $("#endSky").className = e.sky;
  const linesBox = $("#endLines");
  linesBox.innerHTML = e.lines.map(l=>"<p>"+l+"</p>").join("");
  $("#endTitle").style.opacity = 0;
  $("#endBtn").classList.remove("show");
  $("#endBtn").textContent = replay ? "もどる" : "おもいでへ";
  const ekt = $("#endKt");
  buildKt(ekt);
  ekt.className = "kt";
  ekt.style.transition = "none";
  ekt.style.left = "38%";
  scene.classList.add("on");
  beep(523,.5,"sine",.06); setTimeout(()=>beep(659,.5,"sine",.06),500); setTimeout(()=>beep(784,.9,"sine",.06),1000);
  await sleep(800);
  const ps = linesBox.querySelectorAll("p");
  for(const p of ps){ p.classList.add("show"); await sleep(2200); }
  // タイプ別のひとこま
  if(type === "S"){ ekt.className = "kt m-sit m-paw m-wag"; await sleep(1800); }
  if(type === "P"){ ekt.className = "kt m-jump"; await sleep(1600); }
  if(type === "C"){ ekt.className = "kt m-lie"; await sleep(1800); }
  // 歩き出す
  ekt.className = "kt m-walk";
  ekt.style.transition = "left 4s linear";
  requestAnimationFrame(()=>{ ekt.style.left = "72%"; });
  await sleep(4100);
  // 必ずふりかえる
  ekt.className = "kt face-l m-wagfast";
  await sleep(2400);
  fx(0,0,"");
  // また歩いて、光の中へ
  ekt.className = "kt m-walk";
  ekt.style.transition = "left 3.5s linear, opacity 3.5s";
  requestAnimationFrame(()=>{ ekt.style.left = "108%"; ekt.style.opacity = 0; });
  await sleep(3700);
  $("#endTitle").style.opacity = 1;
  chime();
  await sleep(1200);
  $("#endBtn").classList.add("show");
  await new Promise(res=>{ $("#endBtn").onclick = res; });
  scene.classList.remove("on");
  ekt.style.opacity = 1;
}
async function startDay30(){
  if(busy || S.ended) return; busy = true;
  $("#banner30").style.display = "none";
  showMsg("小鉄が 玄関のまえに すわっている…", true);
  await moveKt(18, 24);
  face("l");
  setMotion("sit");
  await sleep(1600);
  face("r");
  setMotion("sit","wag");
  showMsg("小鉄は あなたを見て、やさしく しっぽをふった", true);
  await sleep(2200);
  showMsg("── 小鉄は、じぶんのゆめを 見つけたんだ", true);
  await sleep(2200);
  const type = calculateDreamEnding();
  S.endType = type;
  addDiary("小鉄は じぶんのゆめを見つけた。そして、たびだっていった。", 30);
  addAlbum("たびだちの朝","🌅");
  await playEnding(type, false);
  S.ended = true;
  save();
  busy = false;
  enterMemoryMode();
}

/* ================= 思い出モード ================= */
const LETTERS = [
  "きょうは とおくの橋をわたりました。\nあなたとあるいた さんぽみちを おもいだしました。",
  "しらない町で、あたたかいごはんをもらいました。\nでも、あなたのごはんが いちばんです。",
  "きょうは 雨やどりをしました。\nあのへやの あかい提灯が なつかしいです。",
  "旅のとちゅうで KMIKのみんなに また会いました。\nいっしょに 月をながめました。ゆかいなよるでした。",
  "お手が とくいになったおかげで、\nいろんな人と なかよくなれました。ありがとう。",
  "いつか おみやげばなしを たくさんもって、\nかえりますね。それまで げんきでいてください。"
];
function enterMemoryMode(){
  memoryMode = true;
  $("#memoryBadge").style.display = "block";
  $("#memPhoto").style.display = "block";
  buildKt($("#memPhoto .kt"));
  $("#memPhoto .kt").className = "kt m-sit m-wag";
  kt.style.display = "none";
  $("#ball").style.display = "none";
  $("#banner30").style.display = "none";
  S.poops = []; renderPoops();
  $("#btnFeed").disabled = $("#btnClean").disabled = $("#btnTrain").disabled = true;
  $("#btnPlay").innerHTML = '<span class="ico">▶️</span>さいせい';
  $("#btnWalk").innerHTML = '<span class="ico">🌱</span>はじめから';
  updateHUD();
  showMsg("小鉄は 旅のとちゅう。おもいでを ながめよう。", true);
  maybeLetter();
}
function maybeLetter(){
  const today = Math.floor(Date.now()/DAY_MS);
  if(S.lastLetterDay !== today && Math.random() < .45){
    S.lastLetterDay = today; save();
    setTimeout(()=>{
      chime();
      openModal("✉ 小鉄からの手紙", `<div class="letterPaper">${pick(LETTERS)}<div class="sig">小鉄より 🐾</div></div>`);
    }, 1600);
  }
}
function resetGame(){
  if(!confirm("さいしょから あたらしい小鉄と くらしますか？\n（いまのセーブは きえます）")) return;
  localStorage.removeItem(KEY);
  location.reload();
}

/* ================= モーダル ================= */
function openModal(title, html){
  $("#modalTitle").textContent = title;
  $("#modalBody").innerHTML = html;
  $("#modal").classList.add("on");
}
function closeModal(){ $("#modal").classList.remove("on"); }
$("#modalClose").onclick = closeModal;
$("#modal").addEventListener("click", e=>{ if(e.target.id === "modal") closeModal(); });

/* ================= ナビ ================= */
$("#btnFeed").onclick  = ()=>{ if(!busy && !memoryMode) openFoodModal(); };
$("#btnClean").onclick = ()=>{
  if(busy || memoryMode) return;
  if(S.poops.length) cleanPoop(0);
  else { showMsg("いまは きれいだよ。えらいえらい ✨"); S.clean = clamp(S.clean+2,0,100); updateHUD(); save(); }
};
$("#btnPlay").onclick = ()=>{
  if(memoryMode){ playEnding(S.endType || "B", true); return; }
  if(!busy) showMsg("🎾 ボールを ゆびでひっぱって なげてみよう！");
};
$("#btnTrain").onclick = ()=>{ if(!busy && !memoryMode) openTrainModal(); };
$("#btnWalk").onclick  = ()=>{ if(memoryMode){ resetGame(); return; } if(!busy) goWalk(); };
$("#btnDiary").onclick = ()=>openDiaryModal();
$("#btnDay30").onclick = startDay30;

/* ================= デバッグ ================= */
$("#dbgBtn").onclick = ()=>$("#dbgPanel").classList.toggle("on");
$("#dbgPlus1").onclick = ()=>{ S.dbgDays++; save(); checkDay(); };
$("#dbgTo30").onclick = ()=>{
  const real = Math.floor((Date.now()-S.start)/DAY_MS) + 1;
  S.dbgDays = Math.max(0, 30 - real); save(); checkDay();
};
$("#dbgReset").onclick = ()=>{ localStorage.removeItem(KEY); location.reload(); };

/* ================= 起動 ================= */
function initTitle(){
  const has = load();
  if(has && S.ended){ $("#btnStart").textContent = "おもいでへ"; $("#titleSub").textContent = "小鉄は 旅のとちゅうです"; }
  else if(has && curDay() > 1){
    $("#btnStart").textContent = "つづきから";
    $("#titleSub").textContent = curDay() >= 30 ? "小鉄が あなたをまっています" : curDay() + "日目 / 小鉄がまっています";
  }
  else { $("#btnStart").textContent = "はじめる"; $("#titleSub").textContent = "ちゃいろの トイプードルと くらす日々"; }
}
async function startGame(){
  if(!S) S = defaultState();
  if(!localStorage.getItem(KEY)){ S = defaultState(); }
  $("#titleScreen").classList.remove("on");
  $("#game").classList.add("on");
  applyOfflineProgress();
  setKtPos(50, 20, true);
  setMotion();
  renderPoops();
  updateHUD();
  save();
  if(S.ended){ enterMemoryMode(); return; }
  if(S.diary.length === 0){
    addDiary("きょうから 小鉄とのくらしが はじまった。ちゃいろくて ふわふわだ。", 1);
    S.lastAutoDiary = 1;
    showMsg("ちゃいろの トイプードル「小鉄」が やってきた！");
    setMotion("tilt");
    setTimeout(()=>{ if(!busy) setMotion("wag"); }, 1800);
    setTimeout(()=>{ if(!busy) setMotion(); }, 3200);
  }else{
    showMsg("おかえりなさい。小鉄が まっていたよ");
    setMotion("wagfast","jump");
    setTimeout(()=>{ if(!busy) setMotion(); }, 1800);
  }
  save();
  await sleep(600);
  checkDay();
  // 定期的なくらしの変化
  setInterval(()=>{
    if(busy || memoryMode || S.ended) return;
    S.hunger = clamp(S.hunger - .5, 5, 100);
    S.mood = clamp(S.mood - .25, 8, 100);
    if(Math.random() < .05 && S.poops.length < 3){ spawnPoop(); }
    if(Math.random() < .12 && !busy){
      // 気まぐれな自発行動
      const d = curDay();
      (async ()=>{
        busy = true;
        try{
          if(d >= 21 && Math.random() < .5){
            await moveKt(18, 24); face("l"); setMotion("sit");
            showMsg("小鉄が 玄関のほうを じっと見ている");
            await sleep(2000);
          }else if(S.hunger < 35){
            await moveKt(24, 13); setMotion("sniff");
            showMsg("小鉄が おさらのちかくで まっている…おなかがすいたのかな");
            await sleep(1600);
          }else if(d >= 16 && Math.random() < .6){
            await moveKt(clamp(ktPos.x + rand(-20,20), 14, 84));
          }
        }finally{ setMotion(); busy = false; }
      })();
    }
    updateHUD(); save();
  }, 25000);
  document.addEventListener("visibilitychange", ()=>{
    if(document.hidden){ S.last = Date.now(); save(); }
    else if(!S.ended){ applyOfflineProgress(); renderPoops(); updateHUD(); checkDay(); }
  });
}
$("#btnStart").onclick = ()=>{ beep(660,.12); startGame(); };
initTitle();
</script>
