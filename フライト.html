<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKY RUSH — 3D Flight</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --hud:#9ff7c0; --hud-dim:rgba(159,247,192,.45); --warn:#ffb14a; --danger:#ff5d5d;
    --panel:rgba(6,18,14,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a1622;
    font-family:'Rajdhani',system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
  canvas{display:block}
  .mono{font-family:'Share Tech Mono',monospace}

  /* ===== HUD ===== */
  #hud{position:fixed;inset:0;pointer-events:none;color:var(--hud);
    text-shadow:0 0 6px rgba(159,247,192,.5);display:none}
  .gauge{position:absolute;background:var(--panel);border:1px solid var(--hud-dim);
    backdrop-filter:blur(4px);padding:8px 14px;border-radius:4px}
  .gauge .lbl{font-size:10px;letter-spacing:.25em;opacity:.75}
  .gauge .val{font-family:'Share Tech Mono',monospace;font-size:26px;line-height:1.1}
  .gauge .unit{font-size:11px;opacity:.7;margin-left:3px}
  #gSpd{left:16px;top:16px}
  #gAlt{left:16px;top:88px}
  #gScore{right:16px;top:16px;text-align:right}
  #gDist{right:16px;top:88px;text-align:right}

  /* health */
  #hpWrap{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);width:min(46vw,320px)}
  #hpLabel{font-size:10px;letter-spacing:.3em;text-align:center;margin-bottom:4px}
  #hpBar{height:10px;border:1px solid var(--hud-dim);border-radius:5px;overflow:hidden;background:rgba(0,0,0,.35)}
  #hpFill{height:100%;width:100%;background:linear-gradient(90deg,#3fe28a,#9ff7c0);transition:width .25s,background .25s}

  /* artificial horizon */
  #reticle{position:absolute;left:50%;top:50%;width:240px;height:240px;margin:-120px 0 0 -120px}
  #horizon{position:absolute;left:50%;top:50%;width:200px;height:2px;margin-left:-100px;
    background:linear-gradient(90deg,transparent,var(--hud) 18%,var(--hud) 82%,transparent);opacity:.8}
  #horizon::before,#horizon::after{content:"";position:absolute;top:-4px;width:2px;height:10px;background:var(--hud)}
  #horizon::before{left:42px}#horizon::after{right:42px}
  #dot{position:absolute;left:50%;top:50%;width:8px;height:8px;margin:-4px 0 0 -4px;
    border:2px solid var(--hud);border-radius:50%;opacity:.9}
  .wingtip{position:absolute;top:50%;width:34px;height:2px;background:var(--hud);margin-top:-1px;opacity:.9}
  .wingtip.l{left:14px}.wingtip.r{right:14px}

  /* status pills */
  #fx{position:absolute;left:50%;top:14px;transform:translateX(-50%);display:flex;gap:8px}
  .pill{display:none;font-size:12px;letter-spacing:.2em;padding:4px 12px;border-radius:99px;
    border:1px solid currentColor;background:rgba(0,0,0,.4)}
  #pBoost{color:#5cd9ff}#pShield{color:#7dff9b}#pMulti{color:#ffd95c}

  #toast{position:absolute;left:50%;top:32%;transform:translateX(-50%);font-size:22px;font-weight:700;
    letter-spacing:.18em;opacity:0;transition:opacity .15s;text-align:center;white-space:nowrap}

  #dmgFlash{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(255,40,40,.55));
    opacity:0;pointer-events:none;transition:opacity .4s}

  /* ===== touch controls ===== */
  #stickZone{position:fixed;left:0;bottom:0;width:55%;height:60%;pointer-events:auto;display:none}
  #stickBase{position:absolute;width:110px;height:110px;border:2px solid var(--hud-dim);border-radius:50%;
    display:none;backdrop-filter:blur(2px)}
  #stickKnob{position:absolute;width:48px;height:48px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,rgba(200,255,225,.9),rgba(90,200,150,.55));left:31px;top:31px}
  #boostBtn{position:fixed;right:22px;bottom:70px;width:84px;height:84px;border-radius:50%;display:none;
    border:2px solid #5cd9ff;color:#5cd9ff;background:rgba(8,24,34,.55);font-family:'Rajdhani';font-weight:700;
    font-size:15px;letter-spacing:.12em;pointer-events:auto;text-shadow:0 0 8px #5cd9ff}
  #boostBtn:active{background:rgba(92,217,255,.25)}

  /* ===== screens ===== */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%,rgba(20,60,90,.55),rgba(4,10,18,.88));color:#eaf6ff;text-align:center;z-index:10}
  .screen h1{font-size:clamp(44px,9vw,84px);font-weight:700;letter-spacing:.14em;line-height:1;
    background:linear-gradient(180deg,#fff,#8fd8ff 60%,#3f9fdd);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 18px rgba(80,180,255,.35))}
  .screen .sub{margin-top:6px;font-size:14px;letter-spacing:.5em;color:#9fd2ef;opacity:.85}
  .howto{margin-top:28px;font-size:14px;line-height:2;color:#cfe8f7;opacity:.9}
  .howto b{color:#9ff7c0}
  .bigbtn{margin-top:30px;pointer-events:auto;cursor:pointer;border:1px solid #8fd8ff;color:#dff3ff;
    background:linear-gradient(180deg,rgba(70,160,220,.25),rgba(20,60,100,.35));
    font-family:'Rajdhani';font-weight:700;font-size:20px;letter-spacing:.3em;padding:14px 52px;border-radius:6px;
    transition:transform .12s, box-shadow .12s}
  .bigbtn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(110,190,255,.35)}
  #overScreen{display:none}
  #finalScore{font-family:'Share Tech Mono';font-size:clamp(36px,7vw,64px);color:#ffd95c;margin-top:10px}
  .statline{margin-top:10px;font-size:15px;letter-spacing:.15em;color:#bcd9ec}
  #legend{margin-top:24px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center;font-size:13px;color:#cfe8f7}
  #legend span{display:flex;align-items:center;gap:6px}
  .sw{width:12px;height:12px;border-radius:50%;display:inline-block}
</style>
</head>
<body>

<div id="hud">
  <div class="gauge" id="gSpd"><div class="lbl">SPEED</div><div class="val"><span id="vSpd">0</span><span class="unit">km/h</span></div></div>
  <div class="gauge" id="gAlt"><div class="lbl">ALTITUDE</div><div class="val"><span id="vAlt">0</span><span class="unit">m</span></div></div>
  <div class="gauge" id="gScore"><div class="lbl">SCORE</div><div class="val mono" id="vScore">0</div></div>
  <div class="gauge" id="gDist"><div class="lbl">DISTANCE</div><div class="val"><span id="vDist">0.0</span><span class="unit">km</span></div></div>
  <div id="reticle"><div id="horizon"></div><div class="wingtip l"></div><div class="wingtip r"></div><div id="dot"></div></div>
  <div id="fx">
    <div class="pill" id="pBoost">BOOST</div>
    <div class="pill" id="pShield">SHIELD</div>
    <div class="pill" id="pMulti">SCORE ×2</div>
  </div>
  <div id="toast"></div>
  <div id="hpWrap"><div id="hpLabel">HULL INTEGRITY</div><div id="hpBar"><div id="hpFill"></div></div></div>
</div>
<div id="dmgFlash"></div>

<div id="stickZone"></div>
<div id="stickBase"><div id="stickKnob"></div></div>
<button id="boostBtn">BOOST</button>

<div class="screen" id="startScreen">
  <h1>SKY RUSH</h1>
  <div class="sub">OPEN-SKY FLIGHT</div>
  <div class="howto">
    <b>↑↓←→ / WASD</b> 機体操作 &nbsp;|&nbsp; <b>SHIFT</b> ブースト<br>
    スマホ: <b>左画面ドラッグ</b>で操縦、<b>BOOST</b>ボタンで加速<br>
    障害物を避け、リングをくぐり、アイテムで強化せよ
  </div>
  <div id="legend">
    <span><i class="sw" style="background:#ffd24a"></i>リング +100</span>
    <span><i class="sw" style="background:#5cd9ff"></i>ブースト</span>
    <span><i class="sw" style="background:#7dff9b"></i>シールド</span>
    <span><i class="sw" style="background:#ff6b6b"></i>修理 +30</span>
  </div>
  <button class="bigbtn" id="startBtn">TAKE OFF</button>
</div>

<div class="screen" id="overScreen">
  <h1 style="background:linear-gradient(180deg,#fff,#ffb1a1 60%,#e2543f);-webkit-background-clip:text;background-clip:text">CRASHED</h1>
  <div id="finalScore">0</div>
  <div class="statline" id="finalStats"></div>
  <button class="bigbtn" id="retryBtn">FLY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
<script>
(() => {
"use strict";

/* ================= 基本セットアップ ================= */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xbfd9ec, 250, 1500);

const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.5, 4000);

/* --- 空(グラデーション球) --- */
const skyGeo = new THREE.SphereGeometry(2600, 24, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide, depthWrite:false, fog:false,
  uniforms:{ top:{value:new THREE.Color(0x2f74c0)}, mid:{value:new THREE.Color(0x8fc4e8)}, bot:{value:new THREE.Color(0xe8dfc8)} },
  vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vP; uniform vec3 top,mid,bot;
    void main(){ float h=normalize(vP).y;
      vec3 c = h>0.0 ? mix(mid,top,pow(h,0.65)) : mix(mid,bot,pow(-h,0.5));
      gl_FragColor=vec4(c,1.0);}`
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

/* --- 光 --- */
scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x6b7d57, 0.85));
const sun = new THREE.DirectionalLight(0xfff2dd, 1.35);
sun.position.set(180, 320, -220);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-160; sun.shadow.camera.right=160;
sun.shadow.camera.top=160; sun.shadow.camera.bottom=-160;
sun.shadow.camera.far=900;
scene.add(sun);

/* 太陽グロー */
const glowTex = (()=> {
  const c=document.createElement('canvas'); c.width=c.height=128;
  const g=c.getContext('2d'), gr=g.createRadialGradient(64,64,0,64,64,64);
  gr.addColorStop(0,'rgba(255,250,230,1)'); gr.addColorStop(.25,'rgba(255,236,180,.85)');
  gr.addColorStop(.6,'rgba(255,220,150,.25)'); gr.addColorStop(1,'rgba(255,220,150,0)');
  g.fillStyle=gr; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
})();
const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex, fog:false, depthWrite:false, transparent:true}));
sunSprite.scale.set(420,420,1);
scene.add(sunSprite);

/* ================= 地形 ================= */
function hash(x,z){ let h=Math.sin(x*127.1+z*311.7)*43758.5453; return h-Math.floor(h); }
function smooth(t){ return t*t*(3-2*t); }
function vnoise(x,z){
  const xi=Math.floor(x), zi=Math.floor(z), xf=x-xi, zf=z-zi;
  const a=hash(xi,zi), b=hash(xi+1,zi), c=hash(xi,zi+1), d=hash(xi+1,zi+1);
  const u=smooth(xf), v=smooth(zf);
  return a+(b-a)*u+(c-a)*v+(a-b-c+d)*u*v;
}
function terrainH(x,z){
  let h = vnoise(x*0.004, z*0.004)*60 + vnoise(x*0.012, z*0.012)*22 + vnoise(x*0.05, z*0.05)*5;
  const edge = Math.min(1, Math.max(0,(Math.abs(x)-110)/260)); // 中央は飛行回廊
  h = h*(0.35+edge*1.5) + edge*edge*120 - 14;
  return h;
}
const TILE=560, COLS=3, ROWS=6, SEG=36;
const tiles=[];
function paintTile(mesh){
  const pos=mesh.geometry.attributes.position, col=mesh.geometry.attributes.color;
  const wx=mesh.position.x, wz=mesh.position.z;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i)+wx, z=-pos.getY(i)+wz; // plane回転前のローカルy=世界-z
    const h=terrainH(x,z);
    pos.setZ(i,h);
    let r,g,b;
    if(h<2){ r=.78;g=.72;b=.52; }            // 砂地
    else if(h<35){ r=.30+vnoise(x*.1,z*.1)*.1; g=.52; b=.27; } // 草原
    else if(h<95){ r=.42;g=.38;b=.34; }      // 岩
    else { r=.94;g=.95;b=.98; }              // 雪
    col.setXYZ(i,r,g,b);
  }
  pos.needsUpdate=true; col.needsUpdate=true;
  mesh.geometry.computeVertexNormals();
}
for(let cx=0;cx<COLS;cx++) for(let cz=0;cz<ROWS;cz++){
  const geo=new THREE.PlaneGeometry(TILE,TILE,SEG,SEG);
  geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(geo.attributes.position.count*3),3));
  const m=new THREE.Mesh(geo, new THREE.MeshLambertMaterial({vertexColors:true}));
  m.rotation.x=-Math.PI/2;
  m.position.set((cx-1)*TILE, 0, -cz*TILE+TILE);
  m.receiveShadow=true;
  paintTile(m); scene.add(m); tiles.push(m);
}

/* 雲 */
const clouds=[];
const cloudMat=new THREE.MeshLambertMaterial({color:0xffffff, transparent:true, opacity:0.88, fog:true});
for(let i=0;i<26;i++){
  const g=new THREE.Group();
  const n=3+Math.floor(Math.random()*4);
  for(let j=0;j<n;j++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(10+Math.random()*16, 7, 6), cloudMat);
    s.position.set((Math.random()-.5)*46,(Math.random()-.5)*10,(Math.random()-.5)*30);
    s.scale.y=0.55; g.add(s);
  }
  g.position.set((Math.random()-.5)*900, 90+Math.random()*120, -Math.random()*2200);
  scene.add(g); clouds.push(g);
}

/* ================= 自機 ================= */
const plane = new THREE.Group();
{
  const red=new THREE.MeshPhongMaterial({color:0xd8402e, shininess:80});
  const white=new THREE.MeshPhongMaterial({color:0xf2f0ea, shininess:60});
  const dark=new THREE.MeshPhongMaterial({color:0x22272e, shininess:90});
  const body=new THREE.Mesh(new THREE.CylinderGeometry(1.1,0.75,7.4,12), red);
  body.rotation.x=Math.PI/2; plane.add(body);
  const nose=new THREE.Mesh(new THREE.ConeGeometry(1.1,1.8,12), white);
  nose.rotation.x=-Math.PI/2; nose.position.z=-4.5; plane.add(nose);
  const canopy=new THREE.Mesh(new THREE.SphereGeometry(0.85,10,8), new THREE.MeshPhongMaterial({color:0x6fc3e8, shininess:140, transparent:true, opacity:.92}));
  canopy.position.set(0,0.85,-0.6); canopy.scale.set(1,0.8,1.5); plane.add(canopy);
  const wing=new THREE.Mesh(new THREE.BoxGeometry(13,0.26,2.5), white);
  wing.position.set(0,0.1,-0.4); plane.add(wing);
  const wt1=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.9,2.5), red); wt1.position.set(-6.4,0.5,-0.4); plane.add(wt1);
  const wt2=wt1.clone(); wt2.position.x=6.4; plane.add(wt2);
  const tail=new THREE.Mesh(new THREE.BoxGeometry(4.6,0.2,1.4), white);
  tail.position.set(0,0.3,3.2); plane.add(tail);
  const fin=new THREE.Mesh(new THREE.BoxGeometry(0.22,1.8,1.6), red);
  fin.position.set(0,1.1,3.3); plane.add(fin);
  const prop=new THREE.Mesh(new THREE.BoxGeometry(0.32,5.2,0.16), dark);
  prop.position.z=-5.4; plane.add(prop);
  plane.userData.prop=prop;
  plane.traverse(o=>{ if(o.isMesh){o.castShadow=true;} });
}
scene.add(plane);

/* シールド表示 */
const shieldMesh=new THREE.Mesh(new THREE.SphereGeometry(6.2,18,14),
  new THREE.MeshBasicMaterial({color:0x7dff9b, transparent:true, opacity:0.16, side:THREE.DoubleSide}));
shieldMesh.visible=false; plane.add(shieldMesh);

/* ブースト炎 */
const flame=new THREE.Mesh(new THREE.ConeGeometry(0.8,4.5,8),
  new THREE.MeshBasicMaterial({color:0x5cd9ff, transparent:true, opacity:0.8}));
flame.rotation.x=-Math.PI/2; flame.position.z=6.2; flame.visible=false; plane.add(flame);

/* ================= ゲームオブジェクト ================= */
const obstacles=[], items=[];
const tmpV=new THREE.Vector3();

function makeBalloon(){
  const g=new THREE.Group();
  const hue=Math.random();
  const env=new THREE.Mesh(new THREE.SphereGeometry(9,14,12),
    new THREE.MeshPhongMaterial({color:new THREE.Color().setHSL(hue,.7,.5)}));
  env.scale.y=1.15; g.add(env);
  const basket=new THREE.Mesh(new THREE.BoxGeometry(3,2.4,3), new THREE.MeshLambertMaterial({color:0x7a5a36}));
  basket.position.y=-13; g.add(basket);
  for(const s of [-1,1]){
    const rope=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,4.5), new THREE.MeshBasicMaterial({color:0x3a3128}));
    rope.position.set(s*1.6,-10.8,0); g.add(rope);
  }
  g.userData={type:'obs', r:9.5, kind:'balloon', t:Math.random()*9};
  return g;
}
function makeRock(){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0x6d6258});
  const n=2+Math.floor(Math.random()*3);
  for(let i=0;i<n;i++){
    const r=new THREE.Mesh(new THREE.DodecahedronGeometry(4+Math.random()*5,0), mat);
    r.position.set((Math.random()-.5)*9,(Math.random()-.5)*7,(Math.random()-.5)*9);
    r.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
    r.castShadow=true; g.add(r);
  }
  const moss=new THREE.Mesh(new THREE.SphereGeometry(4.5,8,6), new THREE.MeshLambertMaterial({color:0x4a6b35}));
  moss.position.y=4; moss.scale.y=0.4; g.add(moss);
  g.userData={type:'obs', r:9, kind:'rock', t:Math.random()*9};
  return g;
}
function makePylon(x,z){
  const h=terrainH(x,z);
  const top=h+50+Math.random()*70;
  const g=new THREE.Group();
  const tower=new THREE.Mesh(new THREE.CylinderGeometry(2.4,4.5,top-h,8),
    new THREE.MeshLambertMaterial({color:0x8a8f96}));
  tower.position.y=(h+top)/2; tower.castShadow=true; g.add(tower);
  const beacon=new THREE.Mesh(new THREE.SphereGeometry(2.6,10,8),
    new THREE.MeshBasicMaterial({color:0xff3b30}));
  beacon.position.y=top+1.5; g.add(beacon);
  g.userData={type:'obs', r:5, kind:'pylon', topY:top+1.5, beacon};
  g.position.set(x,0,z);
  return g;
}
function makeDrone(){
  const g=new THREE.Group();
  const core=new THREE.Mesh(new THREE.OctahedronGeometry(4,0),
    new THREE.MeshPhongMaterial({color:0x2c333d, shininess:100}));
  g.add(core);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(5.4,0.4,8,20),
    new THREE.MeshBasicMaterial({color:0xff7a45}));
  g.add(ring);
  g.userData={type:'obs', r:6, kind:'drone', t:Math.random()*9, amp:30+Math.random()*40, core, ring};
  return g;
}
function makeRing(){
  const g=new THREE.Group();
  const torus=new THREE.Mesh(new THREE.TorusGeometry(10,1.1,10,28),
    new THREE.MeshPhongMaterial({color:0xffd24a, emissive:0x6b4f00, shininess:120}));
  g.add(torus);
  g.userData={type:'item', kind:'ring', r:10, torus};
  return g;
}
function makeOrb(kind){
  const colors={boost:0x5cd9ff, shield:0x7dff9b, repair:0xff6b6b, multi:0xffd95c};
  const g=new THREE.Group();
  const core=new THREE.Mesh(new THREE.IcosahedronGeometry(2.6,0),
    new THREE.MeshPhongMaterial({color:colors[kind], emissive:colors[kind], emissiveIntensity:0.45, shininess:120}));
  g.add(core);
  const halo=new THREE.Mesh(new THREE.SphereGeometry(3.6,12,10),
    new THREE.MeshBasicMaterial({color:colors[kind], transparent:true, opacity:0.18}));
  g.add(halo);
  if(kind==='repair'){
    const m=new THREE.MeshBasicMaterial({color:0xffffff});
    const b1=new THREE.Mesh(new THREE.BoxGeometry(2.6,0.8,0.8),m);
    const b2=new THREE.Mesh(new THREE.BoxGeometry(0.8,2.6,0.8),m);
    g.add(b1,b2);
  }
  g.userData={type:'item', kind, r:4.5, core};
  return g;
}

/* 爆発パーティクル */
const sparks=[];
function burst(pos, color, n=18, spd=24){
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(new THREE.TetrahedronGeometry(0.7),
      new THREE.MeshBasicMaterial({color, transparent:true, opacity:1}));
    m.position.copy(pos);
    m.userData.v=new THREE.Vector3((Math.random()-.5)*spd,(Math.random()-.3)*spd,(Math.random()-.5)*spd);
    m.userData.life=0.8+Math.random()*0.5;
    scene.add(m); sparks.push(m);
  }
}

/* ================= サウンド ================= */
let AC=null;
function audio(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(freq, dur=0.12, type='sine', vol=0.18, slide=0){
  try{
    const a=audio(), o=a.createOscillator(), g=a.createGain();
    o.type=type; o.frequency.setValueAtTime(freq, a.currentTime);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide), a.currentTime+dur);
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}

  hit:()=>{beep(140,.25,'sawtooth',.3,-80);},
  crash:()=>{beep(90,.6,'sawtooth',.35,-60); beep(60,.7,'square',.2,-30);},
  boost:()=>{beep(300,.35,'sawtooth',.14,600);}
};

async function startBGM() {
  if(bgmPlaying) return;
  bgmPlaying = true;
  try {
    if(!bgmSynth) {
      const ac = audio();
      bgmSynth = new ABCJS.synth.CreateSynth();
      const parsed = ABCJS.parseOnly(abcString)[0];
      await bgmSynth.init({
        audioContext: ac,
        visualObj: parsed,
        options: { soundFontUrl: "https://paulrosen.github.io/midi-js-soundfonts/FluidR3_GM/" }
      });
      await bgmSynth.prime();
    }
    const playLoop = () => {
      if(!G.playing || !bgmPlaying) return;
      bgmSynth.start().then(() => {
        if(bgmPlaying && G.playing) playLoop();
      }).catch(e=>{});
    };
    playLoop();
  } catch(e) { console.error("BGM Error:", e); }
}

function stopBGM() {
  bgmPlaying = false;
  if(bgmSynth) bgmSynth.stop();
}

/* ================= 入力 ================= */
const keys={};
addEventListener('keydown',e=>{ keys[e.code]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault(); });
addEventListener('keyup',e=>{ keys[e.code]=false; });

const stick={active:false,id:null,ox:0,oy:0,x:0,y:0};
const stickZone=document.getElementById('stickZone');
const stickBase=document.getElementById('stickBase');
const stickKnob=document.getElementById('stickKnob');
const boostBtn=document.getElementById('boostBtn');
const isTouch='ontouchstart' in window;
if(isTouch){ stickZone.style.display='block'; boostBtn.style.display='block'; }

stickZone.addEventListener('touchstart',e=>{
  const t=e.changedTouches[0];
  stick.active=true; stick.id=t.identifier; stick.ox=t.clientX; stick.oy=t.clientY; stick.x=0; stick.y=0;
  stickBase.style.display='block';
  stickBase.style.left=(t.clientX-55)+'px'; stickBase.style.top=(t.clientY-55)+'px';
},{passive:true});
stickZone.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){ if(t.identifier===stick.id){
    let dx=t.clientX-stick.ox, dy=t.clientY-stick.oy;
    const len=Math.hypot(dx,dy), max=52;
    if(len>max){dx*=max/len; dy*=max/len;}
    stick.x=dx/max; stick.y=dy/max;
    stickKnob.style.transform=`translate(${dx}px,${dy}px)`;
  }}
},{passive:true});
const endStick=e=>{ for(const t of e.changedTouches){ if(t.identifier===stick.id){
  stick.active=false; stick.x=0; stick.y=0; stickBase.style.display='none';
  stickKnob.style.transform='translate(0,0)';
}}};
stickZone.addEventListener('touchend',endStick); stickZone.addEventListener('touchcancel',endStick);

let boostHeld=false;
boostBtn.addEventListener('touchstart',e=>{e.preventDefault(); boostHeld=true;});
boostBtn.addEventListener('touchend',()=>boostHeld=false);

const G={
  playing:false, hp:100, score:0, dist:0,
  speed:60, vx:0, vy:0,
  boostT:0, shieldT:0, multiT:0, invT:0,
  nextSpawnZ:-300, ringsHit:0,
};
const $=id=>document.getElementById(id);
const hud=$('hud');

function toast(msg,color='#9ff7c0'){
  const t=$('toast'); t.textContent=msg; t.style.color=color; t.style.opacity=1;
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.style.opacity=0, 900);
}

function resetGame(){
  for(const o of obstacles) scene.remove(o);
  for(const it of items) scene.remove(it);
  for(const s of sparks) scene.remove(s);
  obstacles.length=0; items.length=0; sparks.length=0;
  Object.assign(G,{playing:true,hp:100,score:0,dist:0,speed:60,vx:0,vy:0,
    boostT:0,shieldT:0,multiT:0,invT:0,nextSpawnZ:-300,ringsHit:0});
  plane.position.set(0,55,0); plane.rotation.set(0,0,0);
  camera.position.set(0,62,20);
  hud.style.display='block';
  $('startScreen').style.display='none';
  $('overScreen').style.display='none';
}

  G.playing=false;
  stopBGM();

  burst(plane.position, 0xff7a45, 36, 40);
  burst(plane.position, 0xffd24a, 24, 30);
  hud.style.display='none';
  $('finalScore').textContent=Math.floor(G.score).toLocaleString();
  $('finalStats').textContent=`DISTANCE ${ (G.dist/1000).toFixed(2) } km ・ RINGS ${G.ringsHit}`;
  setTimeout(()=>{ $('overScreen').style.display='flex'; }, 700);
}

$('startBtn').addEventListener('click',()=>{ audio(); startBGM(); resetGame(); });
$('retryBtn').addEventListener('click',()=>{ audio(); startBGM(); resetGame(); });

/* ================= スポーン ================= */
function spawnWave(z){
  const difficulty=Math.min(1, G.dist/9000);
  const lanes=[-70,-35,0,35,70];
  const alt=()=>30+Math.random()*90;

  // 障害物 1〜3個 + 距離で増加
  const nObs=1+Math.floor(Math.random()*(2+difficulty*2));
  for(let i=0;i<nObs;i++){
    const roll=Math.random();
    let o;
    const x=lanes[Math.floor(Math.random()*lanes.length)]+(Math.random()-.5)*20;
    if(roll<0.3){ o=makeBalloon(); o.position.set(x,alt(),z-Math.random()*60); }
    else if(roll<0.55){ o=makeRock(); o.position.set(x,alt(),z-Math.random()*60); }
    else if(roll<0.8){ o=makePylon(x, z-Math.random()*60); }
    else { o=makeDrone(); o.position.set(x,alt(),z-Math.random()*60); o.userData.baseX=x; }
    scene.add(o); obstacles.push(o);
  }

  // リングのチェーン (40%)
  if(Math.random()<0.4){
    const n=3+Math.floor(Math.random()*3);
    const bx=(Math.random()-.5)*120, by=35+Math.random()*70;
    const curve=(Math.random()-.5)*30, lift=(Math.random()-.5)*20;
    for(let i=0;i<n;i++){
      const r=makeRing();
      r.position.set(bx+Math.sin(i*0.8)*curve, by+i*lift/n*2, z-90-i*55);
      scene.add(r); items.push(r);
    }
  }
  // パワーアップ (35%)
  if(Math.random()<0.35){
    const kinds=['boost','boost','shield','repair','multi'];
    const it=makeOrb(kinds[Math.floor(Math.random()*kinds.length)]);
    it.position.set((Math.random()-.5)*140, 30+Math.random()*80, z-40-Math.random()*80);
    scene.add(it); items.push(it);
  }
}

/* ================= メインループ ================= */
let last=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  const t=now/1000;

  if(G.playing){
    /* --- 入力 → 速度 --- */
    let ix=0, iy=0;
    if(keys['ArrowLeft']||keys['KeyA']) ix-=1;
    if(keys['ArrowRight']||keys['KeyD']) ix+=1;
    if(keys['ArrowUp']||keys['KeyW']) iy+=1;
    if(keys['ArrowDown']||keys['KeyS']) iy-=1;
    if(stick.active){ ix+=stick.x; iy+=-stick.y; }
    ix=Math.max(-1,Math.min(1,ix)); iy=Math.max(-1,Math.min(1,iy));

    const agility=85;
    G.vx += (ix*agility - G.vx*3.2)*dt*3.2;
    G.vy += (iy*agility - G.vy*3.2)*dt*3.2;

    /* --- ブースト --- */
    const wantBoost=(keys['ShiftLeft']||keys['ShiftRight']||boostHeld);
    if(wantBoost && G.boostT>0){ /* 使用中 */ }
    const boosting=G.boostT>0;
    if(boosting) G.boostT-=dt;

    const base=60+Math.min(70, G.dist/140);
    G.speed=base*(boosting?1.75:1);

    /* --- 移動 --- */
    plane.position.x=Math.max(-150,Math.min(150, plane.position.x+G.vx*dt));
    plane.position.y=Math.max(6,  Math.min(170, plane.position.y+G.vy*dt));
    plane.position.z-=G.speed*dt;
    G.dist+=G.speed*dt;
    G.score+=G.speed*dt*0.12*(G.multiT>0?2:1);

    /* 地形衝突 */
    const ground=terrainH(plane.position.x, plane.position.z);
    if(plane.position.y < ground+3){
      if(G.shieldT>0 || G.invT>0){ plane.position.y=ground+4; }
      else { gameOver(); }
    }

    /* --- 姿勢 --- */
    plane.rotation.z += ((-G.vx*0.011) - plane.rotation.z)*dt*7;
    plane.rotation.x += ((-G.vy*0.007) - plane.rotation.x)*dt*7;
    plane.userData.prop.rotation.z += dt*(boosting?70:42);
    flame.visible=boosting;
    if(boosting) flame.scale.setScalar(0.85+Math.random()*0.4);
    shieldMesh.visible=G.shieldT>0;
    if(G.shieldT>0){ G.shieldT-=dt; shieldMesh.material.opacity=0.1+Math.sin(t*8)*0.06; }
    if(G.multiT>0) G.multiT-=dt;
    if(G.invT>0) G.invT-=dt;

    /* --- カメラ追従 --- */
    tmpV.set(plane.position.x*0.85, plane.position.y+6.5, plane.position.z+17);
    camera.position.lerp(tmpV, 1-Math.pow(0.0012, dt));
    camera.lookAt(plane.position.x, plane.position.y+1.5, plane.position.z-30);
    camera.rotation.z += (-G.vx*0.0035 - camera.rotation.z)*dt*5;
    const targetFov=boosting?72:62;
    camera.fov+= (targetFov-camera.fov)*dt*5; camera.updateProjectionMatrix();

    /* --- スポーン & 回収 --- */
    while(G.nextSpawnZ > plane.position.z-1100){
      spawnWave(G.nextSpawnZ);
      G.nextSpawnZ -= 130;
    }

    /* --- 障害物更新/衝突 --- */
    for(let i=obstacles.length-1;i>=0;i--){
      const o=obstacles[i], d=o.userData;
      if(o.position.z > plane.position.z+80){ scene.remove(o); obstacles.splice(i,1); continue; }
      if(d.kind==='balloon'){ d.t+=dt; o.position.y+=Math.sin(d.t*1.3)*0.05; o.rotation.y+=dt*0.2; }
      if(d.kind==='rock'){ d.t+=dt; o.rotation.y+=dt*0.15; o.position.y+=Math.sin(d.t)*0.03; }
      if(d.kind==='drone'){ d.t+=dt; o.position.x=d.baseX+Math.sin(d.t*1.6)*d.amp; d.core.rotation.y+=dt*4; d.ring.rotation.x+=dt*2.5; }
      if(d.kind==='pylon'){ d.beacon.material.color.setHex(Math.sin(t*6)>0?0xff3b30:0x801510); }

      let hit=false;
      if(d.kind==='pylon'){
        const dx=o.position.x-plane.position.x, dz=o.position.z-plane.position.z;
        hit=(Math.hypot(dx,dz)<d.r+3.5 && plane.position.y < d.topY+2);
      } else {
        hit=o.position.distanceTo(plane.position) < d.r+3.5;
      }
      if(hit && G.invT<=0){
        if(G.shieldT>0){
          burst(o.position,0x7dff9b,16,28); scene.remove(o); obstacles.splice(i,1);
          toast('SHIELD ABSORB','#7dff9b'); sfx.hit(); G.invT=0.3;
        } else {
          G.hp-=34; G.invT=1.1;
          burst(plane.position,0xff7a45,20,30); sfx.hit();
          const f=$('dmgFlash'); f.style.opacity=1; setTimeout(()=>f.style.opacity=0,120);
          if(G.hp<=0){ gameOver(); }
        }
      }
    }

    /* --- アイテム --- */
    for(let i=items.length-1;i>=0;i--){
      const it=items[i], d=it.userData;
      if(it.position.z > plane.position.z+60){ scene.remove(it); items.splice(i,1); continue; }
      if(d.kind==='ring'){ d.torus.rotation.z+=dt*0.8;
        const dz=Math.abs(it.position.z-plane.position.z);
        const dr=Math.hypot(it.position.x-plane.position.x, it.position.y-plane.position.y);
        if(dz<4 && dr<d.r-1){
          const pts=100*(G.multiT>0?2:1);
          G.score+=pts; G.ringsHit++;
          burst(it.position,0xffd24a,14,20); sfx.ring(); toast('+'+pts,'#ffd24a');
          scene.remove(it); items.splice(i,1); continue;
        }
      } else {
        d.core.rotation.y+=dt*2.4; it.position.y+=Math.sin(t*2.5+i)*0.04;
        if(it.position.distanceTo(plane.position)<d.r+3.5){
          if(d.kind==='boost'){ G.boostT=4.5; toast('BOOST!','#5cd9ff'); sfx.boost(); }
          if(d.kind==='shield'){ G.shieldT=7; toast('SHIELD','#7dff9b'); sfx.power(); }
          if(d.kind==='repair'){ G.hp=Math.min(100,G.hp+30); toast('REPAIR +30','#ff8e8e'); sfx.power(); }
          if(d.kind==='multi'){ G.multiT=8; toast('SCORE ×2','#ffd95c'); sfx.power(); }
          burst(it.position, d.core.material.color.getHex(), 12, 18);
          scene.remove(it); items.splice(i,1); continue;
        }
      }
    }

    /* --- HUD更新 --- */
    $('vSpd').textContent=Math.round(G.speed*3.1);
    $('vAlt').textContent=Math.round(plane.position.y);
    $('vScore').textContent=Math.floor(G.score).toLocaleString();
    $('vDist').textContent=(G.dist/1000).toFixed(1);
    const hpf=$('hpFill');
    hpf.style.width=Math.max(0,G.hp)+'%';
    hpf.style.background=G.hp>55?'linear-gradient(90deg,#3fe28a,#9ff7c0)':
      G.hp>28?'linear-gradient(90deg,#e2b03f,#ffd95c)':'linear-gradient(90deg,#e2543f,#ff8e8e)';
    $('horizon').style.transform=`rotate(${plane.rotation.z*57.3}deg) translateY(${plane.rotation.x*120}px)`;
    $('pBoost').style.display=G.boostT>0?'block':'none';
    $('pShield').style.display=G.shieldT>0?'block':'none';
    $('pMulti').style.display=G.multiT>0?'block':'none';
  }

  /* --- 環境のリサイクル --- */
  const pz=G.playing?plane.position.z:camera.position.z;
  for(const m of tiles){
    if(m.position.z > pz+TILE*1.5){ m.position.z-=ROWS*TILE; paintTile(m); }
  }
  for(const c of clouds){
    c.position.x+=Math.sin(t*0.1+c.position.z)*0.02;
    if(c.position.z > pz+200){ c.position.z-=2400; c.position.x=(Math.random()-.5)*900; }
  }
  sky.position.z=pz;
  sun.position.set(180,320,pz-220); sun.target.position.set(0,0,pz); sun.target.updateMatrixWorld();
  sunSprite.position.set(700,520,pz-2300);

  /* --- パーティクル --- */
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.userData.life-=dt;
    if(s.userData.life<=0){ scene.remove(s); sparks.splice(i,1); continue; }
    s.userData.v.y-=30*dt;
    s.position.addScaledVector(s.userData.v,dt);
    s.material.opacity=Math.min(1,s.userData.life*1.6);
    s.rotation.x+=dt*6; s.rotation.y+=dt*5;
  }

  /* タイトル画面のデモ飛行 */
  if(!G.playing && $('overScreen').style.display!=='flex' && $('startScreen').style.display!=='none'){
    camera.position.set(Math.sin(t*0.12)*40, 70+Math.sin(t*0.2)*10, camera.position.z-30*dt);
    camera.lookAt(0,40,camera.position.z-200);
    plane.position.set(Math.sin(t*0.5)*20, 55+Math.sin(t*0.8)*6, camera.position.z-60);
    plane.rotation.z=Math.cos(t*0.5)*-0.25;
    plane.userData.prop.rotation.z+=dt*40;
  }

  renderer.render(scene,camera);
}
requestAnimationFrame(loop);

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
})();
</script>
