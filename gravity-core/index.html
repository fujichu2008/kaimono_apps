function getStageSpawnPosition(
  tierIndex,
  index,
  tierCount
){
  const margin =
    2.2 + tierIndex * 0.45;

  const ringRange =
    GAMEPLAY.tierRingRanges[
      tierIndex
    ];

  // 同じ階層の中でも小さい物から順に外側へ配置し、
  // フィールドを進むほど次の大きさへ移行する流れを作る。
  const progression = clamp(
    (
      index +
      rand(0.15,0.85)
    ) /
    Math.max(1,tierCount),
    0,
    1
  );

  const radiusRatio = lerp(
    ringRange[0],
    ringRange[1],
    progression
  );

  // 黄金角を使い、限られた個数でも特定方向へ偏らず散在させる。
  const goldenAngle =
    Math.PI *
    (3 - Math.sqrt(5));

  const angle =
    index * goldenAngle +
    tierIndex * 0.91 +
    stageIndex * 0.47 +
    rand(-0.20,0.20);

  let x =
    Math.cos(angle) *
    floorHalf *
    radiusRatio;

  let z =
    Math.sin(angle) *
    floorHalf *
    radiusRatio;

  if(stageData.placement === 'aisles'){
    // 通路感を残しながら、一直線に密集しないよう横へ揺らす。
    x +=
      Math.sin(index * 1.37) *
      1.25;
  }else if(
    stageData.placement === 'clusters'
  ){
    // 市場では小さなまとまりを作るが、旧配置ほど密集させない。
    x +=
      Math.cos(index * 0.73) *
      1.55;

    z +=
      Math.sin(index * 0.81) *
      1.55;
  }else{
    // 港では緩い航路状の蛇行を加え、外周探索へ誘導する。
    x +=
      Math.sin(z * 0.13) *
      1.45;

    z +=
      Math.cos(x * 0.11) *
      1.45;
  }

  return {
    x:clamp(
      x,
      -floorHalf + margin,
      floorHalf - margin
    ),
    z:clamp(
      z,
      -floorHalf + margin,
      floorHalf - margin
    )
  };
}

function configureLivingRecord(record){
  if(!LIVING_KINDS.has(record.kind)){
    record.living = false;
    return;
  }

  record.living = true;
  record.wanderAngle =
    rand(0,Math.PI * 2);

  record.turnTimer =
    rand(0.8,2.8);

  record.motionPhase =
    rand(0,Math.PI * 2);

  record.walkSpeed =
    record.kind === 'person'
      ? rand(0.55,0.82)
      : record.kind === 'dog'
        ? rand(0.85,1.25)
        : record.kind === 'cat'
          ? rand(0.72,1.08)
          : rand(0.62,0.95);
}

function spawnObjects(){
  const [
    smallCount,
    mediumCount,
    largeCount
  ] = stageData.counts;

  const tiers = [
    {
      count:smallCount,
      min:0.10,
      max:0.36,
      kinds:stageData.small
    },
    {
      count:mediumCount,
      min:0.38,
      max:0.92,
      kinds:stageData.medium
    },
    {
      count:largeCount,
      min:0.95,
      max:2.6,
      kinds:stageData.large
    }
  ];

  tiers.forEach((tier,tierIndex) => {
    for(let index=0;index<tier.count;index++){
      const kind = pick(tier.kinds);

      // 同じ階層内でも内側ほど小さく、外側ほど大きくなるよう
      // サイズを段階化しつつ、完全な固定順にならない揺らぎを残す。
      const sizeProgress = clamp(
        (
          index +
          rand(0.15,0.85)
        ) /
        Math.max(1,tier.count),
        0,
        1
      );

      const sizeMinimum = lerp(
        tier.min,
        tier.max,
        clamp(
          sizeProgress -
            GAMEPLAY.spawnSizeJitter,
          0,
          1
        )
      );

      const sizeMaximum = lerp(
        tier.min,
        tier.max,
        clamp(
          sizeProgress +
            GAMEPLAY.spawnSizeJitter,
          0,
          1
        )
      );

      const size = getSpawnSize(
        kind,
        sizeMinimum,
        sizeMaximum
      );

      const object = createObject(kind,size);

      let x;
      let z;
      let attempts = 0;

      do{
        const position =
          getStageSpawnPosition(
            tierIndex,
            index + attempts,
            tier.count
          );

        x = clamp(
          position.x,
          -floorHalf + 2,
          floorHalf - 2
        );

        z = clamp(
          position.z,
          -floorHalf + 2,
          floorHalf - 2
        );

        attempts++;
      }while(
        (
          x*x + z*z < 16 ||
          pickups.some(item => {
            const differenceX =
              item.mesh.position.x - x;

            const differenceZ =
              item.mesh.position.z - z;

            const minimumDistance =
              (item.size + size) * 0.65;

            return (
              differenceX*differenceX +
              differenceZ*differenceZ
            ) < minimumDistance*minimumDistance;
          }) ||
          obstacles.some(obstacle => {
            const differenceX =
              obstacle.mesh.position.x - x;

            const differenceZ =
              obstacle.mesh.position.z - z;

            const minimumDistance =
              (
                obstacle.radius ||
                obstacle.size * 0.45
              ) +
              size * 0.55;

            return (
              differenceX*differenceX +
              differenceZ*differenceZ
            ) <
              minimumDistance *
              minimumDistance;
          })
        ) &&
        attempts < 25
      );

      object.position.set(
        x,
        getTerrainHeight(x,z) + 0.02,
        z
      );

      object.rotation.y = rand(0,Math.PI * 2);

      world.add(object);

      const record = {
        mesh:object,
        size,
        volume:size ** 3,
        kind,
        tier:tierIndex,
        attached:false
      };

      configureLivingRecord(record);

      object.userData.record = record;
      pickups.push(record);
    }
  });

  for(
    let index=0;
    index<stageData.obstacleCount;
    index++
  ){
    const size =
      rand(2.2,4.2) *
      (stageIndex === 2 ? 1.15 : 1);

    const kind =
      stageIndex === 2
        ? index % 2
          ? 'container'
          : 'rock'
        : index % 3 === 0
          ? 'cabinet'
          : 'rock';

    const obstacle = createObject(kind,size);

    let x;
    let z;

    do{
      x = rand(
        -floorHalf + 4,
        floorHalf - 4
      );

      z = rand(
        -floorHalf + 4,
        floorHalf - 4
      );
    }while(x*x + z*z < 70);

    obstacle.position.set(
      x,
      getTerrainHeight(x,z) + 0.02,
      z
    );

    obstacle.rotation.y = rand(0,Math.PI * 2);

    world.add(obstacle);

    obstacles.push({
      mesh:obstacle,
      radius:size * 0.65,
      size:size * 1.15
    });
  }
}

function setupStage(index){
  isTitleScene = false;
  stageIndex = index;
  stageData = STAGES[index];

  $('#vignette').style.display = '';

  clearWorld();

  scene.background =
    new THREE.Color(stageData.sky);

  scene.fog = new THREE.FogExp2(
    stageData.fog,
    stageIndex === 2
      ? 0.022
      : 0.018
  );

  renderer.toneMappingExposure =
    stageData.exposure;

  addLights();
  createFloorAndWalls();
  decorateStage();
  decorateVegetation();
  createCore();
  spawnObjects();

  coreRadius = stageData.start;
  coreVisualRadius = stageData.start;
  clusterRadius = coreVisualRadius;
  collectedVolume = 0;
  totalCollected = 0;
  sessionHaul = {};
  biggestCatch = null;
  feverAnnounced = false;
  timeLeft = stageData.time;

  coreGroup.position.set(
    0,
    getTerrainHeight(0,0) +
      clusterRadius,
    0
  );

  velocity.set(0,0,0);
  lastMoveDirection.set(0,0,-1);

  invulnerableTime = 0;
  impactDanger = 0;
  speedDanger = 0;
  fractureThreshold = Infinity;
  targetReached = false;
  attached = [];
  pickupCombo = 0;
  pickupComboTimer = 0;

  announcedMilestones.clear();

  MILESTONE_KINDS.forEach(milestone => {
    if(
      milestone.size <=
      stageData.start *
        GAMEPLAY.attachSizeRatio
    ){
      announcedMilestones.add(
        milestone.kind
      );
    }
  });

  // ステージ開始時はコアの後方から見下ろす標準視点へ戻す。
  cameraYaw = 0;
  cameraPitch = 0.68;
  cameraZoom = 1;
  cameraGesture.active = false;
  cameraGesture.lastDistance = 0;

  // TILT操作では、ステージ開始時の端末姿勢を新しい中立位置にする。
  tiltControl.calibrated = false;
  input.x = 0;
  input.y = 0;
  updateControlModeUI();

  updateCoreScale();
  updateHUD();

  camera.position.set(
    0,
    7.5,
    10.5
  );

  cameraTarget.copy(coreGroup.position);
  camera.lookAt(cameraTarget);
}

function updateStageCards(){
  document
    .querySelectorAll('.stage-card')
    .forEach(card => {
      const index = Number(
        card.dataset.stage
      );

      const bestElement =
        card.querySelector(
          '[data-best]'
        );

      if(
        !bestElement ||
        !Number.isInteger(index) ||
        !STAGES[index]
      ){
        return;
      }

      const storedBest = Number(
        localStorage.getItem(
          `gravity-core-best-${index}`
        )
      );

      if(
        !Number.isFinite(storedBest) ||
        storedBest <= 0
      ){
        bestElement.textContent = '';
        return;
      }

      const target =
        STAGES[index].target;

      const stars =
        storedBest >= target * 1.30
          ? '★★★'
          : storedBest >= target * 1.15
            ? '★★'
            : storedBest >= target
              ? '★'
              : '';

      bestElement.textContent =
        `BEST ${storedBest.toFixed(2)}m` +
        (
          stars
            ? ` ${stars}`
            : ''
        );
    });
}

function showScreen(name){
  [
    UI.title,
    UI.stage,
    UI.pause,
    UI.result
  ].forEach(screen => {
    screen.classList.remove('active');
  });

  UI.hud.classList.remove('active');

  if(name === 'title'){
    UI.title.classList.add('active');
  }

  if(name === 'stage'){
    updateStageCards();
    UI.stage.classList.add('active');
  }

  if(name === 'play'){
    UI.hud.classList.add('active');
  }

  if(name === 'pause'){
    UI.hud.classList.add('active');
    UI.pause.classList.add('active');
  }

  if(name === 'result'){
    UI.result.classList.add('active');
  }
}

function startGame(index){
  // 結果画面からリトライした場合、再生中のジングルを先に停止する。
  resultJingle.stop();
  audio.resume();

  setupStage(index);

  gameState = 'play';
  showScreen('play');

  // ユーザー操作を起点として、ゲーム中BGMを開始する。
  void gameBgm.start();

  clock.getDelta();
}

function updateHUD(){
  UI.timer.textContent =
    Math.max(0,timeLeft).toFixed(1);

  const feverActive =
    timeLeft <= GAMEPLAY.feverStartTime;

  UI.timer.classList.toggle(
    'fever',
    feverActive
  );

  UI.timer.style.color =
    feverActive
      ? ''
      : targetReached
        ? '#8cffb3'
        : timeLeft < 10
          ? '#ff8585'
          : '';

  UI.stageName.textContent =
    stageData.name;

  UI.sizeNow.textContent =
    `${coreRadius.toFixed(2)} m`;

  UI.sizeTarget.textContent =
    `TARGET ${stageData.target.toFixed(2)} m`;

  const progress = clamp(
    (
      coreRadius -
      stageData.start
    ) /
    (
      stageData.target -
      stageData.start
    ),
    0,
    1
  );

  UI.sizeBar.style.width =
    `${(progress * 100).toFixed(1)}%`;

  UI.danger.style.height =
    `${(
      Math.max(
        impactDanger,
        speedDanger
      ) * 100
    ).toFixed(0)}%`;

  UI.danger.classList.toggle(
    'critical',
    speedDanger >= 0.92
  );
}

function showEvent(text,duration=1.1){
  UI.event.textContent = text;
  UI.event.classList.add('show');
  eventTimer = duration;
}

function showPickup(text){
  UI.pickup.textContent = text;
  UI.pickup.classList.add('show');
  pickupTimer = 0.8;
}

function flash(opacity=0.35){
  UI.flash.style.transition = 'none';
  UI.flash.style.opacity = opacity;

  requestAnimationFrame(() => {
    UI.flash.style.transition =
      'opacity .34s';

    UI.flash.style.opacity = 0;
  });
}

function addTimeBonus(seconds){
  // 最終ラッシュ突入後は、取得によって制限時間を延長しない。
  if(
    targetReached ||
    !Number.isFinite(seconds) ||
    seconds <= 0
  ){
    return false;
  }

  timeLeft += seconds;
  return true;
}

function attachObject(item){
  item.attached = true;
  totalCollected++;

  sessionHaul[item.kind] =
    (sessionHaul[item.kind] || 0) + 1;

  if(
    !biggestCatch ||
    item.size > biggestCatch.size
  ){
    biggestCatch = {
      kind:item.kind,
      size:item.size
    };
  }

  const worldPosition = new THREE.Vector3();

  item.mesh.getWorldPosition(
    worldPosition
  );

  // 接触した位置をコアグループ内の座標へ変換する。
  const incomingLocalPosition =
    coreGroup.worldToLocal(
      worldPosition.clone()
    );

  // コアだけでなく、既に付着している物体も接着候補にする。
  const anchor = findAttachmentAnchor(
    incomingLocalPosition,
    item
  );

  const direction =
    incomingLocalPosition
      .clone()
      .sub(anchor.position)
      .normalize();

  if(direction.lengthSq() < 0.01){
    if(anchor.position.lengthSq() > 0.01){
      direction
        .copy(anchor.position)
        .normalize();
    }else{
      direction
        .set(
          rand(-1,1),
          rand(0.1,0.9),
          rand(-1,1)
        )
        .normalize();
    }
  }

  coreGroup.attach(item.mesh);

  item.attachDepth =
    anchor.depth + 1;

  item.mesh.position
    .copy(anchor.position)
    .addScaledVector(
      direction,
      anchor.radius +
      getAttachmentRadius(item) * 0.9
    );

  item.mesh.rotation.set(
    rand(-Math.PI,Math.PI),
    rand(-Math.PI,Math.PI),
    rand(-Math.PI,Math.PI)
  );

  attached.push(item);

  pickupCombo =
    pickupComboTimer > 0
      ? pickupCombo + 1
      : 1;

  pickupComboTimer =
    GAMEPLAY.comboWindow;

  const comboMultiplier =
    1 +
    Math.min(
      pickupCombo,
      GAMEPLAY.comboMax
    ) * GAMEPLAY.comboStep;

  // 現在の吸収上限に近い物ほど本来の成長量を得られる。
  // 成長後も小物だけを集め続ける場合は効率が落ち、
  // 小物から中物、大型物へ順番に狙う必要が生まれる。
  const usefulSizeRatio = clamp(
    item.size /
    Math.max(
      0.01,
      coreRadius *
        GAMEPLAY.attachSizeRatio
    ),
    0,
    1
  );

  const progressionYield =
    usefulSizeRatio <
    GAMEPLAY.undersizeStartRatio
      ? lerp(
          GAMEPLAY.undersizeYieldFloor,
          1,
          usefulSizeRatio /
            GAMEPLAY.undersizeStartRatio
        )
      : 1;

  // 連続取得倍率は維持し、対象が小さすぎる場合だけ成長効率を補正する。
  item.contributedVolume =
    item.volume *
    GAMEPLAY.volumeYield *
    comboMultiplier *
    progressionYield;

  collectedVolume +=
    item.contributedVolume;

  coreRadius = Math.cbrt(
    stageData.start ** 3 +
    collectedVolume
  );

  // 中心コアは拡大せず、付着物を含む塊の外形だけを更新する。
  recalculateClusterRadius();

  // コンボは成長倍率と演出だけに使い、
  // 制限時間を増やす報酬とは分離する。
  if(
    item.living !== undefined &&
    LIVING_KINDS.has(item.kind)
  ){
    const timeBonusGranted =
      addTimeBonus(
        GAMEPLAY.creatureTimeBonus
      );

    showEvent(
      timeBonusGranted
        ? `CAUGHT ${item.kind.toUpperCase()}! +${GAMEPLAY.creatureTimeBonus.toFixed(1)} SEC`
        : `CAUGHT ${item.kind.toUpperCase()}!`,
      1.1
    );

    audio.creature(item.kind);
    vibrate([15,30,25]);
  }else{
    audio.pickup(
      item.size +
      Math.min(pickupCombo,12) * 0.015
    );

    vibrate(
      pickupCombo >= 5
        ? 16
        : 10
    );
  }

  showPickup(
    pickupCombo > 1
      ? `CHAIN ×${pickupCombo}  +${item.kind.toUpperCase()}`
      : `+${item.kind.toUpperCase()}`
  );

  spawnParticles(
    coreGroup.position,
    pickupCombo >= 8
      ? 0xb9ff9d
      : 0x9df8ff,
    7 +
      item.tier * 2 +
      Math.min(pickupCombo,12),
    0.12 + item.size * 0.08
  );
}

function detachObjects(count,power=1){
  if(attached.length === 0){
    return;
  }

  const actualCount =
    Math.min(count,attached.length);

  for(
    let index=0;
    index<actualCount;
    index++
  ){
    const attachedIndex =
      Math.floor(
        Math.random() *
        attached.length
      );

    const item =
      attached.splice(
        attachedIndex,
        1
      )[0];

    const worldPosition =
      new THREE.Vector3();

    item.mesh.getWorldPosition(
      worldPosition
    );

    world.attach(item.mesh);

    item.mesh.position.copy(
      worldPosition
    );

    item.attached = false;
    item.attachDepth = 0;

    const direction = worldPosition
      .clone()
      .sub(coreGroup.position)
      .normalize();

    item.flyVelocity = direction
      .multiplyScalar(
        rand(2.4,4.8) * power
      )
      .add(
        new THREE.Vector3(
          rand(-1,1),
          rand(1.8,4),
          rand(-1,1)
        )
      );

    item.cooldown = 1.2;

    // 取得時に記録した実加算量を正確に戻す。
    collectedVolume = Math.max(
      0,
      collectedVolume -
      (
        item.contributedVolume ||
        item.volume *
          GAMEPLAY.volumeYield
      )
    );

    item.contributedVolume = 0;
  }

  coreRadius = Math.cbrt(
    stageData.start ** 3 +
    collectedVolume
  );

  // 外れた物体を除外して、塊全体の当たり判定を再計算する。
  recalculateClusterRadius();
}

function fractureCore(){
  if(invulnerableTime > 0){
    return;
  }

  invulnerableTime = 2.4;

  const lostCount = Math.max(
    4,
    Math.ceil(
      attached.length *
      GAMEPLAY.fractureLossRatio
    )
  );

  detachObjects(
    lostCount,
    1.7
  );

  collectedVolume *=
    GAMEPLAY.fractureVolumePenalty;

  attached.forEach(item => {
    item.contributedVolume =
      (
        item.contributedVolume ||
        item.volume *
          GAMEPLAY.volumeYield
      ) *
      GAMEPLAY.fractureVolumePenalty;
  });

  coreRadius = Math.cbrt(
    stageData.start ** 3 +
    collectedVolume
  );

  updateCoreScale();

  velocity.multiplyScalar(-0.35);

  showEvent(
    'CORE FRACTURE',
    1.5
  );

  audio.fracture();
  vibrate([60,40,100]);
  flash(0.58);

  cameraShake = 1;

  spawnParticles(
    coreGroup.position,
    0xbbefff,
    34,
    0.34
  );
}

function spawnParticles(
  position,
  color,
  count,
  size
){
  const geometry =
    new THREE.TetrahedronGeometry(
      size,
      0
    );

  const baseMaterial =
    new THREE.MeshBasicMaterial({
      color,
      transparent:true,
      opacity:0.9
    });

  for(let index=0;index<count;index++){
    const particle = new THREE.Mesh(
      geometry,
      baseMaterial.clone()
    );

    particle.position.copy(position);

    world.add(particle);

    particles.push({
      mesh:particle,
      velocity:new THREE.Vector3(
        rand(-1,1),
        rand(0.2,1.6),
        rand(-1,1)
      )
        .normalize()
        .multiplyScalar(
          rand(1.8,6)
        ),
      life:rand(0.35,0.8)
    });
  }
}

function handleObstacleCollision(
  obstacle,
  distance
){
  const difference = tempVector
    .copy(coreGroup.position)
    .sub(obstacle.mesh.position);

  difference.y = 0;

  // 衝突は質量寄りの半径で判定し、1本の長い枝が通路を塞ぐことを防ぐ。
  const effectiveRadius = lerp(
    clusterRadius,
    Math.max(
      coreVisualRadius,
      coreRadius
    ),
    GAMEPLAY.collisionRadiusBlend
  );

  const minimumDistance =
    effectiveRadius +
    obstacle.size * 0.52;

  if(distance >= minimumDistance){
    return;
  }

  const normal =
    difference.lengthSq() > 0.001
      ? difference.normalize()
      : new THREE.Vector3(1,0,0);

  coreGroup.position
    .copy(obstacle.mesh.position)
    .add(
      normal.clone().multiplyScalar(
        minimumDistance
      )
    );

  // 衝突で押し戻された地点の地形高度へ接地させる。
  coreGroup.position.y =
    getTerrainHeight(
      coreGroup.position.x,
      coreGroup.position.z
    ) + clusterRadius;

  const incomingSpeed = Math.max(
    0,
    -velocity.dot(normal)
  );

  velocity.addScaledVector(
    normal,
    incomingSpeed *
      GAMEPLAY.bounceRestitution
  );

  const sizeRatio =
    obstacle.size / coreRadius;

  // 掠り接触(垂直成分小)は罰せず、正面衝突のみ喪失・破砕の対象とする。
  const collisionPower =
    clamp(
      (incomingSpeed - 2.2) / 9,
      0,
      1
    ) *
    clamp(
      sizeRatio * 0.75,
      0,
      1.5
    );

  impactDanger = Math.max(
    impactDanger,
    collisionPower
  );

  if(
    invulnerableTime <= 0 &&
    incomingSpeed >
      GAMEPLAY.detachSpeedThreshold
  ){
    const lostCount = Math.ceil(
      collisionPower *
      (
        GAMEPLAY.detachBaseCount +
        attached.length *
          GAMEPLAY.detachScalePerItem
      )
    );

    const shouldFracture =
      incomingSpeed > fractureThreshold &&
      sizeRatio > 1.2;

    if(lostCount > 0){
      detachObjects(
        lostCount,
        0.8 + collisionPower
      );

      // 通常喪失だけに短い猶予を付け、同一衝突の破砕判定は妨げない。
      if(!shouldFracture){
        invulnerableTime = Math.max(
          invulnerableTime,
          GAMEPLAY.collisionGraceTime
        );
      }
    }

    audio.impact(collisionPower);

    vibrate(
      collisionPower > 0.55
        ? [25,20,45]
        : 18
    );

    cameraShake = Math.max(
      cameraShake,
      collisionPower * 0.7
    );

    showEvent(
      collisionPower > 0.62
        ? 'HEAVY IMPACT'
        : 'IMPACT',
      0.75
    );

    if(shouldFracture){
      fractureCore();
    }
  }
}

function updateLivingPickup(
  item,
  deltaTime
){
  if(
    !item.living ||
    item.attached ||
    item.flyVelocity
  ){
    return;
  }

  item.turnTimer -= deltaTime;

  item.motionPhase +=
    deltaTime *
    (
      item.kind === 'person'
        ? 7
        : item.kind === 'bird'
          ? 10
          : 9
    );

  const differenceX =
    item.mesh.position.x -
    coreGroup.position.x;

  const differenceZ =
    item.mesh.position.z -
    coreGroup.position.z;

  const distanceFromCore =
    Math.hypot(
      differenceX,
      differenceZ
    );

  const fleeDistance =
    4.2 +
    coreRadius * 1.6 +
    item.size;

  if(distanceFromCore < fleeDistance){
    item.wanderAngle =
      Math.atan2(
        differenceX,
        differenceZ
      );

    item.turnTimer =
      rand(0.35,0.8);
  }else if(item.turnTimer <= 0){
    item.wanderAngle +=
      rand(-1.15,1.15);

    item.turnTimer =
      rand(1.1,3.4);
  }

  const directionX =
    Math.sin(item.wanderAngle);

  const directionZ =
    Math.cos(item.wanderAngle);

  const speed =
    item.walkSpeed *
    (
      1 + stageIndex * 0.08
    ) *
    (
      distanceFromCore < fleeDistance
        ? 1.45
        : 1
    );

  const nextX =
    item.mesh.position.x +
    directionX *
    speed *
    deltaTime;

  const nextZ =
    item.mesh.position.z +
    directionZ *
    speed *
    deltaTime;

  const boundary =
    floorHalf -
    Math.max(1.5,item.size);

  const slope =
    getTerrainSlope(
      nextX,
      nextZ,
      livingSlope
    );

  const blockingObstacle =
    obstacles.find(obstacle => {
      const obstacleRadius =
        obstacle.radius ||
        obstacle.size * 0.45;

      const obstacleX =
        nextX -
        obstacle.mesh.position.x;

      const obstacleZ =
        nextZ -
        obstacle.mesh.position.z;

      const minimumDistance =
        obstacleRadius +
        item.size * 0.34;

      return (
        obstacleX * obstacleX +
        obstacleZ * obstacleZ
      ) <
        minimumDistance *
        minimumDistance;
    });

  if(
    Math.abs(nextX) > boundary ||
    Math.abs(nextZ) > boundary ||
    slope.length() >
      (
        stageIndex === 2
          ? 1.45
          : 1.18
      )
  ){
    item.wanderAngle +=
      rand(1.35,2.45);

    item.turnTimer =
      rand(0.45,1.0);
  }else if(blockingObstacle){
    const obstacleRadius =
      blockingObstacle.radius ||
      blockingObstacle.size * 0.45;

    let awayX =
      item.mesh.position.x -
      blockingObstacle.mesh.position.x;

    let awayZ =
      item.mesh.position.z -
      blockingObstacle.mesh.position.z;

    let awayDistance =
      Math.hypot(
        awayX,
        awayZ
      );

    if(awayDistance < 0.001){
      awayX = -directionX;
      awayZ = -directionZ;
      awayDistance = 1;
    }

    const separationDistance =
      obstacleRadius +
      item.size * 0.34 +
      0.08;

    let resolvedX =
      blockingObstacle.mesh.position.x +
      awayX /
      awayDistance *
      separationDistance;

    let resolvedZ =
      blockingObstacle.mesh.position.z +
      awayZ /
      awayDistance *
      separationDistance;

    if(
      Math.abs(resolvedX) > boundary ||
      Math.abs(resolvedZ) > boundary
    ){
      awayX *= -1;
      awayZ *= -1;

      resolvedX =
        blockingObstacle.mesh.position.x +
        awayX /
        awayDistance *
        separationDistance;

      resolvedZ =
        blockingObstacle.mesh.position.z +
        awayZ /
        awayDistance *
        separationDistance;
    }

    item.mesh.position.x = clamp(
      resolvedX,
      -boundary,
      boundary
    );

    item.mesh.position.z = clamp(
      resolvedZ,
      -boundary,
      boundary
    );

    item.wanderAngle =
      Math.atan2(
        awayX,
        awayZ
      );

    item.turnTimer =
      rand(0.8,1.4);
  }else{
    item.mesh.position.x =
      nextX;

    item.mesh.position.z =
      nextZ;
  }

  const bobAmount =
    item.kind === 'bird'
      ? 0.06
      : item.kind === 'person'
        ? 0.025
        : 0.035;

  item.mesh.position.y =
    getTerrainHeight(
      item.mesh.position.x,
      item.mesh.position.z
    ) +
    0.02 +
    Math.abs(
      Math.sin(item.motionPhase)
    ) *
    bobAmount;

  item.mesh.rotation.y =
    item.wanderAngle;

  item.mesh.rotation.z =
    Math.sin(item.motionPhase) *
    (
      item.kind === 'person'
        ? 0.035
        : 0.055
    );

  item.mesh.rotation.x =
    item.kind === 'bird'
      ? Math.sin(
          item.motionPhase * 0.5
        ) * 0.08
      : 0;
}

function updatePickups(deltaTime){
  const corePosition =
    coreGroup.position;

  for(
    let index=pickups.length-1;
    index>=0;
    index--
  ){
    const item = pickups[index];

    if(item.attached){
      continue;
    }

    if(item.cooldown){
      item.cooldown -= deltaTime;
    }

    if(item.flyVelocity){
      item.flyVelocity.y -=
        9.8 * deltaTime;

      item.mesh.position.addScaledVector(
        item.flyVelocity,
        deltaTime
      );

      const itemGroundHeight =
        getTerrainHeight(
          item.mesh.position.x,
          item.mesh.position.z
        ) + 0.02;

      if(
        item.mesh.position.y <
        itemGroundHeight
      ){
        item.mesh.position.y =
          itemGroundHeight;

        item.flyVelocity.y *= -0.28;
        item.flyVelocity.x *= 0.82;
        item.flyVelocity.z *= 0.82;
      }

      if(
        item.flyVelocity.length() < 0.45 &&
        item.mesh.position.y <
          itemGroundHeight + 0.06
      ){
        const overlappingObstacle =
          obstacles.find(obstacle => {
            const obstacleRadius =
              obstacle.radius ||
              obstacle.size * 0.45;

            const differenceX =
              item.mesh.position.x -
              obstacle.mesh.position.x;

            const differenceZ =
              item.mesh.position.z -
              obstacle.mesh.position.z;

            const minimumDistance =
              obstacleRadius +
              item.size * 0.4;

            return (
              differenceX * differenceX +
              differenceZ * differenceZ
            ) <
              minimumDistance *
              minimumDistance;
          });

        if(overlappingObstacle){
          const obstacleRadius =
            overlappingObstacle.radius ||
            overlappingObstacle.size * 0.45;

          const separationDistance =
            obstacleRadius +
            item.size * 0.4 +
            0.15;

          let directionX =
            item.mesh.position.x -
            overlappingObstacle.mesh.position.x;

          let directionZ =
            item.mesh.position.z -
            overlappingObstacle.mesh.position.z;

          let directionLength =
            Math.hypot(
              directionX,
              directionZ
            );

          if(directionLength < 0.001){
            const randomAngle =
              rand(0,Math.PI * 2);

            directionX =
              Math.cos(randomAngle);

            directionZ =
              Math.sin(randomAngle);

            directionLength = 1;
          }

          item.mesh.position.x =
            overlappingObstacle.mesh.position.x +
            directionX /
            directionLength *
            separationDistance;

          item.mesh.position.z =
            overlappingObstacle.mesh.position.z +
            directionZ /
            directionLength *
            separationDistance;

          item.mesh.position.y =
            getTerrainHeight(
              item.mesh.position.x,
              item.mesh.position.z
            ) + 0.02;
        }

        item.flyVelocity = null;
      }
    }

    updateLivingPickup(
      item,
      deltaTime
    );

    let differenceX =
      item.mesh.position.x -
      corePosition.x;

    let differenceZ =
      item.mesh.position.z -
      corePosition.z;

    let distanceSquared =
      differenceX*differenceX +
      differenceZ*differenceZ;

    // コアに近い大きさまで取得可能にして、
    // 成長段階が切り替わる停滞感を減らす。
    const canAttach =
      item.size <=
      coreRadius *
      GAMEPLAY.attachSizeRatio;

    const canBePulled =
      canAttach &&
      !item.flyVelocity &&
      (
        !item.cooldown ||
        item.cooldown <= 0
      );

    // 見た目の枝先を含むclusterRadiusを直接使わず、
    // 数値上の成長値で上限を設けた取得判定半径を使用する。
    const effectivePickupRadius =
      getEffectivePickupRadius();

    const pickupDistance =
      effectivePickupRadius +
      getAttachmentRadius(item);

    // 磁力は接触直前のわずかな位置補正だけに限定する。
    // フィーバー中も塊全体の半径ではなく、補助距離だけを増やす。
    const feverMagnetMultiplier =
      timeLeft <= GAMEPLAY.feverStartTime
        ? GAMEPLAY.feverMagnetBoost
        : 1;

    const magnetDistance =
      pickupDistance +
      GAMEPLAY.magnetPadding *
        feverMagnetMultiplier;

    if(
      canBePulled &&
      distanceSquared <
        magnetDistance *
        magnetDistance &&
      distanceSquared >
        pickupDistance *
        pickupDistance
    ){
      const distance = Math.max(
        0.001,
        Math.sqrt(distanceSquared)
      );

      const pullRatio = clamp(
        1 -
        (
          distance -
          pickupDistance
        ) /
        Math.max(
          0.001,
          magnetDistance -
          pickupDistance
        ),
        0,
        1
      );

      const pullSpeed = lerp(
        0.08,
        0.75,
        pullRatio * pullRatio
      );

      item.mesh.position.x +=
        (
          corePosition.x -
          item.mesh.position.x
        ) /
        distance *
        pullSpeed *
        deltaTime;

      item.mesh.position.z +=
        (
          corePosition.z -
          item.mesh.position.z
        ) /
        distance *
        pullSpeed *
        deltaTime;

      differenceX =
        item.mesh.position.x -
        corePosition.x;

      differenceZ =
        item.mesh.position.z -
        corePosition.z;

      distanceSquared =
        differenceX*differenceX +
        differenceZ*differenceZ;
    }

    if(
      canAttach &&
      distanceSquared <
        pickupDistance *
        pickupDistance &&
      (
        !item.cooldown ||
        item.cooldown <= 0
      )
    ){
      attachObject(item);
    }
  }
}

function updateObstacles(){
  const corePosition =
    coreGroup.position;

  // 同一フレームで複数の障害物が解放されても、
  // 通知と効果音は最初の1件だけにする。
  let unlockNotified = false;

  for(
    let index=obstacles.length-1;
    index>=0;
    index--
  ){
    const obstacle =
      obstacles[index];

    if(
      obstacle.size <=
      coreRadius *
        GAMEPLAY.obstacleAbsorbRatio
    ){
      const record = {
        mesh:obstacle.mesh,
        size:obstacle.size,
        volume:
          obstacle.size ** 3 *
          GAMEPLAY.obstacleVolumeFactor,
        kind:
          obstacle.mesh.userData.kind ||
          'debris',
        tier:2,
        attached:false,
        living:false
      };

      obstacle.mesh.userData.record =
        record;

      pickups.push(record);
      obstacles.splice(index,1);

      if(!unlockNotified){
        showEvent(
          'OBSTACLE UNLOCKED!',
          1.2
        );

        audio.tone(
          520,
          0.25,
          'triangle',
          0.13,
          1.4
        );

        unlockNotified = true;
      }

      continue;
    }

    const differenceX =
      corePosition.x -
      obstacle.mesh.position.x;

    const differenceZ =
      corePosition.z -
      obstacle.mesh.position.z;

    const distance =
      Math.hypot(
        differenceX,
        differenceZ
      );

    handleObstacleCollision(
      obstacle,
      distance
    );
  }
}

let controlMode = 'joystick';

const tiltControl = {
  listening:false,
  calibrated:false,
  neutralBeta:0,
  neutralGamma:0
};

function updateControlModeUI(){
  const tiltEnabled =
    controlMode === 'tilt';

  UI.controlMode.textContent =
    tiltEnabled
      ? 'TILT'
      : 'STICK';

  UI.controlMode.classList.toggle(
    'active',
    tiltEnabled
  );

  UI.controlMode.setAttribute(
    'aria-pressed',
    String(tiltEnabled)
  );
}

function normalizeTiltInput(value){
  const deadZone = 2.5;
  const maximumTilt = 18;
  const absoluteValue =
    Math.abs(value);

  if(absoluteValue <= deadZone){
    return 0;
  }

  return (
    Math.sign(value) *
    clamp(
      (
        absoluteValue - deadZone
      ) /
      (
        maximumTilt - deadZone
      ),
      0,
      1
    )
  );
}

function handleDeviceOrientation(event){
  if(
    controlMode !== 'tilt' ||
    gameState !== 'play' ||
    typeof event.beta !== 'number' ||
    typeof event.gamma !== 'number'
  ){
    return;
  }

  if(!tiltControl.calibrated){
    tiltControl.neutralBeta =
      event.beta;

    tiltControl.neutralGamma =
      event.gamma;

    tiltControl.calibrated = true;
    input.x = 0;
    input.y = 0;

    showEvent(
      'TILT READY',
      0.75
    );

    return;
  }

  const betaDifference =
    event.beta -
    tiltControl.neutralBeta;

  const gammaDifference =
    event.gamma -
    tiltControl.neutralGamma;

  const screenAngle = Number(
    screen.orientation?.angle ??
    window.orientation ??
    0
  );

  const angleRadians =
    THREE.MathUtils.degToRad(
      screenAngle
    );

  const cosine =
    Math.cos(angleRadians);

  const sine =
    Math.sin(angleRadians);

  // 端末座標の傾きを現在の画面方向へ変換する。
  // 縦持ち・横持ちのどちらでも画面右と画面上を基準に操作できる。
  const screenTiltX =
    gammaDifference * cosine +
    betaDifference * sine;

  const screenTiltY =
    -gammaDifference * sine +
    betaDifference * cosine;

  const targetX =
    normalizeTiltInput(
      screenTiltX
    );

  const targetY =
    normalizeTiltInput(
      -screenTiltY
    );

  // センサーの細かな揺れをそのまま移動へ反映しない。
  input.x = lerp(
    input.x,
    targetX,
    0.22
  );

  input.y = lerp(
    input.y,
    targetY,
    0.22
  );
}

async function enableTiltControl(){
  const orientationEventClass =
    window.DeviceOrientationEvent;

  if(!orientationEventClass){
    showEvent(
      'TILT NOT SUPPORTED',
      1.2
    );

    return;
  }

  // iOSの権限ダイアログ中に制限時間が減ることを防ぐ。
  const resumeAfterRequest =
    gameState === 'play';

  if(resumeAfterRequest){
    gameState = 'sensor-permission';
  }

  try{
    if(
      typeof orientationEventClass.requestPermission ===
      'function'
    ){
      const permission =
        await orientationEventClass.requestPermission();

      if(permission !== 'granted'){
        throw new Error(
          'Device orientation permission denied'
        );
      }
    }

    if(!tiltControl.listening){
      window.addEventListener(
        'deviceorientation',
        handleDeviceOrientation,
        true
      );

      tiltControl.listening = true;
    }

    controlMode = 'tilt';
    tiltControl.calibrated = false;

    resetJoystick();
    updateControlModeUI();

    showEvent(
      'TILT: HOLD LEVEL',
      1.2
    );
  }catch(error){
    controlMode = 'joystick';
    tiltControl.calibrated = false;

    resetJoystick();
    updateControlModeUI();

    showEvent(
      'TILT UNAVAILABLE',
      1.2
    );
  }finally{
    if(
      resumeAfterRequest &&
      gameState === 'sensor-permission'
    ){
      gameState = 'play';
      clock.getDelta();
    }
  }
}

function enableJoystickControl(){
  controlMode = 'joystick';
  tiltControl.calibrated = false;

  resetJoystick();
  updateControlModeUI();

  showEvent(
    'STICK CONTROL',
    0.9
  );
}

async function toggleControlMode(){
  if(controlMode === 'tilt'){
    enableJoystickControl();
    return;
  }

  await enableTiltControl();
}

const input = {
  x:0,
  y:0,
  active:false,
  touchId:null,
  originX:0,
  originY:0,
  maximumDistance:44
};

function updateJoystick(
  clientX,
  clientY
){
  let differenceX =
    clientX - input.originX;

  let differenceY =
    clientY - input.originY;

  const length = Math.hypot(
    differenceX,
    differenceY
  );

  if(length > input.maximumDistance){
    differenceX =
      differenceX /
      length *
      input.maximumDistance;

    differenceY =
      differenceY /
      length *
      input.maximumDistance;
  }

  input.x =
    differenceX /
    input.maximumDistance;

  input.y =
    -differenceY /
    input.maximumDistance;

  UI.stick.style.transform =
    `translate(${differenceX}px,${differenceY}px)`;
}

function startJoystick(touch){
  if(controlMode !== 'joystick'){
    return;
  }

  input.active = true;
  input.touchId = touch.identifier;
  input.originX = touch.clientX;
  input.originY = touch.clientY;
  input.x = 0;
  input.y = 0;

  UI.joystick.style.left =
    `${input.originX}px`;

  UI.joystick.style.top =
    `${input.originY}px`;

  UI.joystick.classList.add('active');

  UI.stick.style.transform =
    'translate(0,0)';

  audio.resume();
}

function resetJoystick(){
  input.x = 0;
  input.y = 0;
  input.active = false;
  input.touchId = null;

  UI.joystick.classList.remove('active');

  UI.stick.style.transform =
    'translate(0,0)';
}

function findTouchById(
  touchList,
  identifier
){
  for(
    let index=0;
    index<touchList.length;
    index++
  ){
    if(
      touchList[index].identifier ===
      identifier
    ){
      return touchList[index];
    }
  }

  return null;
}

function isTouchOnButton(target){
  return (
    target instanceof Element &&
    Boolean(target.closest('button'))
  );
}

function getTwoFingerCenter(touches){
  return {
    x:(touches[0].clientX + touches[1].clientX) / 2,
    y:(touches[0].clientY + touches[1].clientY) / 2
  };
}

function getTwoFingerDistance(touches){
  return Math.hypot(
    touches[0].clientX -
      touches[1].clientX,
    touches[0].clientY -
      touches[1].clientY
  );
}

function handleGameTouchStart(event){
  if(gameState === 'result'){
    if(event.touches.length >= 2){
      const center = getTwoFingerCenter(
        event.touches
      );

      resultGesture.active = true;
      resultGesture.touchId = null;
      resultGesture.lastX = center.x;
      resultGesture.lastY = center.y;
      resultGesture.lastDistance =
        getTwoFingerDistance(
          event.touches
        );

      event.preventDefault();
      return;
    }

    if(
      event.touches.length === 1 &&
      !isTouchOnButton(event.target)
    ){
      const touch = event.touches[0];

      resultGesture.active = true;
      resultGesture.touchId =
        touch.identifier;
      resultGesture.lastX =
        touch.clientX;
      resultGesture.lastY =
        touch.clientY;
      resultGesture.lastDistance = 0;

      event.preventDefault();
    }

    return;
  }

  if(gameState !== 'play'){
    return;
  }

  // 操作モードにかかわらず、二本指はカメラ操作を優先する。
  if(event.touches.length >= 2){
    const center = getTwoFingerCenter(
      event.touches
    );

    cameraGesture.active = true;
    cameraGesture.lastX = center.x;
    cameraGesture.lastY = center.y;
    cameraGesture.lastDistance =
      getTwoFingerDistance(
        event.touches
      );

    resetJoystick();

    event.preventDefault();
    return;
  }

  // TILT操作中は一本指を移動入力として使用しない。
  if(controlMode !== 'joystick'){
    return;
  }

  if(
    event.touches.length === 1 &&
    !isTouchOnButton(event.target)
  ){
    startJoystick(event.touches[0]);
    event.preventDefault();
  }
}

function handleGameTouchMove(event){
  if(gameState === 'result'){
    if(event.touches.length >= 2){
      const center = getTwoFingerCenter(
        event.touches
      );

      const differenceX =
        center.x - resultGesture.lastX;

      const differenceY =
        center.y - resultGesture.lastY;

      const currentDistance = Math.max(
        1,
        getTwoFingerDistance(
          event.touches
        )
      );

      if(resultGesture.lastDistance > 0){
        resultShowcaseZoom = clamp(
          resultShowcaseZoom *
          resultGesture.lastDistance /
          currentDistance,
          0.62,
          1.85
        );
      }

      resultShowcaseYaw -=
        differenceX * 0.008;

      resultShowcasePitch = clamp(
        resultShowcasePitch +
          differenceY * 0.005,
        -0.65,
        0.75
      );

      resultGesture.active = true;
      resultGesture.touchId = null;
      resultGesture.lastX = center.x;
      resultGesture.lastY = center.y;
      resultGesture.lastDistance =
        currentDistance;

      event.preventDefault();
      return;
    }

    if(
      resultGesture.active &&
      resultGesture.touchId !== null
    ){
      const touch = findTouchById(
        event.touches,
        resultGesture.touchId
      );

      if(touch){
        const differenceX =
          touch.clientX -
          resultGesture.lastX;

        const differenceY =
          touch.clientY -
          resultGesture.lastY;

        resultShowcaseYaw -=
          differenceX * 0.010;

        resultShowcasePitch = clamp(
          resultShowcasePitch +
            differenceY * 0.006,
          -0.65,
          0.75
        );

        resultGesture.lastX =
          touch.clientX;

        resultGesture.lastY =
          touch.clientY;

        event.preventDefault();
      }
    }

    return;
  }

  if(gameState !== 'play'){
    return;
  }

  if(
    cameraGesture.active &&
    event.touches.length >= 2
  ){
    const center = getTwoFingerCenter(
      event.touches
    );

    const differenceX =
      center.x - cameraGesture.lastX;

    const differenceY =
      center.y - cameraGesture.lastY;

    const currentDistance =
      Math.max(
        1,
        getTwoFingerDistance(
          event.touches
        )
      );

    if(cameraGesture.lastDistance > 0){
      // 指を広げると接近し、指を狭めると広範囲を表示する。
      const pinchRatio =
        cameraGesture.lastDistance /
        currentDistance;

      cameraZoom = clamp(
        cameraZoom * pinchRatio,
        0.68,
        1.70
      );
    }

    cameraYaw -= differenceX * 0.007;

    cameraPitch = clamp(
      cameraPitch + differenceY * 0.004,
      0.35,
      1.05
    );

    cameraGesture.lastX = center.x;
    cameraGesture.lastY = center.y;
    cameraGesture.lastDistance =
      currentDistance;

    event.preventDefault();
    return;
  }

  if(
    controlMode === 'joystick' &&
    input.active
  ){
    const touch = findTouchById(
      event.touches,
      input.touchId
    );

    if(touch){
      updateJoystick(
        touch.clientX,
        touch.clientY
      );

      event.preventDefault();
    }
  }
}

function handleGameTouchEnd(event){
  if(gameState === 'result'){
    if(event.touches.length === 0){
      resultGesture.active = false;
      resultGesture.touchId = null;
      resultGesture.lastDistance = 0;
      return;
    }

    if(event.touches.length === 1){
      const touch = event.touches[0];

      resultGesture.active = true;
      resultGesture.touchId =
        touch.identifier;
      resultGesture.lastX =
        touch.clientX;
      resultGesture.lastY =
        touch.clientY;
      resultGesture.lastDistance = 0;
      return;
    }

    const center = getTwoFingerCenter(
      event.touches
    );

    resultGesture.active = true;
    resultGesture.touchId = null;
    resultGesture.lastX = center.x;
    resultGesture.lastY = center.y;
    resultGesture.lastDistance =
      getTwoFingerDistance(
        event.touches
      );

    return;
  }

  if(event.touches.length < 2){
    cameraGesture.active = false;
    cameraGesture.lastDistance = 0;
  }

  if(
    controlMode === 'joystick' &&
    input.active &&
    !findTouchById(
      event.touches,
      input.touchId
    )
  ){
    resetJoystick();
  }
}

function getMovementDirection(){
  let inputX = input.x;
  let inputY = input.y;

  if(
    keyboard.ArrowLeft ||
    keyboard.KeyA
  ){
    inputX = -1;
  }

  if(
    keyboard.ArrowRight ||
    keyboard.KeyD
  ){
    inputX = 1;
  }

  if(
    keyboard.ArrowUp ||
    keyboard.KeyW
  ){
    inputY = 1;
  }

  if(
    keyboard.ArrowDown ||
    keyboard.KeyS
  ){
    inputY = -1;
  }

  const forward = tempVector
    .set(
      -camera.position.x +
      coreGroup.position.x,
      0,
      -camera.position.z +
      coreGroup.position.z
    )
    .normalize();

  // カメラから見た画面右方向を作る。
  // 以前の符号では左方向になっており、左右入力が反転していた。
  const right = tempVector2.set(
    -forward.z,
    0,
    forward.x
  );

  return new THREE.Vector3()
    .addScaledVector(
      right,
      inputX
    )
    .addScaledVector(
      forward,
      inputY
    );
}

function updateGame(deltaTime){
  timeLeft -= deltaTime;

  if(
    timeLeft <= GAMEPLAY.feverStartTime &&
    !feverAnnounced
  ){
    showEvent(
      'FINAL SPURT!',
      1.4
    );

    audio.tone(
      720,
      0.3,
      'square',
      0.12,
      1.33
    );

    flash(0.2);
    feverAnnounced = true;
  }

  if(timeLeft <= 0){
    timeLeft = 0;

    finishGame(
      coreRadius >= stageData.target
    );

    return;
  }

  if(invulnerableTime > 0){
    invulnerableTime -= deltaTime;
  }

  eventTimer -= deltaTime;

  if(eventTimer <= 0){
    UI.event.classList.remove('show');
  }

  pickupTimer -= deltaTime;

  if(pickupTimer <= 0){
    UI.pickup.classList.remove('show');
  }

  pickupComboTimer = Math.max(
    0,
    pickupComboTimer - deltaTime
  );

  if(pickupComboTimer <= 0){
    pickupCombo = 0;
  }

  impactDanger = Math.max(
    0,
    impactDanger -
    deltaTime * 0.55
  );

  if(cameraShake > 0){
    cameraShake = Math.max(
      0,
      cameraShake -
      deltaTime * 1.8
    );
  }

  const desiredDirection =
    getMovementDirection();

  const inputStrength = Math.min(
    1,
    desiredDirection.length()
  );

  if(inputStrength > 0.05){
    desiredDirection.normalize();

    lastMoveDirection
      .lerp(
        desiredDirection,
        1 - Math.pow(
          0.005,
          deltaTime
        )
      )
      .normalize();
  }

  const progress = clamp(
    (
      coreRadius -
      stageData.start
    ) /
    (
      stageData.target -
      stageData.start
    ),
    0,
    1
  );

  // ダッシュ削除後も広いステージで移動が遅くならないよう、
  // 通常速度をわずかに引き上げる。
  movementSpeed = lerp(
    6.8,
    4.7,
    progress
  );

  fractureThreshold =
    movementSpeed *
    (1 + stageIndex * 0.10) *
    GAMEPLAY.fractureMargin;

  const slope = getTerrainSlope(
    coreGroup.position.x,
    coreGroup.position.z,
    terrainSlope
  );

  // 入力方向と上り勾配が一致するほど速度を落とす。
  // 後半ステージほど斜面の影響を強くする。
  const uphillAmount =
    inputStrength > 0.05
      ? Math.max(
          0,
          desiredDirection.x * slope.x +
          desiredDirection.z * slope.y
        )
      : 0;

  const slopeSpeedFactor = clamp(
    1 -
      uphillAmount *
      stageData.terrain.slopeForce *
      0.55,
    0.48,
    1
  );

  const targetVelocity =
    desiredDirection.multiplyScalar(
      movementSpeed *
      inputStrength *
      slopeSpeedFactor
    );

  velocity.lerp(
    targetVelocity,
    1 - Math.pow(
      0.0009,
      deltaTime
    )
  );

  // 地形の低い方向へ自然に流れる力を加える。
  // NIGHT PORTでは停止中でも急斜面で少し滑る。
  const downhillForce =
    stageData.terrain.slopeForce *
    2.15;

  velocity.x -=
    slope.x *
    downhillForce *
    deltaTime;

  velocity.z -=
    slope.y *
    downhillForce *
    deltaTime;

  const downhillDot =
    velocity.x * (-slope.x) +
    velocity.z * (-slope.y);

  const slopeSpeedLimit =
    movementSpeed *
    (
      downhillDot > 0
        ? GAMEPLAY.downhillBoost
        : 1 + stageIndex * 0.10
    );

  const horizontalSpeed =
    Math.hypot(
      velocity.x,
      velocity.z
    );

  if(horizontalSpeed > slopeSpeedLimit){
    const speedRatio =
      slopeSpeedLimit /
      horizontalSpeed;

    velocity.x *= speedRatio;
    velocity.z *= speedRatio;
  }

  if(inputStrength < 0.05){
    velocity.multiplyScalar(
      Math.pow(
        0.08,
        deltaTime
      )
    );
  }

  coreGroup.position.addScaledVector(
    velocity,
    deltaTime
  );

  coreGroup.position.x = clamp(
    coreGroup.position.x,
    -floorHalf + coreRadius + 0.8,
    floorHalf - coreRadius - 0.8
  );

  coreGroup.position.z = clamp(
    coreGroup.position.z,
    -floorHalf + coreRadius + 0.8,
    floorHalf - coreRadius - 0.8
  );

  // 現在地点の起伏に合わせて塊と影を接地させる。
  const groundHeight =
    getTerrainHeight(
      coreGroup.position.x,
      coreGroup.position.z
    );

  coreGroup.position.y =
    groundHeight + clusterRadius;

  if(coreShadow){
    coreShadow.position.set(
      coreGroup.position.x,
      groundHeight + 0.025,
      coreGroup.position.z
    );

    coreShadow.material.opacity =
      stageIndex === 2
        ? 0.28
        : 0.2;
  }

  const rollAmount =
    velocity.length() *
    deltaTime /
    Math.max(0.1,clusterRadius);

  const rollAxis = tempVector.set(
    velocity.z,
    0,
    -velocity.x
  );

  if(rollAxis.lengthSq() > 0.001){
    coreGroup.rotateOnWorldAxis(
      rollAxis.normalize(),
      rollAmount
    );
  }

  updatePickups(deltaTime);
  updateObstacles();
  updateParticles(deltaTime);
  updateCamera(deltaTime);

  // 障害物の大きさとは無関係に、現在速度だけから衝突リスクを表示する。
  speedDanger = clamp(
    horizontalSpeed /
      fractureThreshold,
    0,
    1
  );

  updateHUD();

  for(const milestone of MILESTONE_KINDS){
    if(
      !announcedMilestones.has(
        milestone.kind
      ) &&
      milestone.size <=
        coreRadius *
        GAMEPLAY.attachSizeRatio
    ){
      showEvent(
        `NEW: ${milestone.kind.toUpperCase()}!`,
        1.3
      );

      audio.tone(
        660,
        0.22,
        'triangle',
        0.13,
        1.5
      );

      flash(0.15);

      announcedMilestones.add(
        milestone.kind
      );

      break;
    }
  }

  if(
    coreRadius >= stageData.target &&
    !targetReached
  ){
    targetReached = true;

    // 目標到達後の長い消化時間をなくし、
    // 最終サイズを伸ばす短いクライマックスへ移行する。
    timeLeft = Math.min(
      timeLeft,
      GAMEPLAY.finalRushTime
    );

    showEvent(
      'TARGET REACHED!\nFINAL CORE RUSH',
      1.8
    );

    audio.clear();
    flash(0.25);
  }
}

function updateParticles(deltaTime){
  for(
    let index=particles.length-1;
    index>=0;
    index--
  ){
    const particle = particles[index];

    particle.life -= deltaTime;
    particle.velocity.y -= 7 * deltaTime;

    particle.mesh.position.addScaledVector(
      particle.velocity,
      deltaTime
    );

    particle.mesh.rotation.x +=
      deltaTime * 5;

    particle.mesh.rotation.y +=
      deltaTime * 4;

    particle.mesh.material.opacity =
      clamp(
        particle.life * 2,
        0,
        1
      );

    if(particle.life <= 0){
      world.remove(particle.mesh);

      particle.mesh.geometry.dispose();
      particle.mesh.material.dispose();

      particles.splice(index,1);
    }
  }
}

function updateCamera(deltaTime){
  // 数値上の成長値ではなく、実際に見えている塊の大きさへ合わせて引く。
  const cameraProgress = clamp(
    clusterRadius / 3.2,
    0,
    1
  );

  // コアが成長したときだけ撮影距離を広げる。
  // 移動方向によって旋回角を変更しない。
  const distance =
    lerp(
      8.5,
      13.5,
      cameraProgress
    ) *
    cameraZoom;

  const horizontalDistance =
    Math.cos(cameraPitch) * distance;

  const verticalDistance =
    Math.sin(cameraPitch) * distance;

  const desiredPosition =
    coreGroup.position
      .clone()
      .add(
        new THREE.Vector3(
          Math.sin(cameraYaw) * horizontalDistance,
          verticalDistance +
            clamp(
              terrainSlope.length() *
              (0.8 + stageIndex * 0.45),
              0,
              1.8
            ),
          Math.cos(cameraYaw) * horizontalDistance
        )
      );

  const horizontalFollow =
    1 - Math.pow(
      0.015,
      deltaTime
    );

  // 上下追従だけを少し遅らせ、坂を上り下りする動きを画面上で感じやすくする。
  const verticalFollow =
    1 - Math.pow(
      0.085,
      deltaTime
    );

  camera.position.x = lerp(
    camera.position.x,
    desiredPosition.x,
    horizontalFollow
  );

  camera.position.z = lerp(
    camera.position.z,
    desiredPosition.z,
    horizontalFollow
  );

  camera.position.y = lerp(
    camera.position.y,
    desiredPosition.y,
    verticalFollow
  );

  if(cameraShake > 0){
    camera.position.add(
      new THREE.Vector3(
        rand(-1,1),
        rand(-1,1),
        rand(-1,1)
      ).multiplyScalar(
        cameraShake * 0.18
      )
    );
  }

  cameraTarget.lerp(
    coreGroup.position
      .clone()
      .add(
        new THREE.Vector3(
          0,
          coreRadius * 0.35,
          0
        )
      ),
    1 - Math.pow(
      0.006,
      deltaTime
    )
  );

  camera.lookAt(cameraTarget);
}

function updateResultShowcase(deltaTime){
  resultShowcaseTime += deltaTime;

  if(!resultGesture.active){
    resultShowcaseAngle +=
      deltaTime * 0.18;
  }

  coreGroup.rotation.x =
    resultShowcasePitch;

  coreGroup.rotation.y =
    resultShowcaseAngle +
    resultShowcaseYaw;

  coreGroup.rotation.z = 0;

  const groundHeight = 0;

  // 回転後の実形状を計測し、最下部が地面へ埋まらない高さへ補正する。
  resultBounds.setFromObject(
    coreGroup
  );

  const desiredBottom =
    groundHeight +
    0.30 +
    Math.sin(
      resultShowcaseTime * 1.1
    ) * 0.04;

  const heightCorrection =
    desiredBottom -
    resultBounds.min.y;

  coreGroup.position.y +=
    heightCorrection *
    (
      1 - Math.pow(
        0.015,
        deltaTime
      )
    );

  // 高さ補正後に再計測し、枝状の付着物や人間の手足も含めて
  // 塊全体を包むバウンディング球を取得する。
  resultBounds.setFromObject(
    coreGroup
  );

  resultBounds.getBoundingSphere(
    resultSphere
  );

  const showcaseRadius = Math.max(
    0.6,
    resultSphere.radius
  );

  if(coreShadow){
    coreShadow.position.set(
      coreGroup.position.x,
      groundHeight + 0.025,
      coreGroup.position.z
    );

    coreShadow.scale.setScalar(
      Math.max(
        clusterRadius,
        showcaseRadius * 0.75
      )
    );

    coreShadow.material.opacity = 0.14;
  }

  const verticalFov =
    THREE.MathUtils.degToRad(
      camera.fov
    );

  const horizontalFov =
    2 * Math.atan(
      Math.tan(verticalFov / 2) *
      camera.aspect
    );

  // 縦画面では下部約25％、横画面では約20％を
  // スコアカード用領域としてカメラの構図から除外する。
  const panelReserve =
    innerWidth > innerHeight
      ? 0.20
      : 0.25;

  const availableVerticalRatio =
    0.48 - panelReserve;

  const verticalFitDistance =
    showcaseRadius /
    Math.sin(
      verticalFov *
      availableVerticalRatio
    );

  const horizontalFitDistance =
    showcaseRadius /
    Math.sin(
      horizontalFov * 0.42
    );

  const showcaseDistance =
    Math.max(
      5.2,
      verticalFitDistance,
      horizontalFitDistance
    ) *
    1.08 *
    resultShowcaseZoom;

  // 注視点を塊の中心より少し下へ置き、
  // 完成塊を画面上側へ持ち上げてスコアカードとの重なりを防ぐ。
  tempVector.copy(
    resultSphere.center
  );

  tempVector.y -=
    showcaseRadius *
    (
      innerWidth > innerHeight
        ? 0.13
        : 0.22
    );

  cameraTarget.lerp(
    tempVector,
    1 - Math.pow(
      0.006,
      deltaTime
    )
  );

  tempVector2.set(
    resultSphere.center.x +
      showcaseDistance * 0.62,
    resultSphere.center.y +
      Math.max(
        1.3,
        showcaseRadius * 0.40
      ),
    resultSphere.center.z +
      showcaseDistance * 0.78
  );

  camera.position.lerp(
    tempVector2,
    1 - Math.pow(
      0.018,
      deltaTime
    )
  );

  camera.lookAt(cameraTarget);
  updateParticles(deltaTime);
}

function finishGame(cleared){
  if(gameState !== 'play'){
    return;
  }

  gameState = 'result';

  // 結果スタジオへ移る前にゲーム中BGMを完全停止する。
  gameBgm.stop();

  velocity.set(0,0,0);
  resetJoystick();

  resultShowcaseTime = 0;
  resultShowcaseAngle = 0;
  resultShowcaseYaw = 0;
  resultShowcasePitch = 0.16;
  resultShowcaseZoom = 1;

  resultGesture.active = false;
  resultGesture.touchId = null;
  resultGesture.lastX = 0;
  resultGesture.lastY = 0;
  resultGesture.lastDistance = 0;

  setupResultStudio();

  cameraTarget.copy(
    coreGroup.position
  );

  const storageKey =
    `gravity-core-best-${stageIndex}`;

  const previousBest = Number(
    localStorage.getItem(storageKey) ||
    0
  );

  const best = Math.max(
    coreRadius,
    previousBest
  );

  localStorage.setItem(
    storageKey,
    best.toFixed(3)
  );

  $('#resultTitle').textContent =
    cleared
      ? 'CLEAR'
      : 'TIME UP';

  $('#resultSize').textContent =
    `${coreRadius.toFixed(2)} m`;

  $('#resultInfo').textContent =
    `TARGET ${stageData.target.toFixed(2)} m · ` +
    `BEST ${best.toFixed(2)} m`;

  $('#resultHint').textContent =
    'DRAG TO ROTATE · PINCH TO ZOOM';

  showScreen('result');

  // CLEAR・TIME UPのどちらでも、結果発表ジングルを1回だけ再生する。
  // 従来のclear効果音は重ねず、結果画面の音楽へ一本化する。
  void resultJingle.start();
}

  const pinkLight =
    new THREE.PointLight(
      0xd99d7a,
      2.2,
      20,
      2
    );

  pinkLight.position.set(-6,3,-5);

  scene.add(pinkLight);
  sceneLights.push(pinkLight);

  createCore();

  coreRadius = 1.15;
  coreVisualRadius = 1.15;
  clusterRadius = 1.15;
  updateCoreScale();

  // 強い反射とクリアコートを抑え、白飛びせず濃いシアンに見える材質へ変更する。
  coreMesh.material.color.setHex(
    0x0b5f7c
  );

  coreMesh.material.emissive.setHex(
    0x021923
  );

  coreMesh.material.emissiveIntensity =
    0.08;

  coreMesh.material.metalness = 0.38;
  coreMesh.material.roughness = 0.42;
  coreMesh.material.clearcoat = 0.55;
  coreMesh.material.clearcoatRoughness =
    0.24;

  coreWire.material.color.setHex(
    0x042f40
  );

  coreWire.material.opacity = 0.62;

  coreGlow.color.setHex(
    0x36a8c7
  );

  coreGlow.intensity = 3.2;
  coreGlow.distance = 7;

  coreGroup.position.set(0,0,0);
  coreShadow.visible = false;

  for(let index=0;index<28;index++){
    const size = rand(0.08,0.34);

    const object = createObject(
      pick([
        'bolt',
        'nut',
        'ball',
        'can',
        'tool'
      ]),
      size
    );

    // 共有マテリアルを汚さず、タイトル用浮遊物だけ白背景向けに濃くする。
    object.traverse(child => {
      if(
        !child.isMesh ||
        !child.material
      ){
        return;
      }

      child.material =
        child.material.clone();

      child.material.color.multiplyScalar(
        0.72
      );

      if(
        typeof child.material.roughness ===
        'number'
      ){
        child.material.roughness =
          Math.min(
            1,
            child.material.roughness + 0.08
          );
      }
    });

    const angle =
      rand(0,Math.PI * 2);

    const radius =
      rand(2.1,5.8);

    object.position.set(
      Math.cos(angle) * radius,
      rand(-2.2,2.2),
      Math.sin(angle) * radius
    );

    object.rotation.set(
      rand(0,3),
      rand(0,3),
      rand(0,3)
    );

    object.userData.orbit = {
      angle,
      radius,
      speed:
        rand(0.08,0.25) *
        (
          Math.random() < 0.5
            ? -1
            : 1
        ),
      y:object.position.y
    };

    world.add(object);
  }

  camera.position.set(0,1.5,10);
  camera.lookAt(0,0,0);
}

function updateTitle(deltaTime){
  titleAngle += deltaTime * 0.18;

  coreGroup.rotation.y +=
    deltaTime * 0.18;

  coreGroup.rotation.x +=
    deltaTime * 0.07;

  world.children.forEach(object => {
    const orbit = object.userData.orbit;

    if(!orbit){
      return;
    }

    orbit.angle +=
      deltaTime *
      orbit.speed;

    object.position.x =
      Math.cos(orbit.angle) *
      orbit.radius;

    object.position.z =
      Math.sin(orbit.angle) *
      orbit.radius;

    object.position.y =
      orbit.y +
      Math.sin(orbit.angle * 2) *
      0.25;

    object.rotation.x +=
      deltaTime * 0.35;

    object.rotation.y +=
      deltaTime * 0.25;
  });

  camera.position.x =
    Math.sin(titleAngle) *
    1.5;

  camera.position.y =
    1.2 +
    Math.sin(titleAngle * 0.7) *
    0.35;

  camera.lookAt(0,0,0);
}

function animate(){
  requestAnimationFrame(animate);

  const deltaTime = Math.min(
    0.033,
    clock.getDelta()
  );

  if(gameState === 'play'){
    updateGame(deltaTime);
  }else if(
    gameState === 'title' ||
    gameState === 'stage'
  ){
    updateTitle(deltaTime);
  }else if(gameState === 'result'){
    updateResultShowcase(deltaTime);
  }else{
    updateParticles(deltaTime);
  }

  renderer.render(scene,camera);
}

$('#playBtn').addEventListener(
  'click',
  () => {
    audio.resume();

    gameState = 'stage';
    showScreen('stage');
  }
);

$('#stageBack').addEventListener(
  'click',
  () => {
    gameState = 'title';
    showScreen('title');
  }
);

document
  .querySelectorAll('.stage-card')
  .forEach(button => {
    button.addEventListener(
      'click',
      () => {
        startGame(
          Number(button.dataset.stage)
        );
      }
    );
  });

$('#pauseBtn').addEventListener(
  'click',
  () => {
    if(gameState !== 'play'){
      return;
    }

    gameState = 'pause';
    showScreen('pause');

    // AudioContext停止中にループタイマーだけが進まないよう残時間を保持する。
    gameBgm.pause();

    if(audio.context){
      audio.context.suspend();
    }
  }
);

$('#resumeBtn').addEventListener(
  'click',
  () => {
    gameState = 'play';
    showScreen('play');

    // 休止中に持ち方が変わっても急発進しないよう、
    // 復帰時の姿勢をTILT操作の新しい中立位置にする。
    if(controlMode === 'tilt'){
      tiltControl.calibrated = false;
      input.x = 0;
      input.y = 0;

      showEvent(
        'TILT: HOLD LEVEL',
        0.8
      );
    }

    audio.resume();
    gameBgm.resume();
    clock.getDelta();
  }
);

$('#quitBtn').addEventListener(
  'click',
  () => {
    gameState = 'title';
    showScreen('title');

    setupTitleScene();
    audio.resume();
  }
);

$('#resultStage').addEventListener(
  'click',
  () => {
    gameState = 'stage';
    showScreen('stage');

    setupTitleScene();
  }
);

$('#retryBtn').addEventListener(
  'click',
  () => {
    startGame(stageIndex);
  }
);

addEventListener(
  'resize',
  () => {
    renderer.setSize(
      innerWidth,
      innerHeight
    );

    renderer.setPixelRatio(
      Math.min(
        devicePixelRatio,
        1.7
      )
    );

    camera.aspect =
      innerWidth /
      innerHeight;

    camera.updateProjectionMatrix();
  }
);

addEventListener(
  'visibilitychange',
  () => {
    if(
      document.hidden &&
      gameState === 'play'
    ){
      $('#pauseBtn').click();
    }
  }
);

document.addEventListener(
  'contextmenu',
  event => {
    event.preventDefault();
  }
);

// スモークテスト項目:
// タイトル表示 → WORKSHOP開始 → PAUSEからTITLEへ戻る遷移で、
// タイトル演出・WORKSHOPの地形、照明、物体サイズ、HUD表示に崩れがないことを確認する。
setupTitleScene();
showScreen('title');
animate();

})();
</script>
