<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080b12">
<title>GRAVITY CORE</title>
<style>
:root{
  --bg:#f4f7fb;
  --panel:rgba(10,14,22,.72);
  --line:rgba(255,255,255,.14);
  --text:#f4f7fb;
  --muted:#9ea9b8;
  --accent:#8ff2ff;
  --danger:#ff6f6f;
  --good:#8cffb3;
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:var(--bg);
  font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  touch-action:none;
}
button{
  font:inherit;
  color:inherit;
}
#game{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}
#vignette{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at center,transparent 36%,rgba(0,0,0,.12) 68%,rgba(0,0,0,.48) 100%),
    linear-gradient(to bottom,rgba(0,0,0,.08),transparent 26%,transparent 72%,rgba(0,0,0,.22));
  z-index:2;
}
.screen{
  position:fixed;
  inset:0;
  z-index:10;
  display:none;
  align-items:center;
  justify-content:center;
  padding:
    max(24px,env(safe-area-inset-top))
    max(20px,env(safe-area-inset-right))
    max(24px,env(safe-area-inset-bottom))
    max(20px,env(safe-area-inset-left));
}
.screen.active{
  display:flex;
}
#titleScreen{
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,.44),
    rgba(241,246,250,.72)
  );
}
.title-wrap{
  text-align:center;
  transform:translateY(-1.5vh);
}
.logo{
  color:#17212c;
  font-size:clamp(42px,11vw,82px);
  font-weight:900;
  letter-spacing:.18em;
  margin-right:-.18em;
  text-shadow:
    0 3px 0 rgba(255,255,255,.8),
    0 10px 32px rgba(30,94,120,.18);
}
.logo-core{
  display:block;
  font-size:.28em;
  letter-spacing:.68em;
  margin-right:-.68em;
  color:#1686a8;
  margin-top:6px;
  font-weight:800;
}
.primary{
  border:1px solid rgba(20,45,60,.22);
  background:rgba(255,255,255,.82);
  color:#15232d;
  backdrop-filter:blur(14px);
  border-radius:999px;
  padding:15px 34px;
  min-width:168px;
  margin-top:42px;
  font-weight:800;
  letter-spacing:.16em;
  box-shadow:
    0 14px 40px rgba(35,73,92,.16),
    inset 0 0 0 1px rgba(255,255,255,.92);
}
.primary:active{
  transform:scale(.97);
  background:rgba(216,243,250,.94);
}
#stageScreen{
  background:rgba(245,248,251,.86);
  color:#17212c;
  backdrop-filter:blur(12px);
}
.stage-panel{
  width:min(920px,100%);
  display:flex;
  flex-direction:column;
  gap:18px;
}
.stage-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.stage-head h2{
  margin:0;
  color:#17212c;
  font-size:26px;
  letter-spacing:.12em;
}
.icon-btn{
  width:46px;
  height:46px;
  border-radius:50%;
  border:1px solid rgba(25,45,60,.16);
  background:rgba(255,255,255,.88);
  color:#17212c;
  box-shadow:0 8px 22px rgba(35,62,78,.10);
}
.stage-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
.stage-card{
  position:relative;
  min-height:250px;
  border:1px solid rgba(25,45,60,.13);
  border-radius:24px;
  overflow:hidden;
  padding:20px;
  color:#17212c;
  text-align:left;
  background:
    linear-gradient(
      to top,
      rgba(255,255,255,.84),
      rgba(255,255,255,.20) 58%,
      rgba(255,255,255,.04)
    ),
    var(--card-bg,linear-gradient(135deg,#dce8ee,#f8fbfc));
  box-shadow:
    0 18px 48px rgba(38,67,83,.16),
    inset 0 0 0 1px rgba(255,255,255,.72);
}
.stage-card:active{
  transform:scale(.985);
  box-shadow:
    0 10px 28px rgba(38,67,83,.12),
    inset 0 0 0 1px rgba(255,255,255,.9);
}
.stage-card .num{
  font-size:12px;
  letter-spacing:.18em;
  color:rgba(23,33,44,.58);
}
.stage-card h3{
  position:absolute;
  left:20px;
  bottom:60px;
  margin:0;
  color:#17212c;
  font-size:25px;
}
.stage-card .best{
  position:absolute;
  right:20px;
  bottom:60px;
  font-size:11px;
  color:#087f9f;
  font-weight:800;
}
.stage-card .meta{
  position:absolute;
  left:20px;
  right:20px;
  bottom:20px;
  display:flex;
  justify-content:space-between;
  color:rgba(23,33,44,.62);
  font-size:12px;
}
.stage-card[data-stage="0"]{
  --card-bg:
    radial-gradient(circle at 76% 18%,rgba(255,174,70,.82),transparent 38%),
    linear-gradient(145deg,#efc38f 0%,#fff0dc 54%,#e7edf1 100%);
}
.stage-card[data-stage="1"]{
  --card-bg:
    radial-gradient(circle at 76% 18%,rgba(73,205,159,.76),transparent 39%),
    linear-gradient(145deg,#a9dfcc 0%,#e9f8f2 54%,#e4ecef 100%);
}
.stage-card[data-stage="2"]{
  --card-bg:
    radial-gradient(circle at 76% 18%,rgba(91,119,235,.72),transparent 38%),
    linear-gradient(145deg,#aebcff 0%,#e6eaff 54%,#e3e8f0 100%);
}
#hud{
  position:fixed;
  inset:0;
  z-index:6;
  pointer-events:none;
  display:none;
  padding:
    calc(12px + env(safe-area-inset-top))
    calc(12px + env(safe-area-inset-right))
    calc(14px + env(safe-area-inset-bottom))
    calc(12px + env(safe-area-inset-left));
}
#hud.active{
  display:block;
}
.topbar{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}
.hud-card{
  background:var(--panel);
  border:1px solid var(--line);
  backdrop-filter:blur(13px);
  border-radius:16px;
  padding:10px 12px;
  box-shadow:0 10px 30px rgba(0,0,0,.18);
}
.stage-name{
  font-size:11px;
  color:var(--muted);
  letter-spacing:.1em;
}
.timer{
  font-size:28px;
  font-weight:900;
  font-variant-numeric:tabular-nums;
  line-height:1.05;
}
.timer.fever{
  color:#ffd447;
  animation:pulse 0.5s infinite alternate;
}
@keyframes pulse{
  from{
    opacity:1;
  }
  to{
    opacity:0.55;
  }
}
.size-card{
  width:min(52vw,280px);
}
.size-row{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:8px;
}
.size-now{
  font-size:19px;
  font-weight:900;
}
.size-target{
  font-size:11px;
  color:var(--muted);
}
.progress{
  height:7px;
  border-radius:999px;
  background:rgba(255,255,255,.09);
  overflow:hidden;
  margin-top:7px;
}
.progress>i{
  display:block;
  height:100%;
  width:0;
  background:linear-gradient(90deg,#64deff,#9dffba);
  border-radius:inherit;
  box-shadow:0 0 18px rgba(105,234,255,.5);
}
.pause{
  pointer-events:auto;
  width:44px;
  height:44px;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:blur(12px);
}
.control-mode{
  position:absolute;
  top:calc(66px + env(safe-area-inset-top));
  right:calc(12px + env(safe-area-inset-right));
  z-index:2;
  pointer-events:auto;
  min-width:62px;
  height:34px;
  padding:0 11px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--panel);
  backdrop-filter:blur(12px);
  font-size:10px;
  font-weight:900;
  letter-spacing:.1em;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.control-mode.active{
  color:var(--accent);
  border-color:rgba(143,242,255,.5);
  background:rgba(49,95,112,.7);
  box-shadow:
    0 8px 24px rgba(0,0,0,.2),
    0 0 18px rgba(105,224,255,.18);
}
.control-mode:active{
  transform:scale(.96);
}
#eventText{
  position:absolute;
  top:26%;
  left:50%;
  transform:translate(-50%,-50%);
  font-weight:900;
  letter-spacing:.08em;
  font-size:clamp(20px,6vw,34px);
  text-align:center;
  white-space:pre-line;
  text-shadow:0 4px 18px #000;
  opacity:0;
  transition:opacity .18s,transform .18s;
}
#eventText.show{
  opacity:1;
  transform:translate(-50%,-60%);
}
#pickupText{
  position:absolute;
  left:50%;
  bottom:31%;
  transform:translateX(-50%);
  font-size:13px;
  font-weight:800;
  text-shadow:0 3px 12px #000;
  opacity:0;
  transition:.18s;
}
#pickupText.show{
  opacity:1;
  transform:translate(-50%,-5px);
}
#joystick{
  position:fixed;
  left:0;
  top:0;
  width:144px;
  height:144px;
  border-radius:50%;
  pointer-events:none;
  opacity:0;
  transform:translate(-50%,-50%);
  transition:opacity .1s;
  background:
    radial-gradient(
      circle,
      rgba(255,255,255,.07),
      rgba(255,255,255,.02) 66%,
      rgba(255,255,255,.1) 67%,
      rgba(255,255,255,.02) 70%
    );
  border:1px solid rgba(255,255,255,.14);
}
#joystick.active{
  opacity:1;
}
#stick{
  position:absolute;
  width:58px;
  height:58px;
  border-radius:50%;
  left:43px;
  top:43px;
  background:
    radial-gradient(
      circle at 35% 30%,
      rgba(255,255,255,.48),
      rgba(134,231,255,.22)
    );
  border:1px solid rgba(255,255,255,.42);
  box-shadow:0 8px 24px rgba(0,0,0,.28);
}
#dangerMeter{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  width:8px;
  height:110px;
  border-radius:999px;
  background:rgba(255,255,255,.09);
  overflow:hidden;
}
#dangerMeter i{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:0;
  background:linear-gradient(to top,#ffe86d,#ff715f);
}
#dangerMeter i.critical{
  background:#ff4747;
}
#pauseScreen{
  background:rgba(242,246,249,.78);
  backdrop-filter:blur(14px);
}
#resultScreen{
  align-items:flex-end;
  background:transparent;
  backdrop-filter:none;
  pointer-events:none;
}
#resultScreen .dialog{
  width:min(460px,calc(100% - 8px));
  padding:14px 16px;
  background:rgba(255,255,255,.94);
  border:1px solid rgba(20,30,42,.16);
  color:#111722;
  backdrop-filter:blur(10px);
  pointer-events:auto;
  box-shadow:
    0 14px 44px rgba(32,42,55,.20),
    inset 0 0 0 1px rgba(255,255,255,.72);
}
#resultScreen .dialog h2{
  margin:0 0 3px;
  font-size:24px;
}
#resultScreen .result-big{
  margin:2px 0;
  font-size:34px;
}
#resultScreen .result-sub{
  color:#55616f;
  font-size:11px;
}
#resultHint{
  margin:8px 0 2px;
  color:#697584;
  font-size:10px;
  font-weight:800;
  letter-spacing:.12em;
}
#resultScreen .dialog-actions{
  margin-top:10px;
}
#resultScreen .dialog-actions button{
  border-color:rgba(20,30,42,.16);
  background:rgba(20,30,42,.06);
}
.dialog{
  width:min(420px,100%);
  border:1px solid rgba(25,45,60,.15);
  border-radius:28px;
  padding:28px;
  background:rgba(255,255,255,.94);
  color:#17212c;
  box-shadow:
    0 30px 80px rgba(38,67,83,.18),
    inset 0 0 0 1px rgba(255,255,255,.85);
  text-align:center;
}
.dialog h2{
  font-size:34px;
  letter-spacing:.12em;
  margin:0 0 14px;
}
.result-big{
  font-size:46px;
  font-weight:950;
  margin:10px 0 4px;
}
.result-sub{
  color:var(--muted);
  font-size:13px;
}
.dialog-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:24px;
}
.dialog-actions button{
  border:1px solid rgba(25,45,60,.15);
  border-radius:16px;
  padding:14px;
  background:rgba(24,48,64,.06);
  color:#17212c;
  font-weight:800;
}
.dialog-actions .go{
  background:
    linear-gradient(
      135deg,
      rgba(99,221,255,.26),
      rgba(126,255,174,.18)
    );
}
#flash{
  position:fixed;
  inset:0;
  z-index:7;
  pointer-events:none;
  background:white;
  opacity:0;
}
@media (max-width:760px) and (orientation:landscape){
  .stage-grid{
    grid-template-columns:repeat(3,1fr);
  }
  .stage-card{
    min-height:180px;
  }
  .stage-card h3{
    font-size:20px;
  }
}
@media (max-width:680px) and (orientation:portrait){
  .stage-panel{
    max-height:92vh;
  }
  .stage-grid{
    grid-template-columns:1fr;
    overflow:auto;
    padding-right:2px;
  }
  .stage-card{
    min-height:150px;
  }
  .stage-card h3{
    bottom:48px;
  }
  .stage-card .meta{
    bottom:16px;
  }
}

</style>
<!-- APPSTUDIO_PWA_HEAD_START -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#080b12">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<!-- APPSTUDIO_PWA_HEAD_END -->
</head>
<body>

<canvas id="game"></canvas>
<div id="vignette"></div>
<div id="flash"></div>

<section id="titleScreen" class="screen active">
  <div class="title-wrap">
    <div class="logo">
      GRAVITY
      <span class="logo-core">CORE</span>
    </div>
    <button id="playBtn" class="primary">PLAY</button>
  </div>
</section>

<section id="stageScreen" class="screen">
  <div class="stage-panel">
    <div class="stage-head">
      <h2>STAGE</h2>
      <button id="stageBack" class="icon-btn">×</button>
    </div>

    <div class="stage-grid">
      <button class="stage-card" data-stage="0">
        <span class="num">01</span>
        <h3>WORKSHOP</h3>
        <span class="best" data-best></span>
        <span class="meta">
          <b>1.45 m</b>
          <span>GENTLE · 90 sec</span>
        </span>
      </button>

      <button class="stage-card" data-stage="1">
        <span class="num">02</span>
        <h3>MARKET</h3>
        <span class="best" data-best></span>
        <span class="meta">
          <b>2.20 m</b>
          <span>TERRACE · 105 sec</span>
        </span>
      </button>

      <button class="stage-card" data-stage="2">
        <span class="num">03</span>
        <h3>NIGHT PORT</h3>
        <span class="best" data-best></span>
        <span class="meta">
          <b>3.10 m</b>
          <span>RUGGED · 120 sec</span>
        </span>
      </button>
    </div>
  </div>
</section>

<div id="hud">
  <div class="topbar">
    <div class="hud-card">
      <div id="hudStage" class="stage-name">WORKSHOP</div>
      <div id="timer" class="timer">90.0</div>
    </div>

    <div class="hud-card size-card">
      <div class="size-row">
        <span id="sizeNow" class="size-now">0.38 m</span>
        <span id="sizeTarget" class="size-target">
          TARGET 1.45 m
        </span>
      </div>
      <div class="progress">
        <i id="sizeBar"></i>
      </div>
    </div>

    <button id="pauseBtn" class="pause">Ⅱ</button>
  </div>

  <button
    id="controlModeBtn"
    class="control-mode"
    aria-label="操作方法を切り替える"
    aria-pressed="false"
  >STICK</button>

  <div id="eventText"></div>
  <div id="pickupText"></div>

  <div id="joystick">
    <div id="stick"></div>
  </div>

  <div id="dangerMeter">
    <i id="dangerFill"></i>
  </div>
</div>

<section id="pauseScreen" class="screen">
  <div class="dialog">
    <h2>PAUSE</h2>
    <div class="dialog-actions">
      <button id="quitBtn">TITLE</button>
      <button id="resumeBtn" class="go">RESUME</button>
    </div>
  </div>
</section>

<section id="resultScreen" class="screen">
  <div class="dialog">
    <h2 id="resultTitle">CLEAR</h2>
    <div id="resultSize" class="result-big">1.45 m</div>
    <div id="resultInfo" class="result-sub"></div>
    <div id="resultHint">DRAG TO ROTATE · PINCH TO ZOOM</div>

    <div class="dialog-actions">
      <button id="resultStage">STAGE</button>
      <button id="retryBtn" class="go">RETRY</button>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/abcjs@6.2.2/dist/abcjs-basic-min.js"></script>
<script>
(() => {
'use strict';

const $ = selector => document.querySelector(selector);

const canvas = $('#game');

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias:true,
  alpha:false,
  powerPreference:'high-performance'
});

renderer.setPixelRatio(Math.min(devicePixelRatio,1.7));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.physicallyCorrectLights = true;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  52,
  innerWidth / innerHeight,
  0.05,
  220
);

// 32小節・4/4・120BPMのため、1周は約64秒。
const GAME_BGM_LOOP_MS = 64000;

// ABC各パートの音量へ掛けるBGM専用倍率。効果音には影響しない。
const GAME_BGM_VOLUME = 0.82;

const gameBgm = {
  synth:null,
  visualObj:null,
  loopTimer:null,
  loopStartedAt:0,
  loopRemaining:GAME_BGM_LOOP_MS,
  token:0,
  playing:false,

  getVisualObj(){
    if(this.visualObj){
      return this.visualObj;
    }

    if(!window.ABCJS){
      return null;
    }

    // 曲全体のABCリピートを解除し、アプリ側で継ぎ目なく繰り返す。
    // 各パートのMIDI音量だけを一括補正し、効果音との音量差を確保する。
    const abc = decodeURIComponent(
      GAME_BGM_ABC_ENCODED
    )
      .replace(
        /^%%MIDI control 7 (\d+)$/gm,
        (match,volume) =>
          `%%MIDI control 7 ${Math.max(
            1,
            Math.round(
              Number(volume) *
              GAME_BGM_VOLUME
            )
          )}`
      )
      .replace(/^x:/m,'X:')
      .replace(/\|:/g,'|')
      .replace(/:\|/g,'|');

    const visualObjects =
      ABCJS.renderAbc(
        '*',
        abc,
        {
          add_classes:false
        }
      );

    this.visualObj =
      visualObjects[0] || null;

    return this.visualObj;
  },

  scheduleLoop(
    delay=GAME_BGM_LOOP_MS
  ){
    if(this.loopTimer){
      clearTimeout(this.loopTimer);
    }

    this.loopRemaining = delay;
    this.loopStartedAt = performance.now();

    this.loopTimer = setTimeout(() => {
      this.loopTimer = null;

      if(gameState === 'play'){
        void this.start();
      }
    },delay);
  },

  async start(){
    this.stop();
    audio.resume();

    const visualObj =
      this.getVisualObj();

    if(
      !visualObj ||
      !window.ABCJS?.synth ||
      !audio.context
    ){
      return;
    }

    const currentToken =
      this.token;

    const synth =
      new ABCJS.synth.CreateSynth();

    this.synth = synth;

    try{
      await synth.init({
        visualObj,
        audioContext:audio.context,
        millisecondsPerMeasure:2000
      });

      await synth.prime();

      if(
        currentToken !== this.token ||
        gameState !== 'play'
      ){
        if(
          typeof synth.stop ===
          'function'
        ){
          synth.stop();
        }

        return;
      }

      synth.start();
      this.playing = true;
      this.scheduleLoop();
    }catch(error){
      if(currentToken === this.token){
        this.synth = null;
        this.playing = false;
      }

      console.warn(
        'Gravity Core BGM playback failed.',
        error
      );
    }
  },

  pause(){
    if(
      !this.playing ||
      !this.loopTimer
    ){
      return;
    }

    const elapsed =
      performance.now() -
      this.loopStartedAt;

    this.loopRemaining = Math.max(
      0,
      this.loopRemaining - elapsed
    );

    clearTimeout(this.loopTimer);
    this.loopTimer = null;
  },

  resume(){
    if(gameState !== 'play'){
      return;
    }

    if(!this.playing){
      void this.start();
      return;
    }

    this.scheduleLoop(
      Math.max(
        50,
        this.loopRemaining
      )
    );
  },

  stop(){
    this.token++;

    if(this.loopTimer){
      clearTimeout(this.loopTimer);
      this.loopTimer = null;
    }

    if(
      this.synth &&
      typeof this.synth.stop ===
      'function'
    ){
      try{
        this.synth.stop();
      }catch(error){
        console.warn(
          'Gravity Core BGM stop failed.',
          error
        );
      }
    }

    this.synth = null;
    this.playing = false;
    this.loopRemaining =
      GAME_BGM_LOOP_MS;
  }
};

    if(this.visualObj){
      return this.visualObj;
    }

    if(!window.ABCJS){
      return null;
    }

    const visualObjects =
      ABCJS.renderAbc(
        '*',
        RESULT_JINGLE_ABC,
        {
          add_classes:false
        }
      );

    this.visualObj =
      visualObjects[0] || null;

    return this.visualObj;
  },

  async start(){
    this.stop();
    await audio.resume();

    const visualObj =
      this.getVisualObj();

    if(
      !visualObj ||
      !window.ABCJS?.synth ||
      !audio.context
    ){
      return;
    }

    const currentToken =
      this.token;

    const synth =
      new ABCJS.synth.CreateSynth();

    this.synth = synth;

    try{
      await synth.init({
        visualObj,
        audioContext:audio.context,
        millisecondsPerMeasure:2000
      });

      await synth.prime();

      if(
        currentToken !== this.token ||
        gameState !== 'result'
      ){
        if(
          typeof synth.stop ===
                   'function'
        ){
          synth.stop();
        }

        return;
      }

      synth.start();
    }catch(error){
      if(currentToken === this.token){
        this.synth = null;
      }

      console.warn(
        'Gravity Core result jingle playback failed.',
        error
      );
    }
  },

  stop(){
    this.token++;

    if(
      this.synth &&
      typeof this.synth.stop ===
      'function'
    ){
      try{
        this.synth.stop();
      }catch(error){
        console.warn(
          'Gravity Core result jingle stop failed.',
          error
        );
      }
    }

    this.synth = null;
  }
};

function getMaterial(
  color,
  metalness=0.15,
  roughness=0.62,
  emissive=0x000000
){
  const key = [
    color,
    metalness,
    roughness,
    emissive
  ].join('/');

  if(!materials.has(key)){
    const material = new THREE.MeshStandardMaterial({
      color,
      metalness,
      roughness,
      emissive,
      emissiveIntensity:0
    });

    materials.set(key,material);
  }

  return materials.get(key);
}

function rand(min,max){
  return min + Math.random() * (max-min);
}

function pick(array){
  return array[
    Math.floor(Math.random() * array.length)
  ];
}

function clamp(value,min,max){
  return Math.max(min,Math.min(max,value));
}

function lerp(start,end,ratio){
  return start + (end-start) * ratio;
}

function getSpawnSize(
  kind,
  minimum,
  maximum
){
  const livingRange =
    LIVING_SIZE_RANGES[kind];

  if(livingRange){
    return rand(
      livingRange[0],
      livingRange[1]
    );
  }

  return (
    rand(minimum,maximum) *
    (
      !isTitleScene &&
      stageIndex === 2
        ? 1.08
        : 1
    )
  );
}

const audio = {
  context:null,
  master:null,

  init(){
    if(this.context){
      return;
    }

    const AudioContextClass =
      window.AudioContext ||
      window.webkitAudioContext;

    this.context = new AudioContextClass();

    this.master = this.context.createGain();

    // BGMに埋もれないよう、効果音専用出力を十分な音量へ戻す。
    this.master.gain.value = 0.48;
    this.master.connect(this.context.destination);
  },

  resume(){
    this.init();

    if(this.context.state === 'suspended'){
      return this.context.resume();
    }

    return Promise.resolve();
  },

  tone(
    frequency=440,
    duration=0.1,
    type='sine',
    gainValue=0.15,
    slide=1
  ){
    this.init();

    const playTone = () => {
      if(
        !this.context ||
        !this.master ||
        this.context.state !== 'running'
      ){
        return;
      }

      // AudioContext復帰と同時でも先頭が欠けないよう、わずかに後ろへ予約する。
      const now =
        this.context.currentTime + 0.01;

      const oscillator =
        this.context.createOscillator();

      const gain =
        this.context.createGain();

      oscillator.type = type;

      oscillator.frequency.setValueAtTime(
        frequency,
        now
      );

      oscillator.frequency.exponentialRampToValueAtTime(
        Math.max(40,frequency * slide),
        now + duration
      );

      gain.gain.setValueAtTime(
        gainValue,
        now
      );

      gain.gain.exponentialRampToValueAtTime(
        0.001,
        now + duration
      );

      oscillator.connect(gain);
      gain.connect(this.master);

      oscillator.start(now);
      oscillator.stop(
        now + duration + 0.02
      );
    };

    if(this.context.state === 'running'){
      playTone();
      return;
    }

    void this.resume()
      .then(playTone)
      .catch(error => {
        console.warn(
          'Gravity Core SFX resume failed.',
          error
        );
      });
  },

  pickup(size){
    this.tone(
      380 + size * 220,
      0.09,
      'triangle',
      0.12,
      1.45
    );
  },

  creature(kind){
    if(kind === 'cat'){

        880,

    if(kind === 'bird'){

        1180,

      );

    }

    if(kind === 'dog'){
      this.tone(

      );

    }

    if(kind === 'person'){
      this.tone(

      );
    }
  },

  impact(power){
    this.tone(
      120 - power * 35,

    );

    );

    setTimeout(() => {
      this.tone(

        );

    });
  }

function clearWorld(){
  sceneLights.forEach(light => {
    scene.remove(light);
  });

  scene.remove(world);

  const sharedMaterials = new Set(materials.values());

  world.traverse(object => {
    if(object.geometry){
      object.geometry.dispose();
    }

    if(
      object.material &&
      !sharedMaterials.has(object.material)
    ){
      object.material.dispose();
    }
  });

  world = new THREE.Group();
  scene.add(world);

  pickups = [];
  obstacles = [];
  attached = [];
  particles = [];
  sceneLights = [];
}

function createCore(){

  world.add(coreGroup);

  const coreGeometry =
    new THREE.IcosahedronGeometry(1,4);

  const coreMaterial =
    new THREE.MeshPhysicalMaterial({
      color:0x2a8fb4,
      metalness:0.55,
      roughness:0.20,
      clearcoat:1,
      clearcoatRoughness:0.08,
      emissive:0x0b3d56,
      emissiveIntensity:0.28
    });

  coreMesh = new THREE.Mesh(
    coreGeometry,
    coreMaterial
  );

  coreMesh.castShadow = true;
  coreMesh.receiveShadow = true;

  coreGroup.add(coreMesh);

  coreWire = new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.015,2),
    new THREE.MeshBasicMaterial({
      color:0x12374a,
      wireframe:true,
      transparent:true,
      opacity:0.52
    })
  );

  coreGroup.add(coreWire);

  coreGlow = new THREE.PointLight(
    0x4bb6d6,
    8.5,
    8,
    2
  );

  coreGlow.position.y = 0.2;
  coreGroup.add(coreGlow);

  coreShadow = new THREE.Mesh(
    new THREE.CircleGeometry(1,32),
    new THREE.MeshBasicMaterial({
      color:0x000000,
      transparent:true,
      opacity:0.22,
      depthWrite:false
    })
  );

  coreShadow.rotation.x = -Math.PI / 2;
  coreShadow.position.y = 0.025;

  world.add(coreShadow);

  updateCoreScale();
}

function getAttachmentRadius(item){
  return Math.max(
    0.08,
    item.size * 0.56
  );
}

function getEffectivePickupRadius(){
  // clusterRadiusは完成塊の見た目とカメラ用に残し、
  // 取得能力は数値上の成長coreRadiusから大きく逸脱させない。
  return Math.min(
    clusterRadius,
    coreRadius *
      GAMEPLAY.pickupRadiusRatio
  );
}

function updateCoreScale(){
  // 中心のコアは、ステージ開始時の表示サイズから拡大しない。
  if(coreMesh){
    coreMesh.scale.setScalar(
      coreVisualRadius
    );
  }

  if(coreWire){
    coreWire.scale.setScalar(
      coreVisualRadius
    );
  }

  // 影と発光範囲は、付着物を含む塊全体へ合わせる。
  if(coreShadow){
    coreShadow.scale.setScalar(
      clusterRadius * 1.12
    );
  }

  if(coreGlow){
    coreGlow.distance =
      5 + clusterRadius * 2;

    coreGlow.intensity =
      7 + Math.min(clusterRadius,3) * 2;
  }
}

function recalculateClusterRadius(){
  let nextRadius = coreVisualRadius;

  attached.forEach(item => {
    const itemReach =
      item.mesh.position.length() +
      getAttachmentRadius(item);

    nextRadius = Math.max(
      nextRadius,
      itemReach
    );
  });

  clusterRadius = nextRadius;
  updateCoreScale();
}

function findAttachmentAnchor(
  incomingLocalPosition,
  newItem
){
  let bestAnchor = {
    position:new THREE.Vector3(),
    radius:coreVisualRadius,
    depth:0
  };

  // コア表面を基準候補とする。
  let bestScore =
    incomingLocalPosition.length() -
    coreVisualRadius * 0.35;

  attached.forEach(candidate => {
    const candidateDepth =
      candidate.attachDepth || 1;

    // 無制限に枝が伸びることを防ぐ。
    if(candidateDepth >= 4){
      return;
    }

    const candidateRadius =
      getAttachmentRadius(candidate);

    const distanceToIncoming =
      incomingLocalPosition.distanceTo(
        candidate.mesh.position
      );

    // 塊の外側にある物体を少し優先し、
    // 中心へ埋め込まれる配置を防ぐ。
    const outwardBias =
      candidate.mesh.position.length() *
      0.22;

    // 極端に小さい物体へ大物が接着する配置を抑える。
    const sizePenalty =
      newItem.size > candidate.size * 2.4
        ? newItem.size * 0.65
        : 0;

    const score =
      distanceToIncoming -
      outwardBias +
      sizePenalty;

    if(score < bestScore){
      bestScore = score;

      bestAnchor = {
        position:
          candidate.mesh.position.clone(),
        radius:candidateRadius,
        depth:candidateDepth
      };
    }
  });

  return bestAnchor;
}

function getTerrainHeight(x,z){
  let height = 0;

  terrainFeatures.forEach(feature => {
    const differenceX =
      x - feature.x;

    const differenceZ =
      z - feature.z;

    const cosine =
      Math.cos(-feature.rotation);

    const sine =
      Math.sin(-feature.rotation);

    const localX =
      differenceX * cosine -
      differenceZ * sine;

    const localZ =
      differenceX * sine +
      differenceZ * cosine;

    const normalizedDistance =
      Math.hypot(
        localX / feature.stretchX,
        localZ / feature.stretchZ
      ) /
      feature.radius;

    if(normalizedDistance >= 1){
      return;
    }

    const ratio =
      1 - normalizedDistance;

    const smoothRatio =
      ratio * ratio *
      (3 - 2 * ratio);

    height +=
      feature.height *
      Math.pow(
        smoothRatio,
        feature.sharpness
      );
  });

  const terrainSettings =
    stageData.terrain;

  const waveHeight =
    Math.sin(
      (x + z) *
      terrainSettings.waveFrequency
    ) *
    Math.cos(
      (x - z) *
      terrainSettings.waveFrequency *
      0.71
    ) *
    terrainSettings.waveAmplitude;

  let shapedHeight =
    height + waveHeight;

  // MARKETは高さを段階化し、明確な段丘として感じられるようにする。
  if(terrainSettings.terraceStrength > 0){
    const steppedHeight =
      Math.round(
        shapedHeight /
        terrainSettings.terraceStep
      ) *
      terrainSettings.terraceStep;

    shapedHeight = lerp(
      shapedHeight,
      steppedHeight,
      terrainSettings.terraceStrength
    );
  }

  const edgeRatio =
    Math.max(
      Math.abs(x),
      Math.abs(z)
    ) /
    Math.max(1,floorHalf);

  const edgeFade = clamp(
    (1.02 - edgeRatio) / 0.18,
    0,
    1
  );

  return clamp(
    shapedHeight * edgeFade,
    terrainSettings.minHeight,
    terrainSettings.maxHeight
  );
}

function getTerrainSlope(x,z,target){
  const sampleDistance = 0.34;

  const leftHeight =
    getTerrainHeight(
      x - sampleDistance,
      z
    );

  const rightHeight =
    getTerrainHeight(
      x + sampleDistance,
      z
    );

  const nearHeight =
    getTerrainHeight(
      x,
      z - sampleDistance
    );

  const farHeight =
    getTerrainHeight(
      x,
      z + sampleDistance
    );

  target.set(
    (
      rightHeight - leftHeight
    ) /
    (sampleDistance * 2),
    (
      farHeight - nearHeight
    ) /
    (sampleDistance * 2)
  );

  return target;
}

function createFloorAndWalls(){
  floorHalf = stageData.field / 2;
  buildTerrainFeatures();

  // 1枚の地面メッシュを変形させ、丘と谷を作る。
  // 複数の地形オブジェクトを追加しないため、描画負荷を抑えられる。
  // 高難度ステージほど分割数を増やし、細かな起伏を滑らかに描画する。
  const terrainSegments =
    stageData.terrain.segments;

  const floorGeometry =
    new THREE.PlaneGeometry(
      stageData.field + 12,
      stageData.field + 12,
      terrainSegments,
      terrainSegments
    );

  const positions =
    floorGeometry.attributes.position;

  const terrainSettings =
    stageData.terrain;

  const vertexColors =
    new Float32Array(
      positions.count * 3
    );

  const lowColor =
    new THREE.Color(
      terrainSettings.lowColor
    );

  const middleColor =
    new THREE.Color(
      terrainSettings.midColor
    );

  const highColor =
    new THREE.Color(
      terrainSettings.highColor
    );

  const terrainColor =
    new THREE.Color();

  for(
    let index=0;
    index<positions.count;
    index++
  ){
    const worldX =
      positions.getX(index);

    // PlaneGeometryを横倒しにするため、ローカルYの符号を反転してワールドZへ対応させる。
    const worldZ =
      -positions.getY(index);

    const terrainHeight =
      getTerrainHeight(
        worldX,
        worldZ
      );

    positions.setZ(
      index,
      terrainHeight
    );

    const heightRatio = clamp(
      (
        terrainHeight -
        terrainSettings.minHeight
      ) /
      Math.max(
        0.001,
        terrainSettings.maxHeight -
        terrainSettings.minHeight
      ),
      0,
      1
    );

    if(heightRatio < 0.5){
      terrainColor
        .copy(lowColor)
        .lerp(
          middleColor,
          heightRatio * 2
        );
    }else{
      terrainColor
        .copy(middleColor)
        .lerp(
          highColor,
          (heightRatio - 0.5) * 2
        );
    }

    // 高さごとの明暗帯を加え、遠くからでも斜面と段差を判別可能にする。
    const contourShade =
      0.90 +
      Math.abs(
        Math.sin(
          terrainHeight *
          Math.PI /
          Math.max(
            0.18,
            terrainSettings.terraceStep
          )
        )
      ) * 0.10;

    terrainColor.multiplyScalar(
      contourShade
    );

    vertexColors[index * 3] =
      terrainColor.r;

    vertexColors[index * 3 + 1] =
      terrainColor.g;

    vertexColors[index * 3 + 2] =
      terrainColor.b;
  }

  positions.needsUpdate = true;

  floorGeometry.setAttribute(
    'color',
    new THREE.BufferAttribute(
      vertexColors,
      3
    )
  );

  floorGeometry.computeVertexNormals();

  const floorMaterial =
    new THREE.MeshStandardMaterial({
      vertexColors:true,
      metalness:stageIndex === 2
        ? 0.18
        : 0.06,
      roughness:stageIndex === 2
        ? 0.72
        : 0.88
    });

  const floor = new THREE.Mesh(
    floorGeometry,
    floorMaterial
  );

  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;

  world.add(floor);

  const wallMaterial = getMaterial(
    stageIndex === 2
      ? 0x242b38
      : 0x6a6259,
    0.1,
    0.8
  );

  const thickness = 0.7;
  const height = 1.4;
  const fieldSize = stageData.field;

  const wallDefinitions = [
    [
      0,
      height / 2,
      -fieldSize / 2,
      fieldSize,
      height,
      thickness
    ],
    [
      0,
      height / 2,
      fieldSize / 2,
      fieldSize,
      height,
      thickness
    ],
    [
      -fieldSize / 2,
      height / 2,
      0,
      thickness,
      height,
      fieldSize
    ],
    [
      fieldSize / 2,
      height / 2,
      0,
      thickness,
      height,
      fieldSize
    ]
  ];

  wallDefinitions.forEach(definition => {
    const [
      x,
      y,
      z,
      width,
      wallHeight,
      depth
    ] = definition;

    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(
        width,
        wallHeight,
        depth
      ),
      wallMaterial
    );

    wall.position.set(x,y,z);
    wall.receiveShadow = true;
    wall.castShadow = true;

    world.add(wall);
  });
}

function createVegetationObject(kind,size){
  const group = new THREE.Group();

  if(kind === 'tree'){
    const trunkHeight =
      size *
      (
        stageIndex === 2
          ? 2.3
          : 1.9
      );

    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(
        size * 0.13,
        size * 0.20,
        trunkHeight,
        7
      ),
      getMaterial(
        stageIndex === 2
          ? 0x3b3531
          : 0x694b32,
        0.02,
        0.92
      )
    );

    trunk.position.y =
      trunkHeight * 0.5;

    trunk.castShadow = true;
    trunk.receiveShadow = true;

    if(stageIndex === 2){
      trunk.rotation.z =
        rand(-0.13,0.13);
    }

    group.add(trunk);

    const leafColors =
      stageIndex === 0
        ? [0x526b45,0x718154,0x8a8d58]
        : stageIndex === 1
          ? [0x3f7a49,0x5d964f,0x82ad58]
          : [0x243f38,0x31564a,0x496b56];

    const crownCount =
      stageIndex === 2
        ? 3
        : 4;

    for(let index=0;index<crownCount;index++){
      const crown =
        stageIndex === 2
          ? new THREE.Mesh(
              new THREE.ConeGeometry(
                size *
                  (0.78 - index * 0.12),
                size *
                  (1.10 - index * 0.10),
                8
              ),
              getMaterial(
                leafColors[
                  index %
                  leafColors.length
                ],
                0.02,
                0.88
              )
            )
          : new THREE.Mesh(
              new THREE.DodecahedronGeometry(
                size *
                  rand(0.52,0.76),
                0
              ),
              getMaterial(
                leafColors[
                  index %
                  leafColors.length
                ],
                0.02,
                0.86
              )
            );

      crown.position.set(
        stageIndex === 2
          ? rand(-0.12,0.12) * size
          : Math.cos(
              index /
              crownCount *
              Math.PI * 2
            ) *
            size * 0.38,
        trunkHeight +
          size *
          (
            stageIndex === 2
              ? 0.18 + index * 0.34
              : 0.24 + (index % 2) * 0.22
          ),
        stageIndex === 2
          ? 0
          : Math.sin(
              index /
              crownCount *
              Math.PI * 2
            ) *
            size * 0.30
      );

      crown.castShadow = true;
      group.add(crown);
    }
  }

  if(kind === 'grass'){
    const grassMaterial = getMaterial(
      stageIndex === 2
        ? pick([0x435846,0x57634a,0x667052])
        : pick([0x4f7b43,0x63934f,0x7da65a]),
      0.01,
      0.96
    );

      const blade = new THREE.Mesh(
        new THREE.ConeGeometry(
          size * 0.07,
          size * rand(0.42,0.72),
          4
        ),
        grassMaterial
      );

      blade.position.set(
        rand(-0.18,0.18) * size,
        size * 0.25,
        rand(-0.18,0.18) * size
      );

      blade.rotation.z =
        rand(-0.28,0.28);

      group.add(blade);
    }
  }

  if(kind === 'flower'){
    const stemHeight =
      size * rand(0.36,0.58);

    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(
        size * 0.025,
        size * 0.035,
        stemHeight,
        5
      ),
      getMaterial(
        stageIndex === 2
          ? 0x4f654f
          : 0x4d8a4f,
        0.01,
        0.92
      )
    );

    stem.position.y =
      stemHeight * 0.5;

    group.add(stem);

    const flowerColor =
      stageIndex === 0
        ? pick([0xffd36b,0xfff1a6,0xe6b5ff])
        : stageIndex === 1
          ? pick([0xff6f91,0xffd166,0xa8e6ff,0xf7a8ff])
          : pick([0x8ca9ff,0xb184ff,0x76d2c6]);

    const center = new THREE.Mesh(
      new THREE.SphereGeometry(
        size * 0.10,
        7,
        5
      ),
      getMaterial(
        0xffd35a,
        0.02,
        0.70
      )
    );

    center.position.y =
      stemHeight;

    group.add(center);

    for(let index=0;index<5;index++){
      const angle =
        index / 5 *
        Math.PI * 2;

      const petal = new THREE.Mesh(
        new THREE.SphereGeometry(
          size * 0.09,
          6,
          4
        ),
        getMaterial(
          flowerColor,
          0.01,
          0.80
        )
      );

      petal.scale.set(1.45,0.55,1);

      petal.position.set(
        Math.cos(angle) *
          size * 0.15,
        stemHeight,
        Math.sin(angle) *
          size * 0.15
      );

      group.add(petal);
    }
  }

  return group;
}

            floorHalf * 0.68,
            floorHalf * 0.84
          ),
        z:rand(
          -floorHalf * 0.70,
          floorHalf * 0.70
        )
      };
    }

    return {
      x:rand(
        -floorHalf * 0.86,
        floorHalf * 0.86
      ),
      z:index % 3 === 0
        ? side * floorHalf * 0.72
        : rand(
            -floorHalf * 0.78,
            floorHalf * 0.78
          )
    };
  }

  if(stageData.placement === 'clusters'){
    const centers = [
      [-0.55,-0.45],
      [0.52,-0.40],
      [-0.42,0.48],
      [0.50,0.50],
      [0.02,0.08]
    ];

    const center =
      centers[
        index %
        centers.length
      ];

    const radius =
      kind === 'tree'
        ? rand(1.4,3.2)
        : rand(0.5,4.2);

    const angle =
      rand(0,Math.PI * 2);

    return {
      x:center[0] *
        floorHalf *
        0.82 +
        Math.cos(angle) *
        radius,
      z:center[1] *
        floorHalf *
        0.82 +
        Math.sin(angle) *
        radius
    };
  }

  const route =
    index % 4;

  const distance =
    rand(
      -floorHalf * 0.72,
      floorHalf * 0.72
    );

  if(route === 0){
    return {
      x:distance,
      z:-floorHalf * 0.52 +
        Math.sin(distance * 0.20) * 2.2
    };
  }

  if(route === 1){
    return {
      x:-floorHalf * 0.48 +
        Math.sin(distance * 0.17) * 2.0,
      z:distance
    };
  }

  if(route === 2){
    return {
      x:floorHalf * 0.48 +
        Math.cos(distance * 0.18) * 2.0,
      z:distance
    };
  }

  return {
    x:distance,
    z:floorHalf * 0.46 +
      Math.cos(distance * 0.16) * 2.4
  };
}

function decorateVegetation(){
  const vegetation =
    stageData.vegetation;

  [
    ['tree',vegetation.trees],
    ['grass',vegetation.grass],
    ['flower',vegetation.flowers]
  ].forEach(([kind,count]) => {
    for(let index=0;index<count;index++){
      let position;
      let attempts = 0;

      do{
        position =
          getVegetationPosition(
            kind,
            index + attempts
          );

        attempts++;
      }while(
        (
          position.x * position.x +
          position.z * position.z < 20 ||
          getTerrainSlope(
            position.x,
            position.z,
            terrainSlope
          ).length() >
            (
              kind === 'tree'
                ? 1.35
                : 1.75
            )
        ) &&
        attempts < 14
      );

      const size =
        kind === 'tree'
          ? rand(
              stageIndex === 2
                ? 0.85
                : 0.72,
              stageIndex === 1
                ? 1.35
                : 1.16
            )
          : kind === 'grass'
            ? rand(0.28,0.54)
            : rand(0.24,0.42);

      const object =
        createVegetationObject(
          kind,
          size
        );

      const x = clamp(
        position.x,
        -floorHalf + 2,
        floorHalf - 2
      );

      const z = clamp(
        position.z,
        -floorHalf + 2,
        floorHalf - 2
      );

      object.position.set(
        x,
        getTerrainHeight(x,z),
        z
      );

      object.rotation.y =
        rand(0,Math.PI * 2);

      world.add(object);

      if(kind === 'tree'){
        // 木は障害物ではなく、十分に成長したコアが取得できる大型対象として扱う。
        const treeSize =
          size * 1.35;

        const treeRecord = {
          mesh:object,
          size:treeSize,
          volume:treeSize ** 3,
          kind:'tree',
          tier:2,
          attached:false,
          living:false
        };

        object.userData.record =
          treeRecord;

        pickups.push(treeRecord);
      }
    }
  });
}
