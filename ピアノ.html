<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キッズピアノ - 光るガイドでひいてみよう！</title>
<style>
  body {
    font-family: 'Comic Sans MS', 'Hiragino Maru Gothic ProN', sans-serif;
    background-color: #f0f8ff;
    text-align: center;
    margin: 0;
    padding: 20px;
    user-select: none;
  }
  h1 {
    color: #ff6b81;
    text-shadow: 2px 2px #fff;
  }
  #controls {
    margin-bottom: 20px;
  }
  button {
    background-color: #ff7f50;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px #e05626;
    transition: transform 0.1s, box-shadow 0.1s;
    margin: 0 10px;
  }
  button:active {
    transform: translateY(5px);
    box-shadow: 0 0 #e05626;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  select {
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: 2px solid #ff7f50;
  }
  #message {
    font-size: 24px;
    font-weight: bold;
    color: #2ed573;
    height: 35px;
    margin-bottom: 20px;
  }
  .piano {
    position: relative;
    display: inline-block;
    background-color: #ff4757;
    padding: 20px 20px 0 20px;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }
  .keys {
    position: relative;
    display: flex;
  }
  .key {
    cursor: pointer;
    box-sizing: border-box;
    border-radius: 0 0 10px 10px;
    transition: background-color 0.1s;
  }
  .white-key {
    width: 60px;
    height: 200px;
    background-color: white;
    border: 1px solid #ccc;
    border-bottom: 5px solid #eee;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 15px;
    font-weight: bold;
    color: #a4b0be;
  }
  .white-key.active {
    background-color: #eccc68 !important;
    border-bottom: 2px solid #eee;
    height: 197px;
    transform: translateY(3px);
  }
  .black-key {
    width: 40px;
    height: 120px;
    background-color: #2f3542;
    border-bottom: 5px solid #1e272e;
    position: absolute;
    z-index: 2;
    border-radius: 0 0 8px 8px;
  }
  .black-key.active {
    background-color: #ffa502 !important;
    border-bottom: 2px solid #1e272e;
    height: 118px;
    transform: translateY(2px);
  }

  /* 光るガイドのアニメーション */
  @keyframes glow {
    0% { box-shadow: 0 0 10px #ff7f50, inset 0 0 20px #ff7f50; background-color: #ffeaa7; }
    50% { box-shadow: 0 0 30px #ff4757, inset 0 0 40px #ff4757; background-color: #ff9ff3; }
    100% { box-shadow: 0 0 10px #ff7f50, inset 0 0 20px #ff7f50; background-color: #ffeaa7; }
  }
  .guide {
    animation: glow 1s infinite alternate !important;
    z-index: 3; /* ガイドが見えやすいように少し前に */
  }

  /* 黒鍵の配置計算 */
  .bk-cs { left: 40px; }
  .bk-ds { left: 100px; }
  .bk-fs { left: 220px; }
  .bk-gs { left: 280px; }
  .bk-as { left: 340px; }
</style>
</head>
<body>

<h1>ドレミファ・キッズピアノ 🎹</h1>

<div id="controls">
  <button id="start-btn">スタート！（音をだす）</button>
  <span style="display: none;" id="game-controls">
    <select id="song-select">
      <option value="twinkle">きらきら星</option>
      <option value="tulip">チューリップ</option>
    </select>
    <button id="guide-btn">ガイドであそぶ</button>
    <button id="record-btn">🔴 ろくおん</button>
    <button id="play-btn" disabled>▶️ さいせい</button>
  </span>
</div>

<div id="message"></div>

<div class="piano">
  <div class="keys">
    <div class="key white-key" data-note="C4">ド</div>
    <div class="key white-key" data-note="D4">レ</div>
    <div class="key white-key" data-note="E4">ミ</div>
    <div class="key white-key" data-note="F4">ファ</div>
    <div class="key white-key" data-note="G4">ソ</div>
    <div class="key white-key" data-note="A4">ラ</div>
    <div class="key white-key" data-note="B4">シ</div>
    <div class="key white-key" data-note="C5">ド</div>
    
    <div class="key black-key bk-cs" data-note="C#4"></div>
    <div class="key black-key bk-ds" data-note="D#4"></div>
    <div class="key black-key bk-fs" data-note="F#4"></div>
    <div class="key black-key bk-gs" data-note="G#4"></div>
    <div class="key black-key bk-as" data-note="A#4"></div>
  </div>
</div>

<script>
  // --- 音階と周波数の定義 ---
  const frequencies = {
    'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13,
    'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00,
    'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
    'C5': 523.25
  };

  // --- キーボード操作のマッピング ---
  const keyMap = {
    'a': 'C4', 'w': 'C#4', 's': 'D4', 'e': 'D#4', 'd': 'E4',
    'f': 'F4', 't': 'F#4', 'g': 'G4', 'y': 'G#4', 'h': 'A4',
    'u': 'A#4', 'j': 'B4', 'k': 'C5'
  };

  // --- 簡易abc記法による曲データ ---
  // スペース区切りで音階を指定。休符はハイフン(-)などを入れる拡張も可能。
  const songs = {
    'twinkle': "C4 C4 G4 G4 A4 A4 G4 F4 F4 E4 E4 D4 D4 C4", // きらきら星
    'tulip': "C4 D4 E4 C4 D4 E4 G4 E4 D4 C4 D4 E4 C4" // チューリップ（冒頭）
  };

  let audioCtx = null;
  let isGuideMode = false;
  let currentSong = [];
  let currentNoteIndex = 0;

  // 録音用の変数
  let isRecording = false;
  let recordedNotes = [];
  let recordStartTime = 0;

  // DOM要素
  const startBtn = document.getElementById('start-btn');
  const gameControls = document.getElementById('game-controls');
  const guideBtn = document.getElementById('guide-btn');
  const songSelect = document.getElementById('song-select');
  const messageEl = document.getElementById('message');
  const keys = document.querySelectorAll('.key');
  const recordBtn = document.getElementById('record-btn');
  const playBtn = document.getElementById('play-btn');

  // --- 初期化処理 ---
  startBtn.addEventListener('click', () => {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Web Audio APIのロック解除
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    startBtn.style.display = 'none';
    gameControls.style.display = 'inline-block';
    messageEl.textContent = "すきなけん盤を おしてみよう！";
  });

  // --- 音を鳴らす関数 ---
  function playNote(note) {
    if (!audioCtx) return;
    const freq = frequencies[note];
    if (!freq) return;

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    // 子供向けに少し柔らかい音色 (triangle)
    oscillator.type = 'triangle'; 
    oscillator.frequency.value = freq;
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.start();
    // 音の余韻（エンベロープ）
    gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
    oscillator.stop(audioCtx.currentTime + 1.5);

    // 視覚的フィードバック（鍵盤を押したエフェクト）
    const keyElement = document.querySelector(`.key[data-note="${note}"]`);
    if (keyElement) {
      keyElement.classList.add('active');
      setTimeout(() => {
        keyElement.classList.remove('active');
      }, 200);
    }

    // ガイドモード中の判定
    if (isGuideMode) {
      checkGuide(note);
    }

    // 録音中の記録
    if (isRecording && audioCtx) {
      recordedNotes.push({
        note: note,
        time: audioCtx.currentTime - recordStartTime
      });
    }
  }

  // --- ガイド機能関連 ---
  guideBtn.addEventListener('click', () => {
    if (!audioCtx) return;
    const songKey = songSelect.value;
    // 簡易abc記法（文字列）を配列に変換
    currentSong = songs[songKey].split(' ');
    currentNoteIndex = 0;
    isGuideMode = true;
    messageEl.textContent = "ひかる けん盤を おしてね！";
    updateGuide();
  });

  function updateGuide() {
    // すべてのガイドをクリア
    keys.forEach(k => k.classList.remove('guide'));
    
    if (currentNoteIndex < currentSong.length) {
      // 次の音を光らせる
      const nextNote = currentSong[currentNoteIndex];
      const targetKey = document.querySelector(`.key[data-note="${nextNote}"]`);
      if (targetKey) {
        targetKey.classList.add('guide');
      }
    } else {
      // 曲の終了
      isGuideMode = false;
      messageEl.textContent = "たいへんよくできました！🎉";
      confetti(); // 簡易的なクリアエフェクト用（無くても可）
    }
  }

  function checkGuide(playedNote) {
    const expectedNote = currentSong[currentNoteIndex];
    if (playedNote === expectedNote) {
      currentNoteIndex++;
      updateGuide();
    }
  }

  // 簡易クリアアニメーション（文字エフェクト）
  function confetti() {
    let count = 0;
    const interval = setInterval(() => {
      messageEl.style.color = count % 2 === 0 ? "#ff4757" : "#2ed573";
      count++;
      if(count > 10) {
        clearInterval(interval);
        messageEl.style.color = "#2ed573";
      }
    }, 200);
  }

  // --- 録音・再生機能 ---
  recordBtn.addEventListener('click', () => {
    if (!audioCtx) return;
    
    if (isRecording) {
      // 録音停止
      isRecording = false;
      recordBtn.textContent = '🔴 ろくおん';
      messageEl.textContent = 'ろくおん おわり！さいせいしてみよう！';
      if (recordedNotes.length > 0) {
        playBtn.disabled = false;
      }
    } else {
      // 録音開始
      isRecording = true;
      recordedNotes = [];
      recordStartTime = audioCtx.currentTime;
      recordBtn.textContent = '■ とめる';
      playBtn.disabled = true;
      messageEl.textContent = 'ろくおんちゅう... けん盤をひいてね！';
    }
  });

  playBtn.addEventListener('click', () => {
    if (recordedNotes.length === 0 || !audioCtx) return;
    
    messageEl.textContent = 'さいせいちゅう... 🎵';
    playBtn.disabled = true;
    recordBtn.disabled = true;
    
    recordedNotes.forEach((record, index) => {
      setTimeout(() => {
        // 再生中の音が重複記録されないよう一時的にフラグをオフ
        const wasRecording = isRecording;
        isRecording = false;
        playNote(record.note);
        isRecording = wasRecording;
        
        // 最後の音を鳴らした後の処理
        if (index === recordedNotes.length - 1) {
          setTimeout(() => {
            playBtn.disabled = false;
            recordBtn.disabled = false;
            messageEl.textContent = 'すきなけん盤を おしてみよう！';
          }, 1000);
        }
      }, record.time * 1000); // 秒をミリ秒に変換
    });
  });

  // --- イベントリスナー（マウス・タッチ） ---
  keys.forEach(key => {
    // mousedown / touchstart で音を鳴らす
    key.addEventListener('mousedown', (e) => {
      playNote(e.target.dataset.note);
    });
    key.addEventListener('touchstart', (e) => {
      e.preventDefault(); // スクロール防止
      playNote(e.target.dataset.note);
    }, {passive: false});
  });

  // --- イベントリスナー（PCキーボード） ---
  window.addEventListener('keydown', (e) => {
    if (e.repeat) return; // 押しっぱなしによる連続発音を防ぐ
    const note = keyMap[e.key.toLowerCase()];
    if (note) {
      playNote(note);
    }
  });

</script>
</body>
</html>
