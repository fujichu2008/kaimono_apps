<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>DEEP STRIKE 3D</title>
<style>
  :root{
    --blue:#53c7ff;
    --red:#ff4d6d;
    --gold:#ffd166;
    --panel:rgba(5,12,24,.66);
    --line:rgba(130,210,255,.24);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#02040a;
    color:#eaf7ff;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    touch-action:none;
    user-select:none;
  }
  canvas{display:block}
  #ui{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:10;
  }
  .hudTop{
    position:absolute;
    top:calc(12px + env(safe-area-inset-top));
    left:12px;
    right:12px;
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:start;
  }
  .panel{
    background:linear-gradient(135deg,rgba(12,22,40,.72),rgba(4,8,16,.56));
    border:1px solid var(--line);
    box-shadow:0 10px 40px rgba(0,0,0,.32), inset 0 0 20px rgba(83,199,255,.06);
    backdrop-filter:blur(10px);
    border-radius:18px;
  }
  .status{
    padding:10px 12px;
    max-width:520px;
  }
  .titleLine{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    margin-bottom:7px;
    letter-spacing:.08em;
    font-size:11px;
    color:#a9dfff;
  }
  .bars{
    display:grid;
    gap:6px;
  }
  .barWrap{
    height:9px;
    border-radius:999px;
    background:rgba(255,255,255,.09);
    overflow:hidden;
    position:relative;
  }
  .barFill{
    height:100%;
    width:50%;
    border-radius:999px;
    transition:width .18s linear;
  }
  #shieldBar{background:linear-gradient(90deg,#2979ff,#53c7ff,#b8f7ff)}
  #healthBar{background:linear-gradient(90deg,#ff3158,#ff8c42,#ffe27a)}
  .scoreBox{
    min-width:128px;
    padding:10px 12px;
    text-align:right;
  }
  .scoreLabel{
    font-size:10px;
    letter-spacing:.15em;
    color:#8fcfff;
  }
  #score{
    font-size:25px;
    font-weight:900;
    line-height:1.05;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 16px rgba(83,199,255,.42);
  }
  .mini{
    margin-top:4px;
    font-size:11px;
    color:#cdefff;
  }
  #centerMsg{
    position:absolute;
    left:50%;
    top:24%;
    transform:translate(-50%,-50%);
    padding:9px 14px;
    border-radius:999px;
    color:#dff8ff;
    background:rgba(0,20,40,.42);
    border:1px solid rgba(83,199,255,.28);
    box-shadow:0 0 24px rgba(83,199,255,.15);
    font-size:12px;
    letter-spacing:.18em;
    opacity:0;
    transition:opacity .25s, transform .25s;
  }
  #centerMsg.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1.04);
  }
  #reticle{
    position:absolute;
    left:50%;
    top:50%;
    width:86px;
    height:86px;
    transform:translate(-50%,-50%);
    border:1px solid rgba(83,199,255,.2);
    border-radius:50%;
    opacity:.48;
  }
  #reticle:before,#reticle:after{
    content:"";
    position:absolute;
    background:rgba(83,199,255,.62);
    box-shadow:0 0 14px rgba(83,199,255,.55);
  }
  #reticle:before{
    width:1px;height:34px;left:50%;top:50%;transform:translate(-50%,-50%);
  }
  #reticle:after{
    height:1px;width:34px;left:50%;top:50%;transform:translate(-50%,-50%);
  }
  #damageFlash{
    position:absolute;
    inset:0;
    background:radial-gradient(circle,rgba(255,60,80,0) 42%,rgba(255,30,70,.46) 100%);
    opacity:0;
    transition:opacity .16s;
  }
  #overlay{
    position:fixed;
    inset:0;
    z-index:30;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 50% 42%,rgba(83,199,255,.16),transparent 34%),
      radial-gradient(circle at 20% 20%,rgba(255,77,109,.12),transparent 28%),
      linear-gradient(180deg,rgba(0,0,0,.42),rgba(0,0,0,.86));
    backdrop-filter:blur(8px);
  }
  .startCard{
    width:min(560px,100%);
    padding:24px;
    text-align:center;
    border-radius:28px;
    background:linear-gradient(145deg,rgba(9,20,38,.86),rgba(2,5,12,.82));
    border:1px solid rgba(130,210,255,.3);
    box-shadow:0 30px 90px rgba(0,0,0,.55), inset 0 0 35px rgba(83,199,255,.08);
  }
  .logo{
    font-size:clamp(32px,9vw,64px);
    line-height:.9;
    font-weight:1000;
    letter-spacing:.08em;
    text-shadow:0 0 22px rgba(83,199,255,.46),0 0 60px rgba(83,199,255,.18);
  }
  .subtitle{
    margin-top:10px;
    color:#bfeeff;
    font-size:13px;
    line-height:1.7;
  }
  .specs{
    margin:18px auto 20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .spec{
    padding:10px 6px;
    border-radius:16px;
    border:1px solid rgba(83,199,255,.18);
    background:rgba(255,255,255,.04);
  }
  .spec b{display:block;font-size:18px}
  .spec span{font-size:10px;color:#9fdcff}
  #startBtn{
    pointer-events:auto;
    width:100%;
    border:0;
    border-radius:20px;
    padding:16px 20px;
    color:#02101b;
    font-size:16px;
    font-weight:1000;
    letter-spacing:.12em;
    background:linear-gradient(90deg,#53c7ff,#d7fbff,#ffd166);
    box-shadow:0 0 28px rgba(83,199,255,.34),0 14px 40px rgba(0,0,0,.35);
  }
  .hint{
    margin-top:14px;
    color:#86b8ca;
    font-size:12px;
    line-height:1.7;
  }
  #controls{
    position:fixed;
    inset:0;
    z-index:20;
    pointer-events:none;
  }
  #joyBase{
    position:absolute;
    left:24px;
    bottom:calc(26px + env(safe-area-inset-bottom));
    width:126px;
    height:126px;
    border-radius:50%;
    background:radial-gradient(circle,rgba(83,199,255,.18),rgba(83,199,255,.04) 58%,rgba(255,255,255,.03));
    border:1px solid rgba(130,210,255,.24);
    box-shadow:0 0 30px rgba(83,199,255,.12), inset 0 0 22px rgba(83,199,255,.08);
    pointer-events:auto;
  }
  #joyStick{
    position:absolute;
    left:50%;
    top:50%;
    width:54px;
    height:54px;
    margin-left:-27px;
    margin-top:-27px;
    border-radius:50%;
    background:linear-gradient(145deg,rgba(215,251,255,.92),rgba(83,199,255,.52));
    box-shadow:0 0 22px rgba(83,199,255,.48);
  }
  #fireBtn{
    position:absolute;
    right:24px;
    bottom:calc(36px + env(safe-area-inset-bottom));
    width:112px;
    height:112px;
    border-radius:50%;
    border:1px solid rgba(255,209,102,.45);
    background:
      radial-gradient(circle at 50% 42%,rgba(255,255,255,.92),rgba(255,209,102,.65) 28%,rgba(255,77,109,.4) 65%,rgba(255,77,109,.12));
    color:#2b050c;
    font-weight:1000;
    letter-spacing:.08em;
    box-shadow:0 0 32px rgba(255,77,109,.28), inset 0 0 22px rgba(255,255,255,.28);
    pointer-events:auto;
  }
  #fireBtn:active{transform:scale(.96)}
  @media (min-width:760px){
    #joyBase,#fireBtn{opacity:.62}
  }
  @media (max-width:380px){
    #joyBase{width:108px;height:108px;left:18px}
    #fireBtn{width:96px;height:96px;right:18px}
    .scoreBox{min-width:112px}
    #score{font-size:22px}
  }
</style>
</head>
<body>
<div id="ui">
  <div class="hudTop">
    <div class="panel status">
      <div class="titleLine">
        <span>DEEP STRIKE // ORBITAL DEPTH SHOOTER</span>
        <span id="waveText">WAVE 1</span>
      </div>
      <div class="bars">
        <div class="barWrap"><div id="shieldBar" class="barFill"></div></div>
        <div class="barWrap"><div id="healthBar" class="barFill"></div></div>
      </div>
    </div>
    <div class="panel scoreBox">
      <div class="scoreLabel">SCORE</div>
      <div id="score">0</div>
      <div class="mini" id="comboText">COMBO x1</div>
    </div>
  </div>
  <div id="reticle"></div>
  <div id="centerMsg">MISSION START</div>
  <div id="damageFlash"></div>
</div>

<div id="controls">
  <div id="joyBase"><div id="joyStick"></div></div>
  <button id="fireBtn">FIRE</button>
</div>

<div id="overlay">
  <div class="startCard">
    <div class="logo">DEEP<br>STRIKE</div>
    <div class="subtitle">
      奥行き方向へ敵機・隕石・弾幕が迫る、スマホ対応3Dシューティング。<br>
      シールドを維持しながら深宇宙回廊を突破せよ。
    </div>
    <div class="specs">
      <div class="spec"><b>3D</b><span>DEPTH COMBAT</span></div>
      <div class="spec"><b>PBR</b><span>REAL DESIGN</span></div>
      <div class="spec"><b>MOBILE</b><span>TOUCH READY</span></div>
    </div>
    <button id="startBtn">START MISSION</button>
    <div class="hint">
      スマホ：左スティックで移動、右FIREで射撃<br>
      PC：WASD / 矢印キーで移動、Spaceで射撃
    </div>
  </div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const $ = (id)=>document.getElementById(id);

const overlay = $("overlay");
const startBtn = $("startBtn");
const shieldBar = $("shieldBar");
const healthBar = $("healthBar");
const scoreEl = $("score");
const comboText = $("comboText");
const waveText = $("waveText");
const centerMsg = $("centerMsg");
const damageFlash = $("damageFlash");
const joyBase = $("joyBase");
const joyStick = $("joyStick");
const fireBtn = $("fireBtn");

let scene, camera, renderer, clock;
let playerShip, engineGlow;
let starGeo, starSpeeds, stars;
let corridor = [];
let nebulaSprites = [];

const playerBullets = [];
const enemyBullets = [];
const enemies = [];
const asteroids = [];
const particles = [];
const powerups = [];

const keys = {};
const control = { joyX:0, joyY:0, fire:false };

let state = "title";
let elapsed = 0;
let spawnTimer = 0;
let powerTimer = 12;
let score = 0;
let combo = 1;
let highScore = Number(localStorage.getItem("deepStrikeHighScore") || 0);

const player = {
  health:100,
  shield:80,
  maxHealth:100,
  maxShield:100,
  x:0,
  y:-2.2,
  z:8,
  speed:13.5,
  fireCooldown:0,
  rapidTimer:0,
  invuln:0
};

let audio = null;
let glowTexture = null;

glowTexture = makeGlowTexture();
init3D();
initControls();
setAnimation();

function init3D(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x02040a);
  scene.fog = new THREE.FogExp2(0x031126, 0.012);

  camera = new THREE.PerspectiveCamera(68, innerWidth / innerHeight, 0.1, 850);
  camera.position.set(0, 2.4, 23);
  camera.lookAt(0, 0, -70);

  renderer = new THREE.WebGLRenderer({
    antialias:true,
    powerPreference:"high-performance"
  });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.18;
  document.body.prepend(renderer.domElement);

  clock = new THREE.Clock();

  const hemi = new THREE.HemisphereLight(0x87d8ff, 0x080910, 1.2);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xffffff, 2.4);
  sun.position.set(-8, 12, 10);
  scene.add(sun);

  const rim = new THREE.PointLight(0x53c7ff, 9, 80);
  rim.position.set(0, -5, 14);
  scene.add(rim);

  scene.add(createStarfield());
  createNebula();
  createCorridor();

  playerShip = createPlayerShip();
  playerShip.position.set(player.x, player.y, player.z);
  scene.add(playerShip);

  addEventListener("resize", onResize);
  onResize();
}

function makeGlowTexture(){
  const c = document.createElement("canvas");
  c.width = 128;
  c.height = 128;
  const g = c.getContext("2d");
  const grad = g.createRadialGradient(64,64,2,64,64,64);
  grad.addColorStop(0,"rgba(255,255,255,1)");
  grad.addColorStop(.22,"rgba(120,220,255,.9)");
  grad.addColorStop(.55,"rgba(60,140,255,.28)");
  grad.addColorStop(1,"rgba(0,0,0,0)");
  g.fillStyle = grad;
  g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}

function createStarfield(){
  const count = 2400;
  const pos = new Float32Array(count * 3);
  starSpeeds = new Float32Array(count);
  for(let i=0;i<count;i++){
    const r = 20 + Math.random() * 130;
    const a = Math.random() * Math.PI * 2;
    pos[i*3] = Math.cos(a) * r * (0.45 + Math.random());
    pos[i*3+1] = Math.sin(a) * r * (0.25 + Math.random() * .8);
    pos[i*3+2] = -520 + Math.random() * 560;
    starSpeeds[i] = 12 + Math.random() * 80;
  }
  starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color:0xcff6ff,
    size:0.12,
    transparent:true,
    opacity:.86,
    depthWrite:false
  });
  stars = new THREE.Points(starGeo, mat);
  return stars;
}

function createNebula(){
  const colors = [0x245dff, 0x11d7ff, 0xff4d6d, 0x8c5cff];
  for(let i=0;i<12;i++){
    const mat = new THREE.SpriteMaterial({
      map:glowTexture,
      color:colors[i % colors.length],
      transparent:true,
      opacity:.055 + Math.random() * .055,
      blending:THREE.AdditiveBlending,
      depthWrite:false
    });
    const s = new THREE.Sprite(mat);
    s.position.set(
      (Math.random()-.5) * 90,
      (Math.random()-.5) * 42,
      -80 - Math.random() * 360
    );
    const size = 45 + Math.random() * 90;
    s.scale.set(size, size, 1);
    s.userData.speed = 1.5 + Math.random() * 3;
    nebulaSprites.push(s);
    scene.add(s);
  }
}

function createCorridor(){
  const metal = new THREE.MeshStandardMaterial({
    color:0x101927,
    metalness:.68,
    roughness:.36
  });
  const blue = new THREE.MeshStandardMaterial({
    color:0x07192b,
    emissive:0x1cbcff,
    emissiveIntensity:1.9,
    metalness:.25,
    roughness:.28
  });
  const gold = new THREE.MeshStandardMaterial({
    color:0x2a1d08,
    emissive:0xffb64d,
    emissiveIntensity:1.15,
    metalness:.3,
    roughness:.35
  });

  for(let i=0;i<18;i++){
    const g = new THREE.Group();
    const z = -i * 18;

    const railGeo = new THREE.BoxGeometry(.24,.24,13);
    const sideGeo = new THREE.BoxGeometry(.12,4.8,10);
    const floorGeo = new THREE.BoxGeometry(10,.1,12);

    const rails = [
      [-12,-5.3], [12,-5.3], [-12,4.2], [12,4.2]
    ];
    rails.forEach(([x,y],idx)=>{
      const m = new THREE.Mesh(railGeo, idx < 2 ? blue : gold);
      m.position.set(x,y,0);
      g.add(m);
    });

    const leftWall = new THREE.Mesh(sideGeo, metal);
    leftWall.position.set(-14.6,-.7,0);
    leftWall.rotation.z = .05;
    g.add(leftWall);

    const rightWall = new THREE.Mesh(sideGeo, metal);
    rightWall.position.set(14.6,-.7,0);
    rightWall.rotation.z = -.05;
    g.add(rightWall);

    const floor = new THREE.Mesh(floorGeo, metal);
    floor.position.set(0,-7.1,0);
    g.add(floor);

    const lightLine = new THREE.Mesh(new THREE.BoxGeometry(4,.08,10), blue);
    lightLine.position.set(0,-7.0,.2);
    g.add(lightLine);

    g.position.z = z;
    g.userData.baseZ = z;
    corridor.push(g);
    scene.add(g);
  }
}

function createPlayerShip(){
  const group = new THREE.Group();

  const hull = new THREE.MeshStandardMaterial({
    color:0xb9c8d7,
    metalness:.88,
    roughness:.24
  });
  const dark = new THREE.MeshStandardMaterial({
    color:0x172334,
    metalness:.82,
    roughness:.32
  });
  const glass = new THREE.MeshPhysicalMaterial({
    color:0x75eaff,
    emissive:0x123f55,
    emissiveIntensity:.5,
    transmission:.25,
    transparent:true,
    opacity:.72,
    metalness:0,
    roughness:.08,
    clearcoat:1
  });
  const blue = new THREE.MeshStandardMaterial({
    color:0x0b2d48,
    emissive:0x53c7ff,
    emissiveIntensity:2.1,
    metalness:.4,
    roughness:.15
  });

  const body = new THREE.Mesh(new THREE.CylinderGeometry(.48,.68,2.9,32), hull);
  body.rotation.x = Math.PI / 2;
  body.position.z = .05;
  group.add(body);

  const nose = new THREE.Mesh(new THREE.ConeGeometry(.5,1.25,32), hull);
  nose.rotation.x = -Math.PI / 2;
  nose.position.z = -1.75;
  group.add(nose);

  const engine = new THREE.Mesh(new THREE.CylinderGeometry(.62,.7,.58,32), dark);
  engine.rotation.x = Math.PI / 2;
  engine.position.z = 1.62;
  group.add(engine);

  const cockpit = new THREE.Mesh(new THREE.SphereGeometry(.43,32,16), glass);
  cockpit.scale.set(.72,.38,1.18);
  cockpit.position.set(0,.38,-.55);
  group.add(cockpit);

  for(const side of [-1,1]){
    const wing = new THREE.Mesh(new THREE.BoxGeometry(2.15,.13,.82), hull);
    wing.position.set(side * 1.05,-.12,.38);
    wing.rotation.z = side * .13;
    wing.rotation.y = side * -.34;
    group.add(wing);

    const fin = new THREE.Mesh(new THREE.BoxGeometry(.12,.82,.72), dark);
    fin.position.set(side * 1.72,.18,.72);
    fin.rotation.z = side * -.28;
    fin.rotation.y = side * -.18;
    group.add(fin);

    const gun = new THREE.Mesh(new THREE.CylinderGeometry(.06,.08,.82,12), blue);
    gun.rotation.x = Math.PI / 2;
    gun.position.set(side * .88,-.02,-1.15);
    group.add(gun);
  }

  engineGlow = new THREE.Sprite(new THREE.SpriteMaterial({
    map:glowTexture,
    color:0x53c7ff,
    transparent:true,
    opacity:.82,
    blending:THREE.AdditiveBlending,
    depthWrite:false
  }));
  engineGlow.position.set(0,-.03,2.05);
  engineGlow.scale.set(2.3,2.3,1);
  group.add(engineGlow);

  const light = new THREE.PointLight(0x53c7ff, 3.8, 12);
  light.position.set(0,0,1.9);
  group.add(light);

  group.scale.set(1.12,1.12,1.12);
  return group;
}

function createEnemy(type="drone"){
  const group = new THREE.Group();

  const red = new THREE.MeshStandardMaterial({
    color:type==="heavy" ? 0x4b1119 : 0x2b1320,
    emissive:0xff3158,
    emissiveIntensity:type==="scout" ? 1.9 : 1.3,
    metalness:.72,
    roughness:.24
  });
  const armor = new THREE.MeshStandardMaterial({
    color:type==="heavy" ? 0x4b5360 : 0x273244,
    metalness:.9,
    roughness:.3
  });

  const scale = type==="heavy" ? 1.45 : type==="scout" ? .78 : 1;

  const core = new THREE.Mesh(
    type==="heavy" ? new THREE.DodecahedronGeometry(.92,1) : new THREE.OctahedronGeometry(.86,1),
    armor
  );
  core.scale.set(1.05,.75,1.25);
  group.add(core);

  const eye = new THREE.Mesh(new THREE.SphereGeometry(.25,20,10), red);
  eye.position.set(0,.08,.68);
  group.add(eye);

  for(const side of [-1,1]){
    const wing = new THREE.Mesh(new THREE.BoxGeometry(1.4,.1,.46), armor);
    wing.position.set(side * .86,-.05,-.08);
    wing.rotation.z = side * .25;
    group.add(wing);

    const tip = new THREE.Mesh(new THREE.BoxGeometry(.22,.22,.68), red);
    tip.position.set(side * 1.55,-.02,.12);
    tip.rotation.z = side * -.18;
    group.add(tip);
  }

  const glow = new THREE.PointLight(0xff3158, 2.4, 10);
  glow.position.set(0,0,.7);
  group.add(glow);

  group.scale.setScalar(scale);
  group.userData = {
    type,
    hp:type==="heavy" ? 7 : type==="scout" ? 2 : 4,
    maxHp:type==="heavy" ? 7 : type==="scout" ? 2 : 4,
    speed:type==="heavy" ? 8 : type==="scout" ? 17 : 12,
    radius:type==="heavy" ? 1.35 : type==="scout" ? .72 : 1,
    value:type==="heavy" ? 420 : type==="scout" ? 170 : 260,
    fire:1 + Math.random()*1.8,
    amp:.8 + Math.random()*1.4,
    freq:.6 + Math.random()*1.2,
    phase:Math.random() * 20,
    baseX:0,
    baseY:0
  };

  return group;
}

function createAsteroid(){
  const geo = new THREE.IcosahedronGeometry(1,2);
  const pos = geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const v = new THREE.Vector3().fromBufferAttribute(pos,i);
    v.multiplyScalar(.82 + Math.random() * .34);
    pos.setXYZ(i,v.x,v.y,v.z);
  }
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color:0x70665b,
    roughness:.9,
    metalness:.08
  });
  const mesh = new THREE.Mesh(geo, mat);
  const s = .85 + Math.random() * 1.9;
  mesh.scale.setScalar(s);
  mesh.userData = {
    hp:Math.ceil(s * 2),
    radius:s * .95,
    speed:8 + Math.random() * 8,
    rot:new THREE.Vector3(
      (Math.random()-.5)*1.6,
      (Math.random()-.5)*1.6,
      (Math.random()-.5)*1.6
    )
  };
  return mesh;
}

function createPlayerBullet(x,y,z){
  const mat = new THREE.MeshBasicMaterial({
    color:0x9ff4ff,
    transparent:true,
    opacity:.95
  });
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(.045,.045,2.6,10), mat);
  mesh.rotation.x = Math.PI / 2;
  mesh.position.set(x,y,z);
  mesh.userData = { speed:112, life:1.7, damage:1 };
  scene.add(mesh);
  playerBullets.push(mesh);
  laserSound();
}

function createEnemyBullet(from){
  const target = new THREE.Vector3(player.x, player.y, player.z);
  const dir = target.sub(from.position).normalize();
  const mat = new THREE.MeshBasicMaterial({
    color:0xff496c,
    transparent:true,
    opacity:.95
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(.18,16,8), mat);
  mesh.position.copy(from.position);
  mesh.userData = {
    velocity:dir.multiplyScalar(24 + Math.random()*8),
    life:4,
    radius:.22
  };
  scene.add(mesh);
  enemyBullets.push(mesh);
}

function createPowerup(type, pos){
  const color = type==="repair" ? 0x7dff9d : type==="rapid" ? 0xffd166 : 0x53c7ff;
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color,
    emissive:color,
    emissiveIntensity:1.5,
    metalness:.25,
    roughness:.18
  });
  const ring = new THREE.Mesh(new THREE.TorusGeometry(.55,.06,12,36), mat);
  const core = new THREE.Mesh(new THREE.OctahedronGeometry(.28,0), mat);
  group.add(ring,core);
  group.position.copy(pos);
  group.userData = { type, speed:10, radius:.8, life:10 };
  scene.add(group);
  powerups.push(group);
}

function spawnExplosion(pos, color=0x53c7ff, count=26, power=1){
  const geo = new THREE.SphereGeometry(.045,7,7);
  for(let i=0;i<count;i++){
    const mat = new THREE.MeshBasicMaterial({
      color,
      transparent:true,
      opacity:1
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const dir = new THREE.Vector3(
      (Math.random()-.5)*2,
      (Math.random()-.5)*2,
      (Math.random()-.5)*2
    ).normalize();
    p.userData = {
      velocity:dir.multiplyScalar((5 + Math.random()*14) * power),
      life:.45 + Math.random()*.65,
      maxLife:1.1
    };
    scene.add(p);
    particles.push(p);
  }
  explosionSound(power);
}

function startGame(){
  initAudio();

  clearDynamicObjects();

  elapsed = 0;
  spawnTimer = .6;
  powerTimer = 9;
  score = 0;
  combo = 1;

  player.health = 100;
  player.shield = 82;
  player.x = 0;
  player.y = -2.2;
  player.z = 8;
  player.fireCooldown = 0;
  player.rapidTimer = 0;
  player.invuln = 0;

  playerShip.position.set(player.x, player.y, player.z);
  playerShip.visible = true;

  state = "playing";
  overlay.style.display = "none";
  showCenter("MISSION START");
  updateHud();
}

function endGame(){
  state = "gameover";
  playerShip.visible = false;

  highScore = Math.max(highScore, score);
  localStorage.setItem("deepStrikeHighScore", String(highScore));

  overlay.style.display = "flex";
  overlay.querySelector(".logo").innerHTML = "MISSION<br>FAILED";
  overlay.querySelector(".subtitle").innerHTML =
    `SCORE: <b>${score.toLocaleString()}</b><br>HIGH SCORE: <b>${highScore.toLocaleString()}</b>`;
  startBtn.textContent = "RETRY MISSION";
  showCenter("SYSTEM DOWN");
}

function clearDynamicObjects(){
  const arrays = [playerBullets, enemyBullets, enemies, asteroids, particles, powerups];
  arrays.forEach(arr=>{
    while(arr.length){
      const obj = arr.pop();
      scene.remove(obj);
      if(obj.geometry) obj.geometry.dispose();
      if(obj.material){
        if(Array.isArray(obj.material)) obj.material.forEach(m=>m.dispose());
        else obj.material.dispose();
      }
    }
  });
}

function setAnimation(){
  renderer.setAnimationLoop(()=>{
    const dt = Math.min(clock.getDelta(), .033);
    update(dt);
    renderer.render(scene, camera);
  });
}

function update(dt){
  updateEnvironment(dt);

  if(state !== "playing") return;

  elapsed += dt;
  const wave = Math.floor(elapsed / 24) + 1;
  waveText.textContent = `WAVE ${wave}`;

  player.invuln = Math.max(0, player.invuln - dt);
  player.rapidTimer = Math.max(0, player.rapidTimer - dt);
  player.fireCooldown = Math.max(0, player.fireCooldown - dt);

  updatePlayer(dt);
  updateSpawns(dt, wave);
  updateBullets(dt);
  updateEnemies(dt, wave);
  updateAsteroids(dt);
  updatePowerups(dt);
  updateParticles(dt);
  updateCamera(dt);
  updateHud();

  if(player.health <= 0){
    endGame();
  }
}

function updateEnvironment(dt){
  const pos = starGeo.attributes.position.array;
  for(let i=0;i<starSpeeds.length;i++){
    pos[i*3+2] += starSpeeds[i] * dt;
    if(pos[i*3+2] > 28){
      const r = 20 + Math.random() * 130;
      const a = Math.random() * Math.PI * 2;
      pos[i*3] = Math.cos(a) * r * (0.45 + Math.random());
      pos[i*3+1] = Math.sin(a) * r * (0.25 + Math.random() * .8);
      pos[i*3+2] = -520 - Math.random() * 120;
    }
  }
  starGeo.attributes.position.needsUpdate = true;

  corridor.forEach((g)=>{
    g.position.z += 18 * dt;
    g.rotation.z = Math.sin(performance.now()*.0003 + g.userData.baseZ) * .006;
    if(g.position.z > 24){
      g.position.z -= corridor.length * 18;
    }
  });

  nebulaSprites.forEach((s)=>{
    s.position.z += s.userData.speed * dt;
    s.material.opacity = .05 + Math.sin(performance.now()*.0004 + s.position.x) * .015;
    if(s.position.z > 40){
      s.position.z = -430 - Math.random()*80;
      s.position.x = (Math.random()-.5)*90;
      s.position.y = (Math.random()-.5)*42;
    }
  });
}

function updatePlayer(dt){
  let ix = control.joyX;
  let iy = control.joyY;

  if(keys["ArrowLeft"] || keys["KeyA"]) ix -= 1;
  if(keys["ArrowRight"] || keys["KeyD"]) ix += 1;
  if(keys["ArrowUp"] || keys["KeyW"]) iy += 1;
  if(keys["ArrowDown"] || keys["KeyS"]) iy -= 1;

  ix = THREE.MathUtils.clamp(ix, -1, 1);
  iy = THREE.MathUtils.clamp(iy, -1, 1);

  player.x += ix * player.speed * dt;
  player.y += iy * player.speed * dt;

  player.x = THREE.MathUtils.clamp(player.x, -9.6, 9.6);
  player.y = THREE.MathUtils.clamp(player.y, -5.4, 4.2);

  playerShip.position.x += (player.x - playerShip.position.x) * Math.min(1, dt * 18);
  playerShip.position.y += (player.y - playerShip.position.y) * Math.min(1, dt * 18);
  playerShip.position.z = player.z;

  playerShip.rotation.z += ((-ix * .36) - playerShip.rotation.z) * Math.min(1, dt * 10);
  playerShip.rotation.x += ((iy * .16) - playerShip.rotation.x) * Math.min(1, dt * 8);
  playerShip.rotation.y += ((-ix * .13) - playerShip.rotation.y) * Math.min(1, dt * 8);

  const pulse = .86 + Math.sin(performance.now()*.02)*.14;
  engineGlow.scale.set(2.1*pulse,2.1*pulse,1);

  const firing = control.fire || keys["Space"];
  const interval = player.rapidTimer > 0 ? .085 : .16;
  if(firing && player.fireCooldown <= 0){
    createPlayerBullet(playerShip.position.x - .46, playerShip.position.y -.05, player.z - 1.7);
    createPlayerBullet(playerShip.position.x + .46, playerShip.position.y -.05, player.z - 1.7);
    player.fireCooldown = interval;
  }

  if(audio && audio.engineGain){
    const target = state === "playing" ? .045 + Math.abs(ix)*.025 + Math.abs(iy)*.02 : 0;
    audio.engineGain.gain.setTargetAtTime(target, audio.ctx.currentTime, .08);
  }
}

function updateSpawns(dt, wave){
  spawnTimer -= dt;
  powerTimer -= dt;

  if(spawnTimer <= 0){
    const difficulty = 1 + wave * .12;
    const interval = Math.max(.34, 1.18 - wave * .055 - Math.random()*0.18);
    spawnTimer = interval;

    if(Math.random() < .72){
      const r = Math.random();
      const type = r < .16 + wave*.008 ? "heavy" : r < .42 ? "scout" : "drone";
      const e = createEnemy(type);
      e.userData.speed *= difficulty * (.86 + Math.random()*0.26);
      e.userData.baseX = (Math.random()-.5) * 17.5;
      e.userData.baseY = -4.2 + Math.random() * 7.7;
      e.position.set(e.userData.baseX, e.userData.baseY, -130 - Math.random()*55);
      e.rotation.set(Math.random()*.4, Math.random()*Math.PI, Math.random()*.3);
      scene.add(e);
      enemies.push(e);
    }else{
      const a = createAsteroid();
      a.position.set((Math.random()-.5)*20, -5 + Math.random()*10, -125 - Math.random()*70);
      scene.add(a);
      asteroids.push(a);
    }
  }

  if(powerTimer <= 0){
    powerTimer = 15 + Math.random()*10;
    const types = ["shield","repair","rapid"];
    const type = types[Math.floor(Math.random()*types.length)];
    const p = new THREE.Vector3((Math.random()-.5)*14, -4 + Math.random()*7, -118);
    createPowerup(type,p);
  }
}

function updateBullets(dt){
  for(let i=playerBullets.length-1;i>=0;i--){
    const b = playerBullets[i];
    b.position.z -= b.userData.speed * dt;
    b.userData.life -= dt;

    let hit = false;

    for(let j=enemies.length-1;j>=0 && !hit;j--){
      const e = enemies[j];
      if(b.position.distanceTo(e.position) < e.userData.radius + .28){
        e.userData.hp -= b.userData.damage;
        hit = true;
        spawnExplosion(b.position, 0x9ff4ff, 5, .45);
        if(e.userData.hp <= 0){
          killEnemy(j);
        }
      }
    }

    for(let j=asteroids.length-1;j>=0 && !hit;j--){
      const a = asteroids[j];
      if(b.position.distanceTo(a.position) < a.userData.radius + .25){
        a.userData.hp -= 1;
        hit = true;
        spawnExplosion(b.position, 0xffd166, 5, .42);
        if(a.userData.hp <= 0){
          score += 90 * combo;
          combo = Math.min(12, combo + .25);
          spawnExplosion(a.position, 0xffb86b, 25, 1.1);
          removeObj(asteroids,j);
        }
      }
    }

    if(hit || b.userData.life <= 0 || b.position.z < -170){
      removeObj(playerBullets,i);
    }
  }

  for(let i=enemyBullets.length-1;i>=0;i--){
    const b = enemyBullets[i];
    b.position.addScaledVector(b.userData.velocity, dt);
    b.userData.life -= dt;

    if(player.invuln <= 0 && b.position.distanceTo(playerShip.position) < .92){
      damagePlayer(12);
      spawnExplosion(b.position, 0xff496c, 12, .7);
      removeObj(enemyBullets,i);
      continue;
    }

    if(b.userData.life <= 0 || b.position.z > 28){
      removeObj(enemyBullets,i);
    }
  }
}

function updateEnemies(dt, wave){
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    const u = e.userData;

    e.position.z += u.speed * dt;
    e.position.x = u.baseX + Math.sin(elapsed*u.freq + u.phase) * u.amp;
    e.position.y = u.baseY + Math.cos(elapsed*u.freq*.75 + u.phase) * u.amp * .35;

    e.rotation.x += dt * .45;
    e.rotation.y += dt * .75;

    u.fire -= dt;
    if(u.fire <= 0 && e.position.z > -78 && e.position.z < 2){
      createEnemyBullet(e);
      u.fire = Math.max(.55, 2.3 - wave*.08 + Math.random()*1.5);
    }

    if(player.invuln <= 0 && e.position.distanceTo(playerShip.position) < u.radius + .86){
      damagePlayer(u.type==="heavy" ? 28 : 18);
      spawnExplosion(e.position, 0xff3158, 34, 1.1);
      removeObj(enemies,i);
      continue;
    }

    if(e.position.z > 18){
      combo = 1;
      removeObj(enemies,i);
    }
  }
}

function updateAsteroids(dt){
  for(let i=asteroids.length-1;i>=0;i--){
    const a = asteroids[i];
    a.position.z += a.userData.speed * dt;
    a.rotation.x += a.userData.rot.x * dt;
    a.rotation.y += a.userData.rot.y * dt;
    a.rotation.z += a.userData.rot.z * dt;

    if(player.invuln <= 0 && a.position.distanceTo(playerShip.position) < a.userData.radius + .75){
      damagePlayer(22);
      spawnExplosion(a.position, 0xffb86b, 28, 1.1);
      removeObj(asteroids,i);
      continue;
    }

    if(a.position.z > 24){
      removeObj(asteroids,i);
    }
  }
}

function updatePowerups(dt){
  for(let i=powerups.length-1;i>=0;i--){
    const p = powerups[i];
    p.position.z += p.userData.speed * dt;
    p.rotation.x += dt * 1.4;
    p.rotation.y += dt * 2.1;
    p.userData.life -= dt;

    if(p.position.distanceTo(playerShip.position) < p.userData.radius + .9){
      applyPowerup(p.userData.type);
      spawnExplosion(p.position, 0x7dffea, 24, .85);
      removeObj(powerups,i);
      continue;
    }

    if(p.userData.life <= 0 || p.position.z > 22){
      removeObj(powerups,i);
    }
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.position.addScaledVector(p.userData.velocity, dt);
    p.userData.velocity.multiplyScalar(1 - dt * 1.4);
    p.userData.life -= dt;
    p.material.opacity = Math.max(0, p.userData.life / p.userData.maxLife);
    if(p.userData.life <= 0){
      removeObj(particles,i);
    }
  }
}

function updateCamera(dt){
  const targetX = playerShip.position.x * .12;
  const targetY = 2.4 + playerShip.position.y * .08;

  camera.position.x += (targetX - camera.position.x) * dt * 3.2;
  camera.position.y += (targetY - camera.position.y) * dt * 3.2;

  const look = new THREE.Vector3(playerShip.position.x*.18, playerShip.position.y*.08, -72);
  camera.lookAt(look);
}

function killEnemy(index){
  const e = enemies[index];
  const value = Math.round(e.userData.value * combo);
  score += value;
  combo = Math.min(12, combo + .5);

  const pos = e.position.clone();
  spawnExplosion(pos, 0xff496c, e.userData.type==="heavy" ? 46 : 30, e.userData.type==="heavy" ? 1.35 : 1);

  if(Math.random() < .08){
    const type = Math.random() < .5 ? "shield" : "rapid";
    createPowerup(type, pos);
  }

  removeObj(enemies,index);
}

function damagePlayer(amount){
  player.invuln = .45;
  combo = 1;

  let rest = amount;
  if(player.shield > 0){
    const s = Math.min(player.shield, rest);
    player.shield -= s;
    rest -= s;
  }
  player.health -= rest;
  player.health = Math.max(0, player.health);

  damageFlash.style.opacity = "1";
  setTimeout(()=>damageFlash.style.opacity = "0", 80);

  hitSound();
}

function applyPowerup(type){
  if(type === "shield"){
    player.shield = Math.min(player.maxShield, player.shield + 38);
    showCenter("SHIELD BOOST");
  }else if(type === "repair"){
    player.health = Math.min(player.maxHealth, player.health + 28);
    showCenter("HULL REPAIR");
  }else{
    player.rapidTimer = 7;
    showCenter("RAPID FIRE");
  }
  powerSound();
}

function removeObj(arr,index){
  const obj = arr[index];
  scene.remove(obj);
  arr.splice(index,1);
}

function updateHud(){
  shieldBar.style.width = `${THREE.MathUtils.clamp(player.shield / player.maxShield * 100, 0, 100)}%`;
  healthBar.style.width = `${THREE.MathUtils.clamp(player.health / player.maxHealth * 100, 0, 100)}%`;
  scoreEl.textContent = Math.floor(score).toLocaleString();
  comboText.textContent = `COMBO x${Math.max(1, combo).toFixed(combo % 1 ? 1 : 0)}`;
}

let msgTimer = 0;
function showCenter(text){
  clearTimeout(msgTimer);
  centerMsg.textContent = text;
  centerMsg.classList.add("show");
  msgTimer = setTimeout(()=>centerMsg.classList.remove("show"), 1100);
}

function onResize(){
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

function initControls(){
  startBtn.addEventListener("click", startGame);

  addEventListener("keydown",(e)=>{
    keys[e.code] = true;
    if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
  }, {passive:false});

  addEventListener("keyup",(e)=>{
    keys[e.code] = false;
  });

  let joyPointer = null;

  function setStick(dx,dy){
    const max = 42;
    const len = Math.hypot(dx,dy);
    const clamped = Math.min(max, len);
    const ang = Math.atan2(dy,dx);
    const sx = Math.cos(ang) * clamped;
    const sy = Math.sin(ang) * clamped;

    joyStick.style.transform = `translate(${sx}px, ${sy}px)`;
    control.joyX = sx / max;
    control.joyY = -sy / max;
  }

  joyBase.addEventListener("pointerdown",(e)=>{
    joyPointer = e.pointerId;
    joyBase.setPointerCapture(joyPointer);
    const r = joyBase.getBoundingClientRect();
    setStick(e.clientX - (r.left + r.width/2), e.clientY - (r.top + r.height/2));
  });

  joyBase.addEventListener("pointermove",(e)=>{
    if(e.pointerId !== joyPointer) return;
    const r = joyBase.getBoundingClientRect();
    setStick(e.clientX - (r.left + r.width/2), e.clientY - (r.top + r.height/2));
  });

  function resetJoy(e){
    if(joyPointer !== null && e.pointerId !== joyPointer) return;
    joyPointer = null;
    control.joyX = 0;
    control.joyY = 0;
    joyStick.style.transform = "translate(0px, 0px)";
  }
  joyBase.addEventListener("pointerup",resetJoy);
  joyBase.addEventListener("pointercancel",resetJoy);

  fireBtn.addEventListener("pointerdown",(e)=>{
    e.preventDefault();
    control.fire = true;
    fireBtn.setPointerCapture(e.pointerId);
  }, {passive:false});
  fireBtn.addEventListener("pointerup",()=>control.fire=false);
  fireBtn.addEventListener("pointercancel",()=>control.fire=false);

  document.addEventListener("visibilitychange",()=>{
    if(document.hidden) control.fire = false;
  });
}

function initAudio(){
  if(audio) {
    if(audio.ctx.state === "suspended") audio.ctx.resume();
    return;
  }
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const master = ctx.createGain();
  master.gain.value = .45;
  master.connect(ctx.destination);

  const engineOsc = ctx.createOscillator();
  const engineGain = ctx.createGain();
  const engineFilter = ctx.createBiquadFilter();

  engineOsc.type = "sawtooth";
  engineOsc.frequency.value = 54;
  engineFilter.type = "lowpass";
  engineFilter.frequency.value = 120;
  engineGain.gain.value = 0;

  engineOsc.connect(engineFilter);
  engineFilter.connect(engineGain);
  engineGain.connect(master);
  engineOsc.start();

  audio = {ctx,master,engineGain};
}

function laserSound(){
  if(!audio) return;
  const ctx = audio.ctx;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "triangle";
  osc.frequency.setValueAtTime(980, t);
  osc.frequency.exponentialRampToValueAtTime(210, t + .08);

  gain.gain.setValueAtTime(.045, t);
  gain.gain.exponentialRampToValueAtTime(.001, t + .08);

  osc.connect(gain);
  gain.connect(audio.master);
  osc.start(t);
  osc.stop(t + .09);
}

function hitSound(){
  if(!audio) return;
  const ctx = audio.ctx;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "square";
  osc.frequency.setValueAtTime(95, t);
  osc.frequency.exponentialRampToValueAtTime(42, t + .12);

  gain.gain.setValueAtTime(.08, t);
  gain.gain.exponentialRampToValueAtTime(.001, t + .13);

  osc.connect(gain);
  gain.connect(audio.master);
  osc.start(t);
  osc.stop(t + .14);
}

function explosionSound(power=1){
  if(!audio) return;
  const ctx = audio.ctx;
  const len = Math.floor(ctx.sampleRate * .28);
  const buffer = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buffer.getChannelData(0);

  for(let i=0;i<len;i++){
    const n = Math.random() * 2 - 1;
    const d = 1 - i / len;
    data[i] = n * d * d;
  }

  const src = ctx.createBufferSource();
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();
  const t = ctx.currentTime;

  filter.type = "lowpass";
  filter.frequency.setValueAtTime(900, t);
  filter.frequency.exponentialRampToValueAtTime(110, t + .24);

  gain.gain.setValueAtTime(.11 * power, t);
  gain.gain.exponentialRampToValueAtTime(.001, t + .28);

  src.buffer = buffer;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(audio.master);
  src.start(t);
}

function powerSound(){
  if(!audio) return;
  const ctx = audio.ctx;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(420, t);
  osc.frequency.exponentialRampToValueAtTime(1180, t + .18);

  gain.gain.setValueAtTime(.06, t);
  gain.gain.exponentialRampToValueAtTime(.001, t + .22);

  osc.connect(gain);
  gain.connect(audio.master);
  osc.start(t);
  osc.stop(t + .24);
}
