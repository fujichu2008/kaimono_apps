<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMEGA'S REQUIEM - Web Audio Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.3.0/abcjs-audio.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.3.0/abcjs-basic-min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        h1 { color: #ff5555; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .player-container {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        #paper { background: #fdfdfd; padding: 20px; border-radius: 8px; filter: invert(0.9) hue-rotate(180deg); }
    </style>
</head>
<body>

    <h1>OMEGA'S REQUIEM - Final Battle Prototype</h1>
    
    <div class="player-container">
        <div id="audio"></div>
    </div>
    
    <div id="paper"></div>

    <script>
        // ABC記譜法のデータ
        const abcString = `X: 1
T: OMEGA'S REQUIEM - Final Battle Prototype
C: Disciple of N.Uematsu
M: 4/4
L: 1/8
Q: 1/4=160
K: Dm
%%score 1 2
V: 1 clef=treble name="Strings/Choir"
V: 2 clef=bass name="Bass/Organ"

V: 1
%% 1〜8小節: イントロ (忍び寄る絶望と金管楽器の咆哮)
z8 | z8 | z8 | z8 |
D4 F4 | A4 G4 | F4 E4 | D8 |
%% 9〜16小節: Aメロ (ストリングスによる疾走する死闘の旋律)
d2A2 F2D2 | E2F2 G4 | A2F2 D2F2 | E2^C2 A,4 |
d2A2 F2D2 | E2F2 G4 | A2d2 ^c2e2 | d8 |
%% 17〜24小節: Bメロ (クワイアとパイプオルガンによる神聖なる狂気)
[B4d4f4] [B4d4f4] | [c4e4g4] [c4e4g4] | [^c4e4a4] [^c4e4a4] | [d4f4a4] [d4f4a4] |
[B4d4f4] [B4d4f4] | [B4d4g4] [B4d4g4] | [^c8e8a8] | [A8^c8e8] |
%% 25〜32小節: Cメロ (全楽器ユニゾンによるラスボス特有の熱いビルドアップ)
D2D2 F2F2 | A2A2 d2d2 | E2E2 G2G2 | ^C2C2 E2E2 |
d2d2 f2f2 | a2a2 d'2d'2 | e'8 | a'8 |
%% 33〜35小節: クライマックス・ブレイク (強烈なキメと余韻)
[d'8f'8a'8]- | [d'8f'8a'8] | [d'4f'4a'4] z4 |]

V: 2
%% 1〜8小節: イントロ
D,2A,2 D,2A,2 | ^C,2A,2 C,2A,2 | =C,2A,2 C,2A,2 | B,,2G,2 B,,2G,2 |
D,2A,2 D,2A,2 | ^C,2A,2 C,2A,2 | F,4 E,4 | D,8 |
%% 9〜16小節: Aメロ
D,2A,2 D,2A,2 | C,2G,2 C,2G,2 | B,,2F,2 B,,2F,2 | A,,2E,2 A,,2E,2 |
D,2A,2 D,2A,2 | C,2G,2 C,2G,2 | A,,2E,2 A,,2E,2 | D,2A,2 D,4 |
%% 17〜24小節: Bメロ
B,,2F,2 B,,2F,2 | C,2G,2 C,2G,2 | A,,2E,2 A,,2E,2 | D,2A,2 D,2A,2 |
B,,2F,2 B,,2F,2 | G,,2D,2 G,,2D,2 | A,,8- | A,,8 |
%% 25〜32小節: Cメロ
D,,D,,D,,D,, F,,F,,F,,F,, | A,,A,,A,,A,, D,D,D,D, | E,,E,,E,,E,, G,,G,,G,,G,, | ^C,,C,,C,,C,, E,,E,,E,,E,, |
D,D,D,D, F,F,F,F, | A,A,A,A, D D D D | A,,A,,A,,A,, ^C,C,C,C, | E,E,E,E, A,A,A,A, |
%% 33〜35小節: クライマックス・ブレイク
D,,8- | D,,8 | D,,4 z4 |]`;

        // 楽譜のレンダリング
        const visualObj = ABCJS.renderAbc("paper", abcString, { 
            responsive: "resize" 
        })[0];

        // Web Audioのセットアップ
        if (ABCJS.synth.supportsAudio()) {
            const synthControl = new ABCJS.synth.SynthController();
            synthControl.load("#audio", null, {
                displayLoop: true,
                displayRestart: true,
                displayPlay: true,
                displayProgress: true,
                displayWarp: true
            });
            synthControl.setTune(visualObj, false).catch((error) => {
                console.warn("Audio problem:", error);
            });
        } else {
            document.querySelector("#audio").innerHTML = "お使いのブラウザはWeb Audioをサポートしていません。";
        }
    </script>
</body>
</html>
