<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>ごっぱのもじぷかランド</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.3.0/abcjs-basic-min.js"></script>
<style>
  :root{
    --sea1:#7ee8fa;
    --sea2:#37b6ff;
    --sea3:#0275c8;
    --deep:#045a9a;
    --card:#ffffffee;
    --ink:#13506b;
    --soft:#e9fbff;
    --yellow:#ffd95a;
    --orange:#ffad4a;
    --pink:#ff7eb6;
    --green:#68d391;
    --shadow:0 18px 45px rgba(0,70,120,.22);
    --radius:28px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:var(--ink);overflow-x:hidden}
  body{
    background:
      radial-gradient(circle at 20% 12%, rgba(255,255,255,.75), transparent 18%),
      radial-gradient(circle at 80% 5%, rgba(255,255,255,.45), transparent 20%),
      linear-gradient(180deg,var(--sea1) 0%,var(--sea2) 48%,var(--sea3) 100%);
    touch-action:manipulation;
    user-select:none;
  }

  .waveTop{
    position:fixed;left:0;right:0;top:0;height:120px;pointer-events:none;opacity:.45;
    background:
      radial-gradient(80px 38px at 12% 30%, #fff 0 45%, transparent 46%),
      radial-gradient(100px 42px at 38% 18%, #fff 0 42%, transparent 43%),
      radial-gradient(110px 44px at 68% 28%, #fff 0 42%, transparent 43%),
      radial-gradient(90px 38px at 92% 18%, #fff 0 42%, transparent 43%);
    filter:blur(.2px);
  }

  .bubbleBg span{
    position:fixed;bottom:-60px;width:18px;height:18px;border-radius:50%;
    border:2px solid rgba(255,255,255,.65);background:rgba(255,255,255,.18);
    animation:rise 9s linear infinite;pointer-events:none;
  }
  .bubbleBg span:nth-child(1){left:8%;animation-duration:8s}
  .bubbleBg span:nth-child(2){left:22%;width:11px;height:11px;animation-duration:12s;animation-delay:-4s}
  .bubbleBg span:nth-child(3){left:40%;width:24px;height:24px;animation-duration:10s;animation-delay:-2s}
  .bubbleBg span:nth-child(4){left:58%;width:14px;height:14px;animation-duration:13s;animation-delay:-5s}
  .bubbleBg span:nth-child(5){left:76%;width:28px;height:28px;animation-duration:11s;animation-delay:-1s}
  .bubbleBg span:nth-child(6){left:90%;width:12px;height:12px;animation-duration:9s;animation-delay:-3s}
  @keyframes rise{
    from{transform:translateY(0) scale(.9);opacity:0}
    10%{opacity:.9}
    to{transform:translateY(-115vh) scale(1.35);opacity:0}
  }

  .app{
    position:relative;z-index:2;width:min(980px,100%);margin:0 auto;
    padding:calc(12px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
  }

  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;
  }
  .brand{
    display:flex;align-items:center;gap:10px;color:white;text-shadow:0 3px 10px rgba(0,70,120,.35);
    font-weight:900;letter-spacing:.02em;
  }
  .brand .logo{font-size:34px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
  .brand .title{line-height:1.05;font-size:clamp(20px,4.7vw,34px)}
  .brand .sub{font-size:12px;opacity:.92;font-weight:800;margin-top:2px}

  .card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px;backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.65);
  }

  .hero{
    display:grid;grid-template-columns:118px 1fr;gap:12px;align-items:center;margin-bottom:14px;
  }
  .goppaWrap{
    min-height:108px;display:grid;place-items:center;position:relative;
  }
  .goppa{
    width:98px;height:62px;border-radius:56% 48% 48% 56%;
    background:linear-gradient(135deg,#ffd96a,#ff9d3d);
    position:relative;box-shadow:inset -8px -8px 0 rgba(209,104,0,.16),0 12px 20px rgba(0,84,135,.18);
    animation:swim 2.4s ease-in-out infinite;
  }
  .goppa:before{
    content:"";position:absolute;right:-28px;top:15px;width:40px;height:32px;
    background:linear-gradient(135deg,#ffb84c,#ff7c42);
    clip-path:polygon(0 50%,100% 0,82% 50%,100% 100%);
  }
  .goppa:after{
    content:"";position:absolute;left:22px;top:16px;width:11px;height:11px;border-radius:50%;
    background:#14334a;box-shadow:3px 2px 0 3px white;
  }
  .fin{
    position:absolute;left:40px;bottom:-13px;width:30px;height:20px;background:#ff8cc8;
    clip-path:polygon(50% 100%,0 0,100% 0);opacity:.9;
  }
  .mouth{
    position:absolute;left:9px;top:35px;width:16px;height:8px;border-bottom:3px solid #8b4a19;border-radius:0 0 20px 20px;
  }
  @keyframes swim{
    0%,100%{transform:translateY(0) rotate(-2deg)}
    50%{transform:translateY(-8px) rotate(3deg)}
  }
  .speech{
    background:#fff;border-radius:22px;padding:13px 14px;font-weight:900;line-height:1.45;
    box-shadow:0 8px 18px rgba(0,90,130,.12);position:relative;font-size:clamp(15px,4vw,20px);
  }
  .speech:before{
    content:"";position:absolute;left:-10px;top:34px;border-top:10px solid transparent;border-bottom:10px solid transparent;border-right:16px solid #fff;
  }

  .sectionTitle{
    color:white;font-weight:900;font-size:18px;text-shadow:0 3px 10px rgba(0,70,120,.34);margin:18px 8px 10px;
  }

  .btnGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .bigBtn,.smallBtn,.pillBtn{
    border:0;border-radius:22px;font-weight:900;color:var(--ink);cursor:pointer;
    box-shadow:0 8px 0 rgba(0,88,130,.15),0 12px 22px rgba(0,84,135,.12);
    transition:transform .08s ease,filter .15s ease;touch-action:manipulation;
  }
  .bigBtn:active,.smallBtn:active,.pillBtn:active,.charCard:active{transform:translateY(3px);box-shadow:0 4px 0 rgba(0,88,130,.15)}
  .bigBtn{
    min-height:84px;padding:13px 12px;font-size:clamp(18px,5vw,24px);
    background:linear-gradient(180deg,#fff,#e9fbff);
    display:flex;align-items:center;justify-content:center;gap:8px;flex-direction:column;
  }
  .bigBtn span{font-size:28px}
  .primary{background:linear-gradient(180deg,#fff4a8,#ffd95a)}
  .pink{background:linear-gradient(180deg,#ffe4f1,#ff9ac8)}
  .green{background:linear-gradient(180deg,#dcffe9,#76e09b)}
  .orange{background:linear-gradient(180deg,#ffe9c9,#ffb458)}
  .blue{background:linear-gradient(180deg,#e4fbff,#9bedff)}

  .smallBtn{
    padding:13px 15px;background:#fff;font-size:16px;border:2px solid rgba(14,112,160,.12);
  }
  .pillBtn{
    padding:10px 13px;border-radius:999px;background:#fff;font-size:15px;box-shadow:0 5px 0 rgba(0,88,130,.12);
  }
  .danger{background:linear-gradient(180deg,#ffe0e0,#ff9d9d)}
  .muted{opacity:.58;filter:saturate(.65)}
  .wide{grid-column:1/-1}

  .todayRow{
    display:flex;gap:10px;overflow:auto;padding:6px 2px 2px;scrollbar-width:none;
  }
  .todayRow::-webkit-scrollbar{display:none}
  .todayBubble{
    min-width:72px;height:72px;border-radius:26px;background:#fff;display:grid;place-items:center;
    font-size:42px;font-weight:900;color:#0874a4;box-shadow:0 8px 18px rgba(0,90,130,.13);
    animation:floaty 2.7s ease-in-out infinite;
  }
  .todayBubble:nth-child(2n){animation-delay:-.8s}
  .todayBubble:nth-child(3n){animation-delay:-1.4s}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  .charGrid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:11px;
  }
  .charCard{
    border:0;min-height:82px;border-radius:48% 42% 46% 52%;background:linear-gradient(135deg,#fff,#e8fbff 62%,#bff4ff);
    font-size:42px;font-weight:900;color:#0874a4;box-shadow:0 8px 0 rgba(0,88,130,.12),0 12px 22px rgba(0,84,135,.12);
    cursor:pointer;animation:fishFloat 3.2s ease-in-out infinite;position:relative;overflow:visible;
  }
  .charCard:after{
    content:"";position:absolute;right:-13px;top:29px;width:24px;height:23px;background:linear-gradient(135deg,#ffd95a,#ff9ac8);
    clip-path:polygon(0 50%,100% 0,78% 50%,100% 100%);filter:drop-shadow(0 4px 5px rgba(0,80,120,.12));
  }
  .charCard:before{
    content:"○";position:absolute;left:8px;top:6px;font-size:14px;color:rgba(80,190,225,.55);font-weight:900;
  }
  .charCard:nth-child(2n){animation-delay:-.6s}
  .charCard:nth-child(3n){animation-delay:-1.1s}
  @keyframes fishFloat{
    0%,100%{transform:translateY(0) rotate(-2deg)}
    50%{transform:translateY(-8px) rotate(3deg)}
  }

  .detailChar{
    font-size:clamp(96px,28vw,210px);line-height:1;text-align:center;font-weight:900;
    color:#0874a4;text-shadow:0 8px 0 rgba(0,120,170,.12);
  }
  .wordChips{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:10px 0 16px}
  .chip{
    background:#e9fbff;border:2px solid #b9efff;border-radius:999px;padding:9px 12px;font-weight:900;
  }
  .status{
    text-align:center;font-size:14px;font-weight:800;color:#31708e;margin:8px 0;
  }
  .recordCheckPanel{
    background:linear-gradient(180deg,#fff,#e9fbff);
    border:3px solid #b9efff;
    border-radius:28px;
    padding:16px;
    text-align:center;
    font-weight:900;
    color:#0874a4;
    box-shadow:0 10px 22px rgba(0,90,130,.13);
    margin:10px 0 14px;
  }
  .recordCheckIcon{
    font-size:58px;
    line-height:1;
    margin-bottom:8px;
    animation:floaty 2.4s ease-in-out infinite;
  }
  .recordCheckText{
    font-size:clamp(18px,5vw,25px);
    line-height:1.35;
  }
  .recordCheckSub{
    font-size:13px;
    color:#2a7898;
    margin-top:8px;
    line-height:1.5;
  }

  .traceBox{
    position:relative;background:#f6fdff;border-radius:28px;border:3px dashed #8edff4;
    height:min(58vh,520px);min-height:360px;overflow:hidden;box-shadow:inset 0 0 0 8px rgba(255,255,255,.7);
    touch-action:none;
  }
  .traceStepBar{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 12px;
  }
  .traceStep{
    background:rgba(255,255,255,.7);border:2px solid rgba(255,255,255,.9);border-radius:999px;
    padding:8px 6px;text-align:center;font-size:13px;font-weight:900;color:#2a7898;
  }
  .traceStep.active{background:linear-gradient(180deg,#fff4a8,#ffd95a);color:#8a6400;box-shadow:0 6px 14px rgba(0,80,120,.12)}
  .traceStep.done{background:linear-gradient(180deg,#dcffe9,#76e09b);color:#116b38}
  .traceGuide{
    position:absolute;inset:0;display:grid;place-items:center;font-size:min(62vw,370px);
    font-weight:900;color:rgba(2,117,200,.12);line-height:1;pointer-events:none;
  }
  .copySample{
    position:absolute;right:14px;top:14px;z-index:1;display:none;place-items:center;
    min-width:86px;min-height:86px;padding:8px 10px;border-radius:22px;background:#fff;
    box-shadow:0 8px 18px rgba(0,90,130,.14);pointer-events:none;border:3px solid #b9efff;
  }
  .copySample span{display:block;font-size:12px;font-weight:900;color:#2a7898;text-align:center}
  .copySample b{display:block;font-size:46px;line-height:1;color:#0874a4;text-align:center}
  .traceBox.freeWrite .traceGuide{display:none}
  .traceBox.freeWrite .copySample{display:grid}
  .traceBox.freeWrite{background:#fff;border-style:solid}
  .strokeHint{
    position:absolute;left:14px;top:12px;background:#fff9c8;border-radius:999px;padding:8px 12px;
    font-weight:900;color:#8a6400;box-shadow:0 6px 14px rgba(0,0,0,.08);pointer-events:none;z-index:2;
  }
  #traceCanvas{
    position:absolute;inset:0;width:100%;height:100%;touch-action:none;
  }

  .findQuestion{
    font-size:clamp(23px,6vw,38px);font-weight:900;text-align:center;margin:4px 0 12px;
    color:#fff;text-shadow:0 3px 10px rgba(0,70,120,.38);
  }
  .findArena{
    position:relative;min-height:390px;border-radius:30px;overflow:hidden;border:3px solid rgba(255,255,255,.7);
    background:
      radial-gradient(circle at 20% 16%, rgba(255,255,255,.62), transparent 14%),
      radial-gradient(circle at 80% 10%, rgba(255,255,255,.42), transparent 18%),
      linear-gradient(180deg,#8bf1ff 0%,#36bff3 45%,#0580c9 100%);
    box-shadow:inset 0 0 0 8px rgba(255,255,255,.18),0 12px 26px rgba(0,80,120,.16);
  }
  .findArena:before{
    content:"";position:absolute;left:0;right:0;bottom:0;height:72px;opacity:.9;
    background:
      radial-gradient(50px 22px at 12% 70%,#ffe7a8 0 58%,transparent 60%),
      radial-gradient(70px 25px at 38% 78%,#ffe1a0 0 58%,transparent 60%),
      radial-gradient(60px 24px at 72% 72%,#ffdda0 0 58%,transparent 60%),
      linear-gradient(180deg,transparent,#efc578);
  }
  .findArena:after{
    content:"○  ○    ○      ○   ○";position:absolute;left:12px;right:12px;top:18px;
    color:rgba(255,255,255,.62);font-size:30px;letter-spacing:18px;white-space:nowrap;
    animation:arenaBubbles 5s linear infinite;pointer-events:none;
  }
  @keyframes arenaBubbles{
    0%{transform:translateY(26px);opacity:.15}
    20%{opacity:.85}
    100%{transform:translateY(-52px);opacity:0}
  }
  .findTargetBadge{
    position:relative;z-index:2;margin:10px auto 0;width:max-content;max-width:92%;
    background:#fff;border:3px solid #b9efff;border-radius:999px;padding:9px 15px;
    font-weight:900;color:#0874a4;box-shadow:0 8px 18px rgba(0,90,130,.16);
  }
  .findHintBanner{
    position:relative;z-index:4;margin:8px auto 0;width:max-content;max-width:92%;
    background:linear-gradient(180deg,#fff9c8,#ffd95a);color:#8a6400;border-radius:999px;
    padding:8px 13px;font-size:13px;font-weight:900;box-shadow:0 8px 18px rgba(0,90,130,.16);
    animation:hintPop .9s ease-in-out infinite;
  }
  .findBtn.hintTarget{
    outline:5px solid rgba(255,217,90,.95);
    box-shadow:0 0 0 8px rgba(255,255,255,.45),0 14px 26px rgba(255,170,0,.28),0 8px 0 rgba(0,88,130,.13);
    animation:fishHintPulse .9s ease-in-out infinite !important;
    z-index:9;
  }
  .findBtn.hintTarget .fishBubbles{
    font-size:18px;color:rgba(255,255,255,.95);animation:miniBubble .75s ease-in-out infinite;
  }
  @keyframes hintPop{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes fishHintPulse{
    0%,100%{transform:translate(-8px,0) rotate(-2deg) scale(1)}
    50%{transform:translate(10px,-12px) rotate(4deg) scale(1.16)}
  }
  .findVoiceRow{
    position:relative;z-index:3;display:flex;justify-content:center;gap:8px;margin:8px auto 0;
  }
  .findVoiceBtn{
    border:0;border-radius:999px;background:rgba(255,255,255,.88);color:#0874a4;
    padding:7px 11px;font-size:12px;font-weight:900;box-shadow:0 6px 14px rgba(0,90,130,.15);
    cursor:pointer;touch-action:manipulation;
  }
  .findVoiceBtn:active{
    transform:translateY(2px);
  }
  .findGrid{
    position:absolute;inset:72px 12px 24px;display:block;
  }
  .findSeaweed{
    position:absolute;bottom:16px;width:22px;height:82px;border-radius:18px 18px 0 0;opacity:.75;
    background:linear-gradient(180deg,#77e2a0,#16975a);transform-origin:bottom center;animation:seaweedWave 2.4s ease-in-out infinite;
  }
  .findSeaweed.s1{left:7%;height:86px}
  .findSeaweed.s2{left:17%;height:58px;animation-delay:-.6s}
  .findSeaweed.s3{right:9%;height:92px;animation-delay:-1.1s}
  .findSeaweed.s4{right:21%;height:64px;animation-delay:-.3s}
  @keyframes seaweedWave{0%,100%{transform:skewX(-5deg)}50%{transform:skewX(8deg)}}
  .findBtn{
    position:absolute;left:var(--x,20%);top:var(--y,20%);width:92px;height:64px;border:0;border-radius:54% 44% 46% 54%;
    background:linear-gradient(135deg,#fff 0%,#fff7bf 38%,#8eefff 100%);
    font-size:0;font-weight:900;color:#0874a4;box-shadow:0 8px 0 rgba(0,88,130,.13),0 15px 24px rgba(0,84,135,.18);
    cursor:pointer;animation:fishDrift var(--dur,5.2s) ease-in-out infinite;animation-delay:var(--delay,0s);
    transform-origin:center;touch-action:manipulation;
  }
  .findBtn:nth-child(2n){background:linear-gradient(135deg,#fff 0%,#ffe4f1 42%,#9bedff 100%)}
  .findBtn:nth-child(3n){background:linear-gradient(135deg,#fff 0%,#dcffe9 42%,#ffd95a 100%)}
  .findBtn .fishTail{
    position:absolute;right:-24px;top:17px;width:34px;height:31px;background:linear-gradient(135deg,#ffb458,#ff7eb6);
    clip-path:polygon(0 50%,100% 0,80% 50%,100% 100%);filter:drop-shadow(0 4px 5px rgba(0,80,120,.12));
    animation:tailWag .55s ease-in-out infinite;
  }
  .findBtn .fishEye{
    position:absolute;left:17px;top:15px;width:10px;height:10px;border-radius:50%;background:#12344c;
    box-shadow:3px 2px 0 3px #fff;
  }
  .findBtn .fishLetter{
    position:absolute;left:0;right:0;top:12px;text-align:center;font-size:38px;line-height:1;font-weight:900;color:#0874a4;
    text-shadow:0 3px 0 rgba(255,255,255,.7);
  }
  .findBtn .fishBubbles{
    position:absolute;left:-26px;top:4px;font-size:13px;color:rgba(255,255,255,.74);letter-spacing:2px;animation:miniBubble 1.5s ease-in-out infinite;
  }
  @keyframes tailWag{0%,100%{transform:scaleX(1) rotate(-3deg)}50%{transform:scaleX(.82) rotate(8deg)}}
  @keyframes miniBubble{0%{transform:translateY(8px);opacity:.2}50%{opacity:.85}100%{transform:translateY(-16px);opacity:0}}
  @keyframes fishDrift{
    0%,100%{transform:translate(-8px,0) rotate(-2deg)}
    25%{transform:translate(24px,-16px) rotate(3deg)}
    50%{transform:translate(42px,8px) rotate(-1deg)}
    75%{transform:translate(12px,20px) rotate(4deg)}
  }
  .findBtn.caught{
    animation:fishCaught .72s ease-out forwards !important;z-index:8;
  }
  @keyframes fishCaught{
    0%{transform:scale(1) rotate(0deg);opacity:1}
    45%{transform:scale(1.25) rotate(8deg);opacity:1}
    100%{transform:translateY(-90px) scale(.25) rotate(28deg);opacity:0}
  }
  .findBtn.missed{
    animation:fishMiss .48s ease-in-out !important;
  }
  @keyframes fishMiss{
    0%,100%{transform:translateX(0) rotate(0deg)}
    25%{transform:translateX(-16px) rotate(-8deg)}
    50%{transform:translateX(18px) rotate(8deg)}
    75%{transform:translateX(-10px) rotate(-5deg)}
  }

  .parentGrid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px;margin-top:12px;
  }
  .parentChar{
    border:0;border-radius:18px;padding:10px 4px;background:#e9eef3;color:#567;
    font-size:26px;font-weight:900;box-shadow:0 5px 0 rgba(0,0,0,.08);
  }
  .parentChar.on{background:linear-gradient(180deg,#fff4a8,#ffd95a);color:#0874a4}
  .parentChar.today{outline:4px solid #ff7eb6}
  .rowTools{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 2px}
  .parentPanel{
    background:#fff;border-radius:24px;padding:14px;margin:12px 0;box-shadow:0 8px 18px rgba(0,80,120,.1);
  }
  .input{
    width:100%;font-size:22px;border:3px solid #b9efff;border-radius:20px;padding:14px;text-align:center;font-weight:900;color:var(--ink);
    outline:none;background:#f7fdff;
  }

  .footerNav{
    display:flex;gap:10px;margin-top:14px;justify-content:center;flex-wrap:wrap;
  }

  .toast{
    position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:#fff;color:#0874a4;border-radius:999px;padding:12px 18px;font-weight:900;box-shadow:0 16px 35px rgba(0,70,120,.24);
    opacity:0;pointer-events:none;z-index:30;transition:.25s ease;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .burst{
    position:fixed;left:0;top:0;right:0;bottom:0;pointer-events:none;z-index:25;overflow:hidden;
  }
  .burst span{
    position:absolute;border-radius:50%;background:rgba(255,255,255,.85);border:2px solid rgba(255,255,255,.9);
    animation:pop 950ms ease-out forwards;
  }
  @keyframes pop{
    0%{transform:translate(0,0) scale(.3);opacity:0}
    20%{opacity:1}
    100%{transform:translate(var(--x),var(--y)) scale(1.35);opacity:0}
  }

  .miniStats{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;
  }
  .stat{
    background:#e9fbff;border-radius:18px;padding:10px;text-align:center;font-weight:900;
  }

  function speak(text, onDone=null){
    const task = () => new Promise(resolve => {
      const finish = () => {
        currentUtterance = null;
        if(typeof onDone === "function") setTimeout(onDone, 60);
        setTimeout(resolve, 80);
      };

      if(!("speechSynthesis" in window)){
        toast("よみあげが つかえないみたい");
        finish();
        return;
      }

      try{
        const u = new SpeechSynthesisUtterance(text);
        let finished = false;
        const safeFinish = () => {
          if(finished) return;
          finished = true;
          finish();
        };

        u.lang = "ja-JP";
        u.rate = 0.86;
        u.pitch = 1.16;
        u.onend = safeFinish;
        u.onerror = safeFinish;

        const v = getJapaneseVoice();
        if(v) u.voice = v;

        currentUtterance = u;
        speechSynthesis.speak(u);

        const maxWait = Math.max(1800, String(text).length * 170);
        setTimeout(() => {
          if(currentUtterance === u && !speechSynthesis.speaking && !speechSynthesis.pending){
            safeFinish();
          }
        }, maxWait);
      }catch(e){
        toast("よみあげで こまったよ");
        finish();
      }
    });

    speechQueue = speechQueue.then(task, task);
    return speechQueue;
  }

          await new Promise(resolve => {

              resolve();
            };
            audio.onerror = () => {
              URL.revokeObjectURL(url);
              speak(`${ch}。`).then(resolve);
            };
            audio.play().catch(() => {

        toast("じぶんのこえがないので、コンピュータのこえでいうよ");

  function openDB(){
    return new Promise((resolve,reject)=>{
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE_RECORDINGS)){
          db.createObjectStore(STORE_RECORDINGS, {keyPath:"char"});
        }
        if(!db.objectStoreNames.contains(STORE_WRITINGS)){
          const writingStore = db.createObjectStore(STORE_WRITINGS, {keyPath:"id"});
          writingStore.createIndex("by_char", "char", {unique:false});
          writingStore.createIndex("by_date", "date", {unique:false});
          writingStore.createIndex("by_char_date", ["char", "date"], {unique:false});
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function canvasToBlobSafe(canvas, type="image/png"){
    return new Promise((resolve) => {
      if(!canvas || !canvas.toBlob){
        resolve(null);
        return;
      }
      canvas.toBlob(blob => resolve(blob || null), type);
    });
  }

  async function makeWritingBlobFromTrace(){
    if(!traceSession || !traceSession.canvas) return null;
    const src = traceSession.canvas;
    const maxW = 640;
    const ratio = Math.min(1, maxW / Math.max(1, src.width));
    const w = Math.max(1, Math.round(src.width * ratio));
    const h = Math.max(1, Math.round(src.height * ratio));

    const out = document.createElement("canvas");
    out.width = w;
    out.height = h;
    const octx = out.getContext("2d");
    octx.fillStyle = "#ffffff";
    octx.fillRect(0,0,w,h);
    octx.drawImage(src,0,0,w,h);

    const blob = await canvasToBlobSafe(out, "image/png");
    if(!blob) return null;
    return {blob, width:w, height:h};
  }

  async function saveWritingFromTrace(ch){
    const made = await makeWritingBlobFromTrace();
    if(!made) throw new Error("writing image could not be created");

    const createdAt = new Date().toISOString();
    const record = {
      id:`${ch}_${createdAt.replace(/[:.]/g,"-")}_${Math.random().toString(36).slice(2,8)}`,
      char:ch,
      date:todayISO(),
      createdAt,
      blob:made.blob,
      width:made.width,
      height:made.height,
      points:traceSession ? traceSession.points : 0
    };

    const db = await openDB();
    await new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_WRITINGS,"readwrite");
      tx.objectStore(STORE_WRITINGS).put(record);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });

    await pruneWritingsForChar(ch, 10);
    return record;
  }

  async function getAllWritings(){

    return new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_WRITINGS,"readonly");
      const req = tx.objectStore(STORE_WRITINGS).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  }

  function pickMimeType(){
    if(!window.MediaRecorder || !MediaRecorder.isTypeSupported) return "";
    const candidates = [
      "audio/mp4",
      "audio/webm;codecs=opus",
      "audio/webm",
      "audio/ogg;codecs=opus",
      "audio/ogg"
    ];
    return candidates.find(t => MediaRecorder.isTypeSupported(t)) || "";
  }

  async function startRecording(ch){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder){
      toast("このたんまつでは ろくおんが つかえないよ");
      return;
    }
    try{
      if(mediaRecorder && mediaRecorder.state === "recording") stopRecording();

      pauseBGMForRecording();
      stopSpeechNow();

      mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mime = pickMimeType();
      mediaRecorder = mime ? new MediaRecorder(mediaStream,{mimeType:mime}) : new MediaRecorder(mediaStream);
      mediaChunks = [];
      recordingChar = ch;

      mediaRecorder.ondataavailable = e => {
        if(e.data && e.data.size > 0) mediaChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        const type = mediaRecorder.mimeType || mime || "audio/webm";
        const blob = new Blob(mediaChunks, {type});
        if(mediaStream){
          mediaStream.getTracks().forEach(t => t.stop());
          mediaStream = null;
        }
        mediaRecorder = null;

        if(blob.size > 0){
          openRecordingCheck(ch, blob, type);
        }else{
          toast("こえが とれなかったよ");
          openDetail(ch);
          await resumeBGMAfterRecording();
        }
        recordingChar = null;
      };

      mediaRecorder.start();
      const btn = document.getElementById("recordBtn");
      if(btn){
        btn.innerHTML = "<span>⏹️</span>とめる";
        btn.classList.add("danger");
      }
      toast("ろくおんちゅう...");
    }catch(e){
      toast("おうちの人にマイクをゆるしてもらってね");
      if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
      mediaRecorder = null;
      recordingChar = null;
      await resumeBGMAfterRecording();
    }
  }

  function setupTraceCanvas(){
    const canvas = document.getElementById("traceCanvas");
    if(!canvas) return;
    const ctx = canvas.getContext("2d");
    traceSession = {canvas,ctx,points:0,drawing:false,stage:1,char:selectedChar};

    function resize(){
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.lineWidth = 18;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#0874a4";
      ctx.shadowColor = "rgba(0,120,170,.22)";
      ctx.shadowBlur = 8;
    }
    resize();

    function pos(e){
      const r = canvas.getBoundingClientRect();
      return {x:e.clientX-r.left,y:e.clientY-r.top};
    }

    canvas.onpointerdown = e => {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      traceSession.drawing = true;
      const p = pos(e);
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      traceSession.points++;
    };

    canvas.onpointermove = e => {
      if(!traceSession.drawing) return;
      e.preventDefault();
      const p = pos(e);
      ctx.lineTo(p.x,p.y);
      ctx.stroke();
      traceSession.points++;
    };

    canvas.onpointerup = e => {
      traceSession.drawing = false;
      try{ canvas.releasePointerCapture(e.pointerId); }catch(_){}
    };
    canvas.onpointercancel = () => traceSession.drawing = false;

    setTraceStage(1);
  }

    const optionCount = Math.min(Math.max(pool.length,3),6);
    const options = shuffle([findTarget, ...others].slice(0, optionCount));

    let title = "";
    let message = "";

    if(score === findTotalRounds){
      title = "ぜんぶ すぐつれた！";
      message = `すごい。${findTotalRounds}かいちゅう、${score}かい、ヒントなしでせいかい。ゴッパもびっくり。もじさかな名人だね。`;
    }else if(score >= 3){
      title = "たくさん つれたね！";
      message = `${findTotalRounds}かいちゅう、${score}かい、ヒントなしでせいかい。まちがえても、さいごまでつれたのがすごいよ。つぎはもっとすぐつれるかも。`;
    }else{
      title = "さいごまで がんばったね！";
      message = `${findTotalRounds}かいちゅう、${score}かい、ヒントなしでせいかい。だいじょうぶ。まちがえても、せいかいまでやりきれたよ。ゴッパともういちどやってみよう。`;
    }

    shell(
      title,
      `
      <div class="recordCheckPanel">
        <div class="recordCheckIcon">🎣</div>
        <div class="recordCheckText">${score} / ${findTotalRounds} ヒントなしで せいかい！</div>
        <div class="recordCheckSub">${escapeHTML(message)}</div>
      </div>
      <div class="btnGrid">
        <button class="bigBtn primary wide" onclick="openFind()"><span>🔁</span>もういちど つる</button>
        <button class="bigBtn blue wide" onclick="goHome()"><span>🏠</span>ホームへ</button>
      </div>
      `,
      `<div class="footerNav"><button class="pillBtn" onclick="goHome()">🏠 ホーム</button></div>`
    );

    bubbleBurst(score >= 3 ? "よくできたね！" : "さいごまで がんばったね！");
    speak(message);
  }

  window.answerFind = function(ch, el=null){
    if(findAnswerLocked) return;
    findAnswerLocked = true;

    const correct = ch === findTarget;

    if(correct){
      if(el) el.classList.add("caught");
      if(findMissCountThisRound === 0) findCorrectCountInGame++;
      bump(ch,"findCorrectCount");
      addReward("さかながつれた！");
      speak(`つれた。${ch}のさかなだね。`).then(goNextFindRoundAfterCorrect);
    }else{
      findMissCountThisRound++;
      if(el){
        el.classList.add("missed");
        setTimeout(() => el.classList.remove("missed"), 520);
      }
      toast("あれれ？ヒントをだすよ！");
      speak(`あれれ。このさかなじゃないよ。もういちど、${findTarget}のさかなをつってみよう。きらきらのヒントをみてね。`).then(retrySameFindRoundWithHint);
    }
  };

  window.openParent = function(){
    if(!parentAuthed){
      shell(
        "ここは、おうちの人のばしょだよ。さかなをふやしたり、きろくをけしたりできるよ。",
        `
        <div class="parentPanel">
          <div style="font-weight:900;text-align:center;margin-bottom:10px;">おとなの人は、3 + 2 のこたえをいれてね</div>
          <input id="parentAnswer" class="input" inputmode="numeric" placeholder="こたえ" />
          <div class="footerNav">
            <button class="bigBtn primary wide" onclick="checkParent()">🔓 はいる</button>
          </div>
        </div>
        `,
        `<div class="footerNav"><button class="pillBtn" onclick="goHome()">🏠 ホーム</button></div>`
      );
      setTimeout(()=>document.getElementById("parentAnswer")?.focus(),50);
      return;
    }
    renderParent();
  };

  window.checkParent = function(){
    const v = document.getElementById("parentAnswer")?.value.trim();

      parentAuthed = true;
      toast("おやモードを ひらいたよ");
      renderParent();
    }else{
      toast("もういちど たしかめてね");

          </div>

        <div class="parentGrid">
          ${row.chars.map(c => {
            const on = state.unlockedChars.includes(c);
            const today = state.todayChars.includes(c);
            return `<button class="parentChar ${on ? "on" : ""} ${today ? "today" : ""}" onclick="toggleUnlock('${c}')">${c}</button>`;
          }).join("")}
        </div>
      </div>

    const todayChecks = ALL_CHARS.map(c => {
      const locked = !state.unlockedChars.includes(c);

      return `

        </div>

        <button class="pillBtn" onclick="goHome()">🏠 ホーム</button>

  }

  function findRow(name){
    return ROWS.find(r => r.name === name);
  }

  window.unlockRow = function(name){
    const row = findRow(name);
    if(!row) return;
    row.chars.forEach(c => {
      if(!state.unlockedChars.includes(c)) state.unlockedChars.push(c);
    });
    state.todayChars = [...new Set([...state.todayChars, ...row.chars.slice(0, Math.min(3,row.chars.length))])].filter(c => state.unlockedChars.includes(c));
    saveState();
    renderParent();
  };

  window.lockRow = function(name){
    const row = findRow(name);
    if(!row) return;
    state.unlockedChars = state.unlockedChars.filter(c => !row.chars.includes(c));
    state.todayChars = state.todayChars.filter(c => state.unlockedChars.includes(c));
    if(state.unlockedChars.length === 0){
      state.unlockedChars = ["あ"];
      state.todayChars = ["あ"];
    }
    saveState();
    renderParent();
  };

  window.toggleUnlock = function(ch){
    if(state.unlockedChars.includes(ch)){
      state.unlockedChars = state.unlockedChars.filter(c => c !== ch);
      state.todayChars = state.todayChars.filter(c => c !== ch);
      if(state.unlockedChars.length === 0){
        state.unlockedChars = ["あ"];
        state.todayChars = ["あ"];
        toast("ひとつは あけておくよ");
      }
    }else{
      state.unlockedChars.push(ch);
      if(state.todayChars.length < 5) state.todayChars.push(ch);
    }
    state.unlockedChars = ALL_CHARS.filter(c => state.unlockedChars.includes(c));
    state.todayChars = ALL_CHARS.filter(c => state.todayChars.includes(c) && state.unlockedChars.includes(c));
    saveState();
    renderParent();
  };

  window.toggleToday = function(ch){
    if(!state.unlockedChars.includes(ch)) return;
    if(state.todayChars.includes(ch)){
      state.todayChars = state.todayChars.filter(c => c !== ch);
    }else{
      state.todayChars.push(ch);
    }
    state.todayChars = ALL_CHARS.filter(c => state.todayChars.includes(c) && state.unlockedChars.includes(c));
    saveState();
    renderParent();
  };

  window.resetProgress = function(){
    const ok = confirm("進捗をリセットします。録音は消えません。よろしいですか？");

    state.progress = {};
    saveState();
    toast("進捗をリセットしました");

  let bgmSynth = null;
  let isPlayingBGM = false;
  let bgmAudioCtx = null;
  let loopTimer = null;
  let isInitializingBGM = false;
  let bgmFallbackTimer = null;
  let bgmMasterGain = null;

  function getBgmButton(){
    return document.getElementById("bgmBtn");
  }

  async function ensureBgmAudioContext(){
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx){
      toast("このたんまつではBGMがつかえないよ");
      return null;
    }

    if(!bgmAudioCtx){
      bgmAudioCtx = new AudioCtx();
      bgmMasterGain = bgmAudioCtx.createGain();
      bgmMasterGain.gain.value = 0.10;
      bgmMasterGain.connect(bgmAudioCtx.destination);
    }

    if(bgmAudioCtx.state === "suspended"){
      await bgmAudioCtx.resume();
    }

    try{
      const osc = bgmAudioCtx.createOscillator();
      const gain = bgmAudioCtx.createGain();
      gain.gain.value = 0.0001;
      osc.connect(gain);
      gain.connect(bgmAudioCtx.destination);
      osc.start();
      osc.stop(bgmAudioCtx.currentTime + 0.03);
    }catch(_){}

    return bgmAudioCtx;
  }

  function stopBGM(){
    isPlayingBGM = false;
    clearTimeout(loopTimer);
    clearTimeout(bgmFallbackTimer);
    loopTimer = null;
    bgmFallbackTimer = null;
    try{
      if(bgmSynth) bgmSynth.stop();
    }catch(_){}
    bgmSynth = null;
    const btn = getBgmButton();
    if(btn) btn.textContent = "🎵";
  }

  function scheduleFallbackMelody(){
    clearTimeout(bgmFallbackTimer);
    if(!isPlayingBGM || !bgmAudioCtx || !bgmMasterGain) return;

    const notes = [
      349.23, 440.00, 523.25, 440.00,
      392.00, 440.00, 261.63, 329.63,
      349.23, 440.00, 523.25, 587.33,
      523.25, 440.00, 392.00, 349.23
    ];
    const step = 0.34;
    const now = bgmAudioCtx.currentTime + 0.03;

    notes.forEach((freq, i) => {
      const osc = bgmAudioCtx.createOscillator();
      const gain = bgmAudioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * step);
      gain.gain.linearRampToValueAtTime(0.025, now + i * step + 0.025);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * step + step * 0.86);
      osc.connect(gain);
      gain.connect(bgmMasterGain);
      osc.start(now + i * step);
      osc.stop(now + i * step + step * 0.9);
    });

    bgmFallbackTimer = setTimeout(scheduleFallbackMelody, notes.length * step * 1000);
  }

  async function playFallbackBGM(reason=""){
    console.warn("ABCJS BGM fallback:", reason);
    clearTimeout(loopTimer);
    try{
      if(bgmSynth) bgmSynth.stop();
    }catch(_){}
    bgmSynth = null;
    scheduleFallbackMelody();
  }

  const playLoop = async () => {
    if(!isPlayingBGM) return;

    try{
      clearTimeout(loopTimer);
      clearTimeout(bgmFallbackTimer);

      if(!window.ABCJS || !ABCJS.synth || !ABCJS.synth.CreateSynth){
        playFallbackBGM("ABCJS synth is not available");
        return;
      }

      if(bgmAudioCtx && bgmAudioCtx.state === "suspended"){
        await bgmAudioCtx.resume();
      }

      try{
        if(bgmSynth) bgmSynth.stop();
      }catch(_){}

      const visualObj = ABCJS.renderAbc("abcjs-dummy", BGM_ABC, {
        add_classes:false,
        responsive:"resize"
      })[0];

      if(!visualObj){
        playFallbackBGM("ABC render failed");
        return;
      }

      bgmSynth = new ABCJS.synth.CreateSynth();
      await bgmSynth.init({
        visualObj,
        audioContext:bgmAudioCtx,
        options:{ pan:[-0.12,0.12] }
      });
      await bgmSynth.prime();

      if(!isPlayingBGM) return;

      bgmSynth.start();

      const totalTime = typeof visualObj.getTotalTime === "function" ? Number(visualObj.getTotalTime()) : 0;
      const durationMs = Number.isFinite(totalTime) && totalTime > 0 ? totalTime * 1000 : 32000;
      loopTimer = setTimeout(playLoop, durationMs + 120);
    }catch(e){
      console.error("BGM Loop Error:", e);
      playFallbackBGM(e && e.message ? e.message : "unknown error");
    }
  };

  window.toggleBGM = async function(){
    if(mediaRecorder && mediaRecorder.state === "recording"){
      toast("ろくおんちゅうはBGMをとめるよ");
      return;
    }
    if(pendingRecording){
      toast("まねっこの確認中はBGMをとめるよ");
      return;
    }
    if(isInitializingBGM) return;

    const btn = getBgmButton();

    if(isPlayingBGM){
      stopBGM();
      toast("BGMをとめたよ");
      return;
    }

    isInitializingBGM = true;
    if(btn) btn.textContent = "⏳";

    try{
      const ctx = await ensureBgmAudioContext();
      if(!ctx){
        if(btn) btn.textContent = "🎵";
        return;
      }

      isPlayingBGM = true;
      if(btn) btn.textContent = "🔊";
      toast("BGMをならすよ");
      await playLoop();
    }catch(e){
      console.error("BGM Start Error:", e);
      stopBGM();
      toast("BGMをならせなかったよ");
    }finally{
      isInitializingBGM = false;
      const finalBtn = getBgmButton();
      if(finalBtn) finalBtn.textContent = isPlayingBGM ? "🔊" : "🎵";
    }
  };

  openTitle();
})();
