<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>ごっぱのもじぷかランド</title>
<style>
  :root{
    --sea1:#7ee8fa;
    --sea2:#37b6ff;
    --sea3:#0275c8;
    --deep:#045a9a;
    --card:#ffffffee;
    --ink:#13506b;
    --soft:#e9fbff;
    --yellow:#ffd95a;
    --orange:#ffad4a;
    --pink:#ff7eb6;
    --green:#68d391;
    --shadow:0 18px 45px rgba(0,70,120,.22);
    --radius:28px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:var(--ink);overflow-x:hidden}
  body{
    background:
      radial-gradient(circle at 20% 12%, rgba(255,255,255,.75), transparent 18%),
      radial-gradient(circle at 80% 5%, rgba(255,255,255,.45), transparent 20%),
      linear-gradient(180deg,var(--sea1) 0%,var(--sea2) 48%,var(--sea3) 100%);
    touch-action:manipulation;
    user-select:none;
  }

  .waveTop{
    position:fixed;left:0;right:0;top:0;height:120px;pointer-events:none;opacity:.45;
    background:
      radial-gradient(80px 38px at 12% 30%, #fff 0 45%, transparent 46%),
      radial-gradient(100px 42px at 38% 18%, #fff 0 42%, transparent 43%),
      radial-gradient(110px 44px at 68% 28%, #fff 0 42%, transparent 43%),
      radial-gradient(90px 38px at 92% 18%, #fff 0 42%, transparent 43%);
    filter:blur(.2px);
  }

  .bubbleBg span{
    position:fixed;bottom:-60px;width:18px;height:18px;border-radius:50%;
    border:2px solid rgba(255,255,255,.65);background:rgba(255,255,255,.18);
    animation:rise 9s linear infinite;pointer-events:none;
  }
  .bubbleBg span:nth-child(1){left:8%;animation-duration:8s}
  .bubbleBg span:nth-child(2){left:22%;width:11px;height:11px;animation-duration:12s;animation-delay:-4s}
  .bubbleBg span:nth-child(3){left:40%;width:24px;height:24px;animation-duration:10s;animation-delay:-2s}
  .bubbleBg span:nth-child(4){left:58%;width:14px;height:14px;animation-duration:13s;animation-delay:-5s}
  .bubbleBg span:nth-child(5){left:76%;width:28px;height:28px;animation-duration:11s;animation-delay:-1s}
  .bubbleBg span:nth-child(6){left:90%;width:12px;height:12px;animation-duration:9s;animation-delay:-3s}
  @keyframes rise{
    from{transform:translateY(0) scale(.9);opacity:0}
    10%{opacity:.9}
    to{transform:translateY(-115vh) scale(1.35);opacity:0}
  }

  .app{
    position:relative;z-index:2;width:min(980px,100%);margin:0 auto;
    padding:calc(12px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
  }

  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;
  }
  .brand{
    display:flex;align-items:center;gap:10px;color:white;text-shadow:0 3px 10px rgba(0,70,120,.35);
    font-weight:900;letter-spacing:.02em;
  }
  .brand .logo{font-size:34px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
  .brand .title{line-height:1.05;font-size:clamp(20px,4.7vw,34px)}
  .brand .sub{font-size:12px;opacity:.92;font-weight:800;margin-top:2px}

  .card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px;backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.65);
  }

  .hero{
    display:grid;grid-template-columns:118px 1fr;gap:12px;align-items:center;margin-bottom:14px;
  }
  .goppaWrap{
    min-height:108px;display:grid;place-items:center;position:relative;
  }
  .goppa{
    width:98px;height:62px;border-radius:56% 48% 48% 56%;
    background:linear-gradient(135deg,#ffd96a,#ff9d3d);
    position:relative;box-shadow:inset -8px -8px 0 rgba(209,104,0,.16),0 12px 20px rgba(0,84,135,.18);
    animation:swim 2.4s ease-in-out infinite;
  }
  .goppa:before{
    content:"";position:absolute;right:-28px;top:15px;width:40px;height:32px;
    background:linear-gradient(135deg,#ffb84c,#ff7c42);
    clip-path:polygon(0 50%,100% 0,82% 50%,100% 100%);
  }
  .goppa:after{
    content:"";position:absolute;left:22px;top:16px;width:11px;height:11px;border-radius:50%;
    background:#14334a;box-shadow:3px 2px 0 3px white;
  }
  .fin{
    position:absolute;left:40px;bottom:-13px;width:30px;height:20px;background:#ff8cc8;
    clip-path:polygon(50% 100%,0 0,100% 0);opacity:.9;
  }
  .mouth{
    position:absolute;left:9px;top:35px;width:16px;height:8px;border-bottom:3px solid #8b4a19;border-radius:0 0 20px 20px;
  }
  @keyframes swim{
    0%,100%{transform:translateY(0) rotate(-2deg)}
    50%{transform:translateY(-8px) rotate(3deg)}
  }
  .speech{
    background:#fff;border-radius:22px;padding:13px 14px;font-weight:900;line-height:1.45;
    box-shadow:0 8px 18px rgba(0,90,130,.12);position:relative;font-size:clamp(15px,4vw,20px);
  }
  .speech:before{
    content:"";position:absolute;left:-10px;top:34px;border-top:10px solid transparent;border-bottom:10px solid transparent;border-right:16px solid #fff;
  }

  .sectionTitle{
    color:white;font-weight:900;font-size:18px;text-shadow:0 3px 10px rgba(0,70,120,.34);margin:18px 8px 10px;
  }

  .btnGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .bigBtn,.smallBtn,.pillBtn{
    border:0;border-radius:22px;font-weight:900;color:var(--ink);cursor:pointer;
    box-shadow:0 8px 0 rgba(0,88,130,.15),0 12px 22px rgba(0,84,135,.12);
    transition:transform .08s ease,filter .15s ease;touch-action:manipulation;
  }
  .bigBtn:active,.smallBtn:active,.pillBtn:active,.charCard:active{transform:translateY(3px);box-shadow:0 4px 0 rgba(0,88,130,.15)}
  .bigBtn{
    min-height:84px;padding:13px 12px;font-size:clamp(18px,5vw,24px);
    background:linear-gradient(180deg,#fff,#e9fbff);
    display:flex;align-items:center;justify-content:center;gap:8px;flex-direction:column;
  }
  .bigBtn span{font-size:28px}
  .primary{background:linear-gradient(180deg,#fff4a8,#ffd95a)}
  .pink{background:linear-gradient(180deg,#ffe4f1,#ff9ac8)}
  .green{background:linear-gradient(180deg,#dcffe9,#76e09b)}
  .orange{background:linear-gradient(180deg,#ffe9c9,#ffb458)}
  .blue{background:linear-gradient(180deg,#e4fbff,#9bedff)}

  .smallBtn{
    padding:13px 15px;background:#fff;font-size:16px;border:2px solid rgba(14,112,160,.12);
  }
  .pillBtn{
    padding:10px 13px;border-radius:999px;background:#fff;font-size:15px;box-shadow:0 5px 0 rgba(0,88,130,.12);
  }
  .danger{background:linear-gradient(180deg,#ffe0e0,#ff9d9d)}
  .muted{opacity:.58;filter:saturate(.65)}
  .wide{grid-column:1/-1}

  .todayRow{
    display:flex;gap:10px;overflow:auto;padding:6px 2px 2px;scrollbar-width:none;
  }
  .todayRow::-webkit-scrollbar{display:none}
  .todayBubble{
    min-width:72px;height:72px;border-radius:26px;background:#fff;display:grid;place-items:center;
    font-size:42px;font-weight:900;color:#0874a4;box-shadow:0 8px 18px rgba(0,90,130,.13);
    animation:floaty 2.7s ease-in-out infinite;
  }
  .todayBubble:nth-child(2n){animation-delay:-.8s}
  .todayBubble:nth-child(3n){animation-delay:-1.4s}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  .charGrid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:11px;
  }
  .charCard{
    border:0;min-height:82px;border-radius:48% 42% 46% 52%;background:linear-gradient(135deg,#fff,#e8fbff 62%,#bff4ff);
    font-size:42px;font-weight:900;color:#0874a4;box-shadow:0 8px 0 rgba(0,88,130,.12),0 12px 22px rgba(0,84,135,.12);
    cursor:pointer;animation:fishFloat 3.2s ease-in-out infinite;position:relative;overflow:visible;
  }
  .charCard:after{
    content:"";position:absolute;right:-13px;top:29px;width:24px;height:23px;background:linear-gradient(135deg,#ffd95a,#ff9ac8);
    clip-path:polygon(0 50%,100% 0,78% 50%,100% 100%);filter:drop-shadow(0 4px 5px rgba(0,80,120,.12));
  }
  .charCard:before{
    content:"○";position:absolute;left:8px;top:6px;font-size:14px;color:rgba(80,190,225,.55);font-weight:900;
  }
  .charCard:nth-child(2n){animation-delay:-.6s}
  .charCard:nth-child(3n){animation-delay:-1.1s}
  @keyframes fishFloat{
    0%,100%{transform:translateY(0) rotate(-2deg)}
    50%{transform:translateY(-8px) rotate(3deg)}
  }

  .detailChar{
    font-size:clamp(96px,28vw,210px);line-height:1;text-align:center;font-weight:900;
    color:#0874a4;text-shadow:0 8px 0 rgba(0,120,170,.12);
  }
  .wordChips{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:10px 0 16px}
  .chip{
    background:#e9fbff;border:2px solid #b9efff;border-radius:999px;padding:9px 12px;font-weight:900;
  }
  .status{
    text-align:center;font-size:14px;font-weight:800;color:#31708e;margin:8px 0;
  }

  .traceBox{
    position:relative;background:#f6fdff;border-radius:28px;border:3px dashed #8edff4;
    height:min(58vh,520px);min-height:360px;overflow:hidden;box-shadow:inset 0 0 0 8px rgba(255,255,255,.7);
    touch-action:none;
  }
  .traceStepBar{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 12px;
  }
  .traceStep{
    background:rgba(255,255,255,.7);border:2px solid rgba(255,255,255,.9);border-radius:999px;
    padding:8px 6px;text-align:center;font-size:13px;font-weight:900;color:#2a7898;
  }
  .traceStep.active{background:linear-gradient(180deg,#fff4a8,#ffd95a);color:#8a6400;box-shadow:0 6px 14px rgba(0,80,120,.12)}
  .traceStep.done{background:linear-gradient(180deg,#dcffe9,#76e09b);color:#116b38}
  .traceGuide{
    position:absolute;inset:0;display:grid;place-items:center;font-size:min(62vw,370px);
    font-weight:900;color:rgba(2,117,200,.12);line-height:1;pointer-events:none;
  }
  .copySample{
    position:absolute;right:14px;top:14px;z-index:1;display:none;place-items:center;
    min-width:86px;min-height:86px;padding:8px 10px;border-radius:22px;background:#fff;
    box-shadow:0 8px 18px rgba(0,90,130,.14);pointer-events:none;border:3px solid #b9efff;
  }
  .copySample span{display:block;font-size:12px;font-weight:900;color:#2a7898;text-align:center}
  .copySample b{display:block;font-size:46px;line-height:1;color:#0874a4;text-align:center}
  .traceBox.freeWrite .traceGuide{display:none}
  .traceBox.freeWrite .copySample{display:grid}
  .traceBox.freeWrite{background:#fff;border-style:solid}
  .strokeHint{
    position:absolute;left:14px;top:12px;background:#fff9c8;border-radius:999px;padding:8px 12px;
    font-weight:900;color:#8a6400;box-shadow:0 6px 14px rgba(0,0,0,.08);pointer-events:none;z-index:2;
  }
  #traceCanvas{
    position:absolute;inset:0;width:100%;height:100%;touch-action:none;
  }

  .findQuestion{
    font-size:clamp(23px,6vw,38px);font-weight:900;text-align:center;margin:4px 0 12px;
    color:#fff;text-shadow:0 3px 10px rgba(0,70,120,.38);
  }
  .findArena{
    position:relative;min-height:390px;border-radius:30px;overflow:hidden;border:3px solid rgba(255,255,255,.7);
    background:
      radial-gradient(circle at 20% 16%, rgba(255,255,255,.62), transparent 14%),
      radial-gradient(circle at 80% 10%, rgba(255,255,255,.42), transparent 18%),
      linear-gradient(180deg,#8bf1ff 0%,#36bff3 45%,#0580c9 100%);
    box-shadow:inset 0 0 0 8px rgba(255,255,255,.18),0 12px 26px rgba(0,80,120,.16);
  }
  .findArena:before{
    content:"";position:absolute;left:0;right:0;bottom:0;height:72px;opacity:.9;
    background:
      radial-gradient(50px 22px at 12% 70%,#ffe7a8 0 58%,transparent 60%),
      radial-gradient(70px 25px at 38% 78%,#ffe1a0 0 58%,transparent 60%),
      radial-gradient(60px 24px at 72% 72%,#ffdda0 0 58%,transparent 60%),
      linear-gradient(180deg,transparent,#efc578);
  }
  .findArena:after{
    content:"○  ○    ○      ○   ○";position:absolute;left:12px;right:12px;top:18px;
    color:rgba(255,255,255,.62);font-size:30px;letter-spacing:18px;white-space:nowrap;
    animation:arenaBubbles 5s linear infinite;pointer-events:none;
  }
  @keyframes arenaBubbles{
    0%{transform:translateY(26px);opacity:.15}
    20%{opacity:.85}
    100%{transform:translateY(-52px);opacity:0}
  }
  .findTargetBadge{
    position:relative;z-index:2;margin:10px auto 0;width:max-content;max-width:92%;
    background:#fff;border:3px solid #b9efff;border-radius:999px;padding:9px 15px;
    font-weight:900;color:#0874a4;box-shadow:0 8px 18px rgba(0,90,130,.16);
  }
  .findGrid{
    position:absolute;inset:72px 12px 24px;display:block;
  }
  .findSeaweed{
    position:absolute;bottom:16px;width:22px;height:82px;border-radius:18px 18px 0 0;opacity:.75;
    background:linear-gradient(180deg,#77e2a0,#16975a);transform-origin:bottom center;animation:seaweedWave 2.4s ease-in-out infinite;
  }
  .findSeaweed.s1{left:7%;height:86px}
  .findSeaweed.s2{left:17%;height:58px;animation-delay:-.6s}
  .findSeaweed.s3{right:9%;height:92px;animation-delay:-1.1s}
  .findSeaweed.s4{right:21%;height:64px;animation-delay:-.3s}
  @keyframes seaweedWave{0%,100%{transform:skewX(-5deg)}50%{transform:skewX(8deg)}}
  .findBtn{
    position:absolute;left:var(--x,20%);top:var(--y,20%);width:92px;height:64px;border:0;border-radius:54% 44% 46% 54%;
    background:linear-gradient(135deg,#fff 0%,#fff7bf 38%,#8eefff 100%);
    font-size:0;font-weight:900;color:#0874a4;box-shadow:0 8px 0 rgba(0,88,130,.13),0 15px 24px rgba(0,84,135,.18);
    cursor:pointer;animation:fishDrift var(--dur,5.2s) ease-in-out infinite;animation-delay:var(--delay,0s);
    transform-origin:center;touch-action:manipulation;
  }
  .findBtn:nth-child(2n){background:linear-gradient(135deg,#fff 0%,#ffe4f1 42%,#9bedff 100%)}
  .findBtn:nth-child(3n){background:linear-gradient(135deg,#fff 0%,#dcffe9 42%,#ffd95a 100%)}
  .findBtn .fishTail{
    position:absolute;right:-24px;top:17px;width:34px;height:31px;background:linear-gradient(135deg,#ffb458,#ff7eb6);
    clip-path:polygon(0 50%,100% 0,80% 50%,100% 100%);filter:drop-shadow(0 4px 5px rgba(0,80,120,.12));
    animation:tailWag .55s ease-in-out infinite;
  }
  .findBtn .fishEye{
    position:absolute;left:17px;top:15px;width:10px;height:10px;border-radius:50%;background:#12344c;
    box-shadow:3px 2px 0 3px #fff;
  }
  .findBtn .fishLetter{
    position:absolute;left:0;right:0;top:12px;text-align:center;font-size:38px;line-height:1;font-weight:900;color:#0874a4;
    text-shadow:0 3px 0 rgba(255,255,255,.7);
  }
  .findBtn .fishBubbles{
    position:absolute;left:-26px;top:4px;font-size:13px;color:rgba(255,255,255,.74);letter-spacing:2px;animation:miniBubble 1.5s ease-in-out infinite;
  }
  @keyframes tailWag{0%,100%{transform:scaleX(1) rotate(-3deg)}50%{transform:scaleX(.82) rotate(8deg)}}
  @keyframes miniBubble{0%{transform:translateY(8px);opacity:.2}50%{opacity:.85}100%{transform:translateY(-16px);opacity:0}}
  @keyframes fishDrift{
    0%,100%{transform:translate(-8px,0) rotate(-2deg)}
    25%{transform:translate(24px,-16px) rotate(3deg)}
    50%{transform:translate(42px,8px) rotate(-1deg)}
    75%{transform:translate(12px,20px) rotate(4deg)}
  }
  .findBtn.caught{
    animation:fishCaught .72s ease-out forwards !important;z-index:8;
  }
  @keyframes fishCaught{
    0%{transform:scale(1) rotate(0deg);opacity:1}
    45%{transform:scale(1.25) rotate(8deg);opacity:1}
    100%{transform:translateY(-90px) scale(.25) rotate(28deg);opacity:0}
  }
  .findBtn.missed{
    animation:fishMiss .48s ease-in-out !important;
  }
  @keyframes fishMiss{
    0%,100%{transform:translateX(0) rotate(0deg)}
    25%{transform:translateX(-16px) rotate(-8deg)}
    50%{transform:translateX(18px) rotate(8deg)}
    75%{transform:translateX(-10px) rotate(-5deg)}
  }

  .parentGrid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px;margin-top:12px;
  }
  .parentChar{
    border:0;border-radius:18px;padding:10px 4px;background:#e9eef3;color:#567;
    font-size:26px;font-weight:900;box-shadow:0 5px 0 rgba(0,0,0,.08);
  }
  .parentChar.on{background:linear-gradient(180deg,#fff4a8,#ffd95a);color:#0874a4}
  .parentChar.today{outline:4px solid #ff7eb6}
  .rowTools{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 2px}
  .parentPanel{
    background:#fff;border-radius:24px;padding:14px;margin:12px 0;box-shadow:0 8px 18px rgba(0,80,120,.1);
  }
  .input{
    width:100%;font-size:22px;border:3px solid #b9efff;border-radius:20px;padding:14px;text-align:center;font-weight:900;color:var(--ink);
    outline:none;background:#f7fdff;
  }

  .footerNav{
    display:flex;gap:10px;margin-top:14px;justify-content:center;flex-wrap:wrap;
  }

  .toast{
    position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:#fff;color:#0874a4;border-radius:999px;padding:12px 18px;font-weight:900;box-shadow:0 16px 35px rgba(0,70,120,.24);
    opacity:0;pointer-events:none;z-index:30;transition:.25s ease;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .burst{
    position:fixed;left:0;top:0;right:0;bottom:0;pointer-events:none;z-index:25;overflow:hidden;
  }
  .burst span{
    position:absolute;border-radius:50%;background:rgba(255,255,255,.85);border:2px solid rgba(255,255,255,.9);
    animation:pop 950ms ease-out forwards;
  }
  @keyframes pop{
    0%{transform:translate(0,0) scale(.3);opacity:0}
    20%{opacity:1}
    100%{transform:translate(var(--x),var(--y)) scale(1.35);opacity:0}
  }

  .miniStats{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;
  }
  .stat{
    background:#e9fbff;border-radius:18px;padding:10px;text-align:center;font-weight:900;
  }
  .stat b{display:block;font-size:21px;color:#0874a4}

  .rewardTank{
    margin-top:12px;background:linear-gradient(180deg,#e9fbff,#ffffff);border:3px solid rgba(185,239,255,.9);
    border-radius:26px;padding:12px 14px;font-weight:900;color:#0874a4;display:flex;align-items:center;gap:10px;
    box-shadow:0 8px 18px rgba(0,90,130,.12);
  }
  .rewardTank .tankIcon{font-size:34px;animation:floaty 2.6s ease-in-out infinite}
  .missionGrid{display:grid;grid-template-columns:1fr;gap:11px;margin:4px 0 14px}
  .missionCard{
    border:0;border-radius:26px;padding:14px 14px;min-height:76px;background:linear-gradient(180deg,#fff,#e9fbff);
    box-shadow:0 8px 0 rgba(0,88,130,.12),0 12px 22px rgba(0,84,135,.12);font-weight:900;color:#0874a4;
    display:grid;grid-template-columns:54px 1fr auto;gap:10px;align-items:center;text-align:left;cursor:pointer;
  }
  .missionIcon{font-size:36px;filter:drop-shadow(0 4px 6px rgba(0,80,120,.12))}
  .missionTitle{font-size:18px;line-height:1.2}
  .missionSub{font-size:13px;color:#2a7898;margin-top:3px}
  .missionGo{font-size:24px;color:#ff9d3d}

  .albumGrid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;margin-top:12px;
  }
  .writingCard{
    border:0;border-radius:26px;background:linear-gradient(180deg,#fffdf2,#e9fbff);
    padding:12px;box-shadow:0 8px 0 rgba(0,88,130,.12),0 12px 22px rgba(0,84,135,.12);
    text-align:center;position:relative;overflow:hidden;
  }
  .writingCard:before{
    content:'🐚';position:absolute;right:8px;top:4px;font-size:28px;opacity:.28;
  }
  .treasureFishGrid{
    position:relative;overflow:hidden;border-radius:30px;padding:10px;
    background:
      radial-gradient(circle at 18% 16%, rgba(255,255,255,.72), transparent 12%),
      radial-gradient(circle at 78% 8%, rgba(255,255,255,.42), transparent 18%),
      linear-gradient(180deg,rgba(139,241,255,.62),rgba(5,128,201,.18));
    box-shadow:inset 0 0 0 4px rgba(255,255,255,.2);
  }
  .treasureFishGrid:before{
    content:'○  ○    ○      ○   ○';position:absolute;left:14px;right:14px;top:10px;
    color:rgba(255,255,255,.58);font-size:25px;letter-spacing:15px;white-space:nowrap;
    animation:treasureBubbles 5.6s linear infinite;pointer-events:none;
  }
  @keyframes treasureBubbles{
    0%{transform:translateY(38px);opacity:.08}
    22%{opacity:.8}
    100%{transform:translateY(-54px);opacity:0}
  }
  .treasureWritingCard{
    animation:treasureCardFloat var(--fishDur,3.6s) ease-in-out infinite;
    transform-origin:center;z-index:1;
  }
  .treasureWritingCard:nth-child(2n){animation-delay:-.8s}
  .treasureWritingCard:nth-child(3n){animation-delay:-1.4s}
  @keyframes treasureCardFloat{
    0%,100%{transform:translateY(0) rotate(-1.5deg)}
    50%{transform:translateY(-8px) rotate(2deg)}
  }
  .treasureFish{
    width:112px;height:70px;margin:0 auto 8px;position:relative;
    border-radius:56% 44% 46% 54%;
    background:linear-gradient(135deg,#fff 0%,#fff7bf 38%,#8eefff 100%);
    box-shadow:0 8px 0 rgba(0,88,130,.13),0 14px 22px rgba(0,84,135,.16);
    animation:treasureFishSwim var(--fishDur,3.6s) ease-in-out infinite;
    animation-delay:var(--fishDelay,0s);
  }
  .treasureWritingCard:nth-child(2n) .treasureFish{background:linear-gradient(135deg,#fff 0%,#ffe4f1 42%,#9bedff 100%)}
  .treasureWritingCard:nth-child(3n) .treasureFish{background:linear-gradient(135deg,#fff 0%,#dcffe9 42%,#ffd95a 100%)}
  .treasureTail{
    position:absolute;right:-24px;top:18px;width:36px;height:33px;background:linear-gradient(135deg,#ffb458,#ff7eb6);
    clip-path:polygon(0 50%,100% 0,80% 50%,100% 100%);filter:drop-shadow(0 4px 5px rgba(0,80,120,.12));
    animation:treasureTailWag .58s ease-in-out infinite;
  }
  .treasureEye{
    position:absolute;left:16px;top:15px;width:10px;height:10px;border-radius:50%;background:#12344c;
    box-shadow:3px 2px 0 3px #fff;
  }
  .treasureLetter{
    position:absolute;left:0;right:0;top:13px;text-align:center;font-size:40px;line-height:1;font-weight:900;color:#0874a4;
    text-shadow:0 3px 0 rgba(255,255,255,.74);
  }
  .treasureFishBubbles{
    position:absolute;left:-25px;top:4px;font-size:13px;color:rgba(255,255,255,.76);letter-spacing:2px;
    animation:miniBubble 1.6s ease-in-out infinite;
  }
  .treasureDate{
    font-size:13px;font-weight:900;color:#2a7898;margin:0 0 8px;line-height:1.35;text-align:center;
  }
  @keyframes treasureTailWag{0%,100%{transform:scaleX(1) rotate(-4deg)}50%{transform:scaleX(.82) rotate(9deg)}}
  @keyframes treasureFishSwim{
    0%,100%{transform:translate(-3px,0) rotate(-2deg)}
    35%{transform:translate(7px,-5px) rotate(2deg)}
    70%{transform:translate(-6px,4px) rotate(1deg)}
  }
  .writingMeta{
    font-size:13px;font-weight:900;color:#2a7898;margin-bottom:8px;line-height:1.35;
  }
  .writingMeta b{display:block;font-size:28px;color:#0874a4;line-height:1}
  .writingImg{
    width:100%;aspect-ratio:1.15/1;object-fit:contain;background:#fff;border-radius:20px;
    border:3px solid #b9efff;box-shadow:inset 0 0 0 5px rgba(233,251,255,.75);
  }
  .dateGroup{
    background:rgba(255,255,255,.72);border-radius:28px;padding:13px;margin:13px 0;
    border:2px solid rgba(255,255,255,.82);box-shadow:0 10px 22px rgba(0,80,120,.12);
  }
  .dateTitle{
    font-weight:900;color:#0874a4;font-size:18px;margin:2px 4px 8px;
  }
  .emptyTreasure{
    background:#fff;border-radius:26px;padding:22px;text-align:center;font-weight:900;
    color:#2a7898;line-height:1.6;box-shadow:0 8px 18px rgba(0,90,130,.12);
  }
  .previewOverlay{
    position:fixed;inset:0;background:rgba(0,55,92,.62);z-index:50;display:grid;place-items:center;
    padding:18px;backdrop-filter:blur(8px);
  }
  .previewCard{
    width:min(720px,96vw);background:#fff;border-radius:30px;padding:16px;box-shadow:0 24px 70px rgba(0,0,0,.32);
    text-align:center;color:#0874a4;font-weight:900;
  }
  .previewCard img{
    width:100%;max-height:70vh;object-fit:contain;border-radius:22px;border:3px solid #b9efff;background:#fff;
  }

  @media (min-width:720px){
    .app{padding-left:24px;padding-right:24px}
    .card{padding:24px}
    .btnGrid{grid-template-columns:repeat(4,1fr)}
    .bigBtn{min-height:105px}
    .hero{grid-template-columns:150px 1fr}
    .goppa{width:118px;height:74px}
    .findGrid{grid-template-columns:repeat(6,1fr)}
  }

  @media (max-width:380px){
    .hero{grid-template-columns:96px 1fr}
    .goppa{width:82px;height:54px}
    .speech{font-size:14px}
    .btnGrid{gap:9px}
    .bigBtn{min-height:76px}
  }
</style>
</head>
<body>
<div class="waveTop"></div>
<div class="bubbleBg" aria-hidden="true">
  <span></span><span></span><span></span><span></span><span></span><span></span>
</div>
<div id="burst" class="burst"></div>

<div class="app">
  <div class="topbar">
    <div class="brand" onclick="goHome()" role="button" aria-label="ホームへ">
      <div class="logo">🐟</div>
      <div>
        <div class="title">ごっぱのもじぷかランド</div>
        <div class="sub">よんで・ろくおん・なぞって・ぷかぷか！</div>
      </div>
    </div>
    <button class="pillBtn" onclick="goHome()">🏠</button>
  </div>
  <main id="app"></main>
</div>

<div id="toast" class="toast"></div>

<script>
(() => {
  "use strict";

  const LS_KEY = "goppa_mojipuka_state_v1";
  const DB_NAME = "goppa_mojipuka_db";
  const DB_VERSION = 2;
  const STORE_RECORDINGS = "recordings";
  const STORE_WRITINGS = "writings";

  const ROWS = [
    {name:"あ行", chars:["あ","い","う","え","お"]},
    {name:"か行", chars:["か","き","く","け","こ"]},
    {name:"さ行", chars:["さ","し","す","せ","そ"]},
    {name:"た行", chars:["た","ち","つ","て","と"]},
    {name:"な行", chars:["な","に","ぬ","ね","の"]},
    {name:"は行", chars:["は","ひ","ふ","へ","ほ"]},
    {name:"ま行", chars:["ま","み","む","め","も"]},
    {name:"や行", chars:["や","ゆ","よ"]},
    {name:"ら行", chars:["ら","り","る","れ","ろ"]},
    {name:"わ行", chars:["わ","を","ん"]}
  ];
  const ALL_CHARS = ROWS.flatMap(r => r.chars);

  const CHAR_DATA = {
    "あ":{read:"あ",words:["あめ","あり","あさ"]},
    "い":{read:"い",words:["いぬ","いす","いちご"]},
    "う":{read:"う",words:["うみ","うし","うた"]},
    "え":{read:"え",words:["えき","えんぴつ","えほん"]},
    "お":{read:"お",words:["おに","おかし","おふろ"]},

    "か":{read:"か",words:["かさ","かに","かお"]},
    "き":{read:"き",words:["きつね","きのこ","きりん"]},
    "く":{read:"く",words:["くま","くつ","くるま"]},
    "け":{read:"け",words:["けむし","けいと","けしき"]},
    "こ":{read:"こ",words:["こま","こい","ことり"]},

    "さ":{read:"さ",words:["さかな","さくら","さら"]},
    "し":{read:"し",words:["しま","しか","しお"]},
    "す":{read:"す",words:["すいか","すな","すずめ"]},
    "せ":{read:"せ",words:["せみ","せっけん","せんろ"]},
    "そ":{read:"そ",words:["そら","そうじ","そり"]},

    "た":{read:"た",words:["たこ","たいこ","たまご"]},
    "ち":{read:"ち",words:["ちず","ちょう","ちくわ"]},
    "つ":{read:"つ",words:["つき","つみき","つくえ"]},
    "て":{read:"て",words:["てがみ","てんとうむし","てぶくろ"]},
    "と":{read:"と",words:["とけい","とまと","とり"]},

    "な":{read:"な",words:["なす","なみ","なわ"]},
    "に":{read:"に",words:["にじ","にわとり","にんじん"]},
    "ぬ":{read:"ぬ",words:["ぬの","ぬりえ","ぬいぐるみ"]},
    "ね":{read:"ね",words:["ねこ","ねずみ","ねぎ"]},
    "の":{read:"の",words:["のり","のはら","のこぎり"]},

    "は":{read:"は",words:["はな","はさみ","はっぱ"]},
    "ひ":{read:"ひ",words:["ひこうき","ひつじ","ひまわり"]},
    "ふ":{read:"ふ",words:["ふね","ふうせん","ふくろ"]},
    "へ":{read:"へ",words:["へび","へや","へそ"]},
    "ほ":{read:"ほ",words:["ほし","ほね","ほたる"]},

    "ま":{read:"ま",words:["まめ","まくら","まど"]},
    "み":{read:"み",words:["みず","みかん","みみ"]},
    "む":{read:"む",words:["むし","むぎ","むらさき"]},
    "め":{read:"め",words:["めだか","めがね","めろん"]},
    "も":{read:"も",words:["もも","もり","もぐら"]},

    "や":{read:"や",words:["やま","やさい","やかん"]},
    "ゆ":{read:"ゆ",words:["ゆき","ゆび","ゆめ"]},
    "よ":{read:"よ",words:["よる","よっと","よこ"]},

    "ら":{read:"ら",words:["らっぱ","らくだ","らいおん"]},
    "り":{read:"り",words:["りす","りんご","りぼん"]},
    "る":{read:"る",words:["るすばん","るーれっと","るびー"]},
    "れ":{read:"れ",words:["れもん","れいぞうこ","れんげ"]},
    "ろ":{read:"ろ",words:["ろうそく","ろけっと","ろば"]},

    "わ":{read:"わ",words:["わに","わた","わごむ"]},
    "を":{read:"を",words:["えほんをよむ","みずをのむ","てをあらう"]},
    "ん":{read:"ん",words:["みかん","ぱん","きりん"]}
  };

  let state = loadState();
  let currentMode = "read";
  let selectedChar = state.todayChars[0] || state.unlockedChars[0] || "あ";
  let parentAuthed = false;
  let mediaRecorder = null;
  let mediaChunks = [];
  let mediaStream = null;
  let recordingChar = null;
  let findTarget = null;
  let traceSession = null;
  let currentAlbumView = null;
  let currentAlbumChar = null;

  const app = document.getElementById("app");
  const toastEl = document.getElementById("toast");
  const burstEl = document.getElementById("burst");

  function loadState(){
    const base = {
      unlockedChars:["あ","い","う"],
      todayChars:["あ","い","う"],
      progress:{},
      settings:{sound:true}
    };
    try{
      const saved = JSON.parse(localStorage.getItem(LS_KEY) || "null");
      if(!saved) return base;
      return {
        unlockedChars:Array.isArray(saved.unlockedChars) ? saved.unlockedChars.filter(c=>ALL_CHARS.includes(c)) : base.unlockedChars,
        todayChars:Array.isArray(saved.todayChars) ? saved.todayChars.filter(c=>ALL_CHARS.includes(c)) : base.todayChars,
        progress:saved.progress && typeof saved.progress === "object" ? saved.progress : {},
        settings:Object.assign(base.settings, {rewardCount:0}, saved.settings || {})
      };
    }catch(e){
      return base;
    }
  }

  function saveState(){
    state.todayChars = state.todayChars.filter(c => state.unlockedChars.includes(c));
    if(state.unlockedChars.length && state.todayChars.length === 0){
      state.todayChars = state.unlockedChars.slice(0, Math.min(3, state.unlockedChars.length));
    }
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  }

  function todayISO(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  function getProgress(ch){
    if(!state.progress[ch]){
      state.progress[ch] = {
        readCount:0,
        traceCount:0,
        recordCount:0,
        findCorrectCount:0,
        lastPracticedAt:null
      };
    }
    return state.progress[ch];
  }

  function bump(ch,key){
    const p = getProgress(ch);
    p[key] = (p[key] || 0) + 1;
    p.lastPracticedAt = todayISO();
    saveState();
  }

  function escapeHTML(s){
    return String(s).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
    }[m]));
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function activeChars(){
    return state.unlockedChars.length ? state.unlockedChars : ["あ"];
  }

  function todayChars(){
    const t = state.todayChars.filter(c => state.unlockedChars.includes(c));
    return t.length ? t : activeChars().slice(0,3);
  }

  function getRewardCount(){
    const n = Number(state.settings && state.settings.rewardCount);
    return Number.isFinite(n) ? n : 0;
  }

  function rewardLabel(base="ぼうけんクリア！"){
    const icons = ["🫧", "🐚", "🐟", "✨"];
    return `${icons[Math.floor(Math.random()*icons.length)]} ${base}`;
  }

  function addReward(base="ぼうけんクリア！"){
    state.settings.rewardCount = getRewardCount() + 1;
    saveState();
    bubbleBurst(rewardLabel(base));
  }

  function buildAdventureMissions(chars){
    const pool = chars.length ? chars : activeChars();
    const types = [
      {id:"bubble", icon:"🫧", title:"あわをあつめよう", sub:"ゴッパのおてほんをきく"},
      {id:"fish", icon:"🐟", title:"もじさかなをつかまえよう", sub:"ただしいもじをみつける"},
      {id:"shell", icon:"🐚", title:"かいがらをひらこう", sub:"もじの橋をなおす"},
      {id:"copy", icon:"🎙️", title:"ゴッパのまねっこ", sub:"こえであそぶ"}
    ];
    return shuffle(types).slice(0,3).map((m,i) => Object.assign({}, m, {char:pool[i % pool.length]}));
  }

  function adventureMissionHTML(chars){
    return buildAdventureMissions(chars).map(m => `
      <button class="missionCard" onclick="startAdventureMission('${m.id}','${m.char}')">
        <div class="missionIcon">${m.icon}</div>
        <div><div class="missionTitle">${escapeHTML(m.title)}</div><div class="missionSub">「${escapeHTML(m.char)}」で ${escapeHTML(m.sub)}</div></div>
        <div class="missionGo">▶</div>
      </button>
    `).join("");
  }

  window.startAdventureMission = function(type, ch){
    selectedChar = ch;
    if(type === "bubble"){
      openDetail(ch);
      setTimeout(() => speakChar(ch), 120);
    }else if(type === "fish"){
      openFind(ch);
    }else if(type === "shell"){
      openTrace(ch);
    }else{
      openDetail(ch);
      toast("ゴッパのまねっこ、やってみよう！");
      speak(`${ch}。つぎは、きみのばん。`);
    }
  };

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastEl._timer);
    toastEl._timer = setTimeout(() => toastEl.classList.remove("show"), 1700);
  }

  function bubbleBurst(label="ぷかっ！"){
    burstEl.innerHTML = "";
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight * 0.62;
    for(let i=0;i<24;i++){
      const s = document.createElement("span");
      const size = 8 + Math.random()*24;
      const angle = Math.random()*Math.PI*2;
      const dist = 90 + Math.random()*210;
      s.style.left = `${cx + (Math.random()*60-30)}px`;
      s.style.top = `${cy + (Math.random()*30-15)}px`;
      s.style.width = `${size}px`;
      s.style.height = `${size}px`;
      s.style.setProperty("--x", `${Math.cos(angle)*dist}px`);
      s.style.setProperty("--y", `${Math.sin(angle)*dist - 80}px`);
      burstEl.appendChild(s);
    }
    toast(label);
    setTimeout(()=>burstEl.innerHTML="",1000);
  }

  function goppaHTML(message){
    return `
      <div class="hero">
        <div class="goppaWrap">
          <div class="goppa"><div class="fin"></div><div class="mouth"></div></div>
        </div>
        <div class="speech">${escapeHTML(message)}</div>
      </div>
    `;
  }

  function shell(message, body, footer=""){
    app.innerHTML = `
      <section class="card">
        ${goppaHTML(message)}
        ${body}
        ${footer}
      </section>
    `;
  }

  window.goHome = function(){
    const chars = todayChars();
    const todayHTML = chars.map(c => `<button class="todayBubble" onclick="openDetail('${c}')">${c}</button>`).join("");
    const total = ALL_CHARS.length;
    const unlocked = state.unlockedChars.length;
    const practicedToday = Object.values(state.progress).filter(p => p.lastPracticedAt === todayISO()).length;
    const rewardCount = getRewardCount();
    const adventureHTML = adventureMissionHTML(chars);

    shell(
      "きょうはどんな水中ぼうけんにいく？ ゴッパといっしょに、もじさかなをさがしにいこう！",
      `
      <div class="rewardTank"><div class="tankIcon">🐠</div><div>すいそうが にぎやかになってきたよ！<br>たからもの：${rewardCount}こ</div></div>

      <div class="sectionTitle">きょうのぼうけん</div>
      <div class="missionGrid">${adventureHTML}</div>

      <div class="sectionTitle">きょうのもじさかな</div>
      <div class="todayRow">${todayHTML}</div>

      <div class="miniStats">
        <div class="stat"><b>${unlocked}</b>あいた</div>
        <div class="stat"><b>${total}</b>ぜんぶ</div>
        <div class="stat"><b>${practicedToday}</b>きょう</div>
        <div class="stat"><b>${chars.length}</b>れんしゅう</div>
      </div>

      <div class="sectionTitle">あそびをえらぶ</div>
      <div class="btnGrid">
        <button class="bigBtn primary" onclick="openCharList('read')"><span>🫧</span>あわをあつめる</button>
        <button class="bigBtn pink" onclick="openCharList('trace')"><span>🐚</span>かいがらをひらく</button>
        <button class="bigBtn green" onclick="openFind()"><span>🐟</span>もじさかな</button>
        <button class="bigBtn blue" onclick="openReview()"><span>🌟</span>ゴッパとおさらい</button>
        <button class="bigBtn orange" onclick="openWritingAlbumByDate()"><span>🎁</span>たからばこ</button>
        <button class="bigBtn orange wide" onclick="openParent()"><span>🔐</span>おやモード</button>
      </div>
      `
    );
  };

  window.openCharList = function(mode="read"){
    currentMode = mode;
    const chars = activeChars();
    const title = "どのもじさかなを つかまえる？";
    const cards = chars.map(c => `
      <button class="charCard" onclick="${mode === "trace" ? `openTrace('${c}')` : `openDetail('${c}')`}">${c}</button>
    `).join("");

    shell(
      title,
      `
      <div class="charGrid">${cards}</div>
      `,
      `<div class="footerNav"><button class="pillBtn" onclick="goHome()">🏠 ホーム</button></div>`
    );
  };

  window.openReview = function(){
    const chars = todayChars();
    const cards = chars.map(c => {
      const p = getProgress(c);
      return `
        <button class="charCard" onclick="openDetail('${c}')">
          ${c}
        </button>
      `;
    }).join("");

    shell(
      "きょうのもじを、もういちどぷかっとおさらいしよう！",
      `
      <div class="charGrid">${cards}</div>
      <div class="sectionTitle">きょうのきろく</div>
      <div class="parentPanel">
        ${chars.map(c => {
          const p = getProgress(c);
          return `<div style="font-weight:900;margin:7px 0;">${c}：よむ ${p.readCount} / なぞる ${p.traceCount} / ろくおん ${p.recordCount} / さがす ${p.findCorrectCount}</div>`;
        }).join("")}
      </div>
      `,
      `<div class="footerNav"><button class="pillBtn" onclick="goHome()">🏠 ホーム</button></div>`
    );
  };

  window.openDetail = function(ch){
    selectedChar = ch;
    const d = CHAR_DATA[ch] || {read:ch,words:[]};
    const p = getProgress(ch);
    const words = d.words.map(w => `<span class="chip">${escapeHTML(w)}</span>`).join("");

    shell(
      `「${ch}」のもじさかなだよ。ゴッパのまねっこや、かいがらあそびをしてみよう！`,
      `
      <div class="detailChar">${ch}</div>
      <div class="wordChips">${words}</div>
      <div id="recordStatus" class="status">まねっこのこえを しらべているよ...</div>

      <div class="btnGrid">
        <button class="bigBtn primary" onclick="speakChar('${ch}')"><span>🫧</span>あわをきく</button>
        <button id="recordBtn" class="bigBtn pink" onclick="toggleRecording('${ch}')"><span>🎙️</span>ゴッパのまねっこ</button>
        <button id="playRecordBtn" class="bigBtn blue" onclick="playRecording('${ch}')"><span>▶️</span>きいてみる</button>
        <button class="bigBtn green" onclick="openTrace('${ch}')"><span>🐚</span>かいがらをひらく</button>
        <button class="bigBtn orange wide" onclick="openWritingAlbum('${ch}')"><span>🎁</span>たからもの</button>
      </div>

      <div class="miniStats">
        <div class="stat"><b>${p.readCount}</b>よむ</div>
        <div class="stat"><b>${p.recordCount}</b>こえ</div>
        <div class="stat"><b>${p.traceCount}</b>なぞる</div>
        <div class="stat"><b>${p.findCorrectCount}</b>さがす</div>
      </div>
      `,
      `<div class="footerNav">
        <button class="pillBtn" onclick="openCharList('${currentMode}')">🔤 もじ</button>
        <button class="pillBtn" onclick="goHome()">🏠 ホーム</button>
      </div>`
    );

    refreshRecordingStatus(ch);
  };

  function getJapaneseVoice(){
    const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
    return voices.find(v => /ja-JP|Japanese|日本語/i.test(v.lang + " " + v.name)) || voices[0] || null;
  }

  window.speakChar = function(ch){
    const d = CHAR_DATA[ch] || {read:ch,words:[]};
    const word = d.words[0] || "";

  function openDB(){
    return new Promise((resolve,reject)=>{
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE_RECORDINGS)){
          db.createObjectStore(STORE_RECORDINGS, {keyPath:"char"});
        }
        if(!db.objectStoreNames.contains(STORE_WRITINGS)){
          const writingStore = db.createObjectStore(STORE_WRITINGS, {keyPath:"id"});
          writingStore.createIndex("by_char", "char", {unique:false});
          writingStore.createIndex("by_date", "date", {unique:false});
          writingStore.createIndex("by_char_date", ["char", "date"], {unique:false});
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function formatWritingDateTime(iso){

    if(Number.isNaN(d.getTime())) return "";

  function canvasToBlobSafe(canvas, type="image/png"){
    return new Promise((resolve) => {
      if(!canvas || !canvas.toBlob){
        resolve(null);
        return;
      }
      canvas.toBlob(blob => resolve(blob || null), type);
    });
  }

  async function makeWritingBlobFromTrace(){
    if(!traceSession || !traceSession.canvas) return null;
    const src = traceSession.canvas;
    const maxW = 640;
    const ratio = Math.min(1, maxW / Math.max(1, src.width));
    const w = Math.max(1, Math.round(src.width * ratio));
    const h = Math.max(1, Math.round(src.height * ratio));

    const out = document.createElement("canvas");
    out.width = w;
    out.height = h;
    const octx = out.getContext("2d");
    octx.fillStyle = "#ffffff";
    octx.fillRect(0,0,w,h);
    octx.drawImage(src,0,0,w,h);

    const blob = await canvasToBlobSafe(out, "image/png");
    if(!blob) return null;
    return {blob, width:w, height:h};
  }

  async function saveWritingFromTrace(ch){
    const made = await makeWritingBlobFromTrace();
    if(!made) throw new Error("writing image could not be created");

    const createdAt = new Date().toISOString();
    const record = {
      id:`${ch}_${createdAt.replace(/[:.]/g,"-")}_${Math.random().toString(36).slice(2,8)}`,
      char:ch,
      date:todayISO(),
      createdAt,
      blob:made.blob,
      width:made.width,
      height:made.height,
      points:traceSession ? traceSession.points : 0
    };

    const db = await openDB();
    await new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE_WRITINGS,"readwrite");
      tx.objectStore(STORE_WRITINGS).put(record);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });

    await pruneWritingsForChar(ch, 10);
    return record;
  }

  function pickMimeType(){
    if(!window.MediaRecorder || !MediaRecorder.isTypeSupported) return "";
    const candidates = [
      "audio/mp4",
      "audio/webm;codecs=opus",
      "audio/webm",
      "audio/ogg;codecs=opus",
      "audio/ogg"
    ];
    return candidates.find(t => MediaRecorder.isTypeSupported(t)) || "";
  }

  window.toggleRecording = async function(ch){
    if(mediaRecorder && mediaRecorder.state === "recording" && recordingChar === ch){

  async function startRecording(ch){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder){
      toast("このたんまつでは ろくおんが つかえないよ");
      return;
    }
    try{
      if(mediaRecorder && mediaRecorder.state === "recording") stopRecording();

      mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mime = pickMimeType();
      mediaRecorder = mime ? new MediaRecorder(mediaStream,{mimeType:mime}) : new MediaRecorder(mediaStream);
      mediaChunks = [];
      recordingChar = ch;

      mediaRecorder.ondataavailable = e => {
        if(e.data && e.data.size > 0) mediaChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        const type = mediaRecorder.mimeType || mime || "audio/webm";
        const blob = new Blob(mediaChunks, {type});
        if(mediaStream){
          mediaStream.getTracks().forEach(t => t.stop());
          mediaStream = null;
        }
        mediaRecorder = null;

        if(blob.size > 0){
          await saveRecording(ch, blob, type);
          bump(ch,"recordCount");
          addReward("まねっこ できた！");
          openDetail(ch);
        }else{
          toast("こえが とれなかったよ");
          openDetail(ch);
        }
        recordingChar = null;
      };

      mediaRecorder.start();
      const btn = document.getElementById("recordBtn");
      if(btn){
        btn.innerHTML = "<span>⏹️</span>とめる";
        btn.classList.add("danger");
      }
      toast("ろくおんちゅう...");
    }catch(e){
      toast("おうちの人にマイクをゆるしてもらってね");
      if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
      mediaRecorder = null;
      recordingChar = null;
    }
  }

  function setTraceStage(stage){
    if(!traceSession) return;
    traceSession.stage = stage;
    clearTraceCanvasOnly();

    const box = document.getElementById("traceBox");
    const hint = document.getElementById("strokeHint");
    const doneBtn = document.getElementById("traceDoneBtn");

    if(box) box.classList.toggle("freeWrite", stage === 3);

    for(let i=1;i<=3;i++){
      const el = document.getElementById(`traceStep${i}`);
      if(!el) continue;
      el.classList.toggle("active", i === stage);
      el.classList.toggle("done", i < stage);
    }

    if(stage === 1){
      if(hint) hint.textContent = "① こわれたもじの橋をなおそう";
      if(doneBtn) doneBtn.innerHTML = "<span>➡️</span>つぎへ";
    }else if(stage === 2){
      if(hint) hint.textContent = "② もういちどキラキラにしよう";
      if(doneBtn) doneBtn.innerHTML = "<span>➡️</span>つぎへ";
    }else{
      if(hint) hint.textContent = "③ じぶんのもじで かいがらをひらこう";
      if(doneBtn) doneBtn.innerHTML = "<span>✨</span>できた";
    }
  }

  function setupTraceCanvas(){
    const canvas = document.getElementById("traceCanvas");
    if(!canvas) return;
    const ctx = canvas.getContext("2d");
    traceSession = {canvas,ctx,points:0,drawing:false,stage:1,char:selectedChar};

    function resize(){
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.lineWidth = 18;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#0874a4";
      ctx.shadowColor = "rgba(0,120,170,.22)";
      ctx.shadowBlur = 8;
    }
    resize();

    function pos(e){
      const r = canvas.getBoundingClientRect();
      return {x:e.clientX-r.left,y:e.clientY-r.top};
    }

    canvas.onpointerdown = e => {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      traceSession.drawing = true;
      const p = pos(e);
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      traceSession.points++;
    };

    canvas.onpointermove = e => {
      if(!traceSession.drawing) return;
      e.preventDefault();
      const p = pos(e);
      ctx.lineTo(p.x,p.y);
      ctx.stroke();
      traceSession.points++;
    };

    canvas.onpointerup = e => {
      traceSession.drawing = false;
      try{ canvas.releasePointerCapture(e.pointerId); }catch(_){}
    };
    canvas.onpointercancel = () => traceSession.drawing = false;

    setTraceStage(1);
  }

      bubbleBurst("橋がすこしなおったよ！");
      speak("橋がすこしなおったよ。つぎは、キラキラにしよう。");
      setTimeout(() => setTraceStage(2), 650);

      bubbleBurst("キラキラになった！");
      speak("キラキラになったね。さいごは、じぶんのもじで、かいがらをひらこう。");
      setTimeout(() => setTraceStage(3), 650);

    let saved = false;
    try{
      await saveWritingFromTrace(ch);
      saved = true;
    }catch(e){
      console.warn("writing save failed", e);
      toast("たからばこにはしまえなかったけど、できたよ");

    bump(ch,"traceCount");
    addReward(saved ? "かいがらがひらいた！" : "かいがらがひらいた！");

  };

        setTimeout(() => el.classList.remove("missed"), 520);
      }
      toast("あれれ？さかながにげた！");
      speak("あれれ。このさかなじゃなかったみたい。もういっかい、ぷかっとさがそう。");
    }
  };

  window.openParent = function(){
    if(!parentAuthed){
      shell(
        "ここは、おうちの人のばしょだよ。もじをあけたり、きろくをけしたりできるよ。",
        `
        <div class="parentPanel">
          <div style="font-weight:900;text-align:center;margin-bottom:10px;">おとなの人は、3 + 2 のこたえをいれてね</div>
          <input id="parentAnswer" class="input" inputmode="numeric" placeholder="こたえ" />
          <div class="footerNav">
            <button class="bigBtn primary wide" onclick="checkParent()">🔓 はいる</button>
          </div>
        </div>
        `,
        `<div class="footerNav"><button class="pillBtn" onclick="goHome()">🏠 ホーム</button></div>`
      );
      setTimeout(()=>document.getElementById("parentAnswer")?.focus(),50);
      return;
    }
    renderParent();
  };

  window.checkParent = function(){
    const v = document.getElementById("parentAnswer")?.value.trim();
    if(v === "5" || v === "５"){
      parentAuthed = true;
      toast("おやモードを ひらいたよ");
      renderParent();
    }else{
      toast("もういちど たしかめてね");
    }
  };

  function renderParent(){
    const rowHTML = ROWS.map(row => `
      <div class="parentPanel">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <strong>${row.name}</strong>
          <div class="rowTools">
            <button class="pillBtn" onclick="unlockRow('${row.name}')">まとめてあける</button>
            <button class="pillBtn" onclick="lockRow('${row.name}')">まとめてしまう</button>
          </div>
        </div>
        <div class="parentGrid">
          ${row.chars.map(c => {
            const on = state.unlockedChars.includes(c);
            const today = state.todayChars.includes(c);
            return `<button class="parentChar ${on ? "on" : ""} ${today ? "today" : ""}" onclick="toggleUnlock('${c}')">${c}</button>`;
          }).join("")}
        </div>
      </div>
    `).join("");

    const todayChecks = ALL_CHARS.map(c => {
      const locked = !state.unlockedChars.includes(c);
      const checked = state.todayChars.includes(c);
      return `
        <button class="parentChar ${checked ? "today on" : ""} ${locked ? "muted" : ""}" onclick="toggleToday('${c}')" ${locked ? "disabled" : ""}>${c}</button>
      `;
    }).join("");

    shell(
      "おやモードだよ。学習帳で進んだもじだけ、あけてあげよう。",
      `
      <div class="parentPanel">
        <strong>使い方</strong>
        <div style="font-weight:800;line-height:1.6;margin-top:8px;">
          文字ボタンを押すと、解放／ロックを切り替えます。ピンクの枠は「きょうのもじ」です。
        </div>
      </div>

      ${rowHTML}

      <div class="parentPanel">
        <strong>きょうのもじ</strong>
        <div style="font-weight:800;line-height:1.6;margin-top:8px;">解放済みの文字から、今日よく練習する文字を選びます。</div>
        <div class="parentGrid">${todayChecks}</div>
      </div>

      <div class="parentPanel">
        <strong>データ管理</strong>
        <div class="btnGrid" style="margin-top:12px;">
          <button class="bigBtn blue" onclick="resetProgress()"><span>📊</span>進捗リセット</button>
          <button class="bigBtn danger" onclick="deleteAllVoices()"><span>🎙️</span>録音削除</button>
          <button class="bigBtn orange wide" onclick="deleteAllWritings()"><span>🐚</span>書いた文字をすべて削除</button>
        </div>
      </div>
      `,
      `<div class="footerNav">
        <button class="pillBtn" onclick="goHome()">🏠 ホーム</button>
      </div>`
    );
  }

  function findRow(name){
    return ROWS.find(r => r.name === name);
  }

  window.unlockRow = function(name){
    const row = findRow(name);
    if(!row) return;
    row.chars.forEach(c => {
      if(!state.unlockedChars.includes(c)) state.unlockedChars.push(c);
    });
    state.todayChars = [...new Set([...state.todayChars, ...row.chars.slice(0, Math.min(3,row.chars.length))])].filter(c => state.unlockedChars.includes(c));
    saveState();
    renderParent();
  };

  window.lockRow = function(name){
    const row = findRow(name);
    if(!row) return;
    state.unlockedChars = state.unlockedChars.filter(c => !row.chars.includes(c));
    state.todayChars = state.todayChars.filter(c => state.unlockedChars.includes(c));
    if(state.unlockedChars.length === 0){
      state.unlockedChars = ["あ"];
      state.todayChars = ["あ"];
    }
    saveState();
    renderParent();
  };

  window.toggleUnlock = function(ch){
    if(state.unlockedChars.includes(ch)){
      state.unlockedChars = state.unlockedChars.filter(c => c !== ch);
      state.todayChars = state.todayChars.filter(c => c !== ch);
      if(state.unlockedChars.length === 0){
        state.unlockedChars = ["あ"];
        state.todayChars = ["あ"];
        toast("ひとつは あけておくよ");
      }
    }else{
      state.unlockedChars.push(ch);
      if(state.todayChars.length < 5) state.todayChars.push(ch);
    }
    state.unlockedChars = ALL_CHARS.filter(c => state.unlockedChars.includes(c));
    state.todayChars = ALL_CHARS.filter(c => state.todayChars.includes(c) && state.unlockedChars.includes(c));
    saveState();
    renderParent();
  };

  window.toggleToday = function(ch){
    if(!state.unlockedChars.includes(ch)) return;
    if(state.todayChars.includes(ch)){
      state.todayChars = state.todayChars.filter(c => c !== ch);
    }else{
      state.todayChars.push(ch);
    }
    state.todayChars = ALL_CHARS.filter(c => state.todayChars.includes(c) && state.unlockedChars.includes(c));
    saveState();
    renderParent();
  };

  window.resetProgress = function(){
    const ok = confirm("進捗をリセットします。録音は消えません。よろしいですか？");
    if(!ok) return;
    state.progress = {};
    saveState();
    toast("進捗をリセットしました");
    renderParent();
  };

  window.deleteAllVoices = async function(){
    const ok = confirm("録音データをすべて削除します。よろしいですか？");
    if(!ok) return;
    await clearAllRecordings();
    toast("録音を削除しました");
    renderParent();
  };

  window.deleteAllWritings = async function(){
    const ok = confirm("書いた文字の記録をすべて削除します。よろしいですか？");
    if(!ok) return;
    await clearAllWritings();
    toast("書いた文字を削除しました");
    renderParent();
  };

  window.deleteVoiceForChar = async function(ch){
    await deleteRecording(ch);
    toast(`${ch} の録音を削除しました`);
    refreshRecordingStatus(ch);
  };

  window.speak = speak;

  goHome();
})();
</script>
</body>
</html>
