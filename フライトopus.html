<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flight Simulator</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:-apple-system,ui-monospace,monospace; touch-action:none; }
  #scene { position:fixed; inset:0; display:block; }
  .hud { position:fixed; pointer-events:none; color:#5ef2a8; text-shadow:0 0 6px rgba(94,242,168,.5); font-variant-numeric:tabular-nums; }
  .hud-tl { top:max(14px,env(safe-area-inset-top)); left:16px; }
  .hud-tr { top:max(14px,env(safe-area-inset-top)); right:16px; text-align:right; }
  .gauge { font-size:13px; line-height:1.6; letter-spacing:.5px; }
  .gauge b { font-size:22px; font-weight:700; }
  .gauge .u { font-size:11px; opacity:.6; }
  .warn { color:#ff5e5e; text-shadow:0 0 8px rgba(255,94,94,.6); }
  .reticle { position:fixed; top:50%; left:50%; width:60px; height:60px; transform:translate(-50%,-50%); pointer-events:none; }
  .reticle::before,.reticle::after { content:""; position:absolute; background:#5ef2a8; opacity:.35; box-shadow:0 0 6px rgba(94,242,168,.6);}
  .reticle::before { left:50%; top:0; width:1px; height:100%; transform:translateX(-50%);}
  .reticle::after { top:50%; left:0; height:1px; width:100%; transform:translateY(-50%);}
  .reticle span { position:absolute; top:50%; left:50%; width:10px; height:10px; border:1.5px solid #5ef2a8; border-radius:50%; transform:translate(-50%,-50%); box-shadow:0 0 6px rgba(94,242,168,.6);}
  #throttle { position:fixed; right:18px; bottom:max(28px,env(safe-area-inset-bottom)); width:56px; height:200px; background:rgba(10,20,16,.55); border:1px solid rgba(94,242,168,.4); border-radius:28px; pointer-events:auto; backdrop-filter:blur(6px);}
  #throttle .fill { position:absolute; bottom:0; left:0; width:100%; background:linear-gradient(0deg,#2dd47e,#5ef2a8); border-radius:0 0 28px 28px;}
  #throttle .knob { position:absolute; left:50%; width:46px; height:46px; transform:translate(-50%,50%); border-radius:50%; background:#0a0e14; border:2px solid #5ef2a8; box-shadow:0 0 10px rgba(94,242,168,.5);}
  #throttle .lbl { position:absolute; top:-22px; width:100%; text-align:center; font-size:10px; color:#5ef2a8; letter-spacing:1px;}
  .btn { pointer-events:auto; position:fixed; background:rgba(10,20,16,.55); border:1px solid rgba(94,242,168,.4); color:#5ef2a8; border-radius:14px; padding:10px 14px; font-size:12px; letter-spacing:1px; backdrop-filter:blur(6px); font-family:inherit;}
  #recenter { left:18px; bottom:max(28px,env(safe-area-inset-bottom)); }
  #pause { left:18px; bottom:calc(max(28px,env(safe-area-inset-bottom)) + 50px); }
  #gate { position:fixed; inset:0; background:radial-gradient(ellipse at 50% 35%,#16314a 0%,#070b11 70%); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:32px; text-align:center; z-index:50;}
  #gate h1 { color:#eaf6ff; font-size:30px; font-weight:800; letter-spacing:2px;}
  #gate h1 span { color:#5ef2a8; display:block; font-size:13px; letter-spacing:6px; font-weight:500; margin-top:6px; opacity:.8;}
  #gate p { color:#9bb3c7; font-size:13px; line-height:1.7; max-width:300px;}
  #gate .go { pointer-events:auto; background:#5ef2a8; color:#06120c; border:none; padding:16px 40px; border-radius:40px; font-size:15px; font-weight:700; letter-spacing:2px; font-family:inherit; box-shadow:0 0 30px rgba(94,242,168,.4);}
  #gate small { color:#5d7184; font-size:11px;}
  .tilt-demo { width:120px; height:70px; border:2px solid #5ef2a8; border-radius:12px; animation:tilt 3s ease-in-out infinite;}
  @keyframes tilt { 0%,100%{transform:rotate(-12deg)} 50%{transform:rotate(12deg)} }
  @media (prefers-reduced-motion:reduce){ .tilt-demo{animation:none} }
  #err { position:fixed; inset:0; z-index:99; display:none; flex-direction:column; gap:10px; padding:28px; background:#0a0e14; color:#ff8a8a; font-size:13px; line-height:1.7; overflow:auto; white-space:pre-wrap;}
  #err b { color:#ffd27a; }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="hud hud-tl">
  <div class="gauge">SPD<br><b id="spd">0</b> <span class="u">kt</span></div>
  <div class="gauge" style="margin-top:10px">ALT<br><b id="alt">0</b> <span class="u">ft</span></div>
</div>
<div class="hud hud-tr">
  <div class="gauge">HDG <b id="hdg">000</b></div>
  <div class="gauge" style="margin-top:10px">VS <b id="vs">0</b> <span class="u">fpm</span></div>
  <div class="gauge warn" id="stall" style="margin-top:10px; visibility:hidden">STALL</div>
</div>
<div class="reticle"><span></span></div>

<div id="throttle"><div class="lbl">THR</div><div class="fill"></div><div class="knob"></div></div>
<button class="btn" id="recenter">RECENTER</button>
<button class="btn" id="pause">PAUSE</button>

<div id="gate">
  <h1>FLIGHT SIM<span>TILT TO FLY</span></h1>
  <div class="tilt-demo"></div>
  <p>端末を傾けて操縦。前後で機首上下、左右でロール。右スライダーでスロットル。センサーが無ければ画面ドラッグでも操作できます。</p>
  <button class="go" id="start">START</button>
  <small id="hint">読み込み中…</small>
</div>

<div id="err"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js" onerror="var h=document.getElementById('hint'); if(h) h.textContent='Three.js読み込み失敗：ネット接続を確認してください';"></script>
<script>
function showErr(msg){ var e=document.getElementById('err'); e.style.display='flex'; e.textContent='エラーが発生しました\n\n'+String(msg); }
window.addEventListener('error', function(ev){ showErr(ev.message + (ev.filename? '\n'+ev.filename+':'+ev.lineno : '')); });
window.addEventListener('unhandledrejection', function(ev){ showErr(ev.reason); });

(function(){
  if (typeof THREE === 'undefined'){ document.getElementById('hint').textContent='Three.jsが読み込めませんでした（オフライン環境では動きません）'; return; }
  document.getElementById('hint').textContent='タップで開始';

  var canvas=document.getElementById('scene');
  var renderer=new THREE.WebGLRenderer({canvas:canvas, antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);

  var scene=new THREE.Scene();
  scene.background=new THREE.Color(0x9cc4e0);
  scene.fog=new THREE.FogExp2(0xaecbe0,0.00018);
  var camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,1,60000);

  var sun=new THREE.DirectionalLight(0xfff2d8,1.6); sun.position.set(2000,4000,1000); scene.add(sun);
  scene.add(new THREE.HemisphereLight(0xbfe0ff,0x4a6648,0.9));
  var sunDisc=new THREE.Mesh(new THREE.SphereGeometry(600,16,16),new THREE.MeshBasicMaterial({color:0xfff6e0})); scene.add(sunDisc);

  var SIZE=40000,SEG=200;
  var geo=new THREE.PlaneGeometry(SIZE,SIZE,SEG,SEG); geo.rotateX(-Math.PI/2);
  var pos=geo.attributes.position;
  function noise(x,z){ return Math.sin(x*0.0006)*Math.cos(z*0.0005)*420 + Math.sin(x*0.0021+1.3)*Math.cos(z*0.0017)*150 + Math.sin(x*0.0009)*Math.sin(z*0.003)*220; }
  var colors=[],cLow=new THREE.Color(0x3f6b3a),cHigh=new THREE.Color(0x8a8d6b),cSnow=new THREE.Color(0xeef2f4);
  for(var i=0;i<pos.count;i++){ var x=pos.getX(i),z=pos.getZ(i),h=noise(x,z); if(h<0)h*=0.25; pos.setY(i,h);
    var c=cLow.clone(); if(h>250)c.lerp(cHigh,Math.min(1,(h-250)/350)); if(h>520)c.lerp(cSnow,Math.min(1,(h-520)/200)); colors.push(c.r,c.g,c.b); }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3)); geo.computeVertexNormals();
  scene.add(new THREE.Mesh(geo,new THREE.MeshLambertMaterial({vertexColors:true})));

  var water=new THREE.Mesh(new THREE.PlaneGeometry(SIZE,SIZE),new THREE.MeshLambertMaterial({color:0x2f6f9e,transparent:true,opacity:.9}));
  water.rotation.x=-Math.PI/2; water.position.y=2; scene.add(water);
  var rwy=new THREE.Mesh(new THREE.PlaneGeometry(60,1400),new THREE.MeshLambertMaterial({color:0x222428}));
  rwy.rotation.x=-Math.PI/2; rwy.position.set(0,8,0); scene.add(rwy);

  var trees=new THREE.InstancedMesh(new THREE.ConeGeometry(18,70,6),new THREE.MeshLambertMaterial({color:0x2f5e34}),1200);
  var m=new THREE.Matrix4();
  for(var t=0;t<1200;t++){ var tx=(Math.random()-.5)*30000,tz=(Math.random()-.5)*30000,th=noise(tx,tz);
    if(th<60||th>500)m.makeScale(0,0,0); else m.makeTranslation(tx,th+35,tz); trees.setMatrixAt(t,m); }
  scene.add(trees);

  var plane=new THREE.Object3D(); plane.position.set(0,600,600); scene.add(plane);
  var state={speed:120,throttle:0.5,pitch:0,pitchTarget:0,rollTarget:0,paused:false};

  var tilt={beta:0,gamma:0},baseBeta=45,baseGamma=0,calibrated=false,sensorActive=false;
  function onOrient(e){ if(e.beta===null)return; sensorActive=true; tilt.beta=e.beta; tilt.gamma=e.gamma; if(!calibrated){baseBeta=e.beta;baseGamma=e.gamma;calibrated=true;} }
  document.getElementById('recenter').onclick=function(){ calibrated=false; };

  var dragging=false;
  canvas.addEventListener('pointerdown',function(){dragging=true;});
  addEventListener('pointerup',function(){dragging=false;});
  addEventListener('pointermove',function(e){ if(!dragging)return; state.rollTarget=-(e.clientX/innerWidth-0.5)*1.2; state.pitchTarget=(e.clientY/innerHeight-0.5)*0.8; });

  var thr=document.getElementById('throttle'),fill=thr.querySelector('.fill'),knob=thr.querySelector('.knob');
  function setThrottle(v){ v=Math.max(0,Math.min(1,v)); state.throttle=v; fill.style.height=(v*100)+'%'; knob.style.bottom=(v*100)+'%'; }
  setThrottle(0.5);
  var thrDrag=false;
  function thrFrom(e){ var r=thr.getBoundingClientRect(); setThrottle(1-(e.clientY-r.top)/r.height); }
  thr.addEventListener('pointerdown',function(e){thrDrag=true;thrFrom(e);e.preventDefault();e.stopPropagation();});
  addEventListener('pointermove',function(e){ if(thrDrag)thrFrom(e); });
  addEventListener('pointerup',function(){thrDrag=false;});

  document.getElementById('pause').onclick=function(){ state.paused=!state.paused; this.textContent=state.paused?'RESUME':'PAUSE'; };

  var started=false;
  document.getElementById('start').onclick=function(){
    if(started)return; started=true;
    function go(){ document.getElementById('gate').style.display='none'; last=performance.now(); requestAnimationFrame(loop); }
    try{
      if(typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){
        DeviceOrientationEvent.requestPermission().then(function(r){ if(r==='granted')addEventListener('deviceorientation',onOrient); go(); }).catch(go);
      } else { addEventListener('deviceorientation',onOrient); go(); }
    }catch(_){ go(); }
  };

  var elSpd=document.getElementById('spd'),elAlt=document.getElementById('alt'),elHdg=document.getElementById('hdg'),elVs=document.getElementById('vs'),elStall=document.getElementById('stall');
  var last=performance.now(),heading=0,prevAlt=plane.position.y,vs=0,q=new THREE.Quaternion();

  function loop(now){
    var dt=Math.min(0.05,(now-last)/1000); last=now;
    if(!state.paused){
      if(sensorActive&&calibrated){
        state.pitchTarget=THREE.MathUtils.clamp((tilt.beta-baseBeta)/45,-1,1)*0.7;
        state.rollTarget=THREE.MathUtils.clamp((tilt.gamma-baseGamma)/45,-1,1)*1.2;
      }
      state.pitch+=(state.pitchTarget-state.pitch)*Math.min(1,dt*3);
      var roll=state.rollTarget;
      var targetSpeed=60+state.throttle*220;
      state.speed+=(targetSpeed-state.speed)*Math.min(1,dt*0.4);
      state.speed-=state.pitch*40*dt; state.speed=Math.max(0,state.speed);
      var stalling=state.speed<55; elStall.style.visibility=stalling?'visible':'hidden';
      heading+=(-roll*0.5*(stalling?0.3:1))*dt;
      q.setFromEuler(new THREE.Euler(state.pitch,heading,-roll,'YXZ'));
      plane.quaternion.slerp(q,Math.min(1,dt*4));
      var fwd=new THREE.Vector3(0,0,-1).applyQuaternion(plane.quaternion);
      plane.position.addScaledVector(fwd,state.speed*0.514*dt);
      if(stalling)plane.position.y-=60*dt;
      var groundH=Math.max(noise(plane.position.x,plane.position.z),2);
      if(plane.position.y<groundH+12){ plane.position.set(0,600,600); heading=0; state.speed=120; state.pitch=0; }
      vs=(plane.position.y-prevAlt)/dt*196.85; prevAlt=plane.position.y;
      var camPos=plane.position.clone().add(new THREE.Vector3(0,7,26).applyQuaternion(plane.quaternion));
      camera.position.lerp(camPos,Math.min(1,dt*6));
      camera.lookAt(plane.position.clone().add(new THREE.Vector3(0,2,-20).applyQuaternion(plane.quaternion)));
      camera.up.set(0,1,0).applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1),-roll*0.6));
      sunDisc.position.copy(camera.position).add(sun.position);
      elSpd.textContent=Math.round(state.speed);
      elAlt.textContent=Math.round(plane.position.y*3.28);
      elHdg.textContent=String(Math.round(((-heading*180/Math.PI)%360+360)%360)).padStart(3,'0');
      elVs.textContent=(vs>=0?'+':'')+Math.round(vs/10)*10;
    }
    renderer.render(scene,camera);
    requestAnimationFrame(loop);
  }

  addEventListener('resize',function(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
})();
</script>
</body>
</html>
