<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonicForge | AI Compose</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .active-tab { color: #38bdf8 !important; border-bottom: 2px solid #38bdf8; }
        .abcjs-container { background: white; padding: 10px; border-radius: 8px; overflow-x: auto; color: black; }
        select { background: #1e293b; border: 1px solid #334155; padding: 8px; border-radius: 6px; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-8">

    <header class="px-4 py-2 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="text-xl font-bold bg-gradient-to-r from-sky-400 to-emerald-400 bg-clip-text text-transparent">SonicForge</h1>
        <nav class="flex gap-2">
            <button onclick="toggleView('compose')" id="nav-compose" class="p-2 transition-colors active-tab text-slate-400">
                <i data-lucide="plus-circle" class="w-5 h-5"></i>
            </button>
            <button onclick="toggleView('player')" id="nav-player" class="p-2 transition-colors text-slate-400">
                <i data-lucide="play-circle" class="w-5 h-5"></i>
            </button>
            <button onclick="toggleView('library')" id="nav-library" class="p-2 transition-colors text-slate-400">
                <i data-lucide="folder-heart" class="w-5 h-5"></i>
            </button>
        </nav>
    </header>

    <main id="main-content" class="p-4 max-w-md mx-auto space-y-6">
        
        <section id="view-compose" class="space-y-4">
            <div class="glass p-4 rounded-2xl space-y-4">
                <h2 class="text-sm font-semibold text-sky-400 flex items-center gap-2">
                    <i data-lucide="music-2" class="w-4 h-4"></i> 楽曲コンセプト設定
                </h2>
                
                <div class="space-y-3">
                    <label class="block text-xs text-slate-400">大分類ジャンル</label>
                    <select id="genre-main" onchange="updateSubGenre()"></select>
                    
                    <label class="block text-xs text-slate-400">中分類スタイル</label>
                    <select id="genre-sub"></select>

                    <label class="block text-xs text-slate-400">シチュエーション</label>
                    <select id="genre-detail"></select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">小節数</label>
                        <select id="measure-count">
                            <option value="8">8小節</option>
                            <option value="16">16小節</option>
                            <option value="32" selected>32小節</option>
                            <option value="64">64小節</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">パート数 (最大8)</label>
                        <input type="range" id="part-count" min="1" max="8" value="3" class="w-full">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs text-slate-400">必須楽器 (複数選択可)</label>
                    <div id="instrument-chips" class="flex flex-wrap gap-2">
                        </div>
                </div>

                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="loop-check" class="w-4 h-4 accent-sky-400">
                    <label for="loop-check" class="text-sm">エンドレスリピートを有効にする</label>
                </div>

                <div class="space-y-1">
                    <label class="block text-xs text-slate-400">追加のこだわり（自由入力）</label>
                    <textarea id="free-text" class="w-full h-20 bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm" placeholder="例：短調から長調へ劇的に転調させて..."></textarea>
                </div>

                <button id="btn-generate" onclick="generatePrompt()" class="w-full py-4 bg-sky-500 hover:bg-sky-400 rounded-xl font-bold transition-all flex justify-center items-center gap-2">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Gemini用プロンプトを生成
                </button>

            </div>
        </section>

        <section id="view-player" class="hidden space-y-4">
            <button onclick="loadJsonFromClipboard()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold transition-all flex justify-center items-center gap-2 shadow-lg shadow-emerald-900/50">
                <i data-lucide="clipboard-paste" class="w-5 h-5"></i> クリップボードから曲(JSON)を読み込む
            </button>

            <div class="glass p-4 rounded-2xl">
                <div id="display-notation">
                    <div id="notation-paper" class="abcjs-container"></div>
                </div>

                <div class="mt-4 text-center space-y-2">
                    <h3 id="current-title" class="text-lg font-bold">曲名未定</h3>
                    <p id="current-meta" class="text-xs text-slate-400">Generating vibe...</p>
                    <div id="player-rating" class="flex justify-center gap-1 text-slate-500">
                        <i data-lucide="star" class="w-5 h-5 cursor-pointer" onclick="setRating(1)"></i>
                        <i data-lucide="star" class="w-5 h-5 cursor-pointer" onclick="setRating(2)"></i>
                        <i data-lucide="star" class="w-5 h-5 cursor-pointer" onclick="setRating(3)"></i>
                        <i data-lucide="star" class="w-5 h-5 cursor-pointer" onclick="setRating(4)"></i>
                        <i data-lucide="star" class="w-5 h-5 cursor-pointer" onclick="setRating(5)"></i>
                    </div>
                </div>

                <div class="flex justify-center gap-6 mt-6">
                    <button onclick="rewindMusic()" class="p-3 bg-slate-800 rounded-full"><i data-lucide="skip-back"></i></button>
                    <button id="btn-play-pause" onclick="togglePlay()" class="p-5 bg-sky-500 rounded-full"><i data-lucide="play" fill="currentColor"></i></button>
                    <button onclick="saveToLibrary()" class="p-3 bg-slate-800 rounded-full"><i data-lucide="bookmark"></i></button>
                </div>

                <button onclick="copyAbcCode()" class="w-full mt-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl text-xs font-bold transition-all flex justify-center items-center gap-2">
                    <i data-lucide="code" class="w-4 h-4"></i> 楽曲コード(ABC)をコピーして外部で使う
                </button>
            </div>

            <div class="glass p-4 rounded-2xl space-y-3">
                <h4 class="text-xs font-semibold text-emerald-400">AIに修正プロンプトを生成する</h4>
                <div class="flex gap-2">
                    <input id="refine-text" type="text" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 text-sm" placeholder="例：ドラムをもっと激しくして...">
                    <button onclick="generateRefinePrompt()" class="p-2 bg-emerald-600 rounded-lg"><i data-lucide="file-text"></i></button>
                </div>
            </div>
        </section>

        <section id="view-library" class="hidden space-y-4 relative">
            <h2 class="text-lg font-bold">マイ・ライブラリ</h2>
            <div id="library-list" class="space-y-2">
            </div>
            <div id="library-modal" class="hidden absolute top-0 left-0 w-full h-full glass rounded-2xl p-6 flex flex-col gap-4 z-10 shadow-2xl bg-slate-900/90">
                <h3 id="modal-title" class="text-xl font-bold text-sky-400"></h3>
                <div id="modal-rating" class="flex gap-1 text-yellow-400 text-lg"></div>
                <p id="modal-desc" class="text-sm text-slate-300 flex-1 overflow-y-auto leading-relaxed"></p>
                <div id="hidden-modal-paper" class="hidden"></div>
                <div class="grid grid-cols-2 gap-2 mt-auto">
                    <button id="btn-modal-play" class="w-full py-3 bg-amber-500 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-colors hover:bg-amber-400"><i data-lucide="play" class="w-4 h-4"></i> 再生</button>
                    <button id="btn-modal-load" class="w-full py-3 bg-sky-500 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-colors hover:bg-sky-400"><i data-lucide="download" class="w-4 h-4"></i> 読込</button>
                    <button onclick="closeLibraryModal()" class="w-full py-3 bg-slate-700 rounded-xl text-sm font-bold transition-colors hover:bg-slate-600">閉じる</button>
                    <button id="btn-modal-delete" class="w-full py-3 bg-red-600 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-colors hover:bg-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i> 削除</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- データ定義 ---
        const GENRES = {
            "指定しない": {
                styles: ["指定しない"],
                situations: ["指定しない"]
            },
            "ゲーム音楽": {
                styles: ["指定しない", "古典ファンタジー", "現代オープンワールド", "8bitレトロ", "サイバーパンクRPG", "ニーア風絶望", "ソウルライク", "ペルソナ風ジャズ", "タクティクスRPG風", "ホラーゲーム風", "和風アクション"],
                situations: ["指定しない", "通常戦闘", "中ボス戦", "ラストボス（第一形態）", "ラストボス（最終形態）", "フィールド・旅立ち", "静かな村", "悲しい別れ", "王宮・威厳", "謎解き・ダンジョン", "ゲームオーバー"]
            },
            "映像音楽・シネマティック": {
                styles: ["指定しない", "ハリウッド級エピック", "サスペンス・スリラー", "ハートフル・ヒューマンドラマ", "SF・宇宙探査", "歴史大河ドラマ", "ジブリ風オーケストラ", "ノスタルジック・日常"],
                situations: ["指定しない", "壮大なタイトルバック", "主人公の絶体絶命", "感動的な再会", "緊迫の追跡劇", "静かなる決意", "不思議な生き物との出会い", "大団円・エンディング"]
            },
            "J-Pop / アニソン": {
                styles: ["指定しない", "2000年代熱血アニソン", "現代シティポップ", "疾走系ロック", "泣きメロバラード", "電波系アイドルソング", "ボカロ風ロック"],
                situations: ["指定しない", "オープニングテーマ", "エンディングテーマ", "挿入歌・覚醒シーン", "失恋・別れのシーン", "青春の1ページ", "日常系アニメのBGM"]
            },
            "クラシック・伝統音楽": {
                styles: ["指定しない", "壮大な交響曲", "バロック調（チェンバロ主体）", "弦楽四重奏", "ピアノ独奏", "ケルト音楽", "和風・雅楽テイスト"],
                situations: ["指定しない", "優雅な舞踏会", "厳粛な儀式", "神聖な聖堂", "午後のティータイム", "安らかな眠り", "異国情緒あふれる市場"]
            },
            "アンビエント / BGM": {
                styles: ["指定しない", "瞑想の森", "深海・水中", "雨の日のカフェ", "宇宙の孤独", "ローファイ・ヒップホップ", "コーポレートVP風", "EDM・クラブ系"],
                situations: ["指定しない", "作業用BGM", "リラックス・入眠", "おしゃれな店舗BGM", "企業プレゼン用", "不気味な廃墟", "サイバー都市の夜"]
            }
        };
        const INSTRUMENTS = ["Piano", "Pipe Organ", "Choir", "Violin", "Viola", "Cello", "Timpani", "Distortion Guitar", "Harp", "Flute", "Trumpet", "Drums", "Shakuhachi", "Koto"];

        let currentABC = "";
        let currentMetaRaw = "";
        let currentLibraryId = null;
        let currentRating = 0;
        let synthControl = null;
        let selectedInstruments = [];
        let library = [];

        const dbPromise = new Promise((resolve, reject) => {
            const request = indexedDB.open('SonicForgeDB', 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('library')) {
                    db.createObjectStore('library', { keyPath: 'id', autoIncrement: true });
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });

        async function loadLibraryFromDB() {
            const db = await dbPromise;
            return new Promise((resolve) => {
                const tx = db.transaction('library', 'readonly');
                const request = tx.objectStore('library').getAll();
                request.onsuccess = () => {
                    library = request.result;
                    resolve();
                };
            });
        }

        // --- 初期化 ---
        window.onload = async () => {
            lucide.createIcons();
            initGenreSelect();
            initInstrumentChips();
            await loadLibraryFromDB();
            updateLibraryList();
        };

        function initGenreSelect() {
            const main = document.getElementById('genre-main');
            main.innerHTML = "";
            Object.keys(GENRES).forEach(g => {
                main.innerHTML += `<option value="${g}">${g}</option>`;
            });
            // 大分類セット時に中分類とシチュエーションを連動更新
            updateSubGenre();
        }

        function updateSubGenre() {
            const mainVal = document.getElementById('genre-main').value;
            const sub = document.getElementById('genre-sub');
            const detail = document.getElementById('genre-detail');
            
            sub.innerHTML = "";
            detail.innerHTML = "";
            
            const selectedGenre = GENRES[mainVal] || GENRES["指定しない"];
            
            selectedGenre.styles.forEach(s => {
                sub.innerHTML += `<option value="${s}">${s}</option>`;
            });
            
            selectedGenre.situations.forEach(s => {
                detail.innerHTML += `<option value="${s}">${s}</option>`;
            });
        }

        function initInstrumentChips() {
            const container = document.getElementById('instrument-chips');
            INSTRUMENTS.forEach(inst => {
                const span = document.createElement('span');
                span.className = "px-3 py-1 bg-slate-800 rounded-full text-xs cursor-pointer border border-transparent";
                span.innerText = inst;
                span.onclick = () => {
                    span.classList.toggle('bg-sky-600');
                    span.classList.toggle('border-sky-300');
                    if (selectedInstruments.includes(inst)) {
                        selectedInstruments = selectedInstruments.filter(i => i !== inst);
                    } else {
                        selectedInstruments.push(inst);
                    }
                };
                container.appendChild(span);
            });
        }

        // --- プロンプト生成・連携機能 ---
        function generatePrompt() {
            const promptData = {
                genre: document.getElementById('genre-main').value,
                style: document.getElementById('genre-sub').value,
                situation: document.getElementById('genre-detail').value,
                measures: document.getElementById('measure-count').value,
                parts: document.getElementById('part-count').value,
                instruments: selectedInstruments.length > 0 ? selectedInstruments.join(', ') : '指定なし',
                loop: document.getElementById('loop-check').checked ? 'あり' : 'なし',
                memo: document.getElementById('free-text').value || '特になし'
            };

            const finalPrompt = `あなたはプロの作曲家であり、ABC記法のエキスパートです。以下の条件に基づいて、高品質な楽曲を作成してください。\n\n【楽曲の条件】\n- 大分類ジャンル: ${promptData.genre}\n- 中分類スタイル: ${promptData.style}\n- シチュエーション: ${promptData.situation}\n- 長さ: ${promptData.measures}小節\n- パート数: ${promptData.parts}重奏\n- 必須楽器: ${promptData.instruments}\n- エンドレスリピート: ${promptData.loop}\n- 追加のこだわり: ${promptData.memo}\n\n【作業の順序と制約】\n以下の順序を徹底して作曲を行ってください。\n1. まず、指定された条件に最適な「主旋律（メロディ）」を検討し、単音のABC記法として作成してください。\n2. 次に、その主旋律をベースにして、指定されたパート数・楽器を用いた「多重奏」へと拡張してください。多重奏の場合は V:1, V:2... を使用し、各パートに楽器名(nm)を設定するとともに、必ず各パートの定義部で '%%MIDI program [番号]' を記述し、対象の楽器に合致する「General MIDIのプログラム番号(0〜127)」を割り当ててください（例: バイオリンなら %%MIDI program 40）。この指定がないとWebアプリで全てピアノの音になってしまいます。\n3. 最後に、Webアプリで読み込むために、作成した多重奏のABC記法データを含めた以下のJSON形式でのみ出力してください（※解説テキストやマークダウンの枠外の文章は一切不要です）。\n\n【出力JSONフォーマット】\n\`\`\`json\n{\n  "title": "曲名(英語または日本語)",\n  "abc": "多重奏のABC記法データ(改行は \\n にエスケープすること)",\n  "description": "曲の雰囲気や表現したポイントの解説"\n}\n\`\`\``;

            copyTextToClipboard(finalPrompt, "作曲用プロンプトをコピーしました！\nGeminiに貼り付け、出力されたJSONをコピーしたら「再生」タブの読み込みボタンを押してください。");
            toggleView('player'); // プロンプトコピー後、自動的に再生タブへ遷移
        }

        function generateRefinePrompt() {
            const refineText = document.getElementById('refine-text').value;
            if(!refineText) {
                alert("修正指示を入力してください。");
                return;
            }
            
            const prompt = `以下のABC記法の楽曲データをベースに、次の修正指示に従って楽曲をアップデートしてください。\n\n【修正指示】\n${refineText}\n\n【現在のABCデータ】\n${currentABC}\n\n【作業の順序と制約】\n1. 修正指示に基づき、まず主旋律の調整を行い、その後多重奏全体のバランスを整えてください。その際、各パートに '%%MIDI program [番号]' が正しく設定されているか確認し、意図した楽器の音色になるよう維持・付与してください。\n2. 最終的な結果を、前回と同じJSONフォーマット({"title", "abc", "description"})でのみ出力してください。解説は不要です。`;
            
            copyTextToClipboard(prompt, "修正用プロンプトをコピーしました！\nGeminiに貼り付け、出力されたJSONをコピーしたら再度上部の読み込みボタンを押してください。");
            document.getElementById('refine-text').value = ''; // 入力欄をクリア
            window.scrollTo({ top: 0, behavior: 'smooth' }); // ボタンが押しやすいように一番上へスクロール
        }

        function copyTextToClipboard(text, msg) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand("copy");
                alert(msg);
            } catch (err) {
                alert("コピーに失敗しました。");
            }
            document.body.removeChild(textArea);
        }

        async function loadJsonFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text) throw new Error("クリップボードが空です");
                
                // Markdownのコードブロックが含まれている場合を除去
                const cleanJsonText = text.replace(/^```json/mi, '').replace(/```$/mi, '').trim();
                const result = JSON.parse(cleanJsonText);
                
                if(!result.abc || !result.title) throw new Error("不正なフォーマットです");

                renderMusic(result.abc, result.title, result.description || "");
            } catch (e) {
                alert("JSONの読み込みに失敗しました。\nGeminiの出力したJSONが正しくコピーされているか、またはブラウザの『クリップボード許可設定』を確認してください。");
                console.error(e);
            }
        }

        // --- 再生・レンダリング ---
        function renderMusic(abc, title, meta, libId = null, rating = 0) {
            if (typeof stopAllMusic === 'function') stopAllMusic();
            currentABC = abc;
            currentMetaRaw = meta;
            currentLibraryId = libId;
            currentRating = rating;
            document.getElementById('current-title').innerText = title;
            document.getElementById('current-meta').innerText = meta;
            updatePlayerRatingUI();
            
            const visualObj = ABCJS.renderAbc("notation-paper", abc, { responsive: "resize" })[0];
            
            if (ABCJS.synth.supportsAudio()) {
                const midi = new ABCJS.synth.CreateSynth();
                midi.init({ visualObj: visualObj })
                    .then(() => midi.prime())
                    .then(() => {
                        window.currentMidi = midi;
                    })
                    .catch(err => console.error("Audio Init Error:", err));
            }

            // 再生状態をリセット
            window.isPlaying = false;
            const btn = document.getElementById('btn-play-pause');
            if(btn) btn.innerHTML = '<i data-lucide="play" fill="currentColor"></i>';
            lucide.createIcons();
        }

        async function togglePlay() {
            if (!window.currentMidi) {
                alert("音源（SoundFont）を読み込み中です。数秒待ってから再度お試しください。");
                return;
            }
            const btn = document.getElementById('btn-play-pause');
            if (window.isPlaying) {
                stopAllMusic();
            } else {
                stopAllMusic();
                await window.currentMidi.start();
                btn.innerHTML = '<i data-lucide="pause" fill="currentColor"></i>';
                window.isPlaying = true;
                lucide.createIcons();
            }
        }

        function stopAllMusic() {
            let changed = false;
            if (window.currentMidi && window.isPlaying) {
                window.currentMidi.stop();
                window.isPlaying = false;
                const btn = document.getElementById('btn-play-pause');
                if (btn) btn.innerHTML = '<i data-lucide="play" fill="currentColor"></i>';
                changed = true;
            }
            if (window.modalMidi && window.isModalPlaying) {
                window.modalMidi.stop();
                window.isModalPlaying = false;
                const modalBtn = document.getElementById('btn-modal-play');
                if (modalBtn) modalBtn.innerHTML = '<i data-lucide="play" class="w-4 h-4"></i> 再生';
                changed = true;
            }
            if (changed) lucide.createIcons();
        }

        async function toggleModalPlay(idx) {
            if (window.isModalPlaying) {
                stopAllMusic();
                return;
            }
            stopAllMusic();
            
            const btn = document.getElementById('btn-modal-play');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 準備中';
            lucide.createIcons();

            try {
                const item = library[idx];
                const visualObj = ABCJS.renderAbc("hidden-modal-paper", item.abc)[0];
                
                window.modalMidi = new ABCJS.synth.CreateSynth();
                await window.modalMidi.init({ visualObj: visualObj });
                await window.modalMidi.prime();
                await window.modalMidi.start();
                
                window.isModalPlaying = true;
                btn.innerHTML = '<i data-lucide="square" class="w-4 h-4"></i> 停止';
            } catch (e) {
                console.error(e);
                alert("再生に失敗しました");
                btn.innerHTML = '<i data-lucide="play" class="w-4 h-4"></i> 再生';
            }
            lucide.createIcons();
        }

        function rewindMusic() {
            if (window.currentMidi) {
                window.currentMidi.stop();
                if (window.isPlaying) {
                    window.currentMidi.start();
                }
            }
        }

        async function setRating(stars) {
            currentRating = stars;
            updatePlayerRatingUI();
            
            if (currentLibraryId !== null) {
                try {
                    const db = await dbPromise;
                    const tx = db.transaction('library', 'readwrite');
                    const store = tx.objectStore('library');
                    const req = store.get(currentLibraryId);
                    req.onsuccess = () => {
                        const data = req.result;
                        if(data) {
                            data.rating = stars;
                            store.put(data);
                            tx.oncomplete = async () => {
                                await loadLibraryFromDB();
                                updateLibraryList();
                            };
                        }
                    };
                } catch(e) { console.error("Rating Save Error:", e); }
            }
        }

        function updatePlayerRatingUI() {
            const stars = document.querySelectorAll('#player-rating i, #player-rating svg');
            stars.forEach((star, idx) => {
                if (idx < currentRating) {
                    star.classList.remove('text-slate-500');
                    star.classList.add('text-yellow-400');
                    star.setAttribute('fill', 'currentColor');
                } else {
                    star.classList.remove('text-yellow-400');
                    star.classList.add('text-slate-500');
                    star.setAttribute('fill', 'none');
                }
            });
        }

        // --- ユーティリティ ---
        function copyAbcCode() {
            if (!currentABC) {
                alert("コピーする楽曲データがありません。");
                return;
            }
            copyTextToClipboard(currentABC, "楽曲のコード(ABC記法)をコピーしました！\nお手持ちのゲームエンジンや自作アプリ内でご活用ください。");
        }

        function toggleView(view) {
            ['compose', 'player', 'library'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`nav-${v}`).classList.remove('active-tab');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`nav-${view}`).classList.add('active-tab');
        }

        async function saveToLibrary() {
            if (!currentABC) {
                alert("保存する楽曲データがありません。");
                return;
            }
            if (currentLibraryId !== null) {
                alert("この曲はすでに保存されています。評価の変更は自動で保存されます。");
                return;
            }
            const title = document.getElementById('current-title').innerText;
            const item = { 
                title, 
                abc: currentABC, 
                description: currentMetaRaw, 
                rating: currentRating, 
                date: new Date().toLocaleDateString() 
            };

            try {
                const db = await dbPromise;
                const tx = db.transaction('library', 'readwrite');
                const req = tx.objectStore('library').add(item);
                req.onsuccess = (e) => { currentLibraryId = e.target.result; };
                tx.oncomplete = async () => {
                    alert("ライブラリに保存しました！");
                    await loadLibraryFromDB();
                    updateLibraryList();
                };
            } catch (err) {
                console.error("IndexedDB Save Error:", err);
                alert("保存に失敗しました。");
            }
        }

        function updateLibraryList() {
            const list = document.getElementById('library-list');
            list.innerHTML = library.map((item, idx) => {
                const stars = '★'.repeat(item.rating || 0) + '☆'.repeat(5 - (item.rating || 0));
                return `
                <div class="glass p-3 rounded-xl flex justify-between items-center cursor-pointer hover:bg-slate-800 transition" onclick="showLibraryModal(${idx})">
                    <div>
                        <div class="font-bold text-sm">${item.title}</div>
                        <div class="text-[10px] text-slate-500">${item.date} <span class="text-yellow-400 ml-2 text-xs">${stars}</span></div>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500"></i>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function showLibraryModal(idx) {
            const item = library[idx];
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-desc').innerText = item.description || "説明はありません。";
            document.getElementById('modal-rating').innerText = '★'.repeat(item.rating || 0) + '☆'.repeat(5 - (item.rating || 0));
            document.getElementById('btn-modal-load').onclick = () => {
                closeLibraryModal();
                loadFromLibrary(idx);
            };
            document.getElementById('btn-modal-delete').onclick = () => {
                deleteFromLibrary(item.id);
            };
            document.getElementById('btn-modal-play').onclick = () => {
                toggleModalPlay(idx);
            };
            document.getElementById('btn-modal-play').innerHTML = '<i data-lucide="play" class="w-4 h-4"></i> 再生';
            lucide.createIcons();
            document.getElementById('library-modal').classList.remove('hidden');
        }

        async function deleteFromLibrary(id) {
            if (!confirm("本当にこの楽曲を削除しますか？")) return;
            try {
                const db = await dbPromise;
                const tx = db.transaction('library', 'readwrite');
                tx.objectStore('library').delete(id);
                tx.oncomplete = async () => {
                    closeLibraryModal();
                    if (currentLibraryId === id) {
                        currentLibraryId = null;
                    }
                    await loadLibraryFromDB();
                    updateLibraryList();
                };
            } catch (e) {
                console.error("Delete Error:", e);
                alert("削除に失敗しました。");
            }
        }

        function closeLibraryModal() {
            if (window.isModalPlaying && typeof stopAllMusic === 'function') stopAllMusic();
            document.getElementById('library-modal').classList.add('hidden');
        }

        function loadFromLibrary(idx) {
            const item = library[idx];
            renderMusic(item.abc, item.title, item.description || "Saved from library", item.id, item.rating || 0);
            toggleView('player');
        }
    </script>
</body>
</html>
