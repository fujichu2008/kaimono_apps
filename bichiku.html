<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 初期データ（サンプルの初期在庫）
        const initialInventory = [
            { id: 1, category: "食品", name: "自家製きゅうりの浅漬け", location: "冷蔵庫", quantity: 1, unit: "タッパー", expiry: "2026-04-10", photo: null },
            { id: 2, category: "食品", name: "牛乳", location: "冷蔵庫横食品庫", quantity: 6, unit: "個", expiry: "2026-10-01", photo: null },
            { id: 3, category: "エネルギー", name: "カセットボンベ", location: "床下収納", quantity: 12, unit: "本", expiry: "2032-01-01", photo: null },
            { id: 4, category: "日用品", name: "ゴミ袋(45L)", location: "パントリー", quantity: 50, unit: "枚", expiry: "", photo: null },
            { id: 5, category: "衛生用品", name: "大人用マスク", location: "玄関収納", quantity: 100, unit: "枚", expiry: "", photo: null },
            { id: 6, category: "食品", name: "ミネラルウォーター(2L)", location: "床下収納", quantity: 12, unit: "本", expiry: "2028-08-01", photo: null }
        ];

                const SCENARIOS = [
            "地震・台風（インフラ停止・短期サバイバル）",
            "台湾有事（物流分断・長期ローリングストック）",
            "ホルムズ海峡途絶（エネルギー・油脂類高騰）",
            "日常モード（期限切れ間近の消費）"
        ];

        const DB_NAME = "stockguard-ai-db";
        const STORE_NAME = "appState";
                const APP_STATE_KEY = "stockguard-main";

        const DEFAULT_LOCATIONS = [
            "キッチン下収納",
            "キッチン吊戸棚",
            "キッチン食器棚",
            "冷蔵庫横食品庫",
            "リビングクローゼット",
            "階段下収納",
            "１F洗面台",
            "脱衣所収納",
            "廊下収納スペース",
            "玄関ウォークスルークローゼット",
            "トイレ",
            "2F倉庫スペース",
            "2Fウォークスルークローゼット",
            "子供部屋",
            "寝室",
            "仕事部屋",
            "家裏倉庫"
        ];

        function openStockGuardDB() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    resolve(null);
                    return;
                }
                const request = window.indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id" });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function loadPersistedState() {
            const db = await openStockGuardDB();
            if (!db) return null;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, "readonly");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(APP_STATE_KEY);
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => reject(request.error);
                transaction.oncomplete = () => db.close();
                transaction.onerror = () => reject(transaction.error);
            });
        }

        async function savePersistedState(state) {
            const db = await openStockGuardDB();
            if (!db) return;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                store.put({ id: APP_STATE_KEY, ...state });
                transaction.oncomplete = () => {
                    db.close();
                    resolve();
                };
                transaction.onerror = () => reject(transaction.error);
            });
        }

        function App() {
                        const [inventory, setInventory] = useState(initialInventory);
                                                const [viewMode, setViewMode] = useState("list");
                        const [isDbReady, setIsDbReady] = useState(false);
            const [locations, setLocations] = useState(DEFAULT_LOCATIONS);
            const [lastUsedLocation, setLastUsedLocation] = useState(DEFAULT_LOCATIONS[0] || "");
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
            const [newLocationName, setNewLocationName] = useState("");
            const createBlankRow = (category = "食品") => ({
                id: `blank-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                category,
                name: "",
                location: "",
                quantity: "",
                unit: "",
                expiry: "",
                photo: null
            });
            const [blankRow, setBlankRow] = useState(() => createBlankRow());
                        const [activeCategory, setActiveCategory] = useState("すべて");
            const [isAiModalOpen, setIsAiModalOpen] = useState(false);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [newItem, setNewItem] = useState({ category: "食品", name: "", location: DEFAULT_LOCATIONS[0] || "", quantity: 1, unit: "個", expiry: "", photo: null });
            const [selectedScenario, setSelectedScenario] = useState(SCENARIOS[0]);
            const [generatedPrompt, setGeneratedPrompt] = useState("");

                        // アイコンの描画（マウント時）
            useEffect(() => {
                lucide.createIcons();
            });

                        useEffect(() => {
                let mounted = true;

                const loadStoredState = async () => {
                    try {
                        const savedState = await loadPersistedState();
                        if (!mounted) return;

                        const persistedInventory = savedState && Array.isArray(savedState.inventory) ? savedState.inventory : initialInventory;
                        const persistedLocations = savedState && Array.isArray(savedState.locations) && savedState.locations.length
                            ? savedState.locations
                            : DEFAULT_LOCATIONS;
                        const mergedLocations = Array.from(new Set([
                            ...persistedLocations,
                            ...persistedInventory.map(item => item.location).filter(Boolean)
                        ]));
                        const restoredLastUsedLocation =
                            savedState && savedState.lastUsedLocation && mergedLocations.includes(savedState.lastUsedLocation)
                                ? savedState.lastUsedLocation
                                : (persistedInventory[persistedInventory.length - 1]?.location || mergedLocations[0] || "");

                        setInventory(persistedInventory);
                        setLocations(mergedLocations);
                        setLastUsedLocation(restoredLastUsedLocation);
                        setNewItem(prev => ({
                            ...prev,
                            location: restoredLastUsedLocation || mergedLocations[0] || ""
                        }));

                        if (savedState && savedState.viewMode) {
                            setViewMode(savedState.viewMode);
                        }
                    } catch (error) {
                        console.error("IndexedDB load failed:", error);
                    } finally {
                        if (mounted) {
                            setIsDbReady(true);
                        }
                    }
                };

                loadStoredState();

                return () => {
                    mounted = false;
                };
            }, []);

                        const categories = ["すべて", "食品", "エネルギー", "衛生用品", "日用品"];
            const unitOptions = ["個", "本", "枚", "パック", "箱", "袋", "缶", "g", "kg", "ml", "L", "セット"];
                        const locationOptions = locations.length ? locations : DEFAULT_LOCATIONS;

            const filteredInventory = useMemo(() => {
                return activeCategory === "すべて" 
                    ? inventory 
                    : inventory.filter(item => item.category === activeCategory);
            }, [inventory, activeCategory]);

                        // 数量変更ロジック
            const updateQuantity = (id, delta) => {
                setInventory(inventory.map(item => {
                    if (item.id === id) {
                        const newQuantity = Math.max(0, item.quantity + delta);
                        return { ...item, quantity: newQuantity };
                    }
                    return item;
                }));
            };

            // 写真アップロードロジック
            const handlePhotoUpload = (id, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setInventory(inventory.map(item => item.id === id ? { ...item, photo: reader.result } : item));
                    };
                    reader.readAsDataURL(file);
                }
            };

                                                const updateItemField = (id, field, value) => {
                setInventory(prev => prev.map(item => item.id === id ? { ...item, [field]: value } : item));
            };

            const isBlankRowFilled = (item) => {
                return Boolean(
                    String(item.name || "").trim() ||
                    String(item.location || "").trim() ||
                    String(item.quantity ?? "").trim() ||
                    String(item.unit || "").trim() ||
                    String(item.expiry || "").trim() ||
                    item.photo
                );
            };

            const commitBlankRow = (nextRow) => {
                setInventory(prev => [
                    ...prev,
                    {
                        ...nextRow,
                        quantity: nextRow.quantity === "" ? 0 : Math.max(0, parseInt(nextRow.quantity, 10) || 0)
                    }
                ]);
                setBlankRow(createBlankRow(activeCategory === "すべて" ? "食品" : activeCategory));
            };

            const updateBlankRowField = (field, value) => {
                const nextRow = { ...blankRow, [field]: value };
                if (isBlankRowFilled(nextRow)) {
                    commitBlankRow(nextRow);
                } else {
                    setBlankRow(nextRow);
                }
            };

            const handleBlankRowPhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const nextRow = { ...blankRow, photo: reader.result };
                        commitBlankRow(nextRow);
                    };
                    reader.readAsDataURL(file);
                }
            };

                        const addLocation = () => {
                const trimmed = newLocationName.trim();
                if (!trimmed) return;
                setLocations(prev => prev.includes(trimmed) ? prev : [...prev, trimmed]);
                setNewLocationName("");
            };

            const moveLocation = (index, direction) => {
                setLocations(prev => {
                    const targetIndex = index + direction;
                    if (targetIndex < 0 || targetIndex >= prev.length) return prev;
                    const next = [...prev];
                    [next[index], next[targetIndex]] = [next[targetIndex], next[index]];
                    return next;
                });
            };

            // AIプロンプト生成ロジック
            const generateAiPrompt = () => {
                const dataJson = JSON.stringify(inventory, null, 2);
                const prompt = `あなたはプロの防災アドバイザー兼、家庭内リソース管理の専門家です。
以下のJSONデータは、現在の我が家の在庫状況です。

【想定する有事シナリオ】
${selectedScenario}

【指示】
上記のシナリオに基づき、以下の在庫データを分析してください。
1. 賞味期限や劣化を考慮し、どの順番で消費すべきかの具体的なアクションプラン。
2. 選択された有事シナリオを乗り切るために、現在不足しており買い足すべき備蓄品のアドバイス。
3. リソース（水、熱源、衛生など）を最適に配分するための注意点。

【現在の在庫データ(JSON)】
${dataJson}
`;
                setGeneratedPrompt(prompt);
            };

            // AIモーダルを開くときの処理
                        useEffect(() => {
                if (isAiModalOpen) {
                    generateAiPrompt();
                }
            }, [isAiModalOpen, selectedScenario, inventory]);

                                    useEffect(() => {

                savePersistedState({ inventory, viewMode, locations, lastUsedLocation }).catch(error => {
                    console.error("IndexedDB save failed:", error);
                });
            }, [inventory, viewMode, locations, lastUsedLocation, isDbReady]);

                        useEffect(() => {

                } else {

                }

            useEffect(() => {

                setNewItem(prev => ({
                    ...prev,
                    location: prev.location && locationOptions.includes(prev.location) ? prev.location : fallbackLocation
                }));
            }, [isAddModalOpen, lastUsedLocation, locations]);

                        return (
                <div className="flex h-screen bg-gray-100 font-sans text-gray-800">

                        {unitOptions.map(u => <option key={u} value={u} />)}
                    </datalist>

                    <div className="w-64 bg-white shadow-lg flex flex-col">

                            <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                                <h2 className="text-2xl font-bold">{activeCategory}の在庫</h2>
                                <div className="flex items-center gap-1 bg-gray-100 rounded-xl p-1 border border-gray-200 w-fit">
                                    <button
                                        onClick={() => setViewMode("card")}
                                        className={`px-3 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 transition ${viewMode === "card" ? "bg-white text-gray-800 shadow-sm" : "text-gray-500 hover:text-gray-700"}`}

                                    <button
                                        onClick={() => setViewMode("list")}

                                    >
                                        <i data-lucide="list" className="w-4 h-4"></i> リスト
                                    </button>

                            </div>
                            <button onClick={() => setIsAddModalOpen(true)} className="bg-white text-gray-700 px-4 py-2 rounded-xl border border-gray-200 shadow-sm flex items-center gap-2 hover:bg-gray-50 hover:border-gray-300 active:scale-95 transition text-sm font-semibold">
                                <i data-lucide="plus"></i> アイテム登録
                            </button>
                        </header>

                        <main className="flex-1 p-6 overflow-y-auto">
                            {viewMode === "card" ? (
                                <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 content-start">
                            {filteredInventory.map(item => (
                                <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col relative">
                                    {/* 期限アラート表示（簡易ロジック） */}
                                    {item.expiry && new Date(item.expiry) < new Date(new Date().setMonth(new Date().getMonth() + 3)) && (
                                        <span className="absolute top-2 right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full z-10">
                                            期限注意

                                    )}
                                    
                                                                        {/* 写真エリア */}
                                    <div className="h-32 bg-gray-200 flex items-center justify-center relative group cursor-pointer" onClick={() => document.getElementById(`photo-upload-${item.id}`).click()}>
                                        {item.photo ? (
                                            <img src={item.photo} className="w-full h-full object-cover" />
                                        ) : (
                                            <i data-lucide="camera" className="text-gray-400 w-8 h-8 group-hover:scale-110 transition"></i>
                                        )}
                                        <div className="absolute bottom-0 left-0 bg-black bg-opacity-50 text-white text-xs px-2 py-1 m-2 rounded">
                                            {item.location}
                                        </div>
                                        <input type="file" id={`photo-upload-${item.id}`} accept="image/*" className="hidden" onChange={(e) => handlePhotoUpload(item.id, e)} />
                                    </div>

                                    {/* 情報エリア */}
                                    <div className="p-4 flex-1 flex flex-col justify-between">
                                        <div>
                                            <div className="text-xs text-blue-500 font-semibold mb-1">{item.category}</div>
                                            <h3 className="font-bold text-lg leading-tight mb-2">{item.name}</h3>
                                            {item.expiry && (
                                                <div className="text-sm text-gray-500 flex items-center gap-1 mb-3">
                                                    <i data-lucide="calendar" className="w-4 h-4"></i> {item.expiry}
                                                </div>
                                            )}
                                        </div>
                                        
                                        {/* クイックエディット（数量変更） */}
                                        <div className="flex items-center justify-between mt-auto pt-3 border-t">
                                            <span className="text-xl font-bold">{item.quantity} <span className="text-sm font-normal text-gray-500">{item.unit}</span></span>
                                            <div className="flex gap-1">
                                                <button onClick={() => updateQuantity(item.id, -1)} className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 active:bg-gray-300 transition text-xl">-</button>
                                                <button onClick={() => updateQuantity(item.id, 1)} className="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-200 active:bg-blue-300 transition text-xl">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                                                        </div>
                            ) : (
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="min-w-[980px] w-full text-sm">
                                            <thead className="bg-gray-50 border-b border-gray-200">
                                                <tr className="text-left text-gray-600">
                                                    <th className="px-4 py-3 font-semibold">写真</th>
                                                    <th className="px-4 py-3 font-semibold">カテゴリ</th>
                                                    <th className="px-4 py-3 font-semibold">品目名</th>
                                                    <th className="px-4 py-3 font-semibold">保管場所</th>
                                                    <th className="px-4 py-3 font-semibold">数量</th>
                                                    <th className="px-4 py-3 font-semibold">単位</th>
                                                    <th className="px-4 py-3 font-semibold">期限</th>
                                                    <th className="px-4 py-3 font-semibold">状態</th>
                                                </tr>
                                            </thead>
                                                                                        <tbody className="divide-y divide-gray-100">
                                                {filteredInventory.map(item => {
                                                    const isExpirySoon = item.expiry && new Date(item.expiry) < new Date(new Date().setMonth(new Date().getMonth() + 3));
                                                    return (
                                                        <tr key={item.id} className="hover:bg-gray-50 align-top">
                                                            <td className="px-4 py-3">
                                                                <div className="flex items-center gap-2">
                                                                    <button
                                                                        onClick={() => document.getElementById(`list-photo-upload-${item.id}`).click()}
                                                                        className="w-10 h-10 rounded-lg border border-gray-200 bg-white hover:bg-gray-50 flex items-center justify-center transition"
                                                                    >
                                                                        <i data-lucide="camera" className="w-4 h-4 text-gray-500"></i>
                                                                    </button>
                                                                    <span className="text-xs text-gray-500 whitespace-nowrap">{item.photo ? "登録済み" : "未登録"}</span>
                                                                    <input
                                                                        type="file"
                                                                        id={`list-photo-upload-${item.id}`}
                                                                        accept="image/*"
                                                                        className="hidden"
                                                                        onChange={(e) => handlePhotoUpload(item.id, e)}
                                                                    />
                                                                </div>
                                                            </td>
                                                            <td className="px-4 py-3 min-w-[140px]">
                                                                <select
                                                                    value={item.category}
                                                                    onChange={e => updateItemField(item.id, "category", e.target.value)}
                                                                    className="w-full bg-white border border-gray-200 rounded-lg p-2.5"
                                                                >
                                                                    {categories.filter(c => c !== "すべて").map(c => <option key={c}>{c}</option>)}
