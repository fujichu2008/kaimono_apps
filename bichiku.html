        function dataUrlToBlob(dataUrl) {
            if (!dataUrl || typeof dataUrl !== "string" || !dataUrl.startsWith("data:")) {
                return null;
            }
            const parts = dataUrl.split(",");
            if (parts.length < 2) return null;
            const mimeMatch = parts[0].match(/data:(.*?);base64/);
            const mimeType = mimeMatch ? mimeMatch[1] : "image/jpeg";
            const binary = atob(parts[1]);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i += 1) {
                bytes[i] = binary.charCodeAt(i);
            }
            return new Blob([bytes], { type: mimeType });
        }

        function openStockGuardDB() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    resolve(null);
                    return;
                }
                const request = window.indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(LEGACY_STORE_NAME)) {
                        db.createObjectStore(LEGACY_STORE_NAME, { keyPath: "id" });
                    }
                    if (!db.objectStoreNames.contains(SETTINGS_STORE_NAME)) {
                        db.createObjectStore(SETTINGS_STORE_NAME, { keyPath: "id" });
                    }
                    if (!db.objectStoreNames.contains(INVENTORY_STORE_NAME)) {
                        db.createObjectStore(INVENTORY_STORE_NAME, { keyPath: "id" });
                    }
                    if (!db.objectStoreNames.contains(IMAGE_STORE_NAME)) {
                        db.createObjectStore(IMAGE_STORE_NAME, { keyPath: "id" });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function readStoreRecord(db, storeName, key) {
            return new Promise((resolve, reject) => {
                if (!db.objectStoreNames.contains(storeName)) {
                    resolve(null);
                    return;
                }
                const transaction = db.transaction(storeName, "readonly");
                const store = transaction.objectStore(storeName);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => reject(request.error);
                transaction.onerror = () => reject(transaction.error);
            });
        }

        function readAllStoreRecords(db, storeName) {
            return new Promise((resolve, reject) => {
                if (!db.objectStoreNames.contains(storeName)) {
                    resolve([]);
                    return;
                }
                const transaction = db.transaction(storeName, "readonly");
                const store = transaction.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(Array.isArray(request.result) ? request.result : []);
                request.onerror = () => reject(request.error);
                transaction.onerror = () => reject(transaction.error);
            });
        }

        async function loadPersistedState() {
            const db = await openStockGuardDB();
            if (!db) return null;

            try {
                const [settingsRecord, inventoryRecord, legacyState] = await Promise.all([
                    readStoreRecord(db, SETTINGS_STORE_NAME, SETTINGS_KEY),
                    readStoreRecord(db, INVENTORY_STORE_NAME, INVENTORY_KEY),
                    readStoreRecord(db, LEGACY_STORE_NAME, APP_STATE_KEY)
                ]);

                let persistedInventory = Array.isArray(inventoryRecord && inventoryRecord.items)
                    ? inventoryRecord.items.map(item => ({ ...item, photo: null, photoBlob: null }))
                    : null;

                if (persistedInventory && db.objectStoreNames.contains(IMAGE_STORE_NAME)) {
                    const photoRecords = await readAllStoreRecords(db, IMAGE_STORE_NAME);
                    const photoMap = new Map(
                        photoRecords.map(record => [String(record.id), record.blob || null])
                    );
                    persistedInventory = persistedInventory.map(item => ({
                        ...item,
                        photo: null,
                        photoBlob: photoMap.get(String(item.id)) || null
                    }));
                } else if (!persistedInventory && legacyState && Array.isArray(legacyState.inventory)) {
                    persistedInventory = legacyState.inventory.map(item => ({
                        ...item,
                        photo: item.photo || null,
                        photoBlob: null
                    }));
                }

                return {
                    ...(legacyState || {}),
                    ...((settingsRecord && settingsRecord.data) || {}),
                    inventory: persistedInventory
                };
            } finally {
                db.close();
            }
        }

        async function savePersistedInventory(inventory) {
            const db = await openStockGuardDB();
            if (!db) return;

            const normalizedItems = (Array.isArray(inventory) ? inventory : []).map(item => {
                const photoBlob = item && item.photoBlob
                    ? item.photoBlob
                    : dataUrlToBlob(item && item.photo);
                const { photo, photoBlob: _photoBlob, ...rest } = item || {};
                return {
                    persistedItem: { ...rest },
                    photoBlob: photoBlob || null
                };
            });

            return new Promise((resolve, reject) => {
                const transaction = db.transaction([INVENTORY_STORE_NAME, IMAGE_STORE_NAME], "readwrite");
                const inventoryStore = transaction.objectStore(INVENTORY_STORE_NAME);
                const imageStore = transaction.objectStore(IMAGE_STORE_NAME);

                inventoryStore.put({
                    id: INVENTORY_KEY,
                    items: normalizedItems.map(entry => entry.persistedItem)
                });

                const validImageIds = new Set();

                normalizedItems.forEach(entry => {
                    const imageId = String(entry.persistedItem.id);
                    validImageIds.add(imageId);
                    if (entry.photoBlob) {
                        imageStore.put({ id: imageId, blob: entry.photoBlob });
                    } else {
                        imageStore.delete(imageId);
                    }
                });

                const keysRequest = imageStore.getAllKeys();
                keysRequest.onsuccess = () => {
                    (keysRequest.result || []).forEach(key => {
                        if (!validImageIds.has(String(key))) {
                            imageStore.delete(key);
                        }
                    });
                };
                keysRequest.onerror = () => reject(keysRequest.error);

                transaction.oncomplete = () => {
                    db.close();
                    resolve();
                };
                transaction.onerror = () => {
                    db.close();
                    reject(transaction.error);
                };
                transaction.onabort = () => {
                    db.close();
                    reject(transaction.error);
                };
            });
        }

                    db.close();
                    reject(transaction.error);
                };
                transaction.onabort = () => {
                    db.close();
                    reject(transaction.error);
                };
            });
        }

                                                const filteredInventory = useMemo(() => {
                const normalizedKeyword = String(inventorySearchKeyword || "").trim().toLowerCase();
                const baseByCategory = activeCategory === "すべて"
                    ? inventory
                    : inventory.filter(item => item.category === activeCategory);
                const base = !normalizedKeyword
                    ? baseByCategory
                    : baseByCategory.filter(item => {
                        const searchTargets = [item.name, item.category, item.location, item.unit];
                        return searchTargets.some(value => String(value || "").toLowerCase().includes(normalizedKeyword));
                    });

                if (sortField === "none") return base;

                const sorted = [...base];

                if (sortField === "category") {
                    sorted.sort((a, b) => String(a.category || "").localeCompare(String(b.category || ""), "ja"));
                } else if (sortField === "location") {
                    const getLocationIndex = (location) => {
                        const index = locationOptions.indexOf(location);
                        return index === -1 ? Number.MAX_SAFE_INTEGER : index;
                    };
                    sorted.sort((a, b) => {
                        const diff = getLocationIndex(a.location) - getLocationIndex(b.location);
                        if (diff !== 0) return diff;
                        return String(a.name || "").localeCompare(String(b.name || ""), "ja");
                    });
                } else if (sortField === "expiry") {
                    sorted.sort((a, b) => {
                        const aHasExpiry = Boolean(a.expiry);
                        const bHasExpiry = Boolean(b.expiry);
                        if (aHasExpiry && bHasExpiry) return String(a.expiry).localeCompare(String(b.expiry), "ja");
                        if (aHasExpiry) return -1;
                        if (bHasExpiry) return 1;
                        return String(a.name || "").localeCompare(String(b.name || ""), "ja");
                    });
                }

                                return sorted;
                        }, [inventory, activeCategory, sortField, locationOptions, inventorySearchKeyword]);

                                                const compressImageFile = (file, options = {}) => {
                const {
                    maxWidth = 1280,
                    maxHeight = 1280,
                    quality = 0.72,
                    maxOutputBytes = 220 * 1024
                } = options;

                const canvasToBlob = (canvas, type, exportQuality) => new Promise(resolveBlob => {
                    if (typeof canvas.toBlob === "function") {
                        canvas.toBlob(resolveBlob, type, exportQuality);
                    } else {
                        resolveBlob(null);
                    }
                });

                return new Promise((resolve, reject) => {
                    if (!file) {
                        resolve(null);
                        return;
                    }

                    const objectUrl = URL.createObjectURL(file);
                    const image = new Image();

                    const cleanup = () => {
                        try {
                            URL.revokeObjectURL(objectUrl);
                        } catch (error) {
                            console.warn("Object URL cleanup failed:", error);
                        }
                    };

                    image.onload = async () => {
                        try {
                            const width = image.naturalWidth || image.width || 1;
                            const height = image.naturalHeight || image.height || 1;
                            const scale = Math.min(1, maxWidth / width, maxHeight / height);
                            const targetWidth = Math.max(1, Math.round(width * scale));
                            const targetHeight = Math.max(1, Math.round(height * scale));

                            const canvas = document.createElement("canvas");
                            canvas.width = targetWidth;
                            canvas.height = targetHeight;

                            const context = canvas.getContext("2d", { alpha: false });
                            if (!context) {
                                cleanup();
                                resolve(null);
                                return;
                            }

                            context.fillStyle = "#ffffff";
                            context.fillRect(0, 0, targetWidth, targetHeight);
                            context.drawImage(image, 0, 0, targetWidth, targetHeight);

                            let currentQuality = quality;
                            let blob = await canvasToBlob(canvas, "image/webp", currentQuality);

                            while (blob && blob.size > maxOutputBytes && currentQuality > 0.42) {
                                currentQuality = Math.max(0.42, Number((currentQuality - 0.08).toFixed(2)));
                                blob = await canvasToBlob(canvas, "image/webp", currentQuality);
                            }

                            if (!blob) {
                                blob = await canvasToBlob(canvas, "image/jpeg", currentQuality);
                            }

                            cleanup();

                            if (!blob) {
                                const fallbackBlob = dataUrlToBlob(canvas.toDataURL("image/jpeg", currentQuality));
                                if (!fallbackBlob) {
                                    resolve(null);
                                    return;
                                }
                                resolve({
                                    blob: fallbackBlob,
                                    previewUrl: createPreviewUrlFromBlob(fallbackBlob)
                                });
                                return;
                            }

                            resolve({
                                blob,
                                previewUrl: createPreviewUrlFromBlob(blob)
                            });
                        } catch (error) {
                            cleanup();
                            reject(error);
                        }
                    };

                    image.onerror = () => {
                        cleanup();
                        resolve(null);
                    };
                    image.src = objectUrl;
                });
            };

                        const extractJsonTextFromAiResponse = (rawText) => {
                const text = String(rawText || "").trim();
                if (!text) {
                    throw new Error("empty-json");
                }

                if (
                    (text.startsWith("{") && text.endsWith("}")) ||
                    (text.startsWith("[") && text.endsWith("]"))
                ) {
                    JSON.parse(text);
                    return text;
                }

                const fencedMatches = [];
                const fencedRegex = /```(?:json)?\s*([\s\S]*?)```/gi;
                let fencedMatch;

                while ((fencedMatch = fencedRegex.exec(text)) !== null) {
                    fencedMatches.push(String(fencedMatch[1] || "").trim());
                }

                for (let i = fencedMatches.length - 1; i >= 0; i -= 1) {
                    const candidate = fencedMatches[i];
                    if (!candidate) continue;
                    try {
                        JSON.parse(candidate);
                        return candidate;
                    } catch (error) {
                        // 続けて候補を探す
                    }
                }

                const possibleStarts = [];
                for (let i = 0; i < text.length; i += 1) {
                    if (text[i] === "{" || text[i] === "[") {
                        possibleStarts.push(i);
                    }
                }

                for (let i = possibleStarts.length - 1; i >= 0; i -= 1) {
                    const candidate = text.slice(possibleStarts[i]).trim();
                    try {
                        JSON.parse(candidate);
                        return candidate;
                    } catch (error) {
                        // 続けて候補を探す
                    }
                }

                throw new Error("json-not-found");
            };
