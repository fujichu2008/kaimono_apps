        function openStockGuardDB() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    resolve(null);
                    return;
                }
                const request = window.indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id" });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function loadPersistedState() {
            const db = await openStockGuardDB();
            if (!db) return null;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, "readonly");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(APP_STATE_KEY);
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => reject(request.error);
                transaction.oncomplete = () => db.close();
                transaction.onerror = () => reject(transaction.error);
            });
        }

        async function savePersistedState(state) {
            const db = await openStockGuardDB();
            if (!db) return;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, "readwrite");
                const store = transaction.objectStore(STORE_NAME);
                store.put({ id: APP_STATE_KEY, ...state });
                transaction.oncomplete = () => {
                    db.close();
                    resolve();
                };
                transaction.onerror = () => reject(transaction.error);
            });
        }

        function App() {
                        const [inventory, setInventory] = useState(initialInventory);
                                                const [viewMode, setViewMode] = useState("list");
                        const [isDbReady, setIsDbReady] = useState(false);
            const [locations, setLocations] = useState(DEFAULT_LOCATIONS);
            const [lastUsedLocation, setLastUsedLocation] = useState(DEFAULT_LOCATIONS[0] || "");
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
            const [newLocationName, setNewLocationName] = useState("");
            const createBlankRow = (category = "食品") => ({

            const [blankRow, setBlankRow] = useState(() => createBlankRow());
                        const [activeCategory, setActiveCategory] = useState("すべて");
            const [isAiModalOpen, setIsAiModalOpen] = useState(false);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [newItem, setNewItem] = useState({ category: "食品", name: "", location: DEFAULT_LOCATIONS[0] || "", quantity: 1, unit: "個", expiry: "", photo: null });
            const [selectedScenario, setSelectedScenario] = useState(SCENARIOS[0]);
            const [generatedPrompt, setGeneratedPrompt] = useState("");
            const [selectedAnalysisOptions, setSelectedAnalysisOptions] = useState(["consume_plan", "short_actions", "replenishment"]);
            const [aiFreeText, setAiFreeText] = useState("");
            const [aiOutputStyle, setAiOutputStyle] = useState("action");
            const [isPromptPreviewOpen, setIsPromptPreviewOpen] = useState(false);
            const [aiCopyMessage, setAiCopyMessage] = useState("");
                                                const [sortField, setSortField] = useState("none");
                        const [isBarcodeScannerOpen, setIsBarcodeScannerOpen] = useState(false);
            const [isBarcodeSectionExpanded, setIsBarcodeSectionExpanded] = useState(false);
            const [barcodeStatus, setBarcodeStatus] = useState("");
            const [barcodeInput, setBarcodeInput] = useState("");
            const [isBarcodeSupported] = useState(() => typeof window !== "undefined" && "BarcodeDetector" in window);
            const videoRef = useRef(null);
            const scannerStreamRef = useRef(null);

            const parseExpiryDate = (expiry) => {
                if (!expiry) return null;
                const date = new Date(`${expiry}T00:00:00`);
                return Number.isNaN(date.getTime()) ? null : date;
            };

            const getDaysUntilExpiry = (expiry) => {
                const expiryDate = parseExpiryDate(expiry);
                if (!expiryDate) return null;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                return Math.floor((expiryDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
            };

            const formatExpiryStatus = (expiry) => {
                const days = getDaysUntilExpiry(expiry);
                if (days === null) return "期限未設定";
                if (days < 0) return `${Math.abs(days)}日超過`;
                if (days === 0) return "今日まで";
                return `あと${days}日`;
            };

                                                // アイコンの描画（初回表示＋DOM更新時のみ）
            useEffect(() => {
                let rafId = null;

                const refreshIcons = () => {
                    if (rafId !== null) {
                        cancelAnimationFrame(rafId);
                    }
                    rafId = requestAnimationFrame(() => {
                        lucide.createIcons();
                    });
                };

                const rootElement = document.getElementById("root");
                refreshIcons();

                if (!rootElement || typeof MutationObserver === "undefined") {
                    return () => {
                        if (rafId !== null) {
                            cancelAnimationFrame(rafId);
                        }
                    };
                }

                const observer = new MutationObserver(() => {
                    refreshIcons();
                });

                observer.observe(rootElement, {
                    childList: true,
                    subtree: true
                });

                return () => {
                    observer.disconnect();
                    if (rafId !== null) {
                        cancelAnimationFrame(rafId);
                    }
                };
            }, []);

                        useEffect(() => {
                let mounted = true;

                const loadStoredState = async () => {
                    try {
                        const savedState = await loadPersistedState();
                        if (!mounted) return;

                        const persistedInventory = savedState && Array.isArray(savedState.inventory) ? savedState.inventory : initialInventory;
                        const persistedLocations = savedState && Array.isArray(savedState.locations) && savedState.locations.length
                            ? savedState.locations
                            : DEFAULT_LOCATIONS;
                        const mergedLocations = Array.from(new Set([
                            ...persistedLocations,
                            ...persistedInventory.map(item => item.location).filter(Boolean)
                        ]));
                        const restoredLastUsedLocation =
                            savedState && savedState.lastUsedLocation && mergedLocations.includes(savedState.lastUsedLocation)
                                ? savedState.lastUsedLocation
                                : (persistedInventory[persistedInventory.length - 1]?.location || mergedLocations[0] || "");

                        setInventory(persistedInventory);
                        setLocations(mergedLocations);
                        setLastUsedLocation(restoredLastUsedLocation);
                        setNewItem(prev => ({
                            ...prev,
                            location: restoredLastUsedLocation || mergedLocations[0] || ""
                        }));

                                                if (savedState && savedState.viewMode) {
                            setViewMode(savedState.viewMode);
                        }
                        if (savedState && typeof savedState.isBarcodeSectionExpanded === "boolean") {
                            setIsBarcodeSectionExpanded(savedState.isBarcodeSectionExpanded);
                        }
                    } catch (error) {
                        console.error("IndexedDB load failed:", error);
                    } finally {
                        if (mounted) {
                            setIsDbReady(true);
                        }
                    }
                };

                loadStoredState();

                return () => {
                    mounted = false;
                };
            }, []);

                        const categories = ["すべて", "食品", "エネルギー", "衛生用品", "日用品"];
            const unitOptions = ["個", "本", "枚", "パック", "箱", "袋", "缶", "g", "kg", "ml", "L", "セット"];
                        const locationOptions = locations.length ? locations : DEFAULT_LOCATIONS;

                        const filteredInventory = useMemo(() => {
                const base = activeCategory === "すべて"
                    ? inventory
                    : inventory.filter(item => item.category === activeCategory);

                if (sortField === "none") return base;

                const sorted = [...base];

                if (sortField === "category") {
                    sorted.sort((a, b) => String(a.category || "").localeCompare(String(b.category || ""), "ja"));
                } else if (sortField === "location") {
                    const getLocationIndex = (location) => {
                        const index = locationOptions.indexOf(location);
                        return index === -1 ? Number.MAX_SAFE_INTEGER : index;
                    };
                    sorted.sort((a, b) => {
                        const diff = getLocationIndex(a.location) - getLocationIndex(b.location);
                        if (diff !== 0) return diff;
                        return String(a.name || "").localeCompare(String(b.name || ""), "ja");
                    });
                } else if (sortField === "expiry") {
                    sorted.sort((a, b) => {
                        const aHasExpiry = Boolean(a.expiry);
                        const bHasExpiry = Boolean(b.expiry);
                        if (aHasExpiry && bHasExpiry) return String(a.expiry).localeCompare(String(b.expiry), "ja");
                        if (aHasExpiry) return -1;
                        if (bHasExpiry) return 1;
                        return String(a.name || "").localeCompare(String(b.name || ""), "ja");
                    });
                }

                return sorted;
                        }, [inventory, activeCategory, sortField, locationOptions]);

            const expiringItems = useMemo(() => {
                return inventory
                    .filter(item => parseExpiryDate(item.expiry))
                    .map(item => ({
                        ...item,
                        daysUntilExpiry: getDaysUntilExpiry(item.expiry)
                    }))
                    .sort((a, b) => {
                        const dayDiff = a.daysUntilExpiry - b.daysUntilExpiry;
                        if (dayDiff !== 0) return dayDiff;
                        return String(a.name || "").localeCompare(String(b.name || ""), "ja");
                    });
            }, [inventory]);

            const dueIn7DaysItems = useMemo(() => {
                return expiringItems.filter(item => item.daysUntilExpiry >= 0 && item.daysUntilExpiry <= 7);
            }, [expiringItems]);

            const dueIn30DaysItems = useMemo(() => {
                return expiringItems.filter(item => item.daysUntilExpiry >= 0 && item.daysUntilExpiry <= 30);
            }, [expiringItems]);

            const expiredItems = useMemo(() => {
                return expiringItems.filter(item => item.daysUntilExpiry < 0);
            }, [expiringItems]);

            const priorityConsumptionItems = useMemo(() => {
                return expiringItems.filter(item => item.daysUntilExpiry >= 0).slice(0, 5);
            }, [expiringItems]);

            const dashboardCards = [

                        // 数量変更ロジック
            const updateQuantity = (id, delta) => {
                setInventory(inventory.map(item => {
                    if (item.id === id) {
                        const newQuantity = Math.max(0, item.quantity + delta);
                        return { ...item, quantity: newQuantity };

                    return item;
                }));
            };

            // 写真アップロードロジック

                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setInventory(inventory.map(item => item.id === id ? { ...item, photo: reader.result } : item));
                    };
                    reader.readAsDataURL(file);
                }
            };

                                                const updateItemField = (id, field, value) => {

            };

                        const isBlankRowFilled = (item) => {
                return Boolean(
                    String(item.name || "").trim() ||

            };

            const commitBlankRow = (nextRow) => {
                const trimmedName = String(nextRow.name || "").trim();
                if (!trimmedName) return false;

                const normalizedLocation = nextRow.location || lastUsedLocation || locationOptions[0] || "";

                setInventory(prev => [
                    ...prev,
                    {
                        ...nextRow,
                        name: trimmedName,
                        location: normalizedLocation,
                        unit: normalizedUnit,
                        quantity: nextRow.quantity === "" ? 0 : Math.max(0, parseInt(nextRow.quantity, 10) || 0)
                    }

                if (normalizedLocation) {
                    setLastUsedLocation(normalizedLocation);
                }
                setBlankRow(createBlankRow(activeCategory === "すべて" ? "食品" : activeCategory));
                return true;
            };

            const commitBlankRowIfReady = () => {
                commitBlankRow(blankRow);
            };

            const updateBlankRowField = (field, value) => {
                setBlankRow(prev => ({ ...prev, [field]: value }));
            };

            const handleBlankRowBlur = (e) => {
                const currentTarget = e.currentTarget;
                window.setTimeout(() => {
                    if (!currentTarget.contains(document.activeElement)) {
                        commitBlankRowIfReady();
                    }
                }, 0);
            };

            const handleBlankRowKeyDown = (e) => {
                if (e.key !== "Enter" || e.nativeEvent.isComposing) return;
                e.preventDefault();
                commitBlankRowIfReady();
            };

                                                                                                const toggleBarcodeSection = () => {
                setIsBarcodeSectionExpanded(prev => {
                    const next = !prev;
                    if (!next) {
                        stopBarcodeScanner();
                    }
                    return next;
                });
            };

            const applyBarcodeToName = () => {
                const trimmed = String(barcodeInput || "").trim();
                if (!trimmed) return;
                setNewItem(prev => ({ ...prev, name: trimmed }));
                setBarcodeStatus("入力内容を品目名に反映しました。");
            };

            const stopBarcodeScanner = (shouldClose = true) => {
                if (scannerRafRef.current !== null) {
                    cancelAnimationFrame(scannerRafRef.current);
                    scannerRafRef.current = null;
                }
                if (scannerStreamRef.current) {
                    scannerStreamRef.current.getTracks().forEach(track => track.stop());
                    scannerStreamRef.current = null;
                }
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject = null;
                }
                if (shouldClose) {
                    setIsBarcodeScannerOpen(false);
                }
            };

            const scanBarcodeLoop = async () => {
                const video = videoRef.current;
                const detector = barcodeDetectorRef.current;

                if (!video || !detector || !scannerStreamRef.current) {
                    return;
                }

                if (video.readyState >= 2) {
                    try {
                        const detectedCodes = await detector.detect(video);
                        const rawValue = detectedCodes && detectedCodes[0] && detectedCodes[0].rawValue
                            ? String(detectedCodes[0].rawValue).trim()
                            : "";

                        if (rawValue) {
                            setBarcodeInput(rawValue);
                            setNewItem(prev => ({ ...prev, name: rawValue }));
                            setBarcodeStatus("バーコードを読み取り、品目名に反映しました。");
                            stopBarcodeScanner();
                            return;
                        }
                    } catch (error) {
                        console.error("Barcode detection failed:", error);
                        setBarcodeStatus("読取に失敗しました。下の欄に手入力してください。");
                        stopBarcodeScanner();
                        return;
                    }
                }

                scannerRafRef.current = requestAnimationFrame(scanBarcodeLoop);
            };

            const startBarcodeScanner = async () => {
                if (!isBarcodeSupported || typeof window.BarcodeDetector === "undefined") {
                    setBarcodeStatus("この環境では自動読取に未対応です。下の欄に手入力してください。");
                    setIsBarcodeScannerOpen(false);
                    return;
                }

                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    setBarcodeStatus("この端末ではカメラを利用できません。下の欄に手入力してください。");
                    setIsBarcodeScannerOpen(false);
                    return;
                }

                try {
                    stopBarcodeScanner(false);
                    setBarcodeStatus("カメラを起動しています…");

                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: "environment" } },
                        audio: false
                    });

                    scannerStreamRef.current = stream;
                    barcodeDetectorRef.current = barcodeDetectorRef.current || new window.BarcodeDetector();
                    setIsBarcodeScannerOpen(true);

                    await new Promise(resolve => {
                        const video = videoRef.current;
                        if (!video) {
                            resolve();
                            return;
                        }
                        video.onloadedmetadata = () => {
                            const playResult = video.play();
                            if (playResult && typeof playResult.then === "function") {
                                playResult.then(resolve).catch(resolve);
                            } else {
                                resolve();
                            }
                        };
                        video.srcObject = stream;
                    });

                    setBarcodeStatus("バーコードを枠内に合わせてください。");
                    scannerRafRef.current = requestAnimationFrame(scanBarcodeLoop);
                } catch (error) {
                    console.error("Camera start failed:", error);
                    setBarcodeStatus("カメラを起動できませんでした。下の欄に手入力してください。");
                    stopBarcodeScanner();
                }
            };

            const addLocation = () => {
                const trimmed = newLocationName.trim();
                if (!trimmed) return;
                setLocations(prev => prev.includes(trimmed) ? prev : [...prev, trimmed]);
                setNewLocationName("");
            };

            const moveLocation = (index, direction) => {
                setLocations(prev => {
                    const targetIndex = index + direction;
                    if (targetIndex < 0 || targetIndex >= prev.length) return prev;
                    const next = [...prev];
                    [next[index], next[targetIndex]] = [next[targetIndex], next[index]];
                    return next;
                });
            };

                        // AIプロンプト生成ロジック
            const toggleAnalysisOption = (optionKey) => {
                setSelectedAnalysisOptions(prev =>
                    prev.includes(optionKey)
                        ? prev.filter(key => key !== optionKey)
                        : [...prev, optionKey]
                );
            };

            const createAiPromptText = () => {
                const selectedAnalysisLabels = AI_ANALYSIS_OPTIONS
                    .filter(option => selectedAnalysisOptions.includes(option.key))
                    .map(option => option.label);

                const outputStyleLabel =
                    AI_OUTPUT_STYLE_OPTIONS.find(option => option.key === aiOutputStyle)?.label || "今日やること重視";

                const extraInstruction = String(aiFreeText || "").trim();

            const copyTextToClipboard = async (text) => {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    return true;
                }

                const textarea = document.createElement("textarea");
                textarea.value = text;
                textarea.setAttribute("readonly", "");
                textarea.style.position = "fixed";
                textarea.style.opacity = "0";
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();

                try {
                    const copied = document.execCommand("copy");
                    document.body.removeChild(textarea);
                    return copied;
                } catch (error) {
                    document.body.removeChild(textarea);
                    throw error;
                }
