        function getSuggestedUnitByItemName(name) {
            const normalizedName = String(name || "").trim();
            if (!normalizedName) return "";
            const matchedRule = UNIT_SUGGESTION_RULES.find(rule =>
                rule.keywords.some(keyword => normalizedName.includes(keyword))
            );
            return matchedRule ? matchedRule.unit : "";
        }

        function dataUrlToBlob(dataUrl) {
            if (!dataUrl || typeof dataUrl !== "string" || !dataUrl.startsWith("data:")) {
                return null;
            }
            const parts = dataUrl.split(",");
            if (parts.length < 2) return null;
            const mimeMatch = parts[0].match(/data:(.*?);base64/);
            const mimeType = mimeMatch ? mimeMatch[1] : "image/jpeg";
            const binary = atob(parts[1]);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i += 1) {
                bytes[i] = binary.charCodeAt(i);
            }
            return new Blob([bytes], { type: mimeType });
        }

        function openStockGuardDB() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    resolve(null);
                    return;
                }
                const request = window.indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(LEGACY_STORE_NAME)) {
                        db.createObjectStore(LEGACY_STORE_NAME, { keyPath: "id" });
                    }
                    if (!db.objectStoreNames.contains(SETTINGS_STORE_NAME)) {
                        db.createObjectStore(SETTINGS_STORE_NAME, { keyPath: "id" });
                    }
                    if (!db.objectStoreNames.contains(INVENTORY_STORE_NAME)) {
                        db.createObjectStore(INVENTORY_STORE_NAME, { keyPath: "id" });
                    }
                    if (!db.objectStoreNames.contains(IMAGE_STORE_NAME)) {
                        db.createObjectStore(IMAGE_STORE_NAME, { keyPath: "id" });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function readStoreRecord(db, storeName, key) {
            return new Promise((resolve, reject) => {
                if (!db.objectStoreNames.contains(storeName)) {
                    resolve(null);
                    return;
                }
                const transaction = db.transaction(storeName, "readonly");
                const store = transaction.objectStore(storeName);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = () => reject(request.error);
                transaction.onerror = () => reject(transaction.error);
            });
        }

        function readAllStoreRecords(db, storeName) {
            return new Promise((resolve, reject) => {
                if (!db.objectStoreNames.contains(storeName)) {
                    resolve([]);
                    return;
                }
                const transaction = db.transaction(storeName, "readonly");
                const store = transaction.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(Array.isArray(request.result) ? request.result : []);
                request.onerror = () => reject(request.error);
                transaction.onerror = () => reject(transaction.error);
            });
        }

        async function loadPersistedState() {
            const db = await openStockGuardDB();
            if (!db) return null;

            try {
                const [settingsRecord, inventoryRecord, legacyState] = await Promise.all([
                    readStoreRecord(db, SETTINGS_STORE_NAME, SETTINGS_KEY),
                    readStoreRecord(db, INVENTORY_STORE_NAME, INVENTORY_KEY),
                    readStoreRecord(db, LEGACY_STORE_NAME, APP_STATE_KEY)
                ]);

                let persistedInventory = Array.isArray(inventoryRecord && inventoryRecord.items)
                    ? inventoryRecord.items.map(item => ({ ...item, photo: null, photoBlob: null }))
                    : null;

                if (persistedInventory && db.objectStoreNames.contains(IMAGE_STORE_NAME)) {
                    const photoRecords = await readAllStoreRecords(db, IMAGE_STORE_NAME);
                    const photoMap = new Map(
                        photoRecords.map(record => [String(record.id), record.blob || null])
                    );
                    persistedInventory = persistedInventory.map(item => ({
                        ...item,
                        photo: null,
                        photoBlob: photoMap.get(String(item.id)) || null
                    }));
                } else if (!persistedInventory && legacyState && Array.isArray(legacyState.inventory)) {
                    persistedInventory = legacyState.inventory.map(item => ({
                        ...item,
                        photo: item.photo || null,
                        photoBlob: null
                    }));
                }

                return {
                    ...(legacyState || {}),
                    ...((settingsRecord && settingsRecord.data) || {}),
                    inventory: persistedInventory
                };
            } finally {
                db.close();
            }
        }

        async function savePersistedInventory(inventory) {
            const db = await openStockGuardDB();
            if (!db) return;

            const normalizedItems = (Array.isArray(inventory) ? inventory : []).map(item => {
                const photoBlob = item && item.photoBlob
                    ? item.photoBlob
                    : dataUrlToBlob(item && item.photo);
                const { photo, photoBlob: _photoBlob, ...rest } = item || {};
                return {
                    persistedItem: { ...rest },
                    photoBlob: photoBlob || null
                };
            });

            return new Promise((resolve, reject) => {
                const transaction = db.transaction([INVENTORY_STORE_NAME, IMAGE_STORE_NAME], "readwrite");
                const inventoryStore = transaction.objectStore(INVENTORY_STORE_NAME);
                const imageStore = transaction.objectStore(IMAGE_STORE_NAME);

                inventoryStore.put({
                    id: INVENTORY_KEY,
                    items: normalizedItems.map(entry => entry.persistedItem)
                });

                const validImageIds = new Set();

                normalizedItems.forEach(entry => {
                    const imageId = String(entry.persistedItem.id);
                    validImageIds.add(imageId);
                    if (entry.photoBlob) {
                        imageStore.put({ id: imageId, blob: entry.photoBlob });
                    } else {
                        imageStore.delete(imageId);
                    }
                });

                const keysRequest = imageStore.getAllKeys();
                keysRequest.onsuccess = () => {
                    (keysRequest.result || []).forEach(key => {
                        if (!validImageIds.has(String(key))) {
                            imageStore.delete(key);
                        }
                    });
                };
                keysRequest.onerror = () => reject(keysRequest.error);

                transaction.oncomplete = () => {
                    db.close();
                    resolve();
                };
                transaction.onerror = () => {
                    db.close();
                    reject(transaction.error);
                };
                transaction.onabort = () => {
                    db.close();
                    reject(transaction.error);
                };
            });
        }

        async function savePersistedSettings(settings) {
            const db = await openStockGuardDB();
            if (!db) return;

            return new Promise((resolve, reject) => {
                const transaction = db.transaction(SETTINGS_STORE_NAME, "readwrite");
                const store = transaction.objectStore(SETTINGS_STORE_NAME);
                store.put({ id: SETTINGS_KEY, data: { ...(settings || {}) } });
                transaction.oncomplete = () => {

                    db.close();
                    reject(transaction.error);
                };
                transaction.onabort = () => {
                    db.close();
                    reject(transaction.error);
                };
            });
        }

                                <div className={`p-5 border-b flex items-start justify-between gap-3 shrink-0 ${isBelowRecommendedStock(detailDraft) ? "bg-red-50 border-red-100" : "bg-white border-gray-200"}`}>
                                    <div className="min-w-0">
                                        <div className="text-xs font-semibold text-blue-600 mb-1">{detailDraft.category}</div>
                                        <h3 className="text-xl font-bold text-gray-800 break-words">{detailDraft.name || "詳細編集"}</h3>
                                        <p className="text-sm text-gray-500 mt-1">このカード内で各項目を編集し、保存ボタンでまとめて更新できます。</p>
                                    </div>
                                    <button type="button" onClick={handleCloseDetailModal} className="text-gray-400 hover:text-gray-800 shrink-0"><i data-lucide="x"></i></button>
                                </div>
                                <div className="p-5 space-y-5 overflow-y-auto flex-1 min-h-0">
                                                                        <div>
                                        <div className="flex items-center justify-between gap-3 mb-2">
                                            <label className="block text-sm font-bold text-gray-700">写真</label>
                                            <button
                                                type="button"
                                                onClick={() => setDetailPhotoSectionOpen(prev => !prev)}
                                                className="px-3 py-1.5 bg-white text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 text-sm font-bold"
                                            >
                                                {detailPhotoSectionOpen ? "写真を閉じる" : "写真を開く"}
                                            </button>
                                        </div>
                                        {detailPhotoSectionOpen && (
                                            <div className="flex flex-col sm:flex-row items-start gap-4">
                                                <div className="w-full sm:w-56 h-48 rounded-xl border border-gray-200 bg-gray-100 overflow-hidden flex items-center justify-center shrink-0">
                                                    {detailDraft.photo ? (
                                                        <img src={detailDraft.photo} className="w-full h-full object-cover" />
                                                    ) : (
                                                        <i data-lucide="camera" className="w-10 h-10 text-gray-400"></i>
                                                    )}
                                                </div>
                                                <div className="flex-1 min-w-0 space-y-2">
                                                    <div className="flex flex-wrap gap-2">
                                                        <button
                                                            type="button"
                                                            onClick={() => document.getElementById(`detail-photo-capture-${detailDraft.id}`).click()}
                                                            className="px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 font-bold whitespace-nowrap"
                                                        >
                                                            撮影する
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => document.getElementById(`detail-photo-upload-${detailDraft.id}`).click()}
                                                            className="px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 font-bold whitespace-nowrap"
                                                        >
                                                            画像を選ぶ
                                                        </button>
                                                        {detailDraft.photo && (
                                                            <button
                                                                type="button"
                                                                onClick={clearDetailDraftPhoto}
                                                                className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-bold whitespace-nowrap"
                                                            >
                                                                削除
                                                            </button>
                                                        )}
                                                    </div>
                                                    <p className="text-xs text-gray-500">スマホでは「撮影する」でカメラを起動できます。</p>
                                                </div>
                                            </div>
                                        )}
                                        <input
                                            type="file"
                                            id={`detail-photo-capture-${detailDraft.id}`}
                                            accept="image/*"
                                            capture="environment"
                                            className="hidden"
                                            onChange={handleDetailDraftPhotoUpload}
                                        />
                                        <input
                                            type="file"
                                            id={`detail-photo-upload-${detailDraft.id}`}
                                            accept="image/*"
                                            className="hidden"
                                            onChange={handleDetailDraftPhotoUpload}
                                        />
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">カテゴリ</label>
                                            <select
                                                value={detailDraft.category}
                                                onChange={e => updateDetailDraftField("category", e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3"
                                            >
                                                {categories.filter(c => c !== "すべて").map(c => <option key={c}>{c}</option>)}
                                            </select>
                                        </div>
                                                                                <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">保管場所</label>
                                            <select
                                                value={detailDraft.location}
                                                onChange={e => updateDetailDraftField("location", e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3"
                                            >
                                                <option value="">保管場所未設定</option>
                                                {locationOptions.map(location => <option key={location} value={location}>{location}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">在庫分類</label>
                                            <select
                                                value={detailDraft.stockClassification || ""}
                                                onChange={e => updateDetailDraftField("stockClassification", e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3"
                                            >
                                                <option value="">未設定</option>
                                                {getStockClassificationOptionsByCategory(detailDraft.category).map(option => <option key={option} value={option}>{option}</option>)}
                                            </select>
                                        </div>
                                        <div className="sm:col-span-2">
                                            <label className="block text-sm font-bold text-gray-700 mb-1">品目名</label>
                                            <input
                                                type="text"
                                                list="item-name-options"
                                                value={detailDraft.name}
                                                onChange={e => updateDetailDraftField("name", e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3"
                                            />
                                        </div>
                                                                                <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">数量</label>
                                            <input
                                                type="number"
                                                min="0"
                                                value={detailDraft.quantity}
                                                onChange={e => updateDetailDraftField("quantity", e.target.value === "" ? "" : Math.max(0, parseInt(e.target.value, 10) || 0))}
                                                className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">単位</label>
                                            <input
                                                type="text"
                                                list="unit-options"
                                                value={detailDraft.unit}
                                                onChange={e => updateDetailDraftField("unit", e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 h-[48px]"
                                                placeholder="例：個、本"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">適正在庫量</label>
                                            <div className="flex items-center gap-2">
                                                <input
                                                    type="number"
                                                    min="0"
                                                    value={detailDraft.recommendedQuantity}
                                                    onChange={e => updateDetailDraftField("recommendedQuantity", e.target.value === "" ? "" : Math.max(0, parseInt(e.target.value, 10) || 0))}
                                                    className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 h-[48px]"
                                                    placeholder="未設定"
                                                />
                                                <span className="text-sm text-gray-500 whitespace-nowrap">{detailDraft.unit || "個"}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">賞味期限 / 使用期限</label>
                                            <input
                                                type="date"
                                                value={detailDraft.expiry}
                                                onChange={e => updateDetailDraftField("expiry", e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 h-[48px]"
                                            />
                                        </div>
                                        <div className="sm:col-span-2">
                                            <label className="block text-sm font-bold text-gray-700 mb-1">適正在庫メモ</label>
                                            <textarea
                                                value={detailDraft.recommendedMemo || ""}
                                                onChange={e => updateDetailDraftField("recommendedMemo", e.target.value)}
                                                rows="5"
                                                className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 text-sm"
                                                placeholder={getRecommendedMemoText(detailDraft)}
                                            ></textarea>
                                        </div>
                                    </div>

                                    {isBelowRecommendedStock(detailDraft) && (
                                        <div className="rounded-xl bg-red-50 text-red-700 px-4 py-3 text-sm font-semibold">現在数量が適正在庫量を下回っています。保存後も補充候補として確認してください。</div>
                                    )}
                                </div>
                                                                <div className="p-4 border-t flex flex-wrap justify-between gap-2 shrink-0">
                                    <button
                                        type="button"
                                        onClick={() => handleDeleteItem(detailDraft.id, detailDraft.name)}
                                        className="px-4 py-2 bg-white text-red-600 border border-red-200 rounded-lg hover:bg-red-50 font-bold min-w-[96px]"
                                    >
                                        削除
                                    </button>
                                    <div className="flex flex-wrap justify-end gap-2">
                                        <button type="button" onClick={handleSaveDetailItem} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 font-bold min-w-[96px]">保存</button>
                                        <button type="button" onClick={handleCloseDetailModal} className="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 font-bold min-w-[96px]">閉じる</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
